    const SUPA_URL = "https://xqjrlzsdfyjeajfkathx.supabase.co";
    const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxanJsenNkZnlqZWFqZmthdGh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NjUzMzgsImV4cCI6MjA4ODE0MTMzOH0.sFWfnIV0tpNnwB65du9dNYTMSelrlEpMXxWf4Mcww4g";

    async function dbGet(key) {
      try {
        const r = await fetch(`${SUPA_URL}/rest/v1/app_data?key=eq.${key}&select=value`,
          {headers:{"apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`}});
        const d = await r.json();
        return d?.[0]?.value ?? null;
      } catch { return null; }
    }
    async function dbSet(key, value) {
      try {
        await fetch(`${SUPA_URL}/rest/v1/app_data`,{method:"POST",
          headers:{"apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},
          body:JSON.stringify({key,value})});
      } catch {}
    }
    function usePersistedState(key, initial) {
      const [state, setState] = useState(initial);
      const [loaded, setLoaded] = useState(false);
      useEffect(()=>{dbGet(key).then(v=>{if(v!==null)setState(v);setLoaded(true);});},[]);
      useEffect(()=>{if(!loaded)return;const t=setTimeout(()=>dbSet(key,state),800);return()=>clearTimeout(t);},[state,loaded]);
      return [state,setState,loaded];
    }

    // ── UTILS ─────────────────────────────────────────────────────────────────
    const todayLocal = () => { const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
    const dateDiff = (a,b) => { const [ay,am,ad]=a.split("-").map(Number),[by,bm,bd]=b.split("-").map(Number); return Math.ceil((new Date(by,bm-1,bd)-new Date(ay,am-1,ad))/86400000); };
    const visitStatus = v => {
      if(v.status==="zakończona") return "zakończona";
      if(v.status==="anulowana") return "anulowana";
      if(!v.date) return "zaplanowana";
      return new Date(v.date+"T"+(v.time||"00:00")+":00") <= new Date() ? "zakończona" : "zaplanowana";
    };
    const emptyVisit = () => ({date:todayLocal(),time:"15:00",type:"Rehabilitacja domowa",price:"150",status:"zaplanowana",patientName:"",patientId:null,notes:""});
    const emptyRental = () => ({equipment:"Artromot K1 2025",patientName:"",phone:"",address:"",startDate:todayLocal(),startTime:"10:00",endDate:"",endTime:"10:00",renewable:false,amount:"",amountPaid:"",transport:"",notes:""});

    const VISIT_TYPES = ["Rehabilitacja domowa","Kinezyterapia","Masaż leczniczy","Krioterapia","Elektroterapia","Konsultacja","Inne"];
    const EQUIPMENT = ["Artromot K1 2025","Artromot K1 I","Kinetec Spectra","Kinetec Spectra SZ","Optiflex","Ambonka Paula"];

    // ── UI ────────────────────────────────────────────────────────────────────
    const I = {
      home:"M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z M9 22V12h6v10",
      users:"M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2 M23 21v-2a4 4 0 00-3-3.87 M16 3.13a4 4 0 010 7.75",
      equip:"M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18",
      fin:"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z",
      mkt:"M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z",
      plus:"M12 5v14 M5 12h14",back:"M19 12H5 M12 19l-7-7 7-7",chk:"M20 6L9 17l-5-5",
      ph:"M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.08 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z",
      sp:"M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z",
    };
    const Ico = ({d,s=20,c="#1C2B3A",f="none"}) => <svg width={s} height={s} viewBox="0 0 24 24" fill={f} stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d.split(" M").map((p,i)=><path key={i} d={(i?"M":"")+p}/>)}</svg>;

    const Btn = ({children,onClick,variant="primary",small,disabled,style={}}) => {
      const dk=useContext(DarkCtx);
      const v={primary:{background:"#0A7C7C",color:"#fff"},secondary:{background:dk?"#1E3A3A":"#E6F4F4",color:"#0A7C7C"},orange:{background:"#F4A261",color:"#fff"},danger:{background:dk?"#3A1C1C":"#FEE2E2",color:"#E05C5C"}};
      return <button onClick={onClick} disabled={disabled} style={{...v[variant],border:"none",borderRadius:12,padding:small?"10px 18px":"14px 22px",fontSize:small?14:16,fontWeight:600,cursor:disabled?"not-allowed":"pointer",display:"flex",alignItems:"center",gap:6,opacity:disabled?.5:1,fontFamily:"inherit",...style}}>{children}</button>;
    };
    const Card = ({children,onClick,style={}}) => {
      const dk=useContext(DarkCtx);
      return <div onClick={onClick} style={{background:dk?"#1A2A2A":"#fff",borderRadius:16,padding:"16px 18px",marginBottom:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)",cursor:onClick?"pointer":"default",...style}}>{children}</div>;
    };
    const Badge = ({children,color="#0A7C7C"}) => <span style={{background:color+"28",color,borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:700}}>{children}</span>;
    const Empty = ({text}) => <div style={{textAlign:"center",padding:"40px 20px",color:"#7A8FA6",fontSize:14}}>{text}</div>;
    const Av = ({name}) => { const i=(name||"?").split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase(); return <div style={{width:44,height:44,borderRadius:12,background:"#E6F4F4",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:15,color:"#0A7C7C",flexShrink:0}}>{i}</div>; };

    function Toast({msg,onDone}) {
      useEffect(()=>{const t=setTimeout(onDone,2200);return()=>clearTimeout(t);},[]);
      return <div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",background:"#1C2B3A",color:"#fff",borderRadius:14,padding:"12px 20px",fontSize:14,fontWeight:600,zIndex:999,boxShadow:"0 4px 20px rgba(0,0,0,.25)",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:8}}><span style={{color:"#3DAA72",fontSize:16}}>✓</span>{msg}</div>;
    }

    function Modal({title,onClose,children}) {
      const dk=useContext(DarkCtx);
      return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div style={{background:dk?"#0F1F1F":"#fff",borderRadius:"24px 24px 0 0",width:"100%",maxWidth:480,maxHeight:"92vh",overflowY:"auto",padding:"20px 20px 40px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:19,fontWeight:700,color:dk?"#E8F5F5":"#1C2B3A"}}>{title}</div>
            <button onClick={onClose} style={{background:dk?"#1A2A2A":"#F2F5F7",border:"none",borderRadius:10,width:32,height:32,cursor:"pointer",fontSize:18,color:"#7A8FA6",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
          </div>
          {children}
        </div>
      </div>;
    }

    function Inp({label,value,onChange,type="text",placeholder=""}) {
      const dk=useContext(DarkCtx);
      const s={width:"100%",padding:"13px 16px",border:`1.5px solid ${dk?"#2A4040":"#E4EAF0"}`,borderRadius:12,fontSize:16,outline:"none",background:dk?"#0F1F1F":"#FAFCFD",color:dk?"#E8F5F5":"#1C2B3A",fontFamily:"inherit"};
      return <div style={{marginBottom:14}}>
        {label&&<div style={{fontSize:13,fontWeight:600,color:dk?"#5A8A8A":"#4A6070",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>{label}</div>}
        <input type={type} value={value||""} placeholder={placeholder} onChange={e=>onChange(e.target.value)} style={s}/>
      </div>;
    }
    function Txa({label,value,onChange,rows=3,placeholder=""}) {
      const dk=useContext(DarkCtx);
      const s={width:"100%",padding:"13px 16px",border:`1.5px solid ${dk?"#2A4040":"#E4EAF0"}`,borderRadius:12,fontSize:16,outline:"none",background:dk?"#0F1F1F":"#FAFCFD",color:dk?"#E8F5F5":"#1C2B3A",fontFamily:"inherit",resize:"vertical"};
      return <div style={{marginBottom:14}}>
        {label&&<div style={{fontSize:13,fontWeight:600,color:dk?"#5A8A8A":"#4A6070",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>{label}</div>}
        <textarea value={value||""} rows={rows} placeholder={placeholder} onChange={e=>onChange(e.target.value)} style={s}/>
      </div>;
    }
    function Sel({label,value,onChange,options}) {
      const dk=useContext(DarkCtx);
      const s={width:"100%",padding:"13px 16px",border:`1.5px solid ${dk?"#2A4040":"#E4EAF0"}`,borderRadius:12,fontSize:16,outline:"none",background:dk?"#0F1F1F":"#FAFCFD",color:dk?"#E8F5F5":"#1C2B3A",fontFamily:"inherit"};
      return <div style={{marginBottom:14}}>
        {label&&<div style={{fontSize:13,fontWeight:600,color:dk?"#5A8A8A":"#4A6070",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>{label}</div>}
        <select value={value} onChange={e=>onChange(e.target.value)} style={s}>
          {options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
      </div>;
    }
    function TimeSel({label,value,onChange}) {
      const dk=useContext(DarkCtx);
      const s={width:"100%",padding:"13px 16px",border:`1.5px solid ${dk?"#2A4040":"#E4EAF0"}`,borderRadius:12,fontSize:16,outline:"none",background:dk?"#0F1F1F":"#FAFCFD",color:dk?"#E8F5F5":"#1C2B3A",fontFamily:"inherit"};
      const opts=[];
      for(let h=0;h<24;h++)for(let m=0;m<60;m+=5){const hh=String(h).padStart(2,"0"),mm=String(m).padStart(2,"0");opts.push(hh+":"+mm);}
      return <div style={{marginBottom:14}}>
        {label&&<div style={{fontSize:13,fontWeight:600,color:dk?"#5A8A8A":"#4A6070",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>{label}</div>}
        <select value={value||"10:00"} onChange={e=>onChange(e.target.value)} style={s}>
          {opts.map(o=><option key={o} value={o}>{o}</option>)}
        </select>
      </div>;
    }
    function PatientPicker({label,value,onChange,onSelect,patients}) {
      const dk=useContext(DarkCtx);
      const [open,setOpen]=useState(false);
      const matches=(patients||[]).filter(p=>value&&p.name.toLowerCase().includes(value.toLowerCase())).slice(0,6);
      return <div style={{marginBottom:14,position:"relative"}}>
        {label&&<div style={{fontSize:13,fontWeight:600,color:dk?"#5A8A8A":"#4A6070",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>{label}</div>}
        <input value={value||""} placeholder="Wpisz imię pacjenta..." onChange={e=>{onChange(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),150)}
          style={{width:"100%",padding:"13px 16px",border:`1.5px solid ${dk?"#2A4040":"#E4EAF0"}`,borderRadius:12,fontSize:16,outline:"none",background:dk?"#0F1F1F":"#FAFCFD",color:dk?"#E8F5F5":"#1C2B3A",fontFamily:"inherit"}}/>
        {open&&matches.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:dk?"#1A2A2A":"#fff",borderRadius:12,boxShadow:"0 4px 20px rgba(0,0,0,.18)",zIndex:200,overflow:"hidden"}}>
          {matches.map(p=><div key={p.id} onPointerDown={e=>{e.preventDefault();onChange(p.name);if(onSelect)onSelect(p);setOpen(false);}} style={{padding:"12px 16px",cursor:"pointer",borderBottom:`1px solid ${dk?"#2A4040":"#F2F5F7"}`,fontSize:14,fontWeight:500,color:dk?"#E8F5F5":"#1C2B3A"}}>
            {p.name} <span style={{color:"#7A8FA6",fontSize:12}}>{p.phone}</span>
          </div>)}
        </div>}
      </div>;
    }
    function ClockDisplay() {
      const [t,setT]=useState(()=>new Date().toLocaleTimeString("pl-PL",{hour:"2-digit",minute:"2-digit"}));
      useEffect(()=>{const i=setInterval(()=>setT(new Date().toLocaleTimeString("pl-PL",{hour:"2-digit",minute:"2-digit"})),1000);return()=>clearInterval(i);},[]);
      return <span>{t}</span>;
    }

    const ICS_URL = "https://xqjrlzsdfyjeajfkathx.supabase.co/functions/v1/ics";
    function openICS(arg) {
      const p = new URLSearchParams();
      p.set("title", arg.summary||"");
      const hasTime = (arg.dtStart||"").includes("T");
      if(hasTime) {
        const [d,t] = arg.dtStart.split("T");
        p.set("date", d); p.set("time", t.slice(0,5));
        if(arg.dtEnd&&arg.dtEnd.includes("T")){const[d2,t2]=arg.dtEnd.split("T");p.set("endDate",d2);p.set("endTime",t2.slice(0,5));}
      } else {
        p.set("date", arg.dtStart||""); p.set("allDay","1");
      }
      if(arg.description) p.set("desc", arg.description);
      // Use <a> click — Safari handles text/calendar from real URL correctly
      const a = document.createElement("a");
      a.href = ICS_URL+"?"+p.toString();
      a.rel = "noopener";
      document.body.appendChild(a);
      a.click();
      setTimeout(()=>document.body.removeChild(a), 1000);
    }
    function makeICS(summary, dtStart, dtEnd, description, allDay) {
      return {summary, dtStart, dtEnd, description, allDay};
    }
    function openGCal(summary, dtStart, dtEnd, description, allDay) {
      openICS({summary, dtStart, dtEnd, description, allDay});
    }

    function MiniCalendar({visits,rentals,today,onEditVisit,onAddVisit,onGoToRental,events,setEvents,patients}) {
      const dk=useContext(DarkCtx);
      const demo=useDemo();
      const [calYear,setCalYear]=useState(()=>+today.slice(0,4));
      const [calMonth,setCalMonth]=useState(()=>+today.slice(5,7));
      const [openDay,setOpenDay]=useState(()=>+today.slice(8));
      const [showEvtModal,setShowEvtModal]=useState(false);
      const [evtForm,setEvtForm]=useState({title:"",date:"",allDay:false,time:"10:00",notes:"",editId:null});

      const daysInMonth=new Date(calYear,calMonth,0).getDate();
      const firstDow=new Date(calYear,calMonth-1,1).getDay();
      const startOffset=(firstDow+6)%7;
      const monthStr=calYear+"-"+String(calMonth).padStart(2,"0");

      const prevMonth=()=>{if(calMonth===1){setCalYear(y=>y-1);setCalMonth(12);}else setCalMonth(m=>m-1);setOpenDay(null);};
      const nextMonth=()=>{if(calMonth===12){setCalYear(y=>y+1);setCalMonth(1);}else setCalMonth(m=>m+1);setOpenDay(null);};

      const rentalEventsByDay=useMemo(()=>{
        const m={};
        const add=(day,ev)=>{const d=+day;if(!m[d])m[d]=[];m[d].push(ev);};
        rentals.forEach(r=>{
          if(r.status==="zakończone"&&!r.startDate.startsWith(monthStr)&&!(r.endDate||"").startsWith(monthStr))return;
          if(!r.renewable){
            if((r.startDate||"").startsWith(monthStr))add(r.startDate.slice(8),{type:"start",r});
            if((r.endDate||"").startsWith(monthStr))add(r.endDate.slice(8),{type:"end",r});
          } else {
            (r.cycles||[]).forEach(c=>{
              if(c.month===monthStr){
                const startDay=r.startDate.slice(8);
                add(startDay,{type:"cycle",c,r});
              }
            });
            if(r.startDate.startsWith(monthStr)&&!(r.cycles||[]).some(c=>c.month===monthStr)){
              add(r.startDate.slice(8),{type:"start",r});
            }
          }
        });
        return m;
      },[rentals,monthStr]);

      const visitsByDay=useMemo(()=>{
        const m={};
        visits.filter(v=>v.date&&v.date.startsWith(monthStr)).forEach(v=>{
          const d=+v.date.slice(8);
          if(!m[d])m[d]=[];
          m[d].push(v);
        });
        return m;
      },[visits,monthStr]);

      const eventsByDay=useMemo(()=>{
        const m={};
        (events||[]).filter(e=>e.date&&e.date.startsWith(monthStr)).forEach(e=>{
          const d=+e.date.slice(8);
          if(!m[d])m[d]=[];
          m[d].push(e);
        });
        return m;
      },[events,monthStr]);

      const saveEvt=()=>{
        if(!evtForm.title.trim()||!evtForm.date)return;
        if(evtForm.editId){
          setEvents(es=>(es||[]).map(e=>e.id===evtForm.editId?{...e,title:evtForm.title.trim(),date:evtForm.date,allDay:evtForm.allDay,time:evtForm.allDay?"":evtForm.time,notes:evtForm.notes}:e));
        } else {
          setEvents(es=>[...(es||[]),{id:Date.now(),title:evtForm.title.trim(),date:evtForm.date,allDay:evtForm.allDay,time:evtForm.allDay?"":evtForm.time,notes:evtForm.notes}]);
        }
        setShowEvtModal(false);
      };

      const DOW=["Pn","Wt","Śr","Cz","Pt","Sb","Nd"];
      const todayDay=today.startsWith(monthStr)?+today.slice(8):null;
      const cells=[];
      for(let i=0;i<startOffset;i++)cells.push(null);
      for(let d=1;d<=daysInMonth;d++)cells.push(d);

      const openDateStr=openDay?monthStr+"-"+String(openDay).padStart(2,"0"):null;
      const dayVisits=openDay?(visitsByDay[openDay]||[]).sort((a,b)=>(a.time||"").localeCompare(b.time||"")):[];
      const dayRentals=openDay?(rentalEventsByDay[openDay]||[]):[];
      const dayEvents=openDay?(eventsByDay[openDay]||[]):[];
      const dayAllDay=[
        ...dayEvents.filter(e=>e.allDay).map(x=>({_kind:"event",e:x})),
        ...dayVisits.filter(v=>v.allDay).map(v=>({_kind:"visit",v})),
        ...dayRentals.filter(ev=>ev.r.allDay).map(ev=>({_kind:"rental",ev}))
      ].sort((a,b)=>{
        const ta=a._kind==="event"?a.e.title:a._kind==="visit"?a.v.patientName:a.ev.r.patientName;
        const tb=b._kind==="event"?b.e.title:b._kind==="visit"?b.v.patientName:b.ev.r.patientName;
        return ta.localeCompare(tb);
      });
      const dayTimedAll=openDay?[
        ...dayVisits.filter(v=>!v.allDay).map(v=>({_kind:"visit",_time:v.time||"00:00",v})),
        ...dayEvents.filter(e=>!e.allDay).map(e=>({_kind:"event",_time:e.time||"00:00",e})),
        ...dayRentals.filter(ev=>!ev.r.allDay).map(ev=>({_kind:"rental",_time:ev.type==="start"?(ev.r.startTime||"00:00"):ev.type==="end"?(ev.r.endTime||"00:00"):"00:00",ev}))
      ].sort((a,b)=>a._time.localeCompare(b._time)):[];

      return <div style={{marginTop:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:700}}>Kalendarz</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={prevMonth} style={{background:"#E4EAF0",border:"none",borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>

            </div>;}
            return null;
          })}

          {dayTimedAll.map((item,idx)=>{
            if(item._kind==="visit"){const v=item.v;const pat=(patients||[]).find(p=>p.id===v.patientId);const addr=pat?.address||"";return <div key={"v"+v.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${dk?"#2A4040":"#F2F5F7"}`}}>
              <div onClick={()=>onEditVisit(v)} style={{display:"flex",alignItems:"center",gap:10,flex:1,cursor:"pointer"}}>

                <div><div style={{fontWeight:600,fontSize:14,color:dk?"#E8F5F5":"#1C2B3A"}}>{v.time} · {demo?"Pacjent":v.patientName}</div>{addr&&<div style={{fontSize:12,color:"#7A8FA6"}}>📍 {addr}</div>}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{textAlign:"right"}}><div style={{fontWeight:600,fontSize:13,marginBottom:3,color:dk?"#E8F5F5":"#1C2B3A"}}>{v.price} zł</div><Badge color={visitStatus(v)==="zakończona"?"#3DAA72":"#0A7C7C"}>{visitStatus(v)}</Badge></div>
                <button onClick={()=>openICS(makeICS(v.patientName+" – "+v.type, v.date+"T"+v.time, v.date+"T"+(()=>{const[h,m]=v.time.split(":").map(Number);const e=h*60+m+60;return String(Math.floor(e/60)%24).padStart(2,"0")+":"+String(e%60).padStart(2,"0");})(), "Cena: "+v.price+" zł"+(addr?"\\nAdres: "+addr:""), false))} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,padding:"2px 4px",color:"#7A8FA6"}}>📅</button>
              </div>
            </div>;}
            if(item._kind==="event"){const ev=item.e;return <div key={"e"+ev.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${dk?"#2A4040":"#F2F5F7"}`}}>
              <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:"#F4A261",flexShrink:0}}/>
                <div><div style={{fontWeight:600,fontSize:14,color:dk?"#E8F5F5":"#1C2B3A"}}>{ev.time} · {ev.title}</div>{ev.notes&&<div style={{fontSize:12,color:"#7A8FA6",whiteSpace:"pre-wrap"}}>{ev.notes}</div>}</div>
              </div>
              <div style={{display:"flex",gap:4,alignItems:"center"}}>
                <button onClick={()=>openICS(makeICS(ev.title, ev.date+"T"+ev.time, ev.date+"T"+ev.time, ev.notes||"", false))} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#7A8FA6",padding:"2px 4px"}}>📅</button>
                <button onClick={()=>{setEvtForm({title:ev.title,date:ev.date,allDay:ev.allDay,time:ev.time||"10:00",notes:ev.notes||"",editId:ev.id});setShowEvtModal(true);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#7A8FA6",padding:"2px 4px"}}>✏️</button>
                <button onClick={()=>setEvents(es=>(es||[]).filter(e=>e.id!==ev.id))} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#E05C5C",padding:"2px 4px"}}>×</button>
              </div>
            </div>;}
            if(item._kind==="rental"){const ev=item.ev;
              const label=ev.type==="start"?"📦 Wydanie":ev.type==="end"?"🔙 Zwrot":"🔄 Opłata";
              const color=ev.type==="end"?"#F4A261":ev.type==="cycle"?(ev.c.paid?"#3DAA72":"#E05C5C"):"#7C6AF4";
              const extDue=(ev.r.extensions||[]).reduce((s,e)=>s+(+e.amountDue||0),0);
              const totalAmt=(+ev.r.amount||0)+extDue;
              const sub=ev.type==="cycle"?(ev.c.paid?`opłacono ${ev.c.amount} zł`:`do opłacenia ${ev.c.amount} zł`):totalAmt+" zł";
              const timeLabel=ev.type==="start"?(ev.r.startTime||""):( ev.type==="end"?(ev.r.endTime||""):"");
              const icsStart=ev.type==="start"?ev.r.startDate+"T"+(ev.r.startTime||"10:00"):ev.r.endDate+"T"+(ev.r.endTime||"10:00");
              const icsEnd=ev.type==="start"?ev.r.startDate+"T"+(ev.r.startTime||"10:00"):ev.r.endDate+"T"+(ev.r.endTime||"10:00");
              return <div key={"r"+idx} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${dk?"#2A4040":"#F2F5F7"}`}}>
                <div onClick={()=>onGoToRental(ev.r.id)} style={{display:"flex",alignItems:"center",gap:10,flex:1,cursor:"pointer"}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:"#7C6AF4",flexShrink:0}}/>
                  <div><div style={{fontWeight:600,fontSize:14,color:dk?"#E8F5F5":"#1C2B3A"}}>{timeLabel?timeLabel+" · ":""}{label} · {ev.r.patientName}</div><div style={{fontSize:12,color:"#7A8FA6"}}>{ev.r.equipment}{ev.r.address?" · 📍"+ev.r.address:""}</div></div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <Badge color={color}>{sub}</Badge>
                  <button onClick={()=>openICS(makeICS(label+" – "+ev.r.patientName+" ("+ev.r.equipment+")", icsStart, icsEnd, "Tel: "+(ev.r.phone||"brak")+(ev.r.address?"\\nAdres: "+ev.r.address:""), false))} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#7A8FA6",padding:"2px 4px"}}>📅</button>

            return null;
          })}
        </div>}

        {showEvtModal&&<Modal title={evtForm.editId?"Edytuj wydarzenie":"Nowe wydarzenie"} onClose={()=>setShowEvtModal(false)}>
          <Inp label="Tytuł *" value={evtForm.title} onChange={v=>setEvtForm(f=>({...f,title:v}))} placeholder="np. Konferencja, Urlop..."/>
          <Inp label="Data *" value={evtForm.date} onChange={v=>setEvtForm(f=>({...f,date:v}))} type="date"/>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Typ</div>
            <div style={{display:"flex",gap:8}}>
              {[{v:false,l:"⏰ Z godziną"},{v:true,l:"🗓 Całodniowe"}].map(o=><button key={String(o.v)} onClick={()=>setEvtForm(f=>({...f,allDay:o.v}))} style={{flex:1,padding:"10px 8px",borderRadius:12,border:`2px solid ${evtForm.allDay===o.v?"#F4A261":"#E4EAF0"}`,background:evtForm.allDay===o.v?"#FFF4E8":"#fff",color:evtForm.allDay===o.v?"#F4A261":"#7A8FA6",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{o.l}</button>)}
            </div>
          </div>
          {!evtForm.allDay&&<TimeSel label="Godzina" value={evtForm.time||"10:00"} onChange={v=>setEvtForm(f=>({...f,time:v}))}/>}
          <Txa label="Notatka" value={evtForm.notes||""} onChange={v=>setEvtForm(f=>({...f,notes:v}))} rows={2} placeholder="Opcjonalnie..."/>
          <Btn disabled={!evtForm.title.trim()||!evtForm.date} style={{width:"100%",justifyContent:"center"}} onClick={saveEvt}>{evtForm.editId?"Zapisz zmiany":"Dodaj wydarzenie"}</Btn>
        </Modal>}
      </div>;
    }

    // ── DASHBOARD ─────────────────────────────────────────────────────────────
    function Dashboard({visits,setVisits,rentals,setRentals,finances,setFinances,patients,goToRental,nfzCases,goToWozki,todos,setTodos,events,setEvents}) {
      const demo=useDemo();
      const today = todayLocal();
      const dk=useContext(DarkCtx);
      const [showAdd,setShowAdd]=useState(false);
      const [vf,setVf]=useState(emptyVisit);
      const [editV,setEditV]=useState(null);
      const [confirmDel,setConfirmDel]=useState(null);
      const [toast,setToast]=useState(null);

      const todayV = visits.filter(v=>v.date===today).sort((a,b)=>(a.time||"").localeCompare(b.time||""));
      const upcoming = rentals.filter(r=>r.status==="aktywne"&&r.endDate&&!r.renewable).sort((a,b)=>a.endDate.localeCompare(b.endDate)).slice(0,5);
      const unpaidCycles = rentals.filter(r=>r.status==="aktywne"&&r.renewable&&(r.cycles||[]).some(c=>!c.paid));

      const wózkiReminders = useMemo(()=>{
        if(!nfzCases) return [];
        return (nfzCases).filter(cas=>{
          if(!cas.orderDate) return false;
          const nd = nextOrderDate(cas);
          if(!nd) return false;
          const dl = dateDiff(today, nd);
          return dl <= 14;
        }).sort((a,b)=>nextOrderDate(a).localeCompare(nextOrderDate(b)));
      },[nfzCases, today]);

      const birthdayReminders = useMemo(()=>{
        return (patients||[]).filter(p=>{
          if(!p.birthday||p.archived) return false;
          const b=new Date(todayLocal().slice(0,4)+"-"+p.birthday.slice(5)+"T12:00:00");
          const t=new Date(todayLocal()+"T12:00:00");
          if(b<t) b.setFullYear(b.getFullYear()+1);
          return Math.round((b-t)/86400000)<=7;
        }).map(p=>{
          const b=new Date(todayLocal().slice(0,4)+"-"+p.birthday.slice(5)+"T12:00:00");
          const t=new Date(todayLocal()+"T12:00:00");
          if(b<t) b.setFullYear(b.getFullYear()+1);
          const days=Math.round((b-t)/86400000);
          const age=todayLocal().slice(0,4)-p.birthday.slice(0,4)-(p.birthday.slice(5)<todayLocal().slice(5)?0:p.birthday.slice(5)===todayLocal().slice(5)?0:1);
          return {...p,_days:days,_age:age};
        }).sort((a,b)=>a._days-b._days);
      },[patients,today]);

      const syncFinance = (v, isNew=false) => {
        const done = v.status==="zakończona" || new Date(v.date+"T"+(v.time||"00:00")+":00")<=new Date();
        if(!done) return;
        const sid = "visit-"+v.id;
        setFinances(fs=>{
          const exists = fs.some(f=>f.sourceId===sid);
          if(isNew && !exists) return [{id:Date.now()+Math.random(),sourceId:sid,date:v.date,type:"przychód",category:"Wizyta",amount:v.price||0,description:"Wizyta – "+v.patientName},...fs];
          if(!isNew && exists) return fs.map(f=>f.sourceId===sid?{...f,amount:v.price,description:"Wizyta – "+v.patientName,date:v.date}:f);
          if(!isNew && !exists) return [{id:Date.now()+Math.random(),sourceId:sid,date:v.date,type:"przychód",category:"Wizyta",amount:v.price||0,description:"Wizyta – "+v.patientName},...fs];
          return fs;
        });
      };

      const saveNew = () => {
        if(!vf.patientName) return;
        const pat=patients.find(p=>p.name===vf.patientName);
        const nv={id:Date.now(),...vf,price:+vf.price,patientId:pat?.id||null};
        setVisits(vs=>[...vs,nv]);
        syncFinance(nv,true);
        setShowAdd(false); setVf(emptyVisit()); setToast("Wizyta zapisana");
      };
      const saveEdit = () => {
        if(!editV) return;
        const u={...editV,price:+editV.price};
        if(u.id) {
          setVisits(vs=>vs.map(v=>v.id===u.id?{...v,...u}:v));
        } else {
          // stara wizyta bez id — dopasuj po date+time+patientName
          setVisits(vs=>vs.map(v=>(!v.id&&v.date===u.date&&v.time===u.time&&v.patientName===u.patientName)?{...v,...u}:v));
        }
        syncFinance(u,false);
        setEditV(null); setToast("Zmiany zapisane");
      };
      const delVisit = id => {
        if(id && id!=="__DEL__") {
          setVisits(vs=>vs.filter(v=>v.id!==id));
          setFinances(fs=>fs.filter(f=>f.sourceId!=="visit-"+id));
        } else if(editV) {
          const {date,time,patientName}=editV;
          setVisits(vs=>vs.filter(v=>!(v.date===date&&v.time===time&&v.patientName===patientName)));
        }
        setConfirmDel(null); setEditV(null);
      };

      const [searchQ,setSearchQ]=useState("");
      const searchResults=useMemo(()=>{
        const q=(searchQ||"").trim().toLowerCase();
        if(q.length<2) return null;
        const res=[];
        const patByName=Object.fromEntries((patients||[]).map(p=>[p.name,p]));
        // wizyty
        visits.filter(v=>{
          const pat=patByName[v.patientName]||{};
          return (v.patientName||"").toLowerCase().includes(q)||(v.notes||"").toLowerCase().includes(q)||(v.type||"").toLowerCase().includes(q)||((pat.phone||"").replace(/\s/g,"").includes(q.replace(/\s/g,"")));
        }).slice(0,5).forEach(v=>{
          const pat=patByName[v.patientName]||{};
          res.push({kind:"visit",label:"Wizyta",title:(v.allDay?"🗓 ":"⏰ ")+(v.time?v.time+" · ":"")+v.patientName,sub:v.date+" · "+v.type+(v.price?" · "+v.price+" zł":"")+(pat.phone?" · 📞 "+pat.phone:""),item:v});
        });
        // wypożyczenia
        rentals.filter(r=>(r.patientName||"").toLowerCase().includes(q)||(r.equipment||"").toLowerCase().includes(q)||(r.address||"").toLowerCase().includes(q)||((r.phone||"").replace(/\s/g,"").includes(q.replace(/\s/g,"")))).slice(0,5).forEach(r=>res.push({kind:"rental",label:"Sprzęt",title:"📦 "+r.patientName+" – "+r.equipment,sub:r.startDate+(r.endDate?" → "+r.endDate:"")+" · "+(r.status||"")+(r.phone?" · 📞 "+r.phone:""),item:r}));
        // pacjenci
        patients.filter(p=>(p.name||"").toLowerCase().includes(q)||(p.phone||"").replace(/\s/g,"").includes(q.replace(/\s/g,""))||(p.address||"").toLowerCase().includes(q)).slice(0,3).forEach(p=>res.push({kind:"patient",label:"Pacjent",title:"👤 "+p.name,sub:(p.phone?"📞 "+p.phone:"")+(p.address?" · "+p.address:""),item:p}));
        // wydarzenia

            {searchResults&&searchResults.length===0&&<div style={{padding:"10px 4px",fontSize:13,color:"#7A8FA6"}}>Brak wyników</div>}
            {searchResults&&searchResults.length>0&&<div style={{background:dk?"#1A2A2A":"#fff",borderRadius:12,boxShadow:"0 2px 12px rgba(0,0,0,.08)",marginTop:6,overflow:"hidden"}}>

                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:10,fontWeight:700,color:"#0A7C7C",background:"#E6F4F4",padding:"2px 6px",borderRadius:6}}>{r.label}</span>

              </div>
              {todoOpen&&<div style={{borderTop:`1px solid ${dk?"#2A4040":"#F2F5F7"}`,padding:"10px 16px 14px"}}>
                <div style={{display:"flex",gap:8,marginBottom:12}}>
                  <input value={todoInput} onChange={e=>setTodoInput(e.target.value)}

              {birthdayReminders.map(p=><Card key={"bd-"+p.id} style={{background:"#FFF5F0",border:"1.5px solid #F4A26130"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontWeight:600}}>🎂 {demo?"Pacjent":p.name}</div>
                    <div style={{fontSize:13,color:"#7A8FA6"}}>{p._age} lat · {p.birthday.slice(5).split("-").reverse().join(".")}</div>

                  <Badge color={p._days===0?"#F4A261":p._days<=3?"#F4A261":"#3DAA72"}>{p._days===0?"Dziś!":p._days===1?"Jutro":"Za "+p._days+" dni"}</Badge>
                </div>
              </Card>)}
              {upcoming.map(r=>{const d=dateDiff(today,r.endDate);return(
                <Card key={r.id} onClick={()=>goToRental(r.id)}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div><div style={{fontWeight:600}}>{r.equipment}</div><div style={{fontSize:13,color:"#7A8FA6"}}>{r.patientName} · {r.endDate}</div></div>
                    <Badge color={d<0?"#E05C5C":d===0?"#F4A261":d<7?"#F4A261":"#3DAA72"}>{d<0?Math.abs(d)+"d po term.":d===0?"Dziś!":d+"d"}</Badge>
                  </div>

              {wózkiReminders.map(cas=>{

                const dl=dateDiff(today,nd);

                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontWeight:600}}>🦽 {cas.patientName}</div>
                      <div style={{fontSize:13,color:"#7A8FA6"}}>{cas.hasDisabilityCert?"Z orzeczeniem":"Bez orzeczenia"} · kolejne od {nd}</div>
                    </div>
                    <span style={{fontSize:13,fontWeight:600,color:"#1C2B3A"}}>{dl<=0?"można złożyć":"za "+dl+"d"}</span>
                  </div>
                </Card>;
              })}
              {unpaidCycles.map(r=>{const n=(r.cycles||[]).filter(c=>!c.paid).length;return(
                <Card key={r.id} onClick={()=>goToRental(r.id)} style={{borderLeft:"3px solid #E05C5C"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div><div style={{fontWeight:600}}>{r.equipment}</div><div style={{fontSize:13,color:"#7A8FA6"}}>{r.patientName}</div></div>
                    <Badge color="#E05C5C">{n} {n===1?"miesiąc":"mies."}</Badge>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Inp label="Data" value={vf.date} onChange={v=>setVf(f=>({...f,date:v}))} type="date"/>

          </div>

            <div style={{display:"flex",gap:8}}>{[{v:false,l:"⏰ Z godziną"},{v:true,l:"🗓 Całodniowe"}].map(o=><button key={String(o.v)} onClick={()=>setVf(f=>({...f,allDay:o.v}))} style={{flex:1,padding:"8px",borderRadius:10,border:`2px solid ${(vf.allDay||false)===o.v?"#0A7C7C":"#E4EAF0"}`,background:(vf.allDay||false)===o.v?"#E6F4F4":"#fff",color:(vf.allDay||false)===o.v?"#0A7C7C":"#7A8FA6",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{o.l}</button>)}</div>
          </div>
          <Sel label="Typ" value={vf.type} onChange={v=>setVf(f=>({...f,type:v}))} options={VISIT_TYPES.map(x=>({value:x,label:x}))}/>

          <Sel label="Status" value={vf.status} onChange={v=>setVf(f=>({...f,status:v}))} options={[{value:"zaplanowana",label:"📅 Zaplanowana"},{value:"zakończona",label:"✅ Zakończona"}]}/>
          <Txa label="Notatka" value={vf.notes||""} onChange={v=>setVf(f=>({...f,notes:v}))} rows={2} placeholder="Przebieg wizyty, zalecenia..."/>

            <Inp label="Data" value={editV.date} onChange={v=>setEditV(f=>({...f,date:v}))} type="date"/>
            {!editV.allDay&&<TimeSel label="Godzina" value={editV.time} onChange={v=>setEditV(f=>({...f,time:v}))}/>}
          </div>
          <div style={{marginBottom:14}}>
            <div style={{display:"flex",gap:8}}>{[{v:false,l:"⏰ Z godziną"},{v:true,l:"🗓 Całodniowe"}].map(o=><button key={String(o.v)} onClick={()=>setEditV(f=>({...f,allDay:o.v}))} style={{flex:1,padding:"8px",borderRadius:10,border:`2px solid ${(editV.allDay||false)===o.v?"#0A7C7C":"#E4EAF0"}`,background:(editV.allDay||false)===o.v?"#E6F4F4":"#fff",color:(editV.allDay||false)===o.v?"#0A7C7C":"#7A8FA6",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{o.l}</button>)}</div>
          </div>
          <Sel label="Typ" value={editV.type} onChange={v=>setEditV(f=>({...f,type:v}))} options={VISIT_TYPES.map(x=>({value:x,label:x}))}/>
          <Inp label="Cena (zł)" value={editV.price} onChange={v=>setEditV(f=>({...f,price:v}))} type="number"/>
          <Sel label="Status" value={editV.status||"zaplanowana"} onChange={v=>setEditV(f=>({...f,status:v}))} options={[{value:"zaplanowana",label:"📅 Zaplanowana"},{value:"zakończona",label:"✅ Zakończona"}]}/>
          <Txa label="Notatka" value={editV.notes||""} onChange={v=>setEditV(f=>({...f,notes:v}))} rows={2} placeholder="Przebieg wizyty, zalecenia..."/>          <Btn onClick={saveEdit} style={{width:"100%",justifyContent:"center",marginBottom:8}}>Zapisz zmiany</Btn>
          <Btn variant="secondary" style={{width:"100%",justifyContent:"center",marginBottom:8}} onClick={()=>{setVf({...editV,id:undefined,date:todayLocal(),status:"zaplanowana",price:String(editV.price)});setEditV(null);setShowAdd(true);}}>📋 Powiel wizytę</Btn>

    // ── PATIENTS ──────────────────────────────────────────────────────────────
    function BirthdayCard({birthday, dk}) {
      const today = todayLocal();
      const age = +today.slice(0,4) - +birthday.slice(0,4) - (birthday.slice(5) > today.slice(5) ? 1 : 0);
      const thisYearBd = today.slice(0,4) + "-" + birthday.slice(5);
      const bdDate = new Date(thisYearBd + "T12:00:00");
      const todayDate = new Date(today + "T12:00:00");
      if(bdDate < todayDate) bdDate.setFullYear(bdDate.getFullYear() + 1);
      const daysTo = Math.round((bdDate - todayDate) / 86400000);
      return <Card style={{marginBottom:10,background:"#FFF5F0",border:"1.5px solid #F4A26130"}}>
        <div style={{fontSize:11,fontWeight:700,color:"#F4A261",textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>Urodziny</div>
        <div style={{fontSize:14,fontWeight:600,color:dk?"#E0F0F0":"#1A2E35"}}>{new Date(birthday+"T12:00:00").toLocaleDateString("pl-PL",{day:"numeric",month:"long",year:"numeric"})} · {age} lat</div>
        {daysTo<=7&&<div style={{fontSize:12,color:"#F4A261",fontWeight:700,marginTop:4}}>{daysTo===0?"🎂 Dzisiaj!":daysTo===1?"🎂 Jutro!":"🎂 Za "+daysTo+" dni"}</div>}
      </Card>;
    }

    function Patients({patients,setPatients,visits,setVisits,finances,setFinances,rentals,setRentals}) {
      const demo=useDemo();
      const dk=useContext(DarkCtx);
      const [selId,setSelId]=useState(null);
      const [showAdd,setShowAdd]=useState(false);
      const [showEdit,setShowEdit]=useState(false);
      const [confirmDelPat,setConfirmDelPat]=useState(false);
      const [editForm,setEditForm]=useState(null);
      const [newForm,setNewForm]=useState({name:"",phone:"",address:"",diagnosis:"",notes:"",defaultPrice:"",birthday:""});
      const [showAddV,setShowAddV]=useState(false);
      const [vf,setVf]=useState(emptyVisit);
      const [editV,setEditV]=useState(null);
      const [confirmDelV,setConfirmDelV]=useState(null);
      const [search,setSearch]=useState("");
      const [sort,setSort]=useState("alpha");
      const [histFilter,setHistFilter]=useState("all");
      const [showArchived,setShowArchived]=useState(false);
      const [toast,setToast]=useState(null);
      const [showQuickV,setShowQuickV]=useState(false);
      const [quickV,setQuickV]=useState(null);

      const pat = selId ? patients.find(p=>p.id===selId) : null;
      if(selId && !pat) { setSelId(null); return null; }

      const patVisits = pat ? visits.filter(v=>v.patientId===pat.id||(v.patientName===pat.name&&!v.patientId)) : [];
      const patRentals = pat ? rentals.filter(r=>r.patientId===pat.id||r.patientName===pat.name) : [];
      const history = [...patVisits.map(v=>({...v,_t:"v",_d:v.date||"",_time:v.time||"00:00"})),...patRentals.map(r=>({...r,_t:"r",_d:r.startDate||"",_time:"00:00"}))].sort((a,b)=>(b._d||"").localeCompare(a._d||"")||(b._time||"").localeCompare(a._time||""));

      const patTotalVisits = pat ? patVisits.filter(v=>visitStatus(v)==="zakończona").reduce((s,v)=>s+(+v.price||0),0) : 0;
      const patTotalRentals = pat ? patRentals.reduce((s,r)=>s+(r.renewable?(r.cycles||[]).filter(c=>c.paid).reduce((ss,c)=>ss+c.amount,0):(r.amountPaid||0)),0) : 0;
      const patTotal = patTotalVisits + patTotalRentals;
      const patDoneVisits = pat ? patVisits.filter(v=>visitStatus(v)==="zakończona") : [];
      const patAvgPrice = patDoneVisits.length ? Math.round(patDoneVisits.reduce((s,v)=>s+(+v.price||0),0)/patDoneVisits.length) : 0;
      const patFirstVisit = patDoneVisits.length ? patDoneVisits.map(v=>v.date).sort()[0] : null;
      const patSinceMonths = patFirstVisit ? Math.round((new Date(todayLocal())-new Date(patFirstVisit))/2592000000) : 0;

      const syncFinance = (v,isNew) => {
        const done = v.status==="zakończona"||new Date(v.date+"T"+(v.time||"00:00")+":00")<=new Date();
        if(!done) return;
        const sid="visit-"+v.id;
        setFinances(fs=>{
          const ex=fs.some(f=>f.sourceId===sid);
          if(isNew&&!ex) return [{id:Date.now()+Math.random(),sourceId:sid,date:v.date,type:"przychód",category:"Wizyta",amount:v.price||0,description:"Wizyta – "+v.patientName},...fs];
          if(!isNew) return ex?fs.map(f=>f.sourceId===sid?{...f,amount:v.price,description:"Wizyta – "+v.patientName,date:v.date}:f):[{id:Date.now()+Math.random(),sourceId:sid,date:v.date,type:"przychód",category:"Wizyta",amount:v.price||0,description:"Wizyta – "+v.patientName},...fs];
          return fs;
        });
      };



      if(pat) {
        const maps=pat.address?`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(pat.address)}`:null;
        return <>
          <div>
            <button onClick={()=>setSelId(null)} style={{background:"none",border:"none",display:"flex",alignItems:"center",gap:6,color:"#0A7C7C",fontWeight:600,cursor:"pointer",padding:"20px 20px 0",fontFamily:"inherit",fontSize:14}}>
              <Ico d={I.back} s={18} c="#0A7C7C"/> Pacjenci
            </button>
            <div style={{padding:"16px 20px 0"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <Av name={pat.name}/>
                  <div><div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800}}>{pat.name}</div><div style={{fontSize:13,color:"#7A8FA6"}}>{pat.phone}</div></div>
                </div>
                <Btn small variant="secondary" onClick={()=>{setEditForm({...pat});setConfirmDelPat(false);setShowEdit(true);}}>✏️ Edytuj</Btn>
              </div>

              <Card style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:pat.address?10:0}}>
                  <div style={{fontSize:14,color:"#7A8FA6"}}>{pat.phone||"Brak telefonu"}</div>
                  {pat.phone&&<a href={`tel:${pat.phone.replace(/\s/g,"")}`} style={{textDecoration:"none"}}><Btn small variant="secondary"><Ico d={I.ph} s={15} c="#0A7C7C"/> Zadzwoń</Btn></a>}
                </div>
                {pat.address&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:14,color:"#7A8FA6",flex:1,paddingRight:8}}>{pat.address}</div>
                  {maps&&<a href={maps} target="_blank" rel="noreferrer" style={{textDecoration:"none",flexShrink:0}}><Btn small variant="secondary">🗺️ Trasa</Btn></a>}
                </div>}
              </Card>
              {pat.diagnosis&&<Card style={{marginBottom:10,background:"#F0EDFF",border:"1.5px solid #7C6AF430"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#7C6AF4",textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Diagnoza</div>
                <div style={{fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{pat.diagnosis}</div>
              </Card>}
              {pat.notes&&<Card style={{marginBottom:10,background:"#FFFBF5",border:"1.5px solid #F4A26130"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#F4A261",textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Notatki</div>
                <div style={{fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{pat.notes}</div>
              </Card>}
              {pat.defaultPrice&&<Card style={{marginBottom:10,background:"#F0FFF8",border:"1.5px solid #3DAA7230"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#3DAA72",textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>Domyślna cena wizyty</div>
                <div style={{fontSize:18,fontWeight:800,color:"#3DAA72"}}>{pat.defaultPrice} zł</div>
              </Card>}
              {pat.birthday&&<BirthdayCard birthday={pat.birthday} dk={dk}/>}

              {patDoneVisits.length>0&&<Card style={{marginBottom:10,background:dk?"#1A2A2A":"#F7FAFA",border:"1.5px solid #E4EAF0"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#7A8FA6",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Statystyki</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                  {[
                    {l:"Wizyty",v:patDoneVisits.length,c:"#0A7C7C"},
                    {l:"Śr. cena",v:patAvgPrice+" zł",c:"#7C6AF4"},
                    {l:"Pacjent od",v:patSinceMonths<1?"<1 mies.":patSinceMonths<12?patSinceMonths+" mies.":(patSinceMonths/12).toFixed(1).replace(".0","")+" lat",c:"#F4A261"},
                  ].map((x,i)=><div key={i} style={{background:x.c+"14",borderRadius:12,padding:"10px 8px",textAlign:"center",border:`1.5px solid ${x.c}30`}}>
                    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,color:x.c}}>{x.v}</div>
                    <div style={{fontSize:11,color:"#7A8FA6",marginTop:2}}>{x.l}</div>
                  </div>)}
                </div>
              </Card>}
              {patTotal>0&&<Card style={{marginBottom:10,background:"#E6F4F4",border:"1.5px solid #0A7C7C30"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#0A7C7C",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Łącznie zapłacono</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                  {[{l:"Wizyty",v:patTotalVisits,c:"#0A7C7C"},{l:"Wypożyczenia",v:patTotalRentals,c:"#7C6AF4"},{l:"Razem",v:patTotal,c:"#1C2B3A"}].map((x,i)=>(
                    <div key={i} style={{background:"#fff",borderRadius:12,padding:"10px 8px",textAlign:"center",border:"1.5px solid #E4EAF0"}}>
                      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14,color:x.c}}>{x.v} zł</div>
                      <div style={{fontSize:11,color:"#7A8FA6",marginTop:2}}>{x.l}</div>
                    </div>
                  ))}
                </div>
              </Card>}

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:700}}>Historia ({history.length})</div>
                <Btn small onClick={()=>{setVf({...emptyVisit(),patientName:pat.name,patientId:pat.id,price:pat.defaultPrice?String(pat.defaultPrice):"150"});setShowAddV(true);}}><Ico d={I.plus} s={15} c="#fff"/> Wizyta</Btn>
              </div>
              <div style={{display:"flex",gap:6,marginBottom:10}}>
                {[{k:"all",l:"Wszystko"},{k:"v",l:"Wizyty"},{k:"r",l:"Wypożyczenia"}].map(x=><button key={x.k} onClick={()=>setHistFilter(x.k)} style={{padding:"6px 12px",borderRadius:16,border:"none",cursor:"pointer",fontWeight:600,fontSize:12,background:histFilter===x.k?"#0A7C7C":"#E4EAF0",color:histFilter===x.k?"#fff":"#7A8FA6",fontFamily:"inherit"}}>{x.l}</button>)}
              </div>
              {history.filter(item=>histFilter==="all"||(histFilter==="v"&&item._t==="v")||(histFilter==="r"&&item._t==="r")).length===0
                ?<Empty text="Brak wpisów"/>
                :history.filter(item=>histFilter==="all"||(histFilter==="v"&&item._t==="v")||(histFilter==="r"&&item._t==="r")).map(item=>
                item._t==="v"
                ? <Card key={"v"+item.id} onClick={()=>setEditV({...item,price:String(item.price)})}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div><div style={{fontSize:11,fontWeight:700,color:"#0A7C7C",textTransform:"uppercase",letterSpacing:.5,marginBottom:2}}>Wizyta</div><div style={{fontWeight:600}}>{item.date} · {item.time}</div><div style={{fontSize:13,color:"#7A8FA6"}}>{item.type}</div></div>
                      <div style={{textAlign:"right"}}><div style={{fontWeight:600,marginBottom:4}}>{item.price} zł</div><Badge color={visitStatus(item)==="zakończona"?"#3DAA72":"#0A7C7C"}>{visitStatus(item)}</Badge></div>
                    </div>
                    {item.notes&&<div style={{fontSize:12,color:"#7A8FA6",marginTop:8,paddingTop:8,borderTop:"1px solid #F2F5F7",fontStyle:"italic",whiteSpace:"pre-wrap"}}>📝 {item.notes}</div>}
                  </Card>
                : <Card key={"r"+item.id} style={{background:"#F0EDFF"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div><div style={{fontSize:11,fontWeight:700,color:"#7C6AF4",textTransform:"uppercase",letterSpacing:.5,marginBottom:2}}>Wypożyczenie</div><div style={{fontWeight:600}}>{item.equipment}</div><div style={{fontSize:13,color:"#7A8FA6"}}>{item.startDate}{item.endDate?" → "+item.endDate:""}</div></div>
                      <div style={{textAlign:"right"}}><div style={{fontWeight:600,marginBottom:4}}>{item.amount} zł</div><Badge color={item.status==="zakończone"?"#7A8FA6":"#7C6AF4"}>{item.status}</Badge></div>
                    </div>
                  </Card>
              )}
            </div>
          </div>

          {/* Modal: edytuj pacjenta */}
          {showEdit&&editForm&&<Modal title="Edytuj pacjenta" onClose={()=>{setShowEdit(false);setEditForm(null);setConfirmDelPat(false);}}>
            <Inp label="Imię i nazwisko" value={editForm.name||""} onChange={v=>setEditForm(f=>({...f,name:v}))} placeholder="Jan Kowalski"/>
            <Inp label="Telefon" value={editForm.phone||""} onChange={v=>setEditForm(f=>({...f,phone:v}))} placeholder="600 000 000" type="tel"/>
            <Inp label="Adres" value={editForm.address||""} onChange={v=>setEditForm(f=>({...f,address:v}))} placeholder="ul. Przykładowa 1, Gliwice"/>
            <Txa label="Diagnoza" value={editForm.diagnosis||""} onChange={v=>setEditForm(f=>({...f,diagnosis:v}))} rows={2}/>
            <Txa label="Notatki" value={editForm.notes||""} onChange={v=>setEditForm(f=>({...f,notes:v}))} rows={2}/>
            <Inp label="Domyślna cena wizyty (zł)" value={editForm.defaultPrice||""} onChange={v=>setEditForm(f=>({...f,defaultPrice:v}))} type="number" placeholder="np. 150"/>
            <Inp label="Data urodzin" value={editForm.birthday||""} onChange={v=>setEditForm(f=>({...f,birthday:v}))} type="date"/>
            {!confirmDelPat
              ? <>
                  <Btn style={{width:"100%",justifyContent:"center",marginBottom:8}} onClick={()=>{
                    const _pid=editForm.id;
                    const _old=patients.find(p=>p.id===_pid)?.name||editForm.name;
                    const _new=editForm.name||_old;
                    setPatients(ps=>ps.map(p=>p.id===_pid?{...p,...editForm}:p));
                    if(_new!==_old){
                      setVisits(vs=>vs.map(v=>v.patientId===_pid?{...v,patientName:_new}:v));
                      setFinances(fs=>fs.map(f=>f.description?{...f,description:f.description.split(_old).join(_new)}:f));
                    }
                    setRentals(rs=>rs.map(r=>{
                      if(r.patientId!==_pid&&r.patientName!==_old) return r;
                      return {...r,patientName:_new,phone:editForm.phone,address:editForm.address,patientId:_pid};
                    }));
                    setShowEdit(false);
                    setEditForm(null);
                    setToast("Zapisano zmiany");
                  }}>Zapisz zmiany</Btn>
                  <Btn variant="secondary" style={{width:"100%",justifyContent:"center",marginBottom:8}} onClick={()=>{setPatients(ps=>ps.map(p=>p.id===editForm.id?{...p,archived:!p.archived}:p));setShowEdit(false);setEditForm(null);setSelId(null);setToast(editForm.archived?"Pacjent przywrócony":"Pacjent zarchiwizowany");}}>📦 {editForm.archived?"Przywróć pacjenta":"Archiwizuj pacjenta"}</Btn>
                  <Btn variant="danger" style={{width:"100%",justifyContent:"center"}} onClick={()=>setConfirmDelPat(true)}>🗑️ Usuń pacjenta</Btn>
                </>
              : <>
                  <div style={{background:"#FEE2E2",borderRadius:12,padding:14,marginBottom:12,fontSize:14,color:"#E05C5C",textAlign:"center",fontWeight:600}}>Na pewno usunąć pacjenta i wszystkie jego dane?</div>
                  <div style={{display:"flex",gap:10}}>
                    <Btn variant="secondary" style={{flex:1,justifyContent:"center"}} onClick={()=>setConfirmDelPat(false)}>Anuluj</Btn>
                    <Btn variant="danger" style={{flex:1,justifyContent:"center"}} onClick={()=>{
                      const _pid=editForm.id;
                      const _pn=editForm.name;
                      const _pr=rentals.filter(r=>r.patientId===_pid||r.patientName===_pn);
                      const _vids=visits.filter(v=>v.patientId===_pid).map(v=>v.id);
                      const _pids=_pr.flatMap(r=>(r.payments||[]).map(p=>p.id));
                      const _cids=_pr.flatMap(r=>(r.cycles||[]).map(c=>"cycle-"+r.id+"-"+c.month));
                      const _extPrefixes=_pr.map(r=>"extend-"+r.id+"-");
                      setVisits(vs=>vs.filter(v=>v.patientId!==_pid));
                      setRentals(rs=>rs.filter(r=>r.patientId!==_pid&&r.patientName!==_pn));
                      setFinances(fs=>fs.filter(f=>!_vids.some(id=>f.sourceId==="visit-"+id)&&!_pids.some(id=>f.sourceId==="payment-"+id)&&!_cids.some(cid=>f.sourceId===cid)&&!_extPrefixes.some(pfx=>f.sourceId&&f.sourceId.startsWith(pfx))));
                      setPatients(ps=>ps.filter(p=>p.id!==_pid));
                      setShowEdit(false);
                      setEditForm(null);
                      setSelId(null);
                    }}>Tak, usuń</Btn>
                  </div>
                </>
            }
          </Modal>}

          {showAddV&&<Modal title="Nowa wizyta" onClose={()=>setShowAddV(false)}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Inp label="Data" value={vf.date} onChange={v=>setVf(f=>({...f,date:v}))} type="date"/>
              <TimeSel label="Godzina" value={vf.time} onChange={v=>setVf(f=>({...f,time:v}))}/>
            </div>
            <Sel label="Typ" value={vf.type} onChange={v=>setVf(f=>({...f,type:v}))} options={VISIT_TYPES.map(x=>({value:x,label:x}))}/>
            <Inp label="Cena (zł)" value={vf.price} onChange={v=>setVf(f=>({...f,price:v}))} type="number"/>
            <Sel label="Status" value={vf.status} onChange={v=>setVf(f=>({...f,status:v}))} options={[{value:"zaplanowana",label:"📅 Zaplanowana"},{value:"zakończona",label:"✅ Zakończona"}]}/>
            <Txa label="Notatka" value={vf.notes||""} onChange={v=>setVf(f=>({...f,notes:v}))} rows={2} placeholder="Przebieg wizyty, zalecenia..."/>
            <Btn onClick={()=>{const nv={id:Date.now(),patientId:pat.id,patientName:pat.name,...vf,price:+vf.price};setVisits(vs=>[...vs,nv]);syncFinance(nv,true);setShowAddV(false);setToast("Wizyta dodana");}} style={{width:"100%",justifyContent:"center"}}>Zapisz wizytę</Btn>
          </Modal>}

          {editV&&<Modal title="Edytuj wizytę" onClose={()=>setEditV(null)}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Inp label="Data" value={editV.date} onChange={v=>setEditV(f=>({...f,date:v}))} type="date"/>
              <TimeSel label="Godzina" value={editV.time} onChange={v=>setEditV(f=>({...f,time:v}))}/>
            </div>
            <Sel label="Typ" value={editV.type} onChange={v=>setEditV(f=>({...f,type:v}))} options={VISIT_TYPES.map(x=>({value:x,label:x}))}/>
            <Inp label="Cena (zł)" value={editV.price} onChange={v=>setEditV(f=>({...f,price:v}))} type="number"/>
            <Sel label="Status" value={editV.status||"zaplanowana"} onChange={v=>setEditV(f=>({...f,status:v}))} options={[{value:"zaplanowana",label:"📅 Zaplanowana"},{value:"zakończona",label:"✅ Zakończona"}]}/>
            <Txa label="Notatka" value={editV.notes||""} onChange={v=>setEditV(f=>({...f,notes:v}))} rows={2} placeholder="Przebieg wizyty, zalecenia..."/>
            <Btn onClick={()=>{const u={...editV,price:+editV.price};setVisits(vs=>vs.map(v=>v.id===u.id?{...v,...u}:v));syncFinance(u,false);setEditV(null);setToast("Zmiany zapisane");}} style={{width:"100%",justifyContent:"center",marginBottom:8}}>Zapisz zmiany</Btn>
            <Btn variant="secondary" style={{width:"100%",justifyContent:"center",marginBottom:8}} onClick={()=>{setVf({...editV,date:todayLocal(),status:"zaplanowana",price:String(editV.price)});setEditV(null);setShowAddV(true);}}>📋 Powiel wizytę</Btn>
            <Btn variant="danger" onClick={()=>setConfirmDelV(editV.id||"__DEL__")} style={{width:"100%",justifyContent:"center"}}>🗑️ Usuń wizytę</Btn>
          </Modal>}

          {confirmDelV&&<Modal title="Usuń wizytę" onClose={()=>setConfirmDelV(null)}>
            <div style={{fontSize:15,marginBottom:20}}>Na pewno usunąć tę wizytę?</div>
            <div style={{display:"flex",gap:10}}>
              <Btn variant="secondary" style={{flex:1,justifyContent:"center"}} onClick={()=>setConfirmDelV(null)}>Anuluj</Btn>
              <Btn variant="danger" style={{flex:1,justifyContent:"center"}} onClick={()=>{
                if(confirmDelV && confirmDelV!=="__DEL__"){
                  setVisits(vs=>vs.filter(v=>v.id!==confirmDelV));
                  setFinances(fs=>fs.filter(f=>f.sourceId!=="visit-"+confirmDelV));
                } else if(editV){
                  const {date,time,patientName}=editV;
                  setVisits(vs=>vs.filter(v=>!(v.date===date&&v.time===time&&v.patientName===patientName)));
                }
                setConfirmDelV(null);setEditV(null);}}>Usuń</Btn>
            </div>
          </Modal>}
          {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
        </>;
      }

      // Lista pacjentów
      const sl=search.toLowerCase(),sn=search.replace(/\s/g,"");
      const filtered=patients.filter(p=>(!!p.archived)===showArchived&&(p.name.toLowerCase().includes(sl)||(p.phone||"").replace(/\s/g,"").includes(sn)||(p.address||"").toLowerCase().includes(sl)||(p.diagnosis||"").toLowerCase().includes(sl)||(p.notes||"").toLowerCase().includes(sl)));
      const lastVisitDate=p=>visits.filter(v=>v.patientId===p.id).map(v=>v.date).sort((a,b)=>b.localeCompare(a))[0]||"";
      const sorted=[...filtered].sort((a,b)=>sort==="alpha"?a.name.localeCompare(b.name,"pl"):lastVisitDate(b).localeCompare(lastVisitDate(a)));
      return <div>
        <div style={{padding:"28px 20px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800}}>Pacjenci</div>
            <div style={{fontSize:13,color:"#7A8FA6"}}>{patients.filter(p=>!p.archived).length} aktywnych · {patients.filter(p=>p.archived).length} w archiwum</div>
          </div>
          <Btn small onClick={()=>setShowAdd(true)}><Ico d={I.plus} s={16} c="#fff"/> Nowy</Btn>
        </div>
        <div style={{padding:"0 20px"}}>
          <Inp value={search} onChange={setSearch} placeholder="🔍 Szukaj..."/>
          <div style={{display:"flex",gap:6,marginBottom:12}}>
            {[{k:"alpha",l:"A–Z"},{k:"recent",l:"Ostatnio aktywni"}].map(x=><button key={x.k} onClick={()=>setSort(x.k)} style={{padding:"7px 14px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:12,background:sort===x.k?"#0A7C7C":"#E4EAF0",color:sort===x.k?"#fff":"#7A8FA6",fontFamily:"inherit"}}>{x.l}</button>)}
            <button onClick={()=>setShowArchived(a=>!a)} style={{padding:"7px 14px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:12,background:showArchived?"#7A8FA6":"#E4EAF0",color:showArchived?"#fff":"#7A8FA6",fontFamily:"inherit",marginLeft:"auto"}}>📦 {showArchived?"Aktywni":"Archiwum"}</button>
          </div>
          {search&&sorted.length===0&&<Empty text="Nie znaleziono pacjenta"/>}
          {sorted.map((p,pi)=>{const lv=lastVisitDate(p);return(<Card key={p.id} onClick={()=>setSelId(p.id)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",gap:12,alignItems:"center"}}>
                <Av name={p.name}/>
                <div>
                  <div style={{fontWeight:600}}>{maskName(demo,p.name,pi)}</div>
                  <div style={{fontSize:13,color:"#7A8FA6"}}>{maskPhone(demo,p.phone)}</div>
                  {sort==="recent"&&lv&&<div style={{fontSize:11,color:"#0A7C7C",marginTop:2}}>ostatnia wizyta: {lv}</div>}
                </div>
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <button onClick={e=>{e.stopPropagation();setQuickV({...emptyVisit(),patientName:p.name,patientId:p.id,price:p.defaultPrice?String(p.defaultPrice):"150"});setShowQuickV(true);}} style={{width:30,height:30,borderRadius:10,background:"#0A7C7C",border:"none",color:"#fff",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,lineHeight:1}}>+</button>
                <Ico d="M9 18l6-6-6-6" s={20} c="#7A8FA6"/>
              </div>
            </div>
            {p.diagnosis&&<div style={{fontSize:12,color:"#7A8FA6",marginTop:8,paddingTop:8,borderTop:"1px solid #E4EAF0",whiteSpace:"pre-wrap"}}>{p.diagnosis}</div>}
          </Card>);})}
        </div>
        {showAdd&&<Modal title="Nowy pacjent" onClose={()=>setShowAdd(false)}>
          <Inp label="Imię i nazwisko *" value={newForm.name} onChange={v=>setNewForm(f=>({...f,name:v}))} placeholder="Jan Kowalski"/>
          <Inp label="Telefon" value={newForm.phone} onChange={v=>setNewForm(f=>({...f,phone:v}))} placeholder="600 000 000" type="tel"/>
          <Inp label="Adres" value={newForm.address} onChange={v=>setNewForm(f=>({...f,address:v}))} placeholder="ul. Przykładowa 1, Gliwice"/>
          <Txa label="Diagnoza" value={newForm.diagnosis} onChange={v=>setNewForm(f=>({...f,diagnosis:v}))} rows={2}/>
          <Txa label="Notatki" value={newForm.notes} onChange={v=>setNewForm(f=>({...f,notes:v}))} rows={2}/>
          <Inp label="Domyślna cena wizyty (zł)" value={newForm.defaultPrice||""} onChange={v=>setNewForm(f=>({...f,defaultPrice:v}))} type="number" placeholder="np. 150"/>
          <Inp label="Data urodzin" value={newForm.birthday||""} onChange={v=>setNewForm(f=>({...f,birthday:v}))} type="date"/>
          <Btn disabled={!newForm.name} style={{width:"100%",justifyContent:"center"}} onClick={()=>{if(!newForm.name)return;setPatients(ps=>[...ps,{...newForm,id:Date.now()}]);setNewForm({name:"",phone:"",address:"",diagnosis:"",notes:"",defaultPrice:"",birthday:""});setShowAdd(false);}}>Dodaj pacjenta</Btn>
        </Modal>}
        {showQuickV&&quickV&&<Modal title={"Wizyta – "+quickV.patientName} onClose={()=>setShowQuickV(false)}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Inp label="Data" value={quickV.date} onChange={v=>setQuickV(f=>({...f,date:v}))} type="date"/>
            <TimeSel label="Godzina" value={quickV.time} onChange={v=>setQuickV(f=>({...f,time:v}))}/>
          </div>
          <Sel label="Typ" value={quickV.type} onChange={v=>setQuickV(f=>({...f,type:v}))} options={VISIT_TYPES.map(x=>({value:x,label:x}))}/>
          <Inp label="Cena (zł)" value={quickV.price} onChange={v=>setQuickV(f=>({...f,price:v}))} type="number"/>
          <Sel label="Status" value={quickV.status} onChange={v=>setQuickV(f=>({...f,status:v}))} options={[{value:"zaplanowana",label:"📅 Zaplanowana"},{value:"zakończona",label:"✅ Zakończona"}]}/>
          <Txa label="Notatka" value={quickV.notes||""} onChange={v=>setQuickV(f=>({...f,notes:v}))} rows={2} placeholder="Przebieg wizyty, zalecenia..."/>
          <Btn style={{width:"100%",justifyContent:"center"}} onClick={()=>{
            const nv={...quickV,id:Date.now(),price:+quickV.price};
            setVisits(vs=>[...vs,nv]);
            const done=nv.status==="zakończona"||new Date(nv.date+"T"+(nv.time||"00:00")+":00")<=new Date();
            if(done)setFinances(fs=>[{id:Date.now()+Math.random(),sourceId:"visit-"+nv.id,date:nv.date,type:"przychód",category:"Wizyta",amount:nv.price,description:"Wizyta – "+nv.patientName},...fs]);
            setShowQuickV(false);setToast("Wizyta dodana");

    function HistoryFill({r,setRentals,setFinances}) {
      const cm=todayLocal().slice(0,7);
      // Generate all months from startDate month to current month
      const months=[];
      const [sy,sm]=r.startDate.split("-").map(Number);
      const [cy,cmn]=cm.split("-").map(Number);
      const startDay=r.startDate.split("-")[2]; // e.g. "08"
      let y=sy,m=sm;
      while(y<cy||(y===cy&&m<=cmn)){
        const mStr=y+"-"+String(m).padStart(2,"0");
        // paidDate = same day as startDate but capped to last day of that month
        const lastDay=new Date(y,m,0).getDate();
        const day=Math.min(+startDay,lastDay);
        const paidDate=mStr+"-"+String(day).padStart(2,"0");
        months.push({month:mStr,paidDate});
        m++;if(m>12){m=1;y++;}
      }
      const [checked,setChecked]=useState(()=>Object.fromEntries(months.map(x=>[x.month,true])));
      const [amounts,setAmounts]=useState(()=>Object.fromEntries(months.map(x=>[x.month,String(r.amount||"")])));
      const [bulkAmt,setBulkAmt]=useState(String(r.amount||""));
      const allChecked=months.every(x=>checked[x.month]);
      return <div>
        <div style={{background:"#FFF8E6",border:"1.5px solid #F4A26140",borderRadius:14,padding:14,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>📋 Uzupełnij historię płatności</div>
          <div style={{fontSize:13,color:"#7A8FA6",lineHeight:1.5}}>To wypożyczenie trwa od {r.startDate}. Zaznacz które miesiące zostały opłacone i podaj kwoty, następnie zatwierdź.</div>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}>
          <input type="number" value={bulkAmt} onChange={e=>{setBulkAmt(e.target.value);setAmounts(a=>Object.fromEntries(Object.keys(a).map(k=>[k,e.target.value])));}} placeholder="Kwota dla wszystkich..." style={{flex:1,padding:"10px 14px",border:"1.5px solid #E4EAF0",borderRadius:12,fontSize:14,outline:"none",background:"#FAFCFD",fontFamily:"inherit"}}/>
          <button onClick={()=>setChecked(c=>Object.fromEntries(Object.keys(c).map(k=>[k,!allChecked])))} style={{padding:"10px 14px",borderRadius:12,border:"1.5px solid #E4EAF0",background:allChecked?"#0A7C7C":"#fff",color:allChecked?"#fff":"#7A8FA6",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>{allChecked?"✓ Wszystkie":"Zaznacz wszystkie"}</button>
        </div>
        <div style={{borderRadius:12,border:"1.5px solid #E4EAF0",overflow:"hidden",marginBottom:14}}>
          {months.map((x,i)=>{
            const label=new Date(x.month+"-15").toLocaleDateString("pl-PL",{month:"long",year:"numeric"});
            return <div key={x.month} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderBottom:i<months.length-1?"1px solid #F2F5F7":"none",background:checked[x.month]?"#F6FFF9":"#FAFCFD"}}>
              <button onClick={()=>setChecked(c=>({...c,[x.month]:!c[x.month]}))} style={{width:22,height:22,borderRadius:6,border:`2px solid ${checked[x.month]?"#3DAA72":"#E4EAF0"}`,background:checked[x.month]?"#3DAA72":"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,padding:0}}>
                {checked[x.month]&&<span style={{color:"#fff",fontSize:13,lineHeight:1}}>✓</span>}
              </button>
              <div style={{flex:1,fontSize:14,fontWeight:checked[x.month]?600:400,color:checked[x.month]?"#1C2B3A":"#7A8FA6",textTransform:"capitalize"}}>{label}<div style={{fontSize:11,color:"#7A8FA6",fontWeight:400}}>{x.paidDate}</div></div>
              <input type="number" value={amounts[x.month]||""} onChange={e=>setAmounts(a=>({...a,[x.month]:e.target.value}))} disabled={!checked[x.month]} style={{width:80,padding:"7px 10px",border:"1.5px solid #E4EAF0",borderRadius:10,fontSize:13,outline:"none",background:checked[x.month]?"#FAFCFD":"#F2F5F7",fontFamily:"inherit",textAlign:"right",color:checked[x.month]?"#1C2B3A":"#7A8FA6"}}/>
              <span style={{fontSize:13,color:"#7A8FA6"}}>zł</span>
            </div>;
          })}
        </div>
        <Btn style={{width:"100%",justifyContent:"center"}} onClick={()=>{
          const newCycles=months.map(x=>({month:x.month,amount:+(amounts[x.month]||0),paid:!!checked[x.month],paidDate:checked[x.month]?x.paidDate:null}));
          setRentals(rs=>rs.map(rr=>rr.id===r.id?{...rr,cycles:newCycles}:rr));
          const newFinances=months.filter(x=>checked[x.month]&&+(amounts[x.month]||0)>0).map(x=>{
            const label=new Date(x.month+"-15").toLocaleDateString("pl-PL",{month:"long",year:"numeric"});
            return {id:Date.now()+Math.random(),sourceId:"cycle-"+r.id+"-"+x.month,date:x.paidDate,type:"przychód",category:"Wypożyczalnia",amount:+(amounts[x.month]||0),description:"Wypożyczenie – "+r.patientName+" ("+r.equipment+") "+label};
          });
          if(newFinances.length)setFinances(fs=>[...newFinances,...fs]);
        }}>✓ Zatwierdź historię ({months.filter(x=>checked[x.month]).length} mies.)</Btn>
      </div>;
    }
