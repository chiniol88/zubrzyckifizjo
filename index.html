async function dbGet(key) {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/app_data?key=eq.${key}&select=value`, {
      headers: { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}` }
    });
    const data = await r.json();
    return data?.[0]?.value ?? null;
  } catch(e) { return null; }
}

async function dbSet(key, value) {
  try {
    await fetch(`${SUPA_URL}/rest/v1/app_data`, {
      method: "POST",
      headers: {
        "apikey": SUPA_KEY,
        "Authorization": `Bearer ${SUPA_KEY}`,
        "Content-Type": "application/json",
        "Prefer": "resolution=merge-duplicates"
      },
      body: JSON.stringify({ key, value })
    });
  } catch(e) {}
}

function usePersistedState(key, defaultValue) {
  const [state, setState] = useState(defaultValue);
  const [loaded, setLoaded] = useState(false);

  // Load from Supabase on mount
  useEffect(() => {
    dbGet(key).then(val => {
      if (val !== null) setState(val);
      setLoaded(true);
    });
  }, [key]);

  const set = useCallback((val) => {
    setState(prev => {
      const next = typeof val === "function" ? val(prev) : val;
      dbSet(key, next);
      return next;
    });
  }, [key]);

  return [state, set, loaded];
}

// ── PATIENT PICKER ──────────────────────────────────────────────────────────
function PatientPicker({label="Pacjent", value, onChange, onSelect, patients, rentals}) {
  const [open, setOpen] = useState(false);
  const allPeople = useMemo(() => {
    const map = new Map();
    (patients||[]).forEach(p => map.set(p.name, {id:p.id, name:p.name, phone:p.phone||"", address:p.address||""}));
    (rentals||[]).forEach(r => { if(r.patientName && !map.has(r.patientName)) map.set(r.patientName, {id:null, name:r.patientName, phone:r.phone||"", address:r.address||""}); });
    return Array.from(map.values());
  }, [patients, rentals]);
  const filtered = value
    ? allPeople.filter(p => p.name.toLowerCase().includes(value.toLowerCase()) || p.phone.includes(value))
    : allPeople;
  return (
    <div style={{marginBottom:14, position:"relative"}}>
      {label && <div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>{label}</div>}
      <input value={value} onChange={e=>onChange(e.target.value)} onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),150)}
        placeholder="Jan Kowalski"
        style={{width:"100%",padding:"11px 14px",border:"1.5px solid #E4EAF0",borderRadius:12,fontSize:15,outline:"none",background:"#FAFCFD",color:"#1C2B3A",fontFamily:"inherit",boxSizing:"border-box"}}/>
      {open && filtered.length>0 && (
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:"#fff",borderRadius:12,boxShadow:"0 8px 24px rgba(0,0,0,.15)",zIndex:300,maxHeight:220,overflowY:"auto",border:"1.5px solid #E4EAF0"}}>
          {filtered.slice(0,8).map(p=>(
            <div key={p.id||p.name} onPointerDown={(e)=>{e.preventDefault();onChange(p.name);if(onSelect)onSelect(p);setOpen(false);}}
              style={{padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid #F2F5F7"}}>
              <div style={{fontWeight:600,fontSize:14}}>{p.name}</div>
              {p.phone&&<div style={{fontSize:12,color:"#7A8FA6"}}>{p.phone}</div>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

const PATIENTS = [];

function visitStatus(v) {
  // Ręcznie ustawiony status ma pierwszeństwo
  if(v.status === "zakończona") return "zakończona";
  if(v.status === "anulowana") return "anulowana";
  // Jeśli zaplanowana, sprawdź czy czas już minął
  const now = new Date();
  const startTime = v.time || "00:00";
  const visitDT = new Date(`${v.date}T${startTime}:00`);
  if(visitDT < now) return "zakończona";
  return "zaplanowana";
}

function ClockDisplay() {
  const [time, setTime] = useState(() => new Date().toLocaleTimeString("pl-PL",{hour:"2-digit",minute:"2-digit"}));
  useEffect(() => {
    const t = setInterval(()=>setTime(new Date().toLocaleTimeString("pl-PL",{hour:"2-digit",minute:"2-digit"})),1000);
    return ()=>clearInterval(t);
  },[]);
  return <span>{time}</span>;
}

    .sort((a,b)=>new Date(a.endDate)-new Date(b.endDate))

      patientId: vForm.patientId || matchedPatient?.id || null};

    setShowAddVisit(false);

    const updated = {...editVisit, price:+editVisit.price};
    setVisits(vs=>vs.map(v=>v.id===updated.id?{...v,...updated}:v));
    const sourceId = "visit-"+updated.id;
    const finExists = finances.some(f=>f.sourceId===sourceId);
    const isDone = updated.status==="zakończona" || new Date(updated.date+"T"+(updated.time||"00:00")+":00") <= new Date();
    if(finExists) {
      // Aktualizuj istniejący wpis
      setFinances(fs=>fs.map(f=>f.sourceId===sourceId
        ? {...f, amount:updated.price, description:"Wizyta – "+updated.patientName, date:updated.date}
        : f));

      // Utwórz nowy wpis jeśli wizyta zakończona
      setFinances(fs=>[{id:Date.now()+Math.random(),sourceId,date:updated.date,type:"przychód",category:"Wizyta",amount:updated.price||0,description:"Wizyta – "+updated.patientName},...fs]);
    }
    setEditVisit(null);

        </div>

        {todayVisits.length===0
          ? <Empty text="Brak wizyt na dziś"/>
          : todayVisits.map(v=>(

          <Inp label="Godzina" value={editVisit.time} onChange={v=>setEditVisit(f=>({...f,time:v}))} type="time"/>

        <Inp label="Cena (zł)" value={editVisit.price} onChange={v=>setEditVisit(f=>({...f,price:v}))} type="number"/>
        <Sel label="Status" value={editVisit.status||"zaplanowana"} onChange={v=>setEditVisit(f=>({...f,status:v}))}

      </Modal>

    {/* Potwierdź usuń wizytę */}
    {confirmDeleteVisit&&(
      <Modal title="Usuń wizytę" onClose={()=>setConfirmDeleteVisit(null)}>
        <div style={{fontSize:15,marginBottom:20}}>Na pewno usunąć tę wizytę?</div>
        <div style={{display:"flex",gap:10}}>
          <Btn variant="secondary" style={{flex:1,justifyContent:"center"}} onClick={()=>setConfirmDeleteVisit(null)}>Anuluj</Btn>
          <Btn variant="danger" style={{flex:1,justifyContent:"center"}} onClick={()=>{
            setVisits(vs=>vs.filter(v=>v.id!==confirmDeleteVisit));
            setFinances(fs=>fs.filter(f=>f.sourceId!=="visit-"+confirmDeleteVisit));
            setConfirmDeleteVisit(null);
          }}>Usuń</Btn>
        </div>
      </Modal>
    )}
    </>
  );
}

function Patients({patients, setPatients, visits, setVisits, finances, setFinances, rentals}) {
  const [selected,setSelected]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [showVisit,setShowVisit]=useState(false);
  const [showEditPatient,setShowEditPatient]=useState(false);
  const [editPatientForm,setEditPatientForm]=useState(null);
  const [confirmDeleteVisit,setConfirmDeleteVisit]=useState(null);

  const patVisits = selected ? visits.filter(v=>v.patientId===selected.id) : [];

  useEffect(() => {

  }, [selected?.id]);

  const saveEditVisit = () => {
    const updated = {...editVisitP, price:+editVisitP.price};
    setVisits(vs=>vs.map(v=>v.id===updated.id?{...v,...updated}:v));
    const sourceId = "visit-"+updated.id;
    const finExists = finances.some(f=>f.sourceId===sourceId);
    const isDone = updated.status==="zakończona" || new Date(updated.date+"T"+(updated.time||"00:00")+":00") <= new Date();
    if(finExists) {
      setFinances(fs=>fs.map(f=>f.sourceId===sourceId
        ? {...f, amount:updated.price, description:"Wizyta – "+updated.patientName, date:updated.date}
        : f));
    } else if(isDone) {
      setFinances(fs=>[{id:Date.now()+Math.random(),sourceId,date:updated.date,type:"przychód",category:"Wizyta",amount:updated.price||0,description:"Wizyta – "+updated.patientName},...fs]);
    }
    setEditVisitP(null);
  };

  const savePatient = () => {
    const form = editPatientForm;
    if(!form || !selected) return;
    const pid = selected.id;
    const oldPat = patients.find(p=>p.id===pid);
    if(!oldPat) return;
    const oldName = oldPat.name;
    const newName = form.name || oldName;
    // Aktualizuj pacjenta
    setPatients(prev => prev.map(p => p.id===pid ? {...p,...form} : p));
    // Propaguj imię do wizyt i finansów
    if(newName !== oldName) {
      setVisits(prev => prev.map(v => v.patientId===pid ? {...v,patientName:newName} : v));
      setFinances(prev => prev.map(f => f.description
        ? {...f, description:f.description.split(oldName).join(newName)}
        : f));
    }
    // Propaguj dane do WSZYSTKICH wypożyczeń pacjenta
    setRentals(prev => prev.map(r => {
      if(r.patientId!==pid && r.patientName!==oldName) return r;
      return {...r,
        patientName: newName,
        phone: form.phone,
        address: form.address,
        patientId: pid
      };
    }));
    setShowEditPatient(false);
    setEditPatientForm(null);
  };

  const deletePatient = () => {
    if(!selected) return;
    const pid = selected.id;
    const oldPat = patients.find(p=>p.id===pid);
    const pname = oldPat ? oldPat.name : '';
    const patRentals = rentals.filter(r=>r.patientId===pid || r.patientName===pname);
    const patVisitIds = visits.filter(v=>v.patientId===pid).map(v=>v.id);
    const patPaymentIds = patRentals.flatMap(r=>(r.payments||[]).map(p=>p.id));
    setVisits(prev => prev.filter(v=>v.patientId!==pid));
    setRentals(prev => prev.filter(r=>r.patientId!==pid && r.patientName!==pname));
    setFinances(prev => prev.filter(f=>
      !patVisitIds.some(id=>f.sourceId==='visit-'+id) &&
      !patPaymentIds.some(id=>f.sourceId==='payment-'+id)
    ));
    setPatients(prev => prev.filter(p=>p.id!==pid));
    setShowEditPatient(false);
    setEditPatientForm(null);
    setSelected(null);
  };

    if(selected) {
    // Zawsze czytaj żywe dane z tablicy patients, nie snapshot
    const livePatient = patients.find(p=>p.id===selected.id);
    if(!livePatient) { setSelected(null); return null; }
    const mapsUrl = livePatient.address ? `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(livePatient.address)}` : null;
    return (
      <>
      <div>
        <button onClick={()=>setSelected(null)} style={{background:"none",border:"none",display:"flex",alignItems:"center",gap:6,color:"#0A7C7C",fontWeight:600,cursor:"pointer",padding:"20px 20px 0",fontFamily:"inherit",fontSize:14}}>
          <Ico d={I.back} s={18} c="#0A7C7C"/> Pacjenci
        </button>

                <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800}}>{livePatient.name}</div>

            </div>
          </div>

              <div style={{fontSize:11,fontWeight:700,color:"#0A7C7C",textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Diagnoza</div>
              <div style={{lineHeight:1.5}}>{livePatient.diagnosis}</div>

  return (

const MOCK_RENTALS = [];

const makeEmptyRentalForm = () => ({equipment:"Artromot K1 2025",patientName:"",phone:"",address:"",startDate:(()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");})(),endDate:"",renewable:false,amount:"",amountPaid:"",notes:""});

function PaymentForm({rentalId, rentalAmount, amountPaid, patientName, equipment, setRentals, setFinances}) {
  const [amount, setAmount] = useState("");
  const [date, setDate] = useState(()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");});

    const val = +amount;

      ...x,
      payments:[...(x.payments||[]),newPayment],
      amountPaid:Math.min((x.amountPaid||0)+val, rentalAmount)
    }:x));
    setFinances(fs=>[{id:Date.now()+Math.random(),sourceId:"payment-"+newPayment.id,date,type:"przychód",category:"Wypożyczalnia",amount:val,description:"Wypożyczenie – "+patientName+" ("+equipment+")"},...fs]);
    setAmount("");

  return (
    <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:8}}>

    </div>
  );
}

function dateDiffDays(dateStrA, dateStrB) {
  // Pure date diff without UTC issues — compare YYYY-MM-DD strings as numbers
  const [ay,am,ad] = dateStrA.split("-").map(Number);
  const [by,bm,bd] = dateStrB.split("-").map(Number);
  const a = new Date(ay,am-1,ad), b = new Date(by,bm-1,bd);
  return Math.ceil((b-a)/86400000);
}

function todayLocal() {
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function RentalCard({r, onClick}) {
  const today = todayLocal();
  const daysLeft = r.endDate ? dateDiffDays(today, r.endDate) : null;
  const overdue = daysLeft !== null && daysLeft < 0;
  return (
    <Card onClick={onClick}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
            <div style={{fontWeight:700,fontSize:15}}>{r.equipment}</div>
            {r.renewable && <Badge color="#7C6AF4">🔄 Odnawialne</Badge>}
          </div>
          <div style={{fontSize:14,color:"#1C2B3A"}}>{r.patientName}</div>
        </div>
        {r.status==="aktywne" && (
          r.renewable
            ? <Badge color="#7C6AF4">miesięczne</Badge>
            : <Badge color={overdue?"#E05C5C":daysLeft<7?"#F4A261":"#3DAA72"}>
                {overdue?`${Math.abs(daysLeft)}d po term.`:daysLeft===0?"Dziś!":daysLeft+"d"}
              </Badge>
        )}
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:"4px 16px",fontSize:12,color:"#7A8FA6"}}>
        <span>📅 {r.startDate}{r.endDate?` → ${r.endDate}`:" → odnawialne"}</span>
        <span>💰 {r.amount} zł</span>
        {(r.amount-(r.amountPaid||0))>0
          ? <span style={{color:"#E05C5C",fontWeight:600}}>⚠️ do zapłaty: {r.amount-(r.amountPaid||0)} zł</span>
          : <span style={{color:"#3DAA72",fontWeight:600}}>✓ opłacone</span>
        }
      </div>
    </Card>
  );
}

  const [form,setForm]=useState(makeEmptyRentalForm());
  const [editForm,setEditForm]=useState(null);
  const [confirmDeleteRental,setConfirmDeleteRental]=useState(null);

  // Open detail from external navigation (e.g. dashboard click)
  useEffect(() => {
    if(initialDetail !== null && initialDetail !== undefined) {
      setDetail(initialDetail);
    }
  }, [initialDetail]);

  const closeDetail = () => { setDetail(null); if(onDetailClosed) onDetailClosed(); };

  const counts = {
    aktywne: rentals.filter(r=>r.status==="aktywne"&&!r.renewable).length,
    odnawialne: rentals.filter(r=>r.status==="aktywne"&&r.renewable).length,
    zakończone: rentals.filter(r=>r.status==="zakończone").length,
  };

  const filtered = view==="aktywne"
    ? rentals.filter(r=>r.status==="aktywne"&&!r.renewable)
    : view==="odnawialne"
    ? rentals.filter(r=>r.status==="aktywne"&&r.renewable)
    : rentals.filter(r=>r.status==="zakończone");

  // ── DETAIL VIEW ────────────────────────────────────────────────────────────
  if(detail!==null) {
    const r = rentals.find(x=>x.id===detail);
    if(!r) { setDetail(null); return null; }
    const todayStr2 = todayLocal();
    const daysLeft = r.endDate ? dateDiffDays(todayStr2, r.endDate) : null;
    const overdue = daysLeft !== null && daysLeft < 0;
    const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(r.address)}`;

    return (
      <>
      <div>
        <button onClick={closeDetail} style={{background:"none",border:"none",display:"flex",alignItems:"center",gap:6,color:"#0A7C7C",fontWeight:600,cursor:"pointer",padding:"20px 20px 0",fontFamily:"inherit",fontSize:14}}>
          <Ico d={I.back} s={18} c="#0A7C7C"/> Wypożyczalnia
        </button>
        <div style={{padding:"16px 20px 0"}}>
          {/* Header */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
            <div>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800}}>{r.equipment}</div>
              {r.renewable
                ? <Badge color="#7C6AF4">🔄 Odnawialne miesięcznie</Badge>
                : daysLeft!==null && <Badge color={overdue?"#E05C5C":daysLeft<7?"#F4A261":"#3DAA72"} style={{marginTop:4}}>
                    {overdue?`${Math.abs(daysLeft)}d po terminie`:daysLeft===0?"Termin dziś!":daysLeft+" dni"}
                  </Badge>
              }
            </div>
            <Btn small variant="secondary" onClick={()=>{setEditForm({...r,amount:String(r.amount),amountPaid:String(r.amountPaid||0)});setShowEdit(true);}}>
              ✏️ Edytuj
            </Btn>
          </div>

          {/* Pacjent */}
          <Card style={{marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:"#7A8FA6",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Pacjent</div>
            <div style={{fontWeight:700,fontSize:16,marginBottom:12}}>{r.patientName}</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:14,color:"#7A8FA6"}}>{r.phone}</div>
              <a href={`tel:${(r.phone||"").replace(/\s/g,"")}`} style={{textDecoration:"none"}}>
                <Btn small variant="secondary"><Ico d={I.ph} s={15} c="#0A7C7C"/> Zadzwoń</Btn>
              </a>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:14,color:"#7A8FA6",flex:1,paddingRight:8}}>{r.address}</div>
              <a href={mapsUrl} target="_blank" rel="noreferrer" style={{textDecoration:"none",flexShrink:0}}>
                <Btn small variant="secondary">🗺️ Trasa</Btn>
              </a>
            </div>
          </Card>

          {/* Szczegóły */}
          <Card style={{marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:"#7A8FA6",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Wypożyczenie</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
              <div><div style={{fontSize:11,color:"#7A8FA6",marginBottom:3}}>Data od</div><div style={{fontWeight:600}}>{r.startDate}</div></div>
              <div><div style={{fontSize:11,color:"#7A8FA6",marginBottom:3}}>Data do</div><div style={{fontWeight:600}}>{r.endDate||"—"}</div></div>
              <div><div style={{fontSize:11,color:"#7A8FA6",marginBottom:3}}>Typ</div><div style={{fontWeight:600}}>{r.renewable?"Odnawialne":"Jednorazowe"}</div></div>
              {r.transport>0&&<div><div style={{fontSize:11,color:"#7A8FA6",marginBottom:3}}>Transport</div><div style={{fontWeight:600,color:"#F4A261"}}>{r.transport} zł</div></div>}
            </div>
            {/* Płatność */}
            <div style={{borderTop:"1px solid #E4EAF0",paddingTop:12}}>
              <div style={{fontSize:11,fontWeight:700,color:"#7A8FA6",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Płatność</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                {[
                  {l:"Kwota",v:`${r.amount} zł`,c:"#1C2B3A"},
                  {l:"Zapłacono",v:`${r.amountPaid||0} zł`,c:"#3DAA72"},
                  {l:"Pozostało",v:`${(r.amount-(r.amountPaid||0))} zł`,c:(r.amount-(r.amountPaid||0))>0?"#E05C5C":"#3DAA72"},
                ].map((x,i)=>(
                  <div key={i} style={{background:x.c==="#1C2B3A"?"#F2F5F7":x.c+"14",borderRadius:12,padding:"10px 8px",textAlign:"center",border:`1.5px solid ${x.c==="#1C2B3A"?"#E4EAF0":x.c+"30"}`}}>
                    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14,color:x.c==="#1C2B3A"?"#1C2B3A":x.c}}>{x.v}</div>
                    <div style={{fontSize:11,color:"#7A8FA6",marginTop:2}}>{x.l}</div>
                  </div>
                ))}
              </div>
              {/* Dodaj wpłatę */}
              <PaymentForm rentalId={r.id} rentalAmount={r.amount} amountPaid={r.amountPaid||0} patientName={r.patientName} equipment={r.equipment} setRentals={setRentals} setFinances={setFinances}/>
              {/* Historia wpłat */}
              {(r.payments||[]).length>0&&(
                <div style={{marginTop:14,paddingTop:12,borderTop:"1px solid #E4EAF0"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#7A8FA6",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Historia wpłat</div>
                  {[...(r.payments||[])].sort((a,b)=>b.date.localeCompare(a.date)).map(p=>(
                    <div key={p.id} style={{padding:"10px 0",borderBottom:"1px solid #F2F5F7"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                        <div style={{display:"flex",gap:12,alignItems:"center"}}>
                          <div style={{width:8,height:8,borderRadius:"50%",background:"#3DAA72",flexShrink:0}}/>
                          <div>
                            <div style={{fontWeight:600,fontSize:14}}>{p.amount} zł</div>
                            <div style={{fontSize:12,color:"#7A8FA6"}}>{p.date}</div>
                          </div>
                        </div>
                        <button onClick={()=>{
                          setRentals(rs=>rs.map(x=>x.id===r.id?{
                            ...x,
                            payments:(x.payments||[]).filter(q=>q.id!==p.id),
                            amountPaid:Math.max(0,(x.amountPaid||0)-p.amount)
                          }:x));
                          setFinances(fs=>fs.filter(f=>f.sourceId!=="payment-"+p.id));
                        }} style={{background:"#FEE2E2",border:"none",borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:600,color:"#E05C5C",cursor:"pointer",fontFamily:"inherit"}}>
                          Usuń
                        </button>
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        {[{k:"receipt",l:"🧾 Paragon"},{k:"invoice",l:"📄 Faktura"}].map(opt=>{
                          const active = p.doc===opt.k;
                          return(
                            <button key={opt.k} onClick={()=>setRentals(rs=>rs.map(x=>x.id===r.id?{
                              ...x,
                              payments:(x.payments||[]).map(q=>q.id===p.id?{...q,doc:active?null:opt.k}:q)
                            }:x))} style={{
                              flex:1,padding:"7px 8px",borderRadius:10,fontFamily:"inherit",fontSize:12,fontWeight:600,cursor:"pointer",
                              border:`1.5px solid ${active?"#0A7C7C":"#E4EAF0"}`,
                              background:active?"#E6F4F4":"#fff",
                              color:active?"#0A7C7C":"#7A8FA6",
                              display:"flex",alignItems:"center",justifyContent:"center",gap:4
                            }}>
                              {active&&<span style={{fontSize:10}}>✓</span>}{opt.l}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </Card>

          {r.notes&&(
            <Card style={{marginBottom:10,background:"#FFFBF5",border:"1.5px solid #F4A26130"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#F4A261",textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Notatki</div>
              <div style={{fontSize:14,lineHeight:1.6}}>{r.notes}</div>
            </Card>
          )}

          {r.status==="aktywne" && <>
            {r.renewable && (
              <Btn variant="secondary" onClick={()=>{
                const newEnd = new Date(r.endDate||r.startDate);
                newEnd.setMonth(newEnd.getMonth()+1);
                setRentals(rs=>rs.map(x=>x.id===r.id?{...x,endDate:newEnd.toISOString().split("T")[0]}:x));
              }} style={{width:"100%",justifyContent:"center",marginBottom:10}}>
                🔄 Odnów o miesiąc
              </Btn>
            )}
            <Btn variant="secondary" style={{width:"100%",justifyContent:"center",marginBottom:10,border:"1.5px dashed #E4EAF0"}}>
              📄 Generuj umowę
            </Btn>
            <Btn onClick={()=>{setRentals(rs=>rs.map(x=>x.id===r.id?{...x,status:"zakończone"}:x));closeDetail();}}
              style={{width:"100%",justifyContent:"center"}}>
              <Ico d={I.chk} s={16} c="#fff"/> Sprzęt zwrócony — zakończ
            </Btn>
          </>}
          {r.status==="zakończone" && (
            <Btn variant="secondary" onClick={()=>setRentals(rs=>rs.map(x=>x.id===r.id?{...x,status:"aktywne"}:x))}
              style={{width:"100%",justifyContent:"center",marginBottom:10}}>
              ↩️ Cofnij zakończenie
            </Btn>
          )}
          <Btn variant="danger" style={{width:"100%",justifyContent:"center",marginTop:4}}
            onClick={()=>setConfirmDeleteRental(r.id)}>
            🗑️ Usuń wypożyczenie
          </Btn>
        </div>
      </div>

      {showEdit&&editForm&&(
        <Modal title="Edytuj wypożyczenie" onClose={()=>setShowEdit(false)}>
          <Sel label="Sprzęt" value={editForm.equipment} onChange={v=>setEditForm(f=>({...f,equipment:v}))} options={EQUIPMENT_LIST.map(x=>({value:x,label:x}))}/>
          <PatientPicker label="Pacjent" value={editForm.patientName}
            onChange={v=>setEditForm(f=>({...f,patientName:v}))}
            onSelect={p=>setEditForm(f=>({...f,patientName:p.name,phone:p.phone,address:p.address}))}
            patients={patients} rentals={rentals}/>
          <Inp label="Telefon" value={editForm.phone} onChange={v=>setEditForm(f=>({...f,phone:v}))} placeholder="600 000 000" type="tel"/>
          <Inp label="Adres" value={editForm.address} onChange={v=>setEditForm(f=>({...f,address:v}))} placeholder="ul. Przykładowa 1, Gliwice"/>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Typ</div>
            <div style={{display:"flex",gap:8}}>
              {[{v:false,l:"Jednorazowe"},{v:true,l:"Odnawialne"}].map(opt=>(
                <button key={String(opt.v)} onClick={()=>setEditForm(f=>({...f,renewable:opt.v}))}
                  style={{flex:1,padding:"10px 8px",borderRadius:12,border:`2px solid ${editForm.renewable===opt.v?"#0A7C7C":"#E4EAF0"}`,background:editForm.renewable===opt.v?"#E6F4F4":"#fff",color:editForm.renewable===opt.v?"#0A7C7C":"#7A8FA6",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
                  {opt.l}
                </button>
              ))}
            </div>
          </div>
          <Inp label="Data od" value={editForm.startDate} onChange={v=>setEditForm(f=>({...f,startDate:v}))} type="date"/>
          {!editForm.renewable&&<Inp label="Data do" value={editForm.endDate||""} onChange={v=>setEditForm(f=>({...f,endDate:v}))} type="date"/>}
          <Inp label="Kwota (zł)" value={editForm.amount} onChange={v=>setEditForm(f=>({...f,amount:v}))} type="number"/>
          <Inp label="Zapłacono (zł)" value={editForm.amountPaid} onChange={v=>setEditForm(f=>({...f,amountPaid:v}))} type="number"/>
          <Inp label="Transport (zł)" value={editForm.transport||""} onChange={v=>setEditForm(f=>({...f,transport:v}))} type="number" placeholder="0"/>
          <Txa label="Notatki" value={editForm.notes||""} onChange={v=>setEditForm(f=>({...f,notes:v}))} rows={2}/>
          <Btn style={{width:"100%",justifyContent:"center"}} onClick={()=>{
            const rawAmount = +editForm.amount;
            const matchedEditPat = patients.find(p=>p.name===editForm.patientName);
            const updated = {...editForm,amount:rawAmount,amountPaid:Math.min(+(editForm.amountPaid||0),rawAmount),
              patientId:matchedEditPat?.id||editForm.patientId||null};
            setRentals(rs=>rs.map(x=>x.id===detail?{...x,...updated}:x));
            // Aktualizuj opis w finansach jeśli zmienił się pacjent lub sprzęt
            // Aktualizuj opisy istniejących wpisów finansowych
            setFinances(fs=>fs.map(f=>{
              const r = rentals.find(x=>x.id===detail);
              if(!r) return f;
              const isPayment = (r.payments||[]).some(p=>f.sourceId==="payment-"+p.id);
              if(!isPayment) return f;
              return {...f, description:"Wypożyczenie – "+updated.patientName+" ("+updated.equipment+")"};
            }));
            setShowEdit(false);
          }}>Zapisz zmiany</Btn>
        </Modal>
      )}

      {confirmDeleteRental&&(
        <Modal title="Usuń wypożyczenie" onClose={()=>setConfirmDeleteRental(null)}>
          <div style={{fontSize:15,marginBottom:20,color:"#1C2B3A"}}>Na pewno usunąć to wypożyczenie?</div>
          <div style={{display:"flex",gap:10}}>
            <Btn variant="secondary" style={{flex:1,justifyContent:"center"}} onClick={()=>setConfirmDeleteRental(null)}>Anuluj</Btn>
            <Btn variant="danger" style={{flex:1,justifyContent:"center"}} onClick={()=>{
              const r=rentals.find(x=>x.id===confirmDeleteRental);
              if(r)(r.payments||[]).forEach(p=>setFinances(fs=>fs.filter(f=>f.sourceId!=="payment-"+p.id)));
              setRentals(rs=>rs.filter(x=>x.id!==confirmDeleteRental));
              setConfirmDeleteRental(null);
              closeDetail();
            }}>Usuń</Btn>
          </div>
        </Modal>
      )}
      </>
    );
  }

  // ── LIST VIEW ──────────────────────────────────────────────────────────────
  return (
    <div>
      <div style={{padding:"28px 20px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800}}>Wypożyczalnia</div>
          <div style={{fontSize:13,color:"#7A8FA6"}}>{counts.aktywne+counts.odnawialne} aktywnych</div>
        </div>
        <Btn small onClick={()=>{setForm(makeEmptyRentalForm());setShowAdd(true);}}><Ico d={I.plus} s={16} c="#fff"/> Nowe</Btn>
      </div>

      <div style={{display:"flex",gap:6,padding:"0 20px 16px",overflowX:"auto"}}>
        {[
          {k:"aktywne",l:`Aktywne (${counts.aktywne})`},
          {k:"odnawialne",l:`🔄 Odnawialne (${counts.odnawialne})`},
          {k:"zakończone",l:`Zakończone (${counts.zakończone})`},
        ].map(x=>(
          <button key={x.k} onClick={()=>setView(x.k)} style={{padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,whiteSpace:"nowrap",background:view===x.k?"#0A7C7C":"#E4EAF0",color:view===x.k?"#fff":"#7A8FA6",fontFamily:"inherit"}}>
            {x.l}
          </button>
        ))}
      </div>

      {view==="odnawialne" && (
        <div style={{margin:"0 20px 12px",background:"#F0EDFF",borderRadius:14,padding:"12px 14px",fontSize:13,color:"#7C6AF4",lineHeight:1.5}}>
          🔄 <strong>Odnawialne</strong> — bez ustalonej daty zwrotu. Możesz odnowić o miesiąc w dowolnym momencie.
        </div>
      )}

      <div style={{padding:"0 20px"}}>
        {filtered.length===0
          ? <Empty text="Brak wypożyczeń w tej kategorii"/>
          : filtered.map(r=><RentalCard key={r.id} r={r} onClick={()=>setDetail(r.id)}/>)
        }
      </div>

      {showAdd&&(
        <Modal title="Nowe wypożyczenie" onClose={()=>setShowAdd(false)}>
          <Sel label="Sprzęt" value={form.equipment} onChange={v=>setForm(f=>({...f,equipment:v}))}
            options={EQUIPMENT_LIST.map(x=>({value:x,label:x}))}/>
          <PatientPicker label="Pacjent *" value={form.patientName}
            onChange={v=>setForm(f=>({...f,patientName:v}))}
            onSelect={p=>setForm(f=>({...f,patientName:p.name,phone:p.phone,address:p.address}))}
            patients={patients} rentals={rentals}/>
          <Inp label="Telefon" value={form.phone} onChange={v=>setForm(f=>({...f,phone:v}))} placeholder="600 000 000" type="tel"/>
          <Inp label="Adres" value={form.address} onChange={v=>setForm(f=>({...f,address:v}))} placeholder="ul. Przykładowa 1, Gliwice"/>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Typ wypożyczenia</div>
            <div style={{display:"flex",gap:8}}>
              {[{v:false,l:"Jednorazowe"},{v:true,l:"🔄 Odnawialne miesięcznie"}].map(opt=>(
                <button key={String(opt.v)} onClick={()=>setForm(f=>({...f,renewable:opt.v,endDate:opt.v?"":f.endDate}))}
                  style={{flex:1,padding:"10px 8px",borderRadius:12,border:`2px solid ${form.renewable===opt.v?"#0A7C7C":"#E4EAF0"}`,background:form.renewable===opt.v?"#E6F4F4":"#fff",color:form.renewable===opt.v?"#0A7C7C":"#7A8FA6",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
                  {opt.l}
                </button>
              ))}
            </div>
          </div>
          <Inp label="Data od" value={form.startDate} onChange={v=>setForm(f=>({...f,startDate:v}))} type="date"/>
          {!form.renewable && (
            <Inp label="Data do" value={form.endDate} onChange={v=>setForm(f=>({...f,endDate:v}))} type="date"/>
          )}
          <Inp label="Kwota (zł)" value={form.amount} onChange={v=>setForm(f=>({...f,amount:v}))} type="number" placeholder="400"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Inp label="Zapłacono (zł)" value={form.amountPaid} onChange={v=>setForm(f=>({...f,amountPaid:v}))} type="number" placeholder="0"/>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>Pozostało</div>
              <div style={{padding:"11px 14px",border:"1.5px solid #E4EAF0",borderRadius:12,fontSize:15,background:"#F2F5F7",color:(+form.amount-(+form.amountPaid||0))>0?"#E05C5C":"#3DAA72",fontWeight:700}}>
                {form.amount?(+form.amount-(+form.amountPaid||0))+" zł":"—"}
              </div>
            </div>
          </div>
          <Inp label="Transport (zł)" value={form.transport||""} onChange={v=>setForm(f=>({...f,transport:v}))} type="number" placeholder="0"/>
          <Txa label="Notatki" value={form.notes} onChange={v=>setForm(f=>({...f,notes:v}))} placeholder="np. max zakres 90°, uwagi..." rows={2}/>
          <Btn onClick={()=>{
            if(!form.patientName) return;
            if(!form.renewable && !form.endDate) { alert("Podaj datę końca wypożyczenia"); return; }
            const paymentId = Date.now();
            const rentalId = Date.now()+1;
            const paid = +(form.amountPaid||0);
            const matchedPat = patients.find(p=>p.name===form.patientName);
            const newRental = {...form,id:rentalId,patientId:matchedPat?.id||null,amount:+form.amount,amountPaid:paid,
              payments:paid>0?[{id:paymentId,amount:paid,date:form.startDate}]:[],status:"aktywne"};
            setRentals(r=>[newRental,...r]);
            // Natychmiast dodaj wpłatę do finansów
            if(paid>0) {
              setFinances(fs=>[{id:Date.now()+Math.random(),sourceId:"payment-"+paymentId,date:form.startDate,type:"przychód",category:"Wypożyczalnia",amount:paid,description:"Wypożyczenie – "+form.patientName+" ("+form.equipment+")"},...fs]);
            }
            setShowAdd(false);
          }} disabled={!form.patientName} style={{width:"100%",justifyContent:"center"}}>
            Zapisz wypożyczenie
          </Btn>
        </Modal>
      )}
    </div>
  );
}

// ── FINANCES ─────────────────────────────────────────────────────────────────
function Finances({finances, setFinances, visits, rentals}) {
  const [showAdd,setShowAdd]=useState(false);
  const [month,setMonth]=useState(new Date().toISOString().slice(0,7));
  const [form,setForm]=useState(()=>({date:(()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");})(),type:"przychód",category:"Wizyta",amount:"",description:""}));
  const [editEntry,setEditEntry]=useState(null);
  const cats={przychód:["Wizyta","Wypożyczalnia","Konsultacja","Inne"],koszt:["Paliwo","Sprzęt","Marketing","ZUS","Podatki","Inne"]};
  const mly=finances.filter(f=>f.date.startsWith(month) && !f._deleted);
  const inc=mly.filter(f=>f.type==="przychód").reduce((s,f)=>s+f.amount,0);
  const cst=mly.filter(f=>f.type==="koszt").reduce((s,f)=>s+f.amount,0);

  // Wszystkie miesiące z historii + bieżący, posortowane od najnowszego
  const months = useMemo(() => {
    const currentMonth = new Date().toISOString().slice(0,7);
    const monthSet = new Set([currentMonth]);
    finances.forEach(f => { if(f.date) monthSet.add(f.date.slice(0,7)); });
    return Array.from(monthSet).sort((a,b)=>b.localeCompare(a));
  }, [finances]);

  return (
    <>
    <div>
      <div style={{padding:"28px 20px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800}}>Finanse</div>
        <Btn small onClick={()=>setShowAdd(true)}><Ico d={I.plus} s={16} c="#fff"/> Dodaj</Btn>
      </div>
      <div style={{padding:"0 20px"}}>
        <div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
          {months.map(m=>(
            <button key={m} onClick={()=>setMonth(m)} style={{padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,whiteSpace:"nowrap",background:month===m?"#0A7C7C":"#E4EAF0",color:month===m?"#fff":"#7A8FA6",fontFamily:"inherit"}}>
              {new Date(m+"-15").toLocaleDateString("pl-PL",{month:"long",year:"numeric"})}
            </button>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
          {[{l:"Przychód",v:inc,c:"#3DAA72"},{l:"Koszty",v:cst,c:"#E05C5C"},{l:"Wynik",v:inc-cst,c:inc-cst>=0?"#0A7C7C":"#E05C5C"}].map((x,i)=>(
            <div key={i} style={{background:x.c+"14",borderRadius:14,padding:"12px 8px",textAlign:"center",border:`1.5px solid ${x.c}30`}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,color:x.c}}>{x.v} zł</div>
              <div style={{fontSize:11,color:"#7A8FA6",marginTop:2}}>{x.l}</div>
            </div>
          ))}
        </div>
        {mly.length===0 && <Empty text="Brak wpisów w tym miesiącu"/>}
        {[...mly].sort((a,b)=>b.date.localeCompare(a.date)).map(f=>(
          <Card key={f.id} onClick={()=>setEditEntry({...f,amount:String(f.amount)})} style={{cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontWeight:600}}>{f.description||f.category}</div>
                <div style={{fontSize:13,color:"#7A8FA6"}}>{f.date} · {f.category}</div>
              </div>
              <span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:16,color:f.type==="przychód"?"#3DAA72":"#E05C5C"}}>{f.type==="przychód"?"+":"−"}{f.amount} zł</span>
            </div>
          </Card>
        ))}
      </div>
    </div>
    {showAdd&&(
      <Modal title="Nowy wpis" onClose={()=>setShowAdd(false)}>
        <Sel label="Typ" value={form.type} onChange={v=>setForm(f=>({...f,type:v,category:cats[v][0]}))} options={[{value:"przychód",label:"📈 Przychód"},{value:"koszt",label:"📉 Koszt"}]}/>
        <Sel label="Kategoria" value={form.category} onChange={v=>setForm(f=>({...f,category:v}))} options={cats[form.type].map(c=>({value:c,label:c}))}/>
        <Inp label="Kwota (zł) *" value={form.amount} onChange={v=>setForm(f=>({...f,amount:v}))} type="number" placeholder="150"/>
        <Inp label="Opis" value={form.description} onChange={v=>setForm(f=>({...f,description:v}))} placeholder="np. wizyta u Jana Kowalskiego"/>
        <Inp label="Data" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))} type="date"/>
        <Btn onClick={()=>{if(!form.amount)return;setFinances(fs=>[{...form,id:Date.now(),amount:+form.amount},...fs]);setForm({date:(()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");})(),type:"przychód",category:"Wizyta",amount:"",description:""});setShowAdd(false);}} disabled={!form.amount} style={{width:"100%",justifyContent:"center"}}>Zapisz</Btn>
      </Modal>
    )}
    {editEntry&&(
      <Modal title="Edytuj wpis" onClose={()=>setEditEntry(null)}>
        <Sel label="Typ" value={editEntry.type} onChange={v=>setEditEntry(f=>({...f,type:v,category:cats[v][0]}))} options={[{value:"przychód",label:"📈 Przychód"},{value:"koszt",label:"📉 Koszt"}]}/>
        <Sel label="Kategoria" value={editEntry.category} onChange={v=>setEditEntry(f=>({...f,category:v}))} options={cats[editEntry.type].map(c=>({value:c,label:c}))}/>
        <Inp label="Kwota (zł)" value={editEntry.amount} onChange={v=>setEditEntry(f=>({...f,amount:v}))} type="number"/>
        <Inp label="Opis" value={editEntry.description||""} onChange={v=>setEditEntry(f=>({...f,description:v}))} placeholder="np. wizyta u Jana Kowalskiego"/>
        <Inp label="Data" value={editEntry.date} onChange={v=>setEditEntry(f=>({...f,date:v}))} type="date"/>
        <Btn style={{width:"100%",justifyContent:"center"}} onClick={()=>{
          setFinances(fs=>fs.map(f=>f.id===editEntry.id?{...f,...editEntry,amount:+editEntry.amount}:f));
          setEditEntry(null);
        }}>Zapisz zmiany</Btn>

      </Modal>
    )}

    </>
  );
}

// ── MARKETING ────────────────────────────────────────────────────────────────
function Marketing() {
  const [topic,setTopic]=useState("fizjoterapia domowa");
  const [tone,setTone]=useState("profesjonalny");
  const [post,setPost]=useState("");
  const [loading,setLoading]=useState(false);
  const [copied,setCopied]=useState(false);

  const generate=async()=>{
    setLoading(true);setPost("");
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`Napisz post na Facebook dla ZubrzyckiFizjo z Gliwic. Patryk Zubrzycki – fizjoterapeuta.\nTemat: ${topic}\nTon: ${tone}\nZasady: po polsku, 3-5 zdań + emoji, 4-6 hashtagów, podpisz "Patryk Zubrzycki 💚". Tylko treść posta.`}]})});
      const d=await r.json();setPost(d.content?.[0]?.text||"Błąd.");
    }catch{setPost("Błąd połączenia.");}
    setLoading(false);
  };

  return (
    <div>
      <div style={{padding:"28px 20px 16px"}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800}}>Generator postów</div>
        <div style={{fontSize:13,color:"#7A8FA6",marginTop:2}}>AI tworzy posty na Facebooka</div>
      </div>
      <div style={{padding:"0 20px"}}>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Temat</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {["fizjoterapia domowa","po endoprotezie","maszyna CPM","seniorzy","wypożyczalnia"].map(t=>(
              <button key={t} onClick={()=>setTopic(t)} style={{padding:"8px 14px",borderRadius:20,border:`1.5px solid ${topic===t?"#0A7C7C":"#E4EAF0"}`,background:topic===t?"#0A7C7C":"#fff",color:topic===t?"#fff":"#1C2B3A",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{t}</button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Ton</div>
          <div style={{display:"flex",gap:8}}>
            {["profesjonalny","ciepły","edukacyjny"].map(t=>(
              <button key={t} onClick={()=>setTone(t)} style={{padding:"8px 14px",borderRadius:20,border:`1.5px solid ${tone===t?"#F4A261":"#E4EAF0"}`,background:tone===t?"#F4A261":"#fff",color:tone===t?"#fff":"#1C2B3A",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{t}</button>
            ))}
          </div>
        </div>
        <Btn onClick={generate} variant="orange" disabled={loading} style={{width:"100%",justifyContent:"center",fontSize:16,padding:14}}>
          {loading?"⏳ Generuję...":<><Ico d={I.sp} s={18} c="#fff" f="#fff"/> Generuj post</>}
        </Btn>
        {post&&(
          <Card style={{marginTop:16,background:"#FFFBF5",border:"1.5px solid #F4A26140"}}>
            <div style={{lineHeight:1.7,whiteSpace:"pre-wrap",fontSize:15}}>{post}</div>
            <button onClick={()=>{navigator.clipboard.writeText(post);setCopied(true);setTimeout(()=>setCopied(false),2000);}} style={{marginTop:14,background:copied?"#3DAA72":"#F4A261",color:"#fff",border:"none",borderRadius:10,padding:"10px 16px",fontWeight:600,fontSize:14,cursor:"pointer",width:"100%",fontFamily:"inherit"}}>
              {copied?"✓ Skopiowano!":"📋 Kopiuj do schowka"}
            </button>
          </Card>
        )}
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
const TABS=[
  {id:"dashboard",i:I.home,l:"Pulpit"},
  {id:"patients",i:I.users,l:"Pacjenci"},
  {id:"rentals",i:I.equip,l:"Sprzęt"},
  {id:"finances",i:I.fin,l:"Finanse"},
  {id:"marketing",i:I.mkt,l:"Marketing"},
];

function App({visits,setVisits,patients,setPatients,rentals,setRentals,finances,setFinances}) {
  const [tab,setTab]=useState("dashboard");
  const [deepLinkRental,setDeepLinkRental]=useState(null);
  const [rentalsView,setRentalsView]=useState("aktywne");

  const goToRental = (id) => { setDeepLinkRental(id); setTab("rentals"); };

  return (
    <>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:#F2F5F7;color:#1C2B3A;-webkit-font-smoothing:antialiased}input,select,textarea,button{font-family:'DM Sans',sans-serif}::-webkit-scrollbar{display:none}`}</style>
      <div style={{maxWidth:480,margin:"0 auto",background:"#F2F5F7",minHeight:"100vh"}}>
        <div style={{paddingBottom:80,minHeight:"100vh"}}>
          {tab==="dashboard"&&<Dashboard visits={visits} setVisits={setVisits} rentals={rentals} setRentals={setRentals} finances={finances} setFinances={setFinances} patients={patients} goToRental={goToRental}/>}
          {tab==="patients"&&<Patients patients={patients} setPatients={setPatients} visits={visits} setVisits={setVisits} finances={finances} setFinances={setFinances} rentals={rentals}/>}
          {tab==="rentals"&&<Rentals rentals={rentals} setRentals={setRentals} finances={finances} setFinances={setFinances} patients={patients} initialDetail={deepLinkRental} onDetailClosed={()=>setDeepLinkRental(null)} rentalsView={rentalsView} setRentalsView={setRentalsView}/>}
          {tab==="finances"&&<Finances finances={finances} setFinances={setFinances} visits={visits} rentals={rentals}/>}
          {tab==="marketing"&&<Marketing/>}
        </div>
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:"1px solid #E4EAF0",display:"flex",padding:"8px 0 12px",zIndex:50,boxShadow:"0 -4px 20px rgba(0,0,0,.06)"}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 0",fontFamily:"inherit"}}>
              <div style={{width:36,height:36,borderRadius:12,background:tab===t.id?"#0A7C7C":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <Ico d={t.i} s={18} c={tab===t.id?"#fff":"#7A8FA6"}/>
              </div>
              <span style={{fontSize:10,fontWeight:600,color:tab===t.id?"#0A7C7C":"#7A8FA6"}}>{t.l}</span>
            </button>
          ))}
        </div>
      </div>
    </>
  );
}

    function AppWrapper() {
      const [visits, setVisits, visitsLoaded]       = usePersistedState("fizjo-visits",    VISITS);
      const [patients, setPatients, patientsLoaded] = usePersistedState("fizjo-patients",  PATIENTS);
      const [rentals, setRentals, rentalsLoaded]    = usePersistedState("fizjo-rentals",   MOCK_RENTALS);
      const [finances, setFinances, financesLoaded] = usePersistedState("fizjo-finances",  FINANCES);

      const allLoaded = visitsLoaded && patientsLoaded && rentalsLoaded && financesLoaded;

      if (!allLoaded) return (
        <div className="loader">
          <div className="spinner"/>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,color:"#0A7C7C",fontSize:18}}>ZubrzyckiFizjo</div>
          <div style={{fontSize:13,color:"#7A8FA6"}}>Wczytywanie danych...</div>
        </div>
      );

      return <AppWithSync
        visits={visits} setVisits={setVisits}
        patients={patients} setPatients={setPatients}
        rentals={rentals} setRentals={setRentals}
        finances={finances} setFinances={setFinances}
      />;
    }

    function AppWithSync({visits,setVisits,patients,setPatients,rentals,setRentals,finances,setFinances}) {
      // Auto-sync uruchamia się TYLKO gdy wszystkie dane są już załadowane z Supabase
      useEffect(() => {
        if(!visits || !rentals || !finances) return;
        const now = new Date();
        const d = now; const todayStr = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
        // existingIds includes both active entries AND manually deleted ones (marked with _deleted)
        const existingIds = new Set(finances.map(f => f.sourceId).filter(Boolean));
        const deletedIds = new Set(finances.filter(f=>f._deleted).map(f=>f.sourceId));
        const isSkipped = (id) => existingIds.has(id) || deletedIds.has(id);
        const toAdd = [];
        visits.forEach(v => {
          const sourceId = "visit-" + v.id;
          if(isSkipped(sourceId)) return;
          const visitDT = new Date(v.date + "T" + (v.time || "00:00") + ":00");
          const isDone = v.status === "zakończona" || visitDT <= now;
          if(isDone) {
            toAdd.push({id:Date.now()+Math.random(),sourceId,date:v.date,type:"przychód",category:"Wizyta",amount:v.price||0,description:"Wizyta – "+v.patientName});
          }
        });
        rentals.forEach(r => {
          (r.payments||[]).forEach(p => {
            const sourceId = "payment-" + p.id;
            if(isSkipped(sourceId)) return;
            // Wszystkie wpłaty trafiają do finansów niezależnie od daty
            toAdd.push({id:Date.now()+Math.random(),sourceId,date:p.date,type:"przychód",category:"Wypożyczalnia",amount:p.amount,description:"Wypożyczenie – "+r.patientName+" ("+r.equipment+")"});
          });
        });
        if(toAdd.length === 0) return;
        setFinances(prev => [...toAdd, ...prev]);
      }, [visits, rentals]); // NIE dodawaj finances - spowoduje nieskończoną pętlę

      return <App
        visits={visits} setVisits={setVisits}
        patients={patients} setPatients={setPatients}
        rentals={rentals} setRentals={setRentals}
        finances={finances} setFinances={setFinances}
      />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<AppWrapper/>);
  </script>
</body>
</html>
