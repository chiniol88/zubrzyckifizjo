              {months.map(m=><button key={m} onClick={()=>setMonth(m)} style={{padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,whiteSpace:"nowrap",background:month===m?"#0A7C7C":"#E4EAF0",color:month===m?"#fff":"#7A8FA6",fontFamily:"inherit"}}>{new Date(m+"-15").toLocaleDateString("pl-PL",{month:"long",year:"numeric"})}</button>)}
            </div>}
            {viewMode==="year"&&<div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
              {years.map(y=><button key={y} onClick={()=>setYear(y)} style={{padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,whiteSpace:"nowrap",background:year===y?"#0A7C7C":"#E4EAF0",color:year===y?"#fff":"#7A8FA6",fontFamily:"inherit"}}>{y}</button>)}
            </div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
              {[{l:"Przychód",v:inc,c:"#3DAA72"},{l:"Koszty",v:cst,c:"#E05C5C"},{l:"Wynik",v:inc-cst,c:inc-cst>=0?"#0A7C7C":"#E05C5C"}].map((x,i)=>(
                <div key={i} style={{background:x.c+"14",borderRadius:14,padding:"12px 8px",textAlign:"center",border:`1.5px solid ${x.c}30`}}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,color:x.c}}>{x.v} zł</div>
                  <div style={{fontSize:11,color:"#7A8FA6",marginTop:2}}>{x.l}</div>
                </div>
              ))}
            </div>
            {viewMode==="year"&&yearMonths.length>0&&<>
              {yearMonths.map(m=>{
                const ml=finances.filter(f=>f.date&&f.date.startsWith(m));
                const mi=ml.filter(f=>f.type==="przychód").reduce((s,f)=>s+f.amount,0);
                const mc=ml.filter(f=>f.type==="koszt").reduce((s,f)=>s+f.amount,0);
                return <div key={m} style={{marginBottom:8,borderRadius:14,border:"1.5px solid #E4EAF0",overflow:"hidden"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"#F2F5F7",cursor:"pointer"}} onClick={()=>{setViewMode("month");setMonth(m);}}>
                    <span style={{fontWeight:600,fontSize:14,textTransform:"capitalize"}}>{new Date(m+"-15").toLocaleDateString("pl-PL",{month:"long",year:"numeric"})}</span>
                    <div style={{display:"flex",gap:12,fontSize:13}}>
                      <span style={{color:"#3DAA72",fontWeight:600}}>+{mi} zł</span>
                      <span style={{color:"#E05C5C",fontWeight:600}}>−{mc} zł</span>
                      <span style={{color:mi-mc>=0?"#0A7C7C":"#E05C5C",fontWeight:700}}>{mi-mc>=0?"+":""}{mi-mc} zł</span>
                    </div>
                  </div>
                </div>;
              })}
            </>}
            {viewMode==="month"&&<>{mly.length===0&&<Empty text="Brak wpisów w tym miesiącu"/>}
            {[...mly].sort((a,b)=>b.date.localeCompare(a.date)).map(f=>(
              <Card key={f.id} onClick={()=>setEditE({...f,amount:String(f.amount)})}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><div style={{fontWeight:600}}>{f.description||f.category}</div><div style={{fontSize:13,color:"#7A8FA6"}}>{f.date} · {f.category}</div></div>
                  <span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:16,color:f.type==="przychód"?"#3DAA72":"#E05C5C"}}>{f.type==="przychód"?"+":"−"}{f.amount} zł</span>
                </div>
              </Card>
            ))}</>}
          </div>
        </div>

        {showAdd&&<Modal title="Nowy wpis" onClose={()=>setShowAdd(false)}>
          <Sel label="Typ" value={form.type} onChange={v=>setForm(f=>({...f,type:v,category:cats[v][0]}))} options={[{value:"przychód",label:"📈 Przychód"},{value:"koszt",label:"📉 Koszt"}]}/>
          <Sel label="Kategoria" value={form.category} onChange={v=>setForm(f=>({...f,category:v}))} options={cats[form.type].map(c=>({value:c,label:c}))}/>
          <Inp label="Kwota (zł) *" value={form.amount} onChange={v=>setForm(f=>({...f,amount:v}))} type="number" placeholder="150"/>
          <Inp label="Opis" value={form.description} onChange={v=>setForm(f=>({...f,description:v}))} placeholder="np. wizyta u Jana Kowalskiego"/>
          <Inp label="Data" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))} type="date"/>
          <Btn disabled={!form.amount} style={{width:"100%",justifyContent:"center"}} onClick={()=>{if(!form.amount)return;setFinances(fs=>[{...form,id:Date.now(),amount:+form.amount},...fs]);setForm(ef());setShowAdd(false);setToast("Wpis dodany");}}>Zapisz</Btn>
        </Modal>}

        {editE&&<Modal title="Edytuj wpis" onClose={()=>setEditE(null)}>
          <Sel label="Typ" value={editE.type} onChange={v=>setEditE(f=>({...f,type:v,category:cats[v][0]}))} options={[{value:"przychód",label:"📈 Przychód"},{value:"koszt",label:"📉 Koszt"}]}/>
          <Sel label="Kategoria" value={editE.category} onChange={v=>setEditE(f=>({...f,category:v}))} options={cats[editE.type].map(c=>({value:c,label:c}))}/>
          <Inp label="Kwota (zł)" value={editE.amount} onChange={v=>setEditE(f=>({...f,amount:v}))} type="number"/>
          <Inp label="Opis" value={editE.description||""} onChange={v=>setEditE(f=>({...f,description:v}))}/>
          <Inp label="Data" value={editE.date} onChange={v=>setEditE(f=>({...f,date:v}))} type="date"/>
          <Btn style={{width:"100%",justifyContent:"center",marginBottom:8}} onClick={()=>{setFinances(fs=>fs.map(f=>f.id===editE.id?{...f,...editE,amount:+editE.amount}:f));setEditE(null);setToast("Zmiany zapisane");}}>Zapisz zmiany</Btn>
          <Btn variant="danger" style={{width:"100%",justifyContent:"center"}} onClick={()=>{setFinances(fs=>fs.filter(f=>f.id!==editE.id));setEditE(null);}}>🗑️ Usuń wpis</Btn>
        </Modal>}
        {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      </>;
    }

    // ── MARKETING ─────────────────────────────────────────────────────────────
    function Marketing() {
      const [topic,setTopic]=useState("fizjoterapia domowa");
      const [tone,setTone]=useState("profesjonalny");
      const [post,setPost]=useState("");
      const [loading,setLoading]=useState(false);
      const [copied,setCopied]=useState(false);
      const gen=async()=>{
        setLoading(true);setPost("");
        try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`Napisz post na Facebook dla ZubrzyckiFizjo z Gliwic. Patryk Zubrzycki – fizjoterapeuta.\nTemat: ${topic}\nTon: ${tone}\nZasady: po polsku, 3-5 zdań + emoji, 4-6 hashtagów, podpisz "Patryk Zubrzycki 💚". Tylko treść posta.`}]})});const d=await r.json();setPost(d.content?.[0]?.text||"Błąd.");}catch{setPost("Błąd połączenia.");}
        setLoading(false);
      };
      return <div>
        <div style={{padding:"28px 20px 16px"}}><div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800}}>Generator postów</div><div style={{fontSize:13,color:"#7A8FA6",marginTop:2}}>AI tworzy posty na Facebooka</div></div>
        <div style={{padding:"0 20px"}}>
          <div style={{marginBottom:16}}><div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Temat</div><div style={{display:"flex",flexWrap:"wrap",gap:8}}>{["fizjoterapia domowa","po endoprotezie","maszyna CPM","seniorzy","wypożyczalnia"].map(t=><button key={t} onClick={()=>setTopic(t)} style={{padding:"8px 14px",borderRadius:20,border:`1.5px solid ${topic===t?"#0A7C7C":"#E4EAF0"}`,background:topic===t?"#0A7C7C":"#fff",color:topic===t?"#fff":"#1C2B3A",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{t}</button>)}</div></div>
          <div style={{marginBottom:20}}><div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Ton</div><div style={{display:"flex",gap:8}}>{["profesjonalny","ciepły","edukacyjny"].map(t=><button key={t} onClick={()=>setTone(t)} style={{padding:"8px 14px",borderRadius:20,border:`1.5px solid ${tone===t?"#F4A261":"#E4EAF0"}`,background:tone===t?"#F4A261":"#fff",color:tone===t?"#fff":"#1C2B3A",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{t}</button>)}</div></div>
          <Btn onClick={gen} variant="orange" disabled={loading} style={{width:"100%",justifyContent:"center",fontSize:16,padding:14}}>{loading?"⏳ Generuję...":<><Ico d={I.sp} s={18} c="#fff" f="#fff"/> Generuj post</>}</Btn>
          {post&&<Card style={{marginTop:16,background:"#FFFBF5",border:"1.5px solid #F4A26140"}}>
            <div style={{lineHeight:1.7,whiteSpace:"pre-wrap",fontSize:15}}>{post}</div>
            <button onClick={()=>{navigator.clipboard.writeText(post);setCopied(true);setTimeout(()=>setCopied(false),2000);}} style={{marginTop:14,background:copied?"#3DAA72":"#F4A261",color:"#fff",border:"none",borderRadius:10,padding:"10px 16px",fontWeight:600,fontSize:14,cursor:"pointer",width:"100%",fontFamily:"inherit"}}>{copied?"✓ Skopiowano!":"📋 Kopiuj do schowka"}</button>
          </Card>}
        </div>
      </div>;
    }

    // ── APP ───────────────────────────────────────────────────────────────────
    const TABS=[{id:"dashboard",i:I.home,l:"Pulpit"},{id:"patients",i:I.users,l:"Pacjenci"},{id:"rentals",i:I.equip,l:"Sprzęt"},{id:"finances",i:I.fin,l:"Finanse"},{id:"marketing",i:I.mkt,l:"Marketing"}];

    function App({visits,setVisits,patients,setPatients,rentals,setRentals,finances,setFinances}) {
      const [tab,setTab]=useState("dashboard");
      const [dlRental,setDlRental]=useState(null);
      const [rentalsView,setRentalsView]=useState("aktywne");
      const goToRental=id=>{setDlRental(id);setTab("rentals");};
      return <>
        <div style={{maxWidth:480,margin:"0 auto",background:"#F2F5F7",minHeight:"100vh"}}>
          <div style={{paddingBottom:80,minHeight:"100vh"}}>
            {tab==="dashboard"&&<Dashboard visits={visits} setVisits={setVisits} rentals={rentals} setRentals={setRentals} finances={finances} setFinances={setFinances} patients={patients} goToRental={goToRental}/>}
            {tab==="patients"&&<Patients patients={patients} setPatients={setPatients} visits={visits} setVisits={setVisits} finances={finances} setFinances={setFinances} rentals={rentals} setRentals={setRentals}/>}
            {tab==="rentals"&&<Rentals rentals={rentals} setRentals={setRentals} finances={finances} setFinances={setFinances} patients={patients} initialDetail={dlRental} onDetailClosed={()=>setDlRental(null)} rentalsView={rentalsView} setRentalsView={setRentalsView}/>}
            {tab==="finances"&&<Finances finances={finances} setFinances={setFinances}/>}
            {tab==="marketing"&&<Marketing/>}
          </div>
          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:"1px solid #E4EAF0",display:"flex",padding:"8px 0 12px",zIndex:50,boxShadow:"0 -4px 20px rgba(0,0,0,.06)"}}>
            {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 0",fontFamily:"inherit"}}>
              <div style={{width:36,height:36,borderRadius:12,background:tab===t.id?"#0A7C7C":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}><Ico d={t.i} s={18} c={tab===t.id?"#fff":"#7A8FA6"}/></div>
              <span style={{fontSize:10,fontWeight:600,color:tab===t.id?"#0A7C7C":"#7A8FA6"}}>{t.l}</span>
            </button>)}
          </div>
        </div>
      </>;
    }

    function AppWithSync({visits,setVisits,patients,setPatients,rentals,setRentals,finances,setFinances}) {
      // Auto-generate current month cycle — only for rentals that already have cycles (went through HistoryFill)
      // or are new (startDate is in current month)
      useEffect(()=>{
        if(!rentals)return;
        const cm=todayLocal().slice(0,7);
        const needsUpdate=rentals.some(r=>{
          if(r.status!=="aktywne"||!r.renewable)return false;
          if((r.cycles||[]).some(c=>c.month===cm))return false;
          // Skip if cycles empty AND startDate older than current month — needs HistoryFill first
          if((r.cycles||[]).length===0&&r.startDate.slice(0,7)<cm)return false;
          return true;
        });
        if(!needsUpdate)return;
        setRentals(rs=>rs.map(r=>{
          if(r.status!=="aktywne"||!r.renewable)return r;
          if((r.cycles||[]).some(c=>c.month===cm))return r;
          if((r.cycles||[]).length===0&&r.startDate.slice(0,7)<cm)return r;
          const last=[...(r.cycles||[])].sort((a,b)=>b.month.localeCompare(a.month))[0];
          return {...r,cycles:[...(r.cycles||[]),{month:cm,amount:last?last.amount:(r.amount||0),paid:false,paidDate:null}]};
        }));
      },[]);
      useEffect(()=>{
        if(!visits||!rentals||!finances)return;
        const now=new Date(),ex=new Set(finances.map(f=>f.sourceId).filter(Boolean)),toAdd=[];
        visits.forEach(v=>{
          const sid="visit-"+v.id; if(ex.has(sid))return;
          const done=v.status==="zakończona"||new Date(v.date+"T"+(v.time||"00:00")+":00")<=now;
          if(done)toAdd.push({id:Date.now()+Math.random(),sourceId:sid,date:v.date,type:"przychód",category:"Wizyta",amount:v.price||0,description:"Wizyta – "+v.patientName});
        });
        rentals.forEach(r=>(r.payments||[]).forEach(p=>{
          const sid="payment-"+p.id; if(ex.has(sid))return;
          toAdd.push({id:Date.now()+Math.random(),sourceId:sid,date:p.date,type:"przychód",category:"Wypożyczalnia",amount:p.amount,description:"Wypożyczenie – "+r.patientName+" ("+r.equipment+")"});
        }));
        rentals.forEach(r=>(r.cycles||[]).filter(c=>c.paid).forEach(c=>{
          const sid="cycle-"+r.id+"-"+c.month; if(ex.has(sid))return;
          const label=new Date(c.month+"-15").toLocaleDateString("pl-PL",{month:"long",year:"numeric"});
          toAdd.push({id:Date.now()+Math.random(),sourceId:sid,date:c.paidDate||c.month+"-15",type:"przychód",category:"Wypożyczalnia",amount:c.amount,description:"Wypożyczenie – "+r.patientName+" ("+r.equipment+") "+label});
        }));
        if(toAdd.length)setFinances(prev=>[...toAdd,...prev]);
      },[visits,rentals]);
      return <App visits={visits} setVisits={setVisits} patients={patients} setPatients={setPatients} rentals={rentals} setRentals={setRentals} finances={finances} setFinances={setFinances}/>;
    }

    function AppWrapper() {
      const [visits,setVisits,v1]=usePersistedState("fizjo-visits",[]);
      const [patients,setPatients,v2]=usePersistedState("fizjo-patients",[]);
      const [rentals,setRentals,v3]=usePersistedState("fizjo-rentals",[]);
      const [finances,setFinances,v4]=usePersistedState("fizjo-finances",[]);
      if(!v1||!v2||!v3||!v4)return<div className="loader"><div className="spinner"/><div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,color:"#0A7C7C",fontSize:18}}>ZubrzyckiFizjo</div><div style={{fontSize:13,color:"#7A8FA6"}}>Wczytywanie danych...</div></div>;
      return <AppWithSync visits={visits} setVisits={setVisits} patients={patients} setPatients={setPatients} rentals={rentals} setRentals={setRentals} finances={finances} setFinances={setFinances}/>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<AppWrapper/>);
  </script>
</body>
</html>
