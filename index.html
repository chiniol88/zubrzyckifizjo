const Card = ({ children, style = {}, onClick }) => (

// ─── AUTH ────────────────────────────────────────────────────────────────────
function Auth() {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [mode, setMode] = useState("login");
  const [loading, setLoading] = useState(false);
  const [msg, setMsg] = useState("");
  const [err, setErr] = useState("");

  const handle = async () => {
    setLoading(true); setErr(""); setMsg("");
    if (mode === "login") {
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) setErr("Błędny email lub hasło.");
    } else if (mode === "register") {
      const { error } = await supabase.auth.signUp({ email, password });
      if (error) setErr(error.message);
      else setMsg("Sprawdź email — wyślemy link aktywacyjny.");
    } else {
      const { error } = await supabase.auth.resetPasswordForEmail(email);
      if (error) setErr(error.message);
      else setMsg("Link do resetowania hasła wysłany.");
    }
    setLoading(false);
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#F2F5F7", padding: 20 }}>
      <div style={{ width: "100%", maxWidth: 380 }}>
        <div style={{ textAlign: "center", marginBottom: 40 }}>
          <div style={{ width: 72, height: 72, borderRadius: 20, background: "#0A7C7C", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", boxShadow: "0 8px 24px rgba(10,124,124,0.3)" }}>
            <span style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, color: "#fff", fontSize: 32 }}>Z</span>
          </div>
          <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 24 }}>ZubrzyckiFizjo</div>
          <div style={{ color: "#7A8FA6", fontSize: 14, marginTop: 4 }}>Panel zarządzania praktyką</div>
        </div>
        <div style={{ background: "#fff", borderRadius: 20, padding: 24, boxShadow: "0 4px 24px rgba(0,0,0,0.08)" }}>
          <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: 18, marginBottom: 20 }}>
            {mode === "login" ? "Zaloguj się" : mode === "register" ? "Załóż konto" : "Reset hasła"}
          </div>
          <Input label="Email" value={email} onChange={setEmail} placeholder="patryk@zubrzyckifizjo.pl" type="email" />
          {mode !== "reset" && <Input label="Hasło" value={password} onChange={setPassword} placeholder="••••••••" type="password" />}
          {err && <div style={{ background: "#FEE2E2", color: "#E05C5C", padding: "10px 14px", borderRadius: 10, fontSize: 14, marginBottom: 14 }}>{err}</div>}
          {msg && <div style={{ background: "#E8F7EE", color: "#3DAA72", padding: "10px 14px", borderRadius: 10, fontSize: 14, marginBottom: 14 }}>{msg}</div>}
          <Btn onClick={handle} disabled={loading} style={{ width: "100%", justifyContent: "center" }}>{loading ? "Chwilę..." : mode === "login" ? "Zaloguj" : mode === "register" ? "Zarejestruj" : "Wyślij link"}</Btn>
          <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 8, alignItems: "center" }}>
            {mode === "login" && <>
              <button onClick={() => setMode("reset")} style={{ background: "none", border: "none", color: "#7A8FA6", fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>Zapomniałem hasła</button>
              <button onClick={() => setMode("register")} style={{ background: "none", border: "none", color: "#0A7C7C", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Nie masz konta? Zarejestruj się</button>
            </>}
            {mode !== "login" && <button onClick={() => setMode("login")} style={{ background: "none", border: "none", color: "#0A7C7C", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>← Wróć do logowania</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({ user }) {
  const [stats, setStats] = useState(null);
  const [todayVisits, setTodayVisits] = useState([]);
  const [activeRentals, setActiveRentals] = useState([]);
  const today = new Date().toISOString().split("T")[0];
  const monthStart = today.slice(0, 7) + "-01";

  useEffect(() => {
    (async () => {
      const [{ data: pts }, { data: vis }, { data: ren }, { data: fin }] = await Promise.all([
        supabase.from("patients").select("id").eq("user_id", user.id),
        supabase.from("visits").select("*").eq("user_id", user.id).eq("date", today),
        supabase.from("rentals").select("*").eq("user_id", user.id).eq("status", "aktywne"),
        supabase.from("finances").select("*").eq("user_id", user.id).gte("date", monthStart),
      ]);
      const income = fin?.filter(f => f.type === "przychód").reduce((s, f) => s + +f.amount, 0) || 0;
      const costs = fin?.filter(f => f.type === "koszt").reduce((s, f) => s + +f.amount, 0) || 0;
      setStats({ patients: pts?.length || 0, income, costs, profit: income - costs });
      setTodayVisits(vis || []);
      setActiveRentals(ren || []);
    })();
  }, []);

  if (!stats) return <Loading />;
  const month = new Date().toLocaleDateString("pl-PL", { month: "long", year: "numeric" });

  return (
    <div>
      <div style={{ padding: "28px 20px 8px" }}>
        <div style={{ color: "#7A8FA6", fontSize: 14, marginBottom: 4 }}>Dzień dobry, Patryk 👋</div>
        <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 26, fontWeight: 800 }}>ZubrzyckiFizjo</div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, padding: "12px 20px" }}>
        {[
          { label: "Wizyty dziś", value: todayVisits.length, color: "#0A7C7C", icon: ic.cal },
          { label: "Aktywne wypożyczenia", value: activeRentals.length, color: "#F4A261", icon: ic.equip },
          { label: `Przychód (${month})`, value: `${stats.income} zł`, color: "#3DAA72", icon: ic.trend },
          { label: "Pacjenci", value: stats.patients, color: "#7C6AF4", icon: ic.users },
        ].map((item, i) => (
          <div key={i} style={{ background: item.color, borderRadius: 16, padding: "16px 14px", color: "#fff" }}>
            <Icon d={item.icon} size={20} color="rgba(255,255,255,0.8)" />
            <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 22, fontWeight: 800, margin: "6px 0 2px", wordBreak: "break-word" }}>{item.value}</div>
            <div style={{ fontSize: 12, opacity: 0.85 }}>{item.label}</div>
          </div>
        ))}
      </div>
      <div style={{ padding: "0 20px" }}>
        <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 17, fontWeight: 700, marginBottom: 10 }}>
          Dzisiaj — {new Date().toLocaleDateString("pl-PL", { weekday: "long", day: "numeric", month: "long" })}
        </div>
        {todayVisits.length === 0
          ? <Empty text="Brak wizyt na dziś" />
          : todayVisits.sort((a, b) => a.time?.localeCompare(b.time)).map(v => (
            <Card key={v.id}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontWeight: 600 }}>{v.patient_name}</div>
                  <div style={{ fontSize: 13, color: "#7A8FA6" }}>{v.time?.slice(0, 5)} · {v.type}</div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4 }}>
                  <Badge color={v.status === "zakończona" ? "#3DAA72" : "#0A7C7C"}>{v.status}</Badge>
                  <span style={{ fontWeight: 600 }}>{v.price} zł</span>
                </div>
              </div>
            </Card>
          ))}
        {activeRentals.length > 0 && <>
          <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 17, fontWeight: 700, margin: "16px 0 10px" }}>Aktywne wypożyczenia</div>
          {activeRentals.map(r => {
            const days = Math.ceil((new Date(r.end_date) - new Date()) / 86400000);
            return (
              <Card key={r.id}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div><div style={{ fontWeight: 600 }}>{r.equipment}</div><div style={{ fontSize: 13, color: "#7A8FA6" }}>{r.patient_name}</div></div>
                  <Badge color={days < 3 ? "#E05C5C" : days < 7 ? "#F4A261" : "#3DAA72"}>{days > 0 ? `${days}d` : "Termin!"}</Badge>
                </div>
              </Card>
            );
          })}
        </>}
        <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 17, fontWeight: 700, margin: "16px 0 10px" }}>Wynik miesiąca</div>
        <Card>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
            {[{ label: "Przychód", value: stats.income, color: "#3DAA72" }, { label: "Koszty", value: stats.costs, color: "#E05C5C" }, { label: "Zysk", value: stats.profit, color: stats.profit >= 0 ? "#0A7C7C" : "#E05C5C" }].map((item, i) => (
              <div key={i} style={{ textAlign: "center", padding: "8px 4px", background: item.color + "14", borderRadius: 12 }}>
                <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 15, color: item.color }}>{item.value} zł</div>
                <div style={{ fontSize: 11, color: "#7A8FA6", marginTop: 2 }}>{item.label}</div>
              </div>
            ))}
          </div>
        </Card>
      </div>
    </div>
  );
}

// ─── PATIENTS ────────────────────────────────────────────────────────────────
function Patients({ user }) {
  const [patients, setPatients] = useState([]);
  const [selected, setSelected] = useState(null);
  const [visits, setVisits] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showAdd, setShowAdd] = useState(false);
  const [showVisit, setShowVisit] = useState(false);
  const [search, setSearch] = useState("");
  const [form, setForm] = useState({ name: "", phone: "", address: "", diagnosis: "", notes: "" });
  const [vForm, setVForm] = useState({ date: new Date().toISOString().split("T")[0], time: "10:00", type: "Rehabilitacja domowa", price: "150" });
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    supabase.from("patients").select("*").eq("user_id", user.id).order("name").then(({ data }) => { setPatients(data || []); setLoading(false); });
  }, []);

  const openPatient = async (p) => {
    setSelected(p);
    const { data } = await supabase.from("visits").select("*").eq("patient_id", p.id).order("date", { ascending: false });
    setVisits(data || []);
  };

  const addPatient = async () => {
    if (!form.name) return;
    setSaving(true);
    const { data } = await supabase.from("patients").insert({ ...form, user_id: user.id }).select().single();
    if (data) setPatients(p => [...p, data].sort((a, b) => a.name.localeCompare(b.name)));
    setForm({ name: "", phone: "", address: "", diagnosis: "", notes: "" });
    setShowAdd(false); setSaving(false);
  };

  const addVisit = async () => {
    setSaving(true);
    const { data } = await supabase.from("visits").insert({ ...vForm, price: +vForm.price, patient_id: selected.id, patient_name: selected.name, user_id: user.id }).select().single();
    if (data) setVisits(v => [data, ...v]);
    setShowVisit(false); setSaving(false);
  };

  const completeVisit = async (id) => {
    await supabase.from("visits").update({ status: "zakończona" }).eq("id", id);
    setVisits(v => v.map(x => x.id === id ? { ...x, status: "zakończona" } : x));
  };

  const filtered = patients.filter(p => p.name.toLowerCase().includes(search.toLowerCase()) || p.phone?.includes(search));

  if (selected) {
    const total = visits.filter(v => v.status === "zakończona").reduce((s, v) => s + +v.price, 0);
    return (
      <div>
        <button onClick={() => setSelected(null)} style={{ background: "none", border: "none", display: "flex", alignItems: "center", gap: 6, color: "#0A7C7C", fontWeight: 600, cursor: "pointer", padding: "20px 20px 0", fontFamily: "inherit", fontSize: 14 }}>
          <Icon d={ic.back} size={18} color="#0A7C7C" /> Pacjenci
        </button>
        <div style={{ padding: "12px 20px 0" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
            <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
              <Avatar name={selected.name} size={52} />
              <div>
                <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 20, fontWeight: 800 }}>{selected.name}</div>
                <div style={{ fontSize: 13, color: "#7A8FA6" }}>{selected.address}</div>
              </div>
            </div>
            {selected.phone && <a href={`tel:${selected.phone}`} style={{ textDecoration: "none" }}><Btn small variant="secondary"><Icon d={ic.phone} size={15} color="#0A7C7C" />{selected.phone}</Btn></a>}
          </div>
          {selected.diagnosis && (
            <Card style={{ background: "#E6F4F4" }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#0A7C7C", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6 }}>Diagnoza</div>
              <div style={{ lineHeight: 1.5 }}>{selected.diagnosis}</div>
              {selected.notes && <div style={{ marginTop: 8, fontSize: 13, color: "#0A7C7C", borderTop: "1px solid #c3e0e0", paddingTop: 8 }}>📋 {selected.notes}</div>}
            </Card>
          )}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div>
              <span style={{ fontFamily: "'Syne',sans-serif", fontSize: 17, fontWeight: 700 }}>Wizyty ({visits.length})</span>

          <Card key={p.id} onClick={() => openPatient(p)}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>

        ))}
      </div>
      {showAdd && (
        <Modal title="Nowy pacjent" onClose={() => setShowAdd(false)}>

          <Input label="Telefon" value={form.phone} onChange={v => setForm(f => ({ ...f, phone: v }))} placeholder="600 000 000" type="tel" />
          <Input label="Adres" value={form.address} onChange={v => setForm(f => ({ ...f, address: v }))} placeholder="ul. Przykładowa 1, Gliwice" />

}

// ─── RENTALS ─────────────────────────────────────────────────────────────────
function Rentals({ user }) {
  const [rentals, setRentals] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState("aktywne");
  const [showAdd, setShowAdd] = useState(false);
  const [saving, setSaving] = useState(false);
  const [form, setForm] = useState({ equipment: "Maszyna CPM (kolano)", patient_name: "", phone: "", start_date: new Date().toISOString().split("T")[0], end_date: "", daily_rate: "", deposit: "" });

  useEffect(() => {
    supabase.from("rentals").select("*").eq("user_id", user.id).order("start_date", { ascending: false }).then(({ data }) => { setRentals(data || []); setLoading(false); });
  }, []);

  const add = async () => {
    if (!form.patient_name || !form.end_date) return;
    setSaving(true);
    const { data } = await supabase.from("rentals").insert({ ...form, daily_rate: +form.daily_rate, deposit: +form.deposit, status: "aktywne", user_id: user.id }).select().single();
    if (data) setRentals(r => [data, ...r]);
    setForm({ equipment: "Maszyna CPM (kolano)", patient_name: "", phone: "", start_date: new Date().toISOString().split("T")[0], end_date: "", daily_rate: "", deposit: "" });
    setShowAdd(false); setSaving(false);
  };

  const returnIt = async (id) => {
    await supabase.from("rentals").update({ status: "zakończone" }).eq("id", id);
    setRentals(r => r.map(x => x.id === id ? { ...x, status: "zakończone" } : x));
  };

  const filtered = rentals.filter(r => r.status === filter);
  if (loading) return <Loading />;

  return (
    <div>
      <div style={{ padding: "28px 20px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div><div style={{ fontFamily: "'Syne',sans-serif", fontSize: 24, fontWeight: 800 }}>Wypożyczalnia</div></div>
        <Btn small onClick={() => setShowAdd(true)}><Icon d={ic.plus} size={16} color="#fff" /> Nowe</Btn>
      </div>
      <div style={{ display: "flex", gap: 8, padding: "0 20px 16px" }}>
        {[["aktywne", rentals.filter(r => r.status === "aktywne").length], ["zakończone", rentals.filter(r => r.status === "zakończone").length]].map(([s, count]) => (
          <button key={s} onClick={() => setFilter(s)} style={{ padding: "8px 16px", borderRadius: 20, border: "none", cursor: "pointer", fontWeight: 600, fontSize: 13, background: filter === s ? "#0A7C7C" : "#E4EAF0", color: filter === s ? "#fff" : "#7A8FA6", fontFamily: "inherit" }}>
            {s.charAt(0).toUpperCase() + s.slice(1)} ({count})
          </button>
        ))}
      </div>
      <div style={{ padding: "0 20px" }}>
        {filtered.length === 0 ? <Empty text={`Brak ${filter} wypożyczeń`} /> : filtered.map(r => {
          const days = Math.ceil((new Date(r.end_date) - new Date()) / 86400000);
          return (
            <Card key={r.id}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 15 }}>{r.equipment}</div>
                  <div style={{ fontSize: 14, color: "#7A8FA6" }}>{r.patient_name}</div>
                  {r.phone && <a href={`tel:${r.phone}`} style={{ fontSize: 13, color: "#0A7C7C", textDecoration: "none" }}>{r.phone}</a>}
                </div>
                {r.status === "aktywne" && <Badge color={days < 0 ? "#E05C5C" : days < 7 ? "#F4A261" : "#3DAA72"}>{days > 0 ? `${days}d` : days === 0 ? "Dziś!" : `${Math.abs(days)}d po terminie`}</Badge>}
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: "4px 16px", fontSize: 12, color: "#7A8FA6", marginBottom: r.status === "aktywne" ? 12 : 0 }}>
                <span>📅 {r.start_date} → {r.end_date}</span>
                <span>💰 {r.daily_rate} zł/dzień</span>
                <span>🔒 Kaucja: {r.deposit} zł</span>
              </div>
              {r.status === "aktywne" && <Btn small variant="secondary" onClick={() => returnIt(r.id)} style={{ width: "100%", justifyContent: "center" }}><Icon d={ic.check} size={15} color="#0A7C7C" /> Sprzęt zwrócony</Btn>}
            </Card>
          );
        })}
      </div>
      {showAdd && (
        <Modal title="Nowe wypożyczenie" onClose={() => setShowAdd(false)}>
          <Sel label="Sprzęt" value={form.equipment} onChange={v => setForm(f => ({ ...f, equipment: v }))} options={["Maszyna CPM (kolano)", "Maszyna CPM (biodro)", "Balkonik aluminiowy", "Kule łokciowe (para)", "Chodzik rehabilitacyjny", "Inne"].map(x => ({ value: x, label: x }))} />
          <Input label="Pacjent *" value={form.patient_name} onChange={v => setForm(f => ({ ...f, patient_name: v }))} placeholder="Jan Kowalski" />
          <Input label="Telefon" value={form.phone} onChange={v => setForm(f => ({ ...f, phone: v }))} placeholder="600 000 000" type="tel" />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <Input label="Data od" value={form.start_date} onChange={v => setForm(f => ({ ...f, start_date: v }))} type="date" />
            <Input label="Data do *" value={form.end_date} onChange={v => setForm(f => ({ ...f, end_date: v }))} type="date" />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <Input label="Stawka (zł/dzień)" value={form.daily_rate} onChange={v => setForm(f => ({ ...f, daily_rate: v }))} type="number" placeholder="25" />
            <Input label="Kaucja (zł)" value={form.deposit} onChange={v => setForm(f => ({ ...f, deposit: v }))} type="number" placeholder="300" />
          </div>
          <Btn onClick={add} disabled={saving || !form.patient_name || !form.end_date} style={{ width: "100%", justifyContent: "center" }}>{saving ? "Zapisywanie..." : "Zapisz wypożyczenie"}</Btn>
        </Modal>
      )}
    </div>
  );
}

// ─── FINANCES ────────────────────────────────────────────────────────────────
function Finances({ user }) {
  const [finances, setFinances] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showAdd, setShowAdd] = useState(false);
  const [saving, setSaving] = useState(false);
  const [month, setMonth] = useState(new Date().toISOString().slice(0, 7));
  const [form, setForm] = useState({ date: new Date().toISOString().split("T")[0], type: "przychód", category: "Wizyta", amount: "", description: "" });
  const cats = { przychód: ["Wizyta", "Wypożyczalnia", "Konsultacja", "Inne"], koszt: ["Paliwo", "Sprzęt", "Marketing", "ZUS", "Podatki", "Inne"] };

  useEffect(() => {
    supabase.from("finances").select("*").eq("user_id", user.id).order("date", { ascending: false }).then(({ data }) => { setFinances(data || []); setLoading(false); });
  }, []);

  const add = async () => {
    if (!form.amount) return;
    setSaving(true);
    const { data } = await supabase.from("finances").insert({ ...form, amount: +form.amount, user_id: user.id }).select().single();
    if (data) setFinances(f => [data, ...f]);
    setForm({ date: new Date().toISOString().split("T")[0], type: "przychód", category: "Wizyta", amount: "", description: "" });
    setShowAdd(false); setSaving(false);
  };

  const monthly = finances.filter(f => f.date?.startsWith(month));
  const income = monthly.filter(f => f.type === "przychód").reduce((s, f) => s + +f.amount, 0);
  const costs = monthly.filter(f => f.type === "koszt").reduce((s, f) => s + +f.amount, 0);
  const months = [...new Set(finances.map(f => f.date?.slice(0, 7)))].sort().reverse();
  if (loading) return <Loading />;

  return (
    <div>
      <div style={{ padding: "28px 20px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 24, fontWeight: 800 }}>Finanse</div>
        <Btn small onClick={() => setShowAdd(true)}><Icon d={ic.plus} size={16} color="#fff" /> Dodaj</Btn>
      </div>
      <div style={{ padding: "0 20px" }}>
        <div style={{ overflowX: "auto", display: "flex", gap: 8, paddingBottom: 4, marginBottom: 16 }}>
          {(months.length ? months : [month]).map(m => (
            <button key={m} onClick={() => setMonth(m)} style={{ padding: "8px 14px", borderRadius: 20, border: "none", cursor: "pointer", fontWeight: 600, fontSize: 13, whiteSpace: "nowrap", background: month === m ? "#0A7C7C" : "#E4EAF0", color: month === m ? "#fff" : "#7A8FA6", fontFamily: "inherit" }}>
              {new Date(m + "-01").toLocaleDateString("pl-PL", { month: "long", year: "numeric" })}
            </button>
          ))}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>
          {[{ label: "Przychód", value: income, color: "#3DAA72" }, { label: "Koszty", value: costs, color: "#E05C5C" }, { label: "Wynik", value: income - costs, color: income - costs >= 0 ? "#0A7C7C" : "#E05C5C" }].map((item, i) => (
            <div key={i} style={{ background: item.color + "14", borderRadius: 14, padding: "12px 8px", textAlign: "center", border: `1.5px solid ${item.color}30` }}>
              <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 15, color: item.color }}>{item.value} zł</div>
              <div style={{ fontSize: 11, color: "#7A8FA6", marginTop: 2 }}>{item.label}</div>
            </div>
          ))}
        </div>
        {monthly.length === 0 ? <Empty text="Brak wpisów w tym miesiącu" /> : monthly.map(f => (
          <Card key={f.id}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div><div style={{ fontWeight: 600 }}>{f.description || f.category}</div><div style={{ fontSize: 13, color: "#7A8FA6" }}>{f.date} · {f.category}</div></div>
              <span style={{ fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: 16, color: f.type === "przychód" ? "#3DAA72" : "#E05C5C" }}>{f.type === "przychód" ? "+" : "−"}{f.amount} zł</span>
            </div>
          </Card>
        ))}
      </div>
      {showAdd && (
        <Modal title="Nowy wpis" onClose={() => setShowAdd(false)}>
          <Sel label="Typ" value={form.type} onChange={v => setForm(f => ({ ...f, type: v, category: cats[v][0] }))} options={[{ value: "przychód", label: "📈 Przychód" }, { value: "koszt", label: "📉 Koszt" }]} />
          <Sel label="Kategoria" value={form.category} onChange={v => setForm(f => ({ ...f, category: v }))} options={cats[form.type].map(c => ({ value: c, label: c }))} />
          <Input label="Kwota (zł) *" value={form.amount} onChange={v => setForm(f => ({ ...f, amount: v }))} type="number" placeholder="150" />
          <Input label="Opis" value={form.description} onChange={v => setForm(f => ({ ...f, description: v }))} placeholder="np. wizyta u Jana Kowalskiego" />
          <Input label="Data" value={form.date} onChange={v => setForm(f => ({ ...f, date: v }))} type="date" />
          <Btn onClick={add} disabled={saving || !form.amount} style={{ width: "100%", justifyContent: "center" }}>{saving ? "Zapisywanie..." : "Zapisz"}</Btn>
        </Modal>
      )}
    </div>
  );
}

// ─── MARKETING ───────────────────────────────────────────────────────────────
function Marketing() {
  const [topic, setTopic] = useState("fizjoterapia domowa – korzyści i jak działa");
  const [tone, setTone] = useState("profesjonalny i merytoryczny");
  const [post, setPost] = useState("");
  const [loading, setLoading] = useState(false);
  const [copied, setCopied] = useState(false);

  const topics = [
    { value: "fizjoterapia domowa – korzyści i jak działa", label: "Fizjoterapia domowa" },
    { value: "rehabilitacja po endoprotezoplastyce biodra lub kolana", label: "Po endoprotezie" },
    { value: "wypożyczanie maszyny CPM", label: "Maszyna CPM" },
    { value: "rehabilitacja neurologiczna i polineuropatia", label: "Rehab neurologiczna" },
    { value: "ćwiczenia profilaktyczne dla seniorów", label: "Seniorzy" },
    { value: "wypożyczalnia sprzętu – balkoniki, kule, chodziki", label: "Wypożyczalnia" },
  ];

  const generate = async () => {
    setLoading(true); setPost("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514", max_tokens: 1000,
          messages: [{ role: "user", content: `Napisz post na Facebook dla ZubrzyckiFizjo z Gliwic/Katowic. Właściciel: Patryk Zubrzycki – fizjoterapeuta. Usługi: rehabilitacja domowa, wypożyczanie CPM, balkoników, kul.\n\nTemat: ${topic}\nTon: ${tone}\n\nZasady: po polsku, naturalnie, 3-5 zdań + emoji, 4-6 hashtagów na końcu, podpisz "Patryk Zubrzycki – fizjoterapeuta 💚". Tylko treść posta.` }]
        })
      });
      const data = await res.json();
      setPost(data.content?.[0]?.text || "Błąd generowania.");
    } catch { setPost("Błąd połączenia."); }
    setLoading(false);
  };

  const copy = () => { navigator.clipboard.writeText(post); setCopied(true); setTimeout(() => setCopied(false), 2000); };

  return (
    <div>
      <div style={{ padding: "28px 20px 16px" }}>
        <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 24, fontWeight: 800 }}>Generator postów</div>
        <div style={{ fontSize: 13, color: "#7A8FA6", marginTop: 2 }}>AI tworzy posty na Facebooka</div>
      </div>
      <div style={{ padding: "0 20px" }}>
        <div style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: "#7A8FA6", marginBottom: 8, textTransform: "uppercase", letterSpacing: 0.5 }}>Temat</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {topics.map(t => <button key={t.value} onClick={() => setTopic(t.value)} style={{ padding: "8px 14px", borderRadius: 20, border: `1.5px solid ${topic === t.value ? "#0A7C7C" : "#E4EAF0"}`, background: topic === t.value ? "#0A7C7C" : "#fff", color: topic === t.value ? "#fff" : "#1C2B3A", fontSize: 13, fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>{t.label}</button>)}
          </div>
        </div>
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: "#7A8FA6", marginBottom: 8, textTransform: "uppercase", letterSpacing: 0.5 }}>Ton</div>
          <div style={{ display: "flex", gap: 8 }}>
            {[["profesjonalny i merytoryczny", "Profesjonalny"], ["ciepły i empatyczny", "Ciepły"], ["edukacyjny", "Edukacyjny"]].map(([v, l]) => <button key={v} onClick={() => setTone(v)} style={{ padding: "8px 14px", borderRadius: 20, border: `1.5px solid ${tone === v ? "#F4A261" : "#E4EAF0"}`, background: tone === v ? "#F4A261" : "#fff", color: tone === v ? "#fff" : "#1C2B3A", fontSize: 13, fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>{l}</button>)}
          </div>
        </div>
        <Btn onClick={generate} variant="orange" disabled={loading} style={{ width: "100%", justifyContent: "center", fontSize: 16, padding: 14 }}>
          {loading ? "⏳ Generuję..." : <><Icon d={ic.spark} size={18} color="#fff" fill="#fff" /> Generuj post</>}
        </Btn>
        {post && (
          <Card style={{ marginTop: 16, background: "#FFFBF5", border: "1.5px solid #F4A26140" }}>
            <div style={{ lineHeight: 1.7, whiteSpace: "pre-wrap", fontSize: 15 }}>{post}</div>
            <button onClick={copy} style={{ marginTop: 14, background: copied ? "#3DAA72" : "#F4A261", color: "#fff", border: "none", borderRadius: 10, padding: "10px 16px", fontWeight: 600, fontSize: 14, cursor: "pointer", width: "100%", fontFamily: "inherit" }}>{copied ? "✓ Skopiowano!" : "📋 Kopiuj do schowka"}</button>
          </Card>
        )}
      </div>
    </div>
  );
}

const tabs = [
  { id: "dashboard", icon: ic.home, label: "Pulpit" },
  { id: "patients", icon: ic.users, label: "Pacjenci" },

];

    return () => subscription.unsubscribe();
  }, []);

  if (loading) return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#F2F5F7" }}><div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 20, color: "#0A7C7C" }}>ZubrzyckiFizjo</div></div>;

  return (
    <div style={{ maxWidth: 480, margin: "0 auto", background: "#F2F5F7", minHeight: "100vh" }}>
      <div style={{ paddingBottom: 80, minHeight: "100vh" }}>
        {tab === "dashboard" && <Dashboard user={session.user} />}
        {tab === "patients" && <Patients user={session.user} />}
        {tab === "rentals" && <Rentals user={session.user} />}
        {tab === "finances" && <Finances user={session.user} />}
        {tab === "marketing" && <Marketing />}
      </div>
      <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, background: "#fff", borderTop: "1px solid #E4EAF0", display: "flex", padding: "8px 0 12px", zIndex: 50, boxShadow: "0 -4px 20px rgba(0,0,0,0.06)" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, padding: "4px 0", fontFamily: "inherit" }}>
            <div style={{ width: 36, height: 36, borderRadius: 12, background: tab === t.id ? "#0A7C7C" : "transparent", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <Icon d={t.icon} size={18} color={tab === t.id ? "#fff" : "#7A8FA6"} />
            </div>
            <span style={{ fontSize: 10, fontWeight: 600, color: tab === t.id ? "#0A7C7C" : "#7A8FA6" }}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
