            <button key={t.k} onClick={()=>setTab(t.k)} style={{padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,whiteSpace:"nowrap",background:tab===t.k?"#0A7C7C":"#E4EAF0",color:tab===t.k?"#fff":"#7A8FA6",fontFamily:"inherit"}}>{t.l}</button>
          )}
        </div>
        <div style={{padding:"0 20px"}}>
          {listItems.length===0&&<Empty text="Brak wpisów"/>}
          {listItems.map(cas=>{
            const nd=nextOrderDate(cas);
            const dl=nd?dateDiff(today,nd):null;
            return <Card key={cas.id} onClick={()=>setSelId(cas.id)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:15,marginBottom:3}}>{cas.patientName}</div>
                  <div style={{fontSize:13,color:"#7A8FA6",display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
                    {cas.wheelchairModel&&<span>🦽 {cas.wheelchairModel}</span>}
                    {cas.orderDate&&<span>📅 {cas.orderDate}</span>}
                    {cas.realized&&<span style={{color:"#3DAA72",fontWeight:600}}>✓ zrealizowany</span>}
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0,paddingLeft:10}}>
                  <div onClick={e=>{e.stopPropagation();if(!cas.realized){setPayModal({casId:cas.id,date:cas.orderDate||"",name:cas.patientName});setPayAmount("");}else{setNfzCases(cs=>cs.map(x=>x.id===cas.id?{...x,realized:false}:x));}}}
                    style={{width:24,height:24,borderRadius:7,border:`2px solid ${cas.realized?"#3DAA72":"#E4EAF0"}`,background:cas.realized?"#3DAA72":"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                    {cas.realized&&<span style={{color:"#fff",fontSize:13}}>✓</span>}
                  </div>
                  <div style={{textAlign:"right"}}>
                    {nd&&<div style={{fontSize:12,color:dl<=0?"#3DAA72":"#7A8FA6",fontWeight:dl<=0?700:400}}>{dl<=0?"➜ można złożyć":"➜ "+nd}</div>}
                    <Ico d="M9 18l6-6-6-6" s={18} c="#7A8FA6"/>
                  </div>
                </div>
              </div>
            </Card>;
          })}
        </div>
        {showAdd&&<Modal title="Nowy wózek" onClose={()=>setShowAdd(false)}>
          <Inp label="Imię i nazwisko *" value={form.patientName} onChange={v=>setForm(f=>({...f,patientName:v}))} placeholder="Jan Kowalski"/>
          <Inp label="Adres" value={form.address} onChange={v=>setForm(f=>({...f,address:v}))} placeholder="ul. Przykładowa 1, Gliwice"/>
          <Inp label="Telefon" value={form.phone} onChange={v=>setForm(f=>({...f,phone:v}))} type="tel"/>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,cursor:"pointer"}} onClick={()=>setForm(f=>({...f,hasDisabilityCert:!f.hasDisabilityCert}))}>
            <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${form.hasDisabilityCert?"#3DAA72":"#E4EAF0"}`,background:form.hasDisabilityCert?"#3DAA72":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              {form.hasDisabilityCert&&<span style={{color:"#fff",fontSize:13}}>✓</span>}
            </div>
            <span style={{fontSize:14,fontWeight:500}}>Orzeczenie o niepełnosprawności (stopień znaczny)</span>
          </div>
          <Inp label="Model wózka" value={form.wheelchairModel} onChange={v=>setForm(f=>({...f,wheelchairModel:v}))} placeholder="np. Wózek aktywny X"/>
          <Inp label="Data zamówienia" value={form.orderDate} onChange={v=>setForm(f=>({...f,orderDate:v}))} type="date"/>
          <Txa label="Notatki" value={form.notes} onChange={v=>setForm(f=>({...f,notes:v}))} rows={2}/>
          <Btn disabled={!form.patientName} style={{width:"100%",justifyContent:"center"}} onClick={()=>{if(!form.patientName)return;setNfzCases(cs=>[{...form,id:Date.now()},...(cs||[])]);setForm(emptyNFZ());setShowAdd(false);setToast("Dodano");}}>Dodaj</Btn>
        </Modal>}
        {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      </div>;
    }


    // ── APP ───────────────────────────────────────────────────────────────────
    const TABS=[{id:"dashboard",i:I.home,l:"Pulpit"},{id:"patients",i:I.users,l:"Pacjenci"},{id:"rentals",i:I.equip,l:"Sprzęt"},{id:"finances",i:I.fin,l:"Finanse"},{id:"nfz",i:"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z",l:"Wózki"},{id:"settings",i:"M12 15a3 3 0 100-6 3 3 0 000 6zM19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z",l:"Ustawienia"}];

    function useIsDesktop(){
      const [desk,setDesk]=React.useState(()=>window.innerWidth>=900);
      React.useEffect(()=>{const h=()=>setDesk(window.innerWidth>=900);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
      return desk;
    }

    function App({visits,setVisits,patients,setPatients,rentals,setRentals,finances,setFinances,stock,setStock,nfzCases,setNfzCases,todos,setTodos,events,setEvents,dark,setDark,settings,setSettings,exportData,importData,demo,setDemo,budget,setBudget}) {
      const [tab,setTab]=useState("dashboard");
      const [dlRental,setDlRental]=useState(null);
      const [wozkiSel,setWozkiSel]=useState(null);
      const [rentalsView,setRentalsView]=useState("aktywne");
      const goToRental=id=>{setDlRental(id);setTab("rentals");};
      const goToWozki=id=>{setWozkiSel(id);setTab("nfz");};
      const dk=dark;
      const desk=useIsDesktop();

      const activeRentals=(rentals||[]).filter(r=>r.status==="aktywne").length;
      const todayVisits=(visits||[]).filter(v=>v.date===todayLocal()).length;
      const unpaidCount=(rentals||[]).filter(r=>r.status==="aktywne"&&r.renewable&&(r.cycles||[]).some(c=>!c.paid)).length;

      const content = <>
        {tab==="dashboard"&&<Dashboard visits={visits} setVisits={setVisits} rentals={rentals} setRentals={setRentals} finances={finances} setFinances={setFinances} patients={patients} goToRental={goToRental} nfzCases={nfzCases} goToWozki={goToWozki} todos={todos} setTodos={setTodos} events={events} setEvents={setEvents}/>}
        {tab==="patients"&&<Patients patients={patients} setPatients={setPatients} visits={visits} setVisits={setVisits} finances={finances} setFinances={setFinances} rentals={rentals} setRentals={setRentals}/>}
        {tab==="rentals"&&<Rentals rentals={rentals} setRentals={setRentals} finances={finances} setFinances={setFinances} patients={patients} initialDetail={dlRental} onDetailClosed={()=>setDlRental(null)} rentalsView={rentalsView} setRentalsView={setRentalsView} stock={stock} setStock={setStock}/>}
        {tab==="finances"&&<Finances finances={finances} setFinances={setFinances} visits={visits} setVisits={setVisits} rentals={rentals} setRentals={setRentals} nfzCases={nfzCases} setNfzCases={setNfzCases} budget={budget} setBudget={setBudget} desk={desk} anthropicKey={settings.anthropicKey||""}/>}
        {tab==="nfz"&&<NFZ nfzCases={nfzCases} setNfzCases={setNfzCases} initialSel={wozkiSel} onSelCleared={()=>setWozkiSel(null)} setFinances={setFinances}/>}
        {tab==="settings"&&<Settings dark={dark} setDark={setDark} settings={settings} setSettings={setSettings} exportData={exportData} importData={importData} demo={demo} setDemo={setDemo}/>}
      </>;

      if(desk) {
        const sb=dk?"#0A1818":"#0F2A2A";
        const sbHov=dk?"#1A3030":"#163333";
        const sbAct="#0A7C7C";
        return <div style={{display:"flex",minHeight:"100vh",background:dk?"#0A1A1A":"#EAEFF4",color:dk?"#E8F5F5":"#1C2B3A"}}>
          {/* Sidebar */}
          <div style={{width:230,flexShrink:0,background:sb,display:"flex",flexDirection:"column",position:"fixed",top:0,left:0,height:"100vh",zIndex:100,boxShadow:"4px 0 24px rgba(0,0,0,.18)",overflow:"hidden"}}>
            {/* Logo */}
            <div style={{padding:"20px 14px 20px"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:34,height:34,borderRadius:10,background:"#0A7C7C",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                </div>
                <div style={{minWidth:0}}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13,color:"#E8F5F5",letterSpacing:0}}>ZubrzyckiFizjo</div>
                  <div style={{fontSize:11,color:"#5A9A9A",fontWeight:500}}>Panel fizjoterapeuty</div>
                </div>
              </div>
            </div>
            {/* Nav */}
            <nav style={{flex:1,padding:"0 10px",display:"flex",flexDirection:"column",gap:2}}>
              {TABS.map(t=>{
                const active=tab===t.id;
                return <button key={t.id} onClick={()=>setTab(t.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderRadius:12,border:"none",cursor:"pointer",background:active?sbAct:sbHov+"00",fontFamily:"inherit",fontWeight:600,fontSize:14,color:active?"#fff":"#7ABABA",textAlign:"left",width:"100%",transition:"background .15s",WebkitUserSelect:"none"}}
                  onMouseEnter={e=>{if(!active)e.currentTarget.style.background=sbHov;}}
                  onMouseLeave={e=>{if(!active)e.currentTarget.style.background="transparent";}}>
                  <div style={{width:32,height:32,borderRadius:9,background:active?"rgba(255,255,255,.18)":"rgba(255,255,255,.04)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <Ico d={t.i} s={17} c={active?"#fff":"#5A9A9A"}/>
                  </div>
                  {t.l}
                </button>;
              })}
            </nav>
            {/* Bottom bar in sidebar */}
            <div style={{padding:"16px 14px 24px",borderTop:"1px solid rgba(255,255,255,.06)"}}>
              <div style={{fontSize:11,color:"#3A6060",textAlign:"center"}}>© {new Date().getFullYear()} Patryk Zubrzycki</div>
            </div>
          </div>
          {/* Main content */}
          <div style={{marginLeft:230,flex:1,minWidth:0,minHeight:"100vh",background:dk?"#0A1A1A":"#EAEFF4"}}>
            <div style={{maxWidth:860,margin:"0 auto",minHeight:"100vh",background:dk?"#0F1F1F":"#F2F5F7",boxShadow:"0 0 40px rgba(0,0,0,.08)"}}>
              {content}
            </div>
          </div>
        </div>;
      }

      // Mobile layout
      return <>
        <div style={{maxWidth:480,margin:"0 auto",background:dk?"#0A1A1A":"#F2F5F7",minHeight:"100vh",color:dk?"#E8F5F5":"#1C2B3A",overflowX:"hidden"}}>
          <div style={{paddingBottom:80,minHeight:"100vh"}}>
            {content}
          </div>
          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:dk?"#0F1F1F":"#fff",borderTop:`1px solid ${dk?"#1A3030":"#E4EAF0"}`,display:"flex",padding:"10px 0 16px",zIndex:50,boxShadow:"0 -4px 20px rgba(0,0,0,.08)"}}>
            {TABS.map(t=>{
              return <button key={t.id}
                onClick={()=>setTab(t.id)}
                style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"4px 0",fontFamily:"inherit",userSelect:"none",WebkitUserSelect:"none"}}>
                <div style={{width:40,height:40,borderRadius:12,background:tab===t.id?"#0A7C7C":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}><Ico d={t.i} s={20} c={tab===t.id?"#fff":dk?"#5A8A8A":"#4A6070"}/></div>
                <span style={{fontSize:12,fontWeight:600,color:tab===t.id?"#0A7C7C":dk?"#5A8A8A":"#4A6070"}}>{t.l}</span>
              </button>;
            })}
          </div>
        </div>
      </>;
    }

    function AppWithSync({visits,setVisits,patients,setPatients,rentals,setRentals,finances,setFinances,stock,setStock,nfzCases,setNfzCases,todos,setTodos,events,setEvents,dark,setDark,settings,setSettings,exportData,importData,demo,setDemo,budget,setBudget}) {
      // Auto-generate current month cycle — only for rentals that already have cycles (went through HistoryFill)
      // or are new (startDate is in current month)
      useEffect(()=>{
        if(!rentals)return;
        const cm=todayLocal().slice(0,7);
        const needsUpdate=rentals.some(r=>{
          if(r.status!=="aktywne"||!r.renewable)return false;
          if((r.cycles||[]).some(c=>c.month===cm))return false;
          // Skip if cycles empty AND startDate older than current month — needs HistoryFill first
          if((r.cycles||[]).length===0&&r.startDate.slice(0,7)<cm)return false;
          return true;
        });
        if(!needsUpdate)return;
        setRentals(rs=>rs.map(r=>{
          if(r.status!=="aktywne"||!r.renewable)return r;
          if((r.cycles||[]).some(c=>c.month===cm))return r;
          if((r.cycles||[]).length===0&&r.startDate.slice(0,7)<cm)return r;
          const last=[...(r.cycles||[])].sort((a,b)=>b.month.localeCompare(a.month))[0];
          return {...r,cycles:[...(r.cycles||[]),{month:cm,amount:last?last.amount:(r.amount||0),paid:false,paidDate:null}]};
        }));
      },[]);
      useEffect(()=>{
        if(!visits||!rentals||!finances)return;
        const now=new Date(),ex=new Set(finances.map(f=>f.sourceId).filter(Boolean)),toAdd=[];
        visits.forEach(v=>{
          const sid="visit-"+v.id; if(ex.has(sid))return;
          const done=v.status==="zakończona"||new Date(v.date+"T"+(v.time||"00:00")+":00")<=now;
          if(done)toAdd.push({id:Date.now()+Math.random(),sourceId:sid,date:v.date,type:"przychód",category:"Wizyta",amount:v.price||0,description:"Wizyta – "+v.patientName});
        });
        rentals.forEach(r=>(r.payments||[]).forEach(p=>{
          const sid="payment-"+p.id; if(ex.has(sid))return;
          toAdd.push({id:Date.now()+Math.random(),sourceId:sid,date:p.date,type:"przychód",category:"Wypożyczalnia",amount:p.amount,description:"Wypożyczenie – "+r.patientName+" ("+r.equipment+")"});
        }));
        rentals.forEach(r=>(r.cycles||[]).filter(c=>c.paid).forEach(c=>{
          const sid="cycle-"+r.id+"-"+c.month; if(ex.has(sid))return;
          const label=new Date(c.month+"-15").toLocaleDateString("pl-PL",{month:"long",year:"numeric"});
          toAdd.push({id:Date.now()+Math.random(),sourceId:sid,date:c.paidDate||c.month+"-15",type:"przychód",category:"Wypożyczalnia",amount:c.amount,description:"Wypożyczenie – "+r.patientName+" ("+r.equipment+") "+label});
        }));
        if(toAdd.length)setFinances(prev=>[...toAdd,...prev]);
      },[visits,rentals]);
      return <App visits={visits} setVisits={setVisits} patients={patients} setPatients={setPatients} rentals={rentals} setRentals={setRentals} finances={finances} setFinances={setFinances} stock={stock} setStock={setStock} nfzCases={nfzCases} setNfzCases={setNfzCases} todos={todos} setTodos={setTodos} events={events} setEvents={setEvents} dark={dark} setDark={setDark} settings={settings} setSettings={setSettings} exportData={exportData} importData={importData} demo={demo} setDemo={setDemo} budget={budget} setBudget={setBudget}/>;
    }

    function Settings({dark,setDark,settings,setSettings,exportData,importData,demo,setDemo}) {
      const dk=dark;
      const bg=dk?"#0F1F1F":"#fff";
      const sec=dk?"#0A1A1A":"#F2F5F7";
      const txt=dk?"#E8F5F5":"#1C2B3A";
      const sub="#7A8FA6";
      const Row=({label,children})=><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 0",borderBottom:`1px solid ${dk?"#1A3030":"#F0F4F8"}`}}><span style={{fontSize:14,color:txt}}>{label}</span>{children}</div>;
      const Toggle=({val,onToggle})=><div onClick={onToggle} style={{width:44,height:24,borderRadius:12,background:val?"#0A7C7C":"#D0DCE8",cursor:"pointer",position:"relative",transition:"background 0.2s"}}><div style={{position:"absolute",top:3,left:val?23:3,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left 0.2s",boxShadow:"0 1px 4px rgba(0,0,0,0.2)"}}/></div>;
      const Sec=({title,children})=><div style={{background:bg,borderRadius:16,padding:"4px 16px",marginBottom:12}}><div style={{fontSize:11,fontWeight:700,color:sub,letterSpacing:1,paddingTop:12,paddingBottom:4}}>{title}</div>{children}</div>;
      return <div style={{padding:"16px 12px 20px",background:sec,minHeight:"100vh"}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800,color:txt,marginBottom:16}}>Ustawienia</div>
        <Sec title="WYGLĄD">
          <Row label="Tryb ciemny"><Toggle val={dark} onToggle={()=>setDark(d=>!d)}/></Row>
          <Row label="Tryb demo (ukryj dane)"><Toggle val={demo} onToggle={()=>setDemo(d=>!d)}/></Row>
        </Sec>
        <Sec title="DANE">
          <Row label="Eksport kopii zapasowej">
            <button onClick={exportData} style={{background:"#0A7C7C",border:"none",borderRadius:8,padding:"7px 14px",fontSize:13,fontWeight:700,color:"#fff",cursor:"pointer",fontFamily:"inherit"}}>⬇️ Pobierz JSON</button>
          </Row>
          <Row label="Importuj kopię zapasową">
            <label style={{background:"#E6F4F4",border:"none",borderRadius:8,padding:"7px 14px",fontSize:13,fontWeight:700,color:"#0A7C7C",cursor:"pointer"}}>
              ⬆️ Wgraj JSON
              <input type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
            </label>
          </Row>
          <Row label="Auto-przypomnienie o backupie o 20:00">
            <Toggle val={settings.backupReminder!==false} onToggle={()=>setSettings(s=>({...s,backupReminder:s.backupReminder===false?true:false}))}/>
          </Row>
        </Sec>
        <Sec title="INTEGRACJE">
          <div style={{padding:"12px 0",borderBottom:`1px solid ${dk?"#1A3030":"#F0F4F8"}`}}>
            <div style={{fontSize:14,color:txt,marginBottom:8}}>Klucz API Anthropic</div>
            <div style={{fontSize:12,color:sub,marginBottom:8}}>Wymagany do skanowania paragonów. Wygeneruj na console.anthropic.com</div>
            <input
              type="password"
              value={settings.anthropicKey||""}
              onChange={e=>setSettings(s=>({...s,anthropicKey:e.target.value}))}
              placeholder="sk-ant-..."
              style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1.5px solid ${dk?"#2A4040":"#E4EAF0"}`,background:dk?"#0F1F1F":"#FAFCFD",color:dk?"#E8F5F5":"#1C2B3A",fontSize:14,fontFamily:"inherit",boxSizing:"border-box"}}
            />
            {settings.anthropicKey&&<div style={{fontSize:12,color:"#3DAA72",marginTop:6}}>✓ Klucz zapisany</div>}
          </div>
        </Sec>
        <Sec title="INFORMACJE">
          <Row label="Wersja aplikacji"><span style={{fontSize:13,color:sub}}>ZubrzyckiFizjo 1.0</span></Row>
        </Sec>
      </div>;
    }

    function AppWrapper() {
      const [visits,setVisits,v1]=usePersistedState("fizjo-visits",[]);
      const [patients,setPatients,v2]=usePersistedState("fizjo-patients",[]);
      // Migracja: nadaj id wizytom które go nie mają — uruchamia się po załadowaniu z Supabase
      React.useEffect(()=>{
        if(!v1) return; // czekaj na załadowanie
        setVisits(vs=>{
          const needsMigration=vs.some(v=>!v.id);
          if(!needsMigration) return vs;
          return vs.map(v=>v.id?v:{...v,id:Date.now()+Math.random()});
        });
      },[v1]);
      React.useEffect(()=>{
        if(!v2) return;
        setPatients(ps=>{
          const needsMigration=ps.some(p=>!p.id);
          if(!needsMigration) return ps;
          return ps.map(p=>p.id?p:{...p,id:Date.now()+Math.random()});
        });
      },[v2]);
      const [rentals,setRentals,v3]=usePersistedState("fizjo-rentals",[]);
      const [finances,setFinances,v4]=usePersistedState("fizjo-finances",[]);
      const [stock,setStock,v5]=usePersistedState("fizjo-stock",{});
      const [nfzCases,setNfzCases,v6]=usePersistedState("fizjo-nfz",[]);
      const [todos,setTodos,v7]=usePersistedState("fizjo-todos",[]);
      const [events,setEvents,v9]=usePersistedState("fizjo-events",[]);
      const [settings,setSettings,v8]=usePersistedState("fizjo-settings",{backupReminder:true});
      const [budget,setBudget,v10]=usePersistedState("fizjo-budget",{});
      const [dark,setDark]=useState(false);
      const [demo,setDemo]=useState(false);
      const [showBackupBanner,setShowBackupBanner]=useState(false);

      const exportData=()=>{
        const data={visits,patients,rentals,finances,stock,nfzCases,todos,events,exportedAt:new Date().toISOString()};
        const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a");
        a.href=url;
        a.download="fizjo-backup-"+new Date().toISOString().slice(0,10)+".json";
        a.click();
        URL.revokeObjectURL(url);
        setShowBackupBanner(false);
      };

      const importData=(e)=>{
        const file=e.target.files[0];
        if(!file)return;
        const reader=new FileReader();
        reader.onload=(ev)=>{
          try{
            const d=JSON.parse(ev.target.result);
            if(d.visits)setVisits(d.visits);
            if(d.patients)setPatients(d.patients);
            if(d.rentals)setRentals(d.rentals);
            if(d.finances)setFinances(d.finances);
            if(d.stock)setStock(d.stock);
            if(d.nfzCases)setNfzCases(d.nfzCases);
            if(d.todos)setTodos(d.todos);
            if(d.events)setEvents(d.events);
            alert("Import zakończony pomyślnie!");
          }catch(err){alert("Błąd importu: "+err.message);}
        };
        reader.readAsText(file);
      };

      // Backup reminder at 20:00 Warsaw time
      React.useEffect(()=>{
        if(settings&&settings.backupReminder===false)return;
        const check=()=>{
          const now=new Date();
          const warsaw=new Date(now.toLocaleString("en-US",{timeZone:"Europe/Warsaw"}));
          const h=warsaw.getHours();
          const m=warsaw.getMinutes();
          if(h===20&&m<5)setShowBackupBanner(true);
        };
        check();
        const id=setInterval(check,60000);
        return()=>clearInterval(id);
      },[settings]);

      if(!v1||!v2||!v3||!v4||!v5||!v6||!v7||!v10)return<div className="loader"><div className="spinner"/><div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,color:"#0A7C7C",fontSize:18}}>ZubrzyckiFizjo</div><div style={{fontSize:13,color:"#7A8FA6"}}>Wczytywanie danych...</div></div>;
      return <DarkCtx.Provider value={dark}><DemoCtx.Provider value={demo}>
        <div>
          {showBackupBanner&&<div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#F4A261",zIndex:9999,padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontWeight:700,fontSize:13,color:"#1C2B3A"}}>💾 Czas na backup!</span>
            <div style={{display:"flex",gap:8}}>
              <button onClick={exportData} style={{background:"#1C2B3A",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,color:"#fff",cursor:"pointer",fontFamily:"inherit"}}>Pobierz</button>
              <button onClick={()=>setShowBackupBanner(false)} style={{background:"transparent",border:"none",fontSize:18,cursor:"pointer",color:"#1C2B3A"}}>×</button>
            </div>
          </div>}
          <AppWithSync visits={visits} setVisits={setVisits} patients={patients} setPatients={setPatients} rentals={rentals} setRentals={setRentals} finances={finances} setFinances={setFinances} stock={stock} setStock={setStock} nfzCases={nfzCases} setNfzCases={setNfzCases} todos={todos} setTodos={setTodos} events={events} setEvents={setEvents} dark={dark} setDark={setDark} settings={settings} setSettings={setSettings} exportData={exportData} importData={importData} demo={demo} setDemo={setDemo} budget={budget} setBudget={setBudget}/>
        </div>
      </DemoCtx.Provider></DarkCtx.Provider>;
    }

    class ErrorBoundary extends React.Component {
      constructor(props){super(props);this.state={err:null};}
      static getDerivedStateFromError(e){return {err:e};}
      render(){
        if(this.state.err){
          return React.createElement('div',{style:{padding:24,fontFamily:"monospace",fontSize:13,background:"#FEE2E2",minHeight:"100vh",color:"#1C2B3A"}},
            React.createElement('div',{style:{fontWeight:700,fontSize:16,marginBottom:12,color:"#E05C5C"}},"Blad aplikacji"),
            React.createElement('div',{style:{marginBottom:8,wordBreak:"break-all"}},String(this.state.err)),
            React.createElement('div',{style:{fontSize:11,color:"#7A8FA6",wordBreak:"break-all",whiteSpace:"pre-wrap"}},this.state.err&&this.state.err.stack),
            React.createElement('button',{onClick:()=>this.setState({err:null}),style:{marginTop:16,padding:"8px 16px",background:"#0A7C7C",color:"#fff",border:"none",borderRadius:8,cursor:"pointer"}},"Sprobuj ponownie")
          );
        }
        return this.props.children;
      }
    }
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ErrorBoundary,null,React.createElement(AppWrapper)));
  </script>
</body>
</html>
