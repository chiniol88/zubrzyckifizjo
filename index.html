                    }
                  </> : (()=>{
                    // Łączna należność = oryginał + amountDue ze wszystkich przedłużeń
                    const extDue = (r.extensions||[]).reduce((s,e)=>s+(+e.amountDue||+e.amount||0),0);
                    const totalAmount = (+r.amount||0) + extDue;
                    // Zapłacono = wpłaty z payments + amountPaid z przedłużeń
                    const paymentsPaid = (r.payments||[]).reduce((s,p)=>s+p.amount,0);
                    const extPaid = (r.extensions||[]).reduce((s,e)=>s+(e.amountPaid||0),0);
                    const totalPaid = paymentsPaid + extPaid;
                    const remaining = totalAmount - totalPaid;

                    // Historia wpłat: normalne wpłaty + przedłużenia które mają amountPaid>0
                    const allPayments = [
                      ...(r.payments||[]).map(p=>({...p,_type:"payment"})),
                      ...(r.extensions||[]).filter(e=>(e.amountPaid||0)>0).map(e=>({
                        id:"ext-"+e.id, amount:e.amountPaid, date:e.paidDate||e.date||r.startDate,
                        doc:e.doc, _type:"extension", _extId:e.id,
                        _label:"Przedłużenie → "+e.newEndDate,
                        _due:e.amountDue||e.amount||0
                      }))
                    ].sort((a,b)=>b.date.localeCompare(a.date));

                    return <>
                      <div style={{fontSize:11,fontWeight:700,color:"#7A8FA6",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Płatność</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
                        {[{l:"Łącznie",v:totalAmount+" zł",c:"#1C2B3A"},{l:"Zapłacono",v:totalPaid+" zł",c:"#3DAA72"},{l:"Pozostało",v:remaining+" zł",c:remaining>0?"#E05C5C":"#3DAA72"}].map((x,i)=>(
                          <div key={i} style={{background:x.c==="#1C2B3A"?"#F2F5F7":x.c+"14",borderRadius:12,padding:"10px 8px",textAlign:"center",border:`1.5px solid ${x.c==="#1C2B3A"?"#E4EAF0":x.c+"30"}`}}>
                            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14,color:x.c}}>{x.v}</div>
                            <div style={{fontSize:11,color:"#7A8FA6",marginTop:2}}>{x.l}</div>
                          </div>
                        ))}
                      </div>
                      <PaymentForm rentalId={r.id} rentalAmount={totalAmount} amountPaid={totalPaid} patientName={r.patientName} equipment={r.equipment} setRentals={setRentals} setFinances={setFinances}/>
                      {allPayments.length>0&&<div style={{marginTop:14,paddingTop:12,borderTop:"1px solid #E4EAF0"}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#7A8FA6",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Historia wpłat</div>
                        {allPayments.map(p=>(
                          <div key={p.id} style={{padding:"10px 0",borderBottom:"1px solid #F2F5F7"}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                                <div style={{width:8,height:8,borderRadius:"50%",background:p._type==="extension"?"#7C6AF4":"#3DAA72",flexShrink:0}}/>
                                <div>
                                  <div style={{fontWeight:600,fontSize:14}}>{p.amount} zł{p._label&&<span style={{fontSize:12,color:"#7C6AF4",fontWeight:400,marginLeft:6}}>{p._label}</span>}</div>
                                  <div style={{fontSize:12,color:"#7A8FA6"}}>{p.date}{p._due>0&&p._due!==p.amount&&<span style={{marginLeft:6,color:"#F4A261"}}>należne: {p._due} zł</span>}</div>
                                </div>
                              </div>
                              <button onClick={()=>{
                                if(p._type==="payment"){
                                  setRentals(rs=>rs.map(x=>x.id===r.id?{...x,payments:(x.payments||[]).filter(q=>q.id!==p.id),amountPaid:Math.max(0,(x.amountPaid||0)-p.amount)}:x));
                                  setFinances(fs=>fs.filter(f=>f.sourceId!=="payment-"+p.id));
                                } else {
                                  // Usuń wpłatę za przedłużenie — zeruj amountPaid, zachowaj amountDue
                                  setRentals(rs=>rs.map(x=>x.id===r.id?{...x,extensions:(x.extensions||[]).map(e=>e.id===p._extId?{...e,amountPaid:0,paidDate:null,doc:null}:e)}:x));
                                  setFinances(fs=>fs.filter(f=>f.sourceId!=="extend-"+r.id+"-"+p._extId));
                                }
                              }} style={{background:"#FEE2E2",border:"none",borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:600,color:"#E05C5C",cursor:"pointer",fontFamily:"inherit"}}>Usuń</button>
                            </div>
                            <div style={{display:"flex",gap:8}}>
                              {[{k:"receipt",l:"🧾 Paragon"},{k:"invoice",l:"📄 Faktura"}].map(opt=>{
                                const ac=p.doc===opt.k;
                                const toggle=()=>{
                                  if(p._type==="payment"){
                                    setRentals(rs=>rs.map(x=>x.id===r.id?{...x,payments:(x.payments||[]).map(q=>q.id===p.id?{...q,doc:ac?null:opt.k}:q)}:x));
                                  } else {
                                    setRentals(rs=>rs.map(x=>x.id===r.id?{...x,extensions:(x.extensions||[]).map(e=>e.id===p._extId?{...e,doc:ac?null:opt.k}:e)}:x));
                                  }
                                };
                                return <button key={opt.k} onClick={toggle} style={{flex:1,padding:"7px 8px",borderRadius:10,fontFamily:"inherit",fontSize:12,fontWeight:600,cursor:"pointer",border:`1.5px solid ${ac?"#0A7C7C":"#E4EAF0"}`,background:ac?"#E6F4F4":"#fff",color:ac?"#0A7C7C":"#7A8FA6",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>{ac&&<span style={{fontSize:10}}>✓</span>}{opt.l}</button>;
                              })}
                            </div>
                          </div>
                        ))}
                      </div>}
                    </>;
                  })()}
                </div>
              </Card>

              {r.renewable&&(r.cycles||[]).length>0&&(()=>{
                const paid=(r.cycles||[]).filter(c=>c.paid);
                const total=paid.reduce((s,c)=>s+c.amount,0);
                const unpaidN=(r.cycles||[]).filter(c=>!c.paid).length;
                return <Card style={{marginBottom:10,background:"#E6F4F4",border:"1.5px solid #0A7C7C30"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#0A7C7C",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Podsumowanie wypożyczenia</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                    {[{l:"Mies. łącznie",v:paid.length,c:"#0A7C7C",suf:""},{l:"Łącznie wpłacono",v:total,c:"#3DAA72",suf:" zł"},{l:"Do opłacenia",v:unpaidN,c:unpaidN>0?"#E05C5C":"#3DAA72",suf:" mies."}].map((x,i)=>(
                      <div key={i} style={{background:"#fff",borderRadius:12,padding:"10px 8px",textAlign:"center",border:"1.5px solid #E4EAF0"}}>
                        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14,color:x.c}}>{x.v}{x.suf}</div>
                        <div style={{fontSize:11,color:"#7A8FA6",marginTop:2}}>{x.l}</div>
                      </div>
                    ))}
                  </div>
                </Card>;
              })()}

              {r.notes&&<Card style={{marginBottom:10,background:"#FFFBF5",border:"1.5px solid #F4A26130"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#F4A261",textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Notatki</div>
                <div style={{fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{r.notes}</div>
              </Card>}

              {r.status==="aktywne"&&<>
                <Btn style={{width:"100%",justifyContent:"center",marginBottom:10}} onClick={()=>{
                  const extTotal=(r.extensions||[]).reduce((s,e)=>s+(e.amount||0),0);
                  const totalAmount=r.amount+extTotal;
                  const paymentsPaid=(r.payments||[]).reduce((s,p)=>s+p.amount,0);
                  const extPaid=(r.extensions||[]).filter(e=>e.paid).reduce((s,e)=>s+(e.amount||0),0);
                  const remaining=totalAmount-(paymentsPaid+extPaid);
                  if(remaining>0&&!window.confirm(`Pozostało ${remaining} zł do zapłaty. Zakończyć mimo to?`))return;
                  setRentals(rs=>rs.map(x=>x.id===r.id?{...x,status:"zakończone"}:x));close();
                }}><Ico d={I.chk} s={16} c="#fff"/> Sprzęt zwrócony — zakończ</Btn>
              </>}
              {r.status==="zakończone"&&<Btn variant="secondary" style={{width:"100%",justifyContent:"center",marginBottom:10}} onClick={()=>setRentals(rs=>rs.map(x=>x.id===r.id?{...x,status:"aktywne"}:x))}>↩️ Cofnij zakończenie</Btn>}
              <Btn variant="danger" style={{width:"100%",justifyContent:"center",marginTop:4}} onClick={()=>setConfirmDel(true)}>🗑️ Usuń wypożyczenie</Btn>
            </div>
          </div>

          {showEdit&&ef&&<Modal title="Edytuj wypożyczenie" onClose={()=>setShowEdit(false)}>
            <Sel label="Sprzęt" value={ef.equipment} onChange={v=>setEf(f=>({...f,equipment:v}))} options={EQUIPMENT.map(x=>({value:x,label:x}))}/>
            <PatientPicker label="Pacjent" value={ef.patientName} onChange={v=>setEf(f=>({...f,patientName:v}))} onSelect={p=>setEf(f=>({...f,patientName:p.name,phone:p.phone,address:p.address,patientId:p.id}))} patients={patients}/>
            <Inp label="Telefon" value={ef.phone||""} onChange={v=>setEf(f=>({...f,phone:v}))} type="tel"/>
            <Inp label="Adres" value={ef.address||""} onChange={v=>setEf(f=>({...f,address:v}))}/>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Typ</div>
              <div style={{display:"flex",gap:8}}>{[{v:false,l:"Jednorazowe"},{v:true,l:"Odnawialne"}].map(o=><button key={String(o.v)} onClick={()=>setEf(f=>({...f,renewable:o.v}))} style={{flex:1,padding:"10px 8px",borderRadius:12,border:`2px solid ${ef.renewable===o.v?"#0A7C7C":"#E4EAF0"}`,background:ef.renewable===o.v?"#E6F4F4":"#fff",color:ef.renewable===o.v?"#0A7C7C":"#7A8FA6",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{o.l}</button>)}</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <Inp label="Data od" value={ef.startDate} onChange={v=>setEf(f=>({...f,startDate:v}))} type="date"/>
              <Inp label="Godz. dostawy" value={ef.deliveryTime||""} onChange={v=>setEf(f=>({...f,deliveryTime:v}))} type="time"/>
            </div>
            {!ef.renewable&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <Inp label="Data do" value={ef.endDate||""} onChange={v=>setEf(f=>({...f,endDate:v}))} type="date"/>
              <Inp label="Godz. odbioru" value={ef.pickupTime||""} onChange={v=>setEf(f=>({...f,pickupTime:v}))} type="time"/>
            </div>}
            <Inp label="Kwota (zł)" value={ef.amount} onChange={v=>setEf(f=>({...f,amount:v}))} type="number"/>
            <Inp label="Zapłacono (zł)" value={ef.amountPaid} onChange={v=>setEf(f=>({...f,amountPaid:v}))} type="number"/>
            <Inp label="Transport (zł)" value={ef.transport||""} onChange={v=>setEf(f=>({...f,transport:v}))} type="number" placeholder="0"/>
            <Txa label="Notatki" value={ef.notes||""} onChange={v=>setEf(f=>({...f,notes:v}))} rows={2}/>
            <Btn style={{width:"100%",justifyContent:"center"}} onClick={()=>{
              const raw=+ef.amount,pat=patients.find(p=>p.name===ef.patientName);
              const u={...ef,amount:raw,amountPaid:Math.min(+(ef.amountPaid||0),raw),patientId:pat?.id||ef.patientId||null};
              setRentals(rs=>rs.map(x=>x.id===detail?{...x,...u}:x));
              // Sync opisy finansów: normalne wpłaty + przedłużenia
              setFinances(fs=>fs.map(f=>{
                const cur=rentals.find(x=>x.id===detail);
                if(!cur)return f;
                const isPayment=(cur.payments||[]).some(p=>f.sourceId==="payment-"+p.id);
                const isExtension=f.sourceId&&f.sourceId.startsWith("extend-"+detail+"-");
                if(isPayment) return{...f,description:"Wypożyczenie – "+u.patientName+" ("+u.equipment+")"};
                if(isExtension) return{...f,description:"Przedłużenie – "+u.patientName+" ("+u.equipment+")"};
                return f;
              }));
              setShowEdit(false);setToast("Zmiany zapisane");
            }}>Zapisz zmiany</Btn>
          </Modal>}

          {showExtend&&<Modal title={extForm.editId!=null?"Edytuj przedłużenie":"Przedłuż wypożyczenie"} onClose={()=>setShowExtend(false)}>
            <div style={{fontSize:14,color:"#7A8FA6",marginBottom:14}}>{r.patientName} · {r.equipment}</div>
            {extForm.editId==null&&<div style={{marginBottom:12,padding:"10px 14px",background:"#F2F5F7",borderRadius:10,fontSize:13}}>
              <span style={{color:"#7A8FA6"}}>Aktualna data do: </span><span style={{fontWeight:700}}>{r.endDate}</span>
            </div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <Inp label="Nowa data końca *" value={extForm.newEndDate} onChange={v=>setExtForm(f=>({...f,newEndDate:v}))} type="date"/>
              <Inp label="Godz. odbioru" value={extForm.pickupTime||""} onChange={v=>setExtForm(f=>({...f,pickupTime:v}))} type="time"/>
            </div>
            <Inp label="Kwota do zapłaty (zł)" value={extForm.amountDue||""} onChange={v=>setExtForm(f=>({...f,amountDue:v}))} type="number" placeholder="zostaw puste jeśli nieznana"/>
            <Inp label="Zapłacono (zł)" value={extForm.amountPaid||""} onChange={v=>setExtForm(f=>({...f,amountPaid:v}))} type="number" placeholder="0 = jeszcze nie zapłacił"/>
            <Txa label="Notatka" value={extForm.notes||""} onChange={v=>setExtForm(f=>({...f,notes:v}))} rows={2} placeholder="np. pacjent prosi o fakturę..."/>
            <Btn disabled={!extForm.newEndDate} style={{width:"100%",justifyContent:"center"}} onClick={()=>{
              const due = +extForm.amountDue||0;
              const paid = Math.min(+extForm.amountPaid||0, due||Infinity);
              const sid = extForm.editId!=null ? "extend-"+r.id+"-"+extForm.editId : "extend-"+r.id+"-"+Date.now();

              if(extForm.editId!=null){
                const oldExt = (r.extensions||[]).find(e=>(e.id||e._fallbackId)===extForm.editId)||{};
                const oldPaid = oldExt.amountPaid||0;
                const isLast = (r.extensions||[]).at(-1)?.id===extForm.editId;
                setRentals(rs=>rs.map(x=>x.id===r.id?{
                  ...x,
                  endDate: isLast ? extForm.newEndDate : x.endDate,
                  extensions:(x.extensions||[]).map(e=>e.id===extForm.editId?{...e,newEndDate:extForm.newEndDate,pickupTime:extForm.pickupTime||"",amountDue:due,amountPaid:paid,notes:extForm.notes||"",paidDate:paid>0&&!e.paidDate?todayLocal():e.paidDate}:e)
                }:x));
                // Sync finansów — wpis dotyczy amountPaid
                const extSid="extend-"+r.id+"-"+extForm.editId;
                if(oldPaid>0&&paid>0) setFinances(fs=>fs.map(f=>f.sourceId===extSid?{...f,amount:paid,description:"Przedłużenie – "+r.patientName+" ("+r.equipment+")"}:f));
                else if(oldPaid>0&&paid===0) setFinances(fs=>fs.filter(f=>f.sourceId!==extSid));
                else if(oldPaid===0&&paid>0) setFinances(fs=>[{id:Date.now(),sourceId:extSid,date:todayLocal(),type:"przychód",category:"Wypożyczalnia",amount:paid,description:"Przedłużenie – "+r.patientName+" ("+r.equipment+")"},...(fs||[])]);
                setToast("Przedłużenie zaktualizowane");
              } else {
                const extId = Date.now();
                const ext={id:extId,prevEndDate:r.endDate,newEndDate:extForm.newEndDate,pickupTime:extForm.pickupTime||"",amountDue:due,amountPaid:paid,notes:extForm.notes||"",date:todayLocal(),paidDate:paid>0?todayLocal():null};
                setRentals(rs=>rs.map(x=>x.id===r.id?{...x,endDate:extForm.newEndDate,extensions:[...(x.extensions||[]),ext]}:x));
                if(paid>0){
                  setFinances(fs=>[{id:Date.now()+1,sourceId:"extend-"+r.id+"-"+extId,date:todayLocal(),type:"przychód",category:"Wypożyczalnia",amount:paid,description:"Przedłużenie – "+r.patientName+" ("+r.equipment+")"},...(fs||[])]);
                }
                setToast("Przedłużono do "+extForm.newEndDate);
              }
              setShowExtend(false);
            }}>Zatwierdź</Btn>
          </Modal>}

          {confirmDel&&<Modal title="Usuń wypożyczenie" onClose={()=>setConfirmDel(false)}>
            <div style={{fontSize:15,marginBottom:20}}>Na pewno usunąć to wypożyczenie?</div>
            <div style={{display:"flex",gap:10}}>
              <Btn variant="secondary" style={{flex:1,justifyContent:"center"}} onClick={()=>setConfirmDel(false)}>Anuluj</Btn>
              <Btn variant="danger" style={{flex:1,justifyContent:"center"}} onClick={()=>{const cur=rentals.find(x=>x.id===detail);if(cur){const pids=new Set((cur.payments||[]).map(p=>"payment-"+p.id));const cids=new Set((cur.cycles||[]).map(c=>"cycle-"+cur.id+"-"+c.month));setFinances(fs=>fs.filter(f=>!pids.has(f.sourceId)&&!cids.has(f.sourceId)));}setRentals(rs=>rs.filter(x=>x.id!==detail));setConfirmDel(false);close();}}>Usuń</Btn>
            </div>
          </Modal>}
        </>;
      }

      return <div>
        <div style={{padding:"28px 20px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800}}>Wypożyczalnia</div><div style={{fontSize:13,color:"#7A8FA6"}}>{cnt.aktywne+cnt.odnawialne} aktywnych</div></div>
          <Btn small onClick={()=>{setForm(emptyRental());setShowAdd(true);}}><Ico d={I.plus} s={16} c="#fff"/> Nowe</Btn>
        </div>
        <div style={{display:"flex",gap:6,padding:"0 20px 16px",overflowX:"auto"}}>
          {[{k:"aktywne",l:`Aktywne (${cnt.aktywne})`},{k:"odnawialne",l:`🔄 Odnawialne (${cnt.odnawialne})`},{k:"zakończone",l:`Zakończone (${cnt.zakończone})`}].map(x=>
            <button key={x.k} onClick={()=>setView(x.k)} style={{padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,whiteSpace:"nowrap",background:view===x.k?"#0A7C7C":"#E4EAF0",color:view===x.k?"#fff":"#7A8FA6",fontFamily:"inherit"}}>{x.l}</button>
          )}
        </div>
        <StockPanel rentals={rentals} stock={stock} setStock={setStock}/>
        <div style={{padding:"0 20px"}}>
          {filt.length===0?<Empty text="Brak wypożyczeń w tej kategorii"/>:filt.map(r=><RCard key={r.id} r={r} onClick={()=>setDetail(r.id)}/>)}
        </div>
        {showAdd&&<Modal title="Nowe wypożyczenie" onClose={()=>setShowAdd(false)}>
          <Sel label="Sprzęt" value={form.equipment} onChange={v=>setForm(f=>({...f,equipment:v}))} options={EQUIPMENT.map(x=>({value:x,label:x}))}/>
          <PatientPicker label="Pacjent *" value={form.patientName} onChange={v=>setForm(f=>({...f,patientName:v}))} onSelect={p=>setForm(f=>({...f,patientName:p.name,phone:p.phone,address:p.address,patientId:p.id}))} patients={patients}/>
          <Inp label="Telefon" value={form.phone} onChange={v=>setForm(f=>({...f,phone:v}))} type="tel"/>
          <Inp label="Adres" value={form.address} onChange={v=>setForm(f=>({...f,address:v}))}/>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Typ</div>
            <div style={{display:"flex",gap:8}}>{[{v:false,l:"Jednorazowe"},{v:true,l:"🔄 Odnawialne miesięcznie"}].map(o=><button key={String(o.v)} onClick={()=>setForm(f=>({...f,renewable:o.v,endDate:o.v?"":f.endDate}))} style={{flex:1,padding:"10px 8px",borderRadius:12,border:`2px solid ${form.renewable===o.v?"#0A7C7C":"#E4EAF0"}`,background:form.renewable===o.v?"#E6F4F4":"#fff",color:form.renewable===o.v?"#0A7C7C":"#7A8FA6",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{o.l}</button>)}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <Inp label="Data od" value={form.startDate} onChange={v=>setForm(f=>({...f,startDate:v}))} type="date"/>
            <Inp label="Godz. dostawy" value={form.deliveryTime||""} onChange={v=>setForm(f=>({...f,deliveryTime:v}))} type="time"/>
          </div>
          {!form.renewable&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <Inp label="Data do" value={form.endDate} onChange={v=>setForm(f=>({...f,endDate:v}))} type="date"/>
            <Inp label="Godz. odbioru" value={form.pickupTime||""} onChange={v=>setForm(f=>({...f,pickupTime:v}))} type="time"/>
          </div>}
          <Inp label="Kwota (zł)" value={form.amount} onChange={v=>setForm(f=>({...f,amount:v}))} type="number" placeholder="400"/>
          {!form.renewable&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Inp label="Zapłacono (zł)" value={form.amountPaid} onChange={v=>setForm(f=>({...f,amountPaid:v}))} type="number" placeholder="0"/>
            <div style={{marginBottom:14}}><div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>Pozostało</div><div style={{padding:"11px 14px",border:"1.5px solid #E4EAF0",borderRadius:12,fontSize:15,background:"#F2F5F7",color:(+form.amount-(+form.amountPaid||0))>0?"#E05C5C":"#3DAA72",fontWeight:700}}>{form.amount?(+form.amount-(+form.amountPaid||0))+" zł":"—"}</div></div>
          </div>}
          <Inp label="Transport (zł)" value={form.transport||""} onChange={v=>setForm(f=>({...f,transport:v}))} type="number" placeholder="0"/>
          <Txa label="Notatki" value={form.notes} onChange={v=>setForm(f=>({...f,notes:v}))} rows={2}/>
          <Btn disabled={!form.patientName} style={{width:"100%",justifyContent:"center"}} onClick={()=>{
            if(!form.patientName)return;
            if(!form.renewable&&!form.endDate){alert("Podaj datę końca wypożyczenia");return;}
            const pid=Date.now(),rid=Date.now()+1,paid=form.renewable?0:+(form.amountPaid||0);
            const pat=patients.find(p=>p.name===form.patientName);
            const nr={...form,id:rid,patientId:pat?.id||null,amount:+form.amount,amountPaid:paid,payments:paid>0?[{id:pid,amount:paid,date:form.startDate}]:[],cycles:[],status:"aktywne"};
            setRentals(r=>[nr,...r]);
            if(paid>0)setFinances(fs=>[{id:Date.now()+Math.random(),sourceId:"payment-"+pid,date:form.startDate,type:"przychód",category:"Wypożyczalnia",amount:paid,description:"Wypożyczenie – "+form.patientName+" ("+form.equipment+")"},...fs]);
            setShowAdd(false);setToast("Wypożyczenie dodane");
          }}>Zapisz wypożyczenie</Btn>
        </Modal>}
        {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      </div>;
    }

    function StatsPanel({visits}) {
      const sm=todayLocal().slice(0,7);
      const mVisits=visits.filter(v=>v.date&&v.date.startsWith(sm));
      const mDone=mVisits.filter(v=>visitStatus(v)==="zakończona");
      const avgPrice=mDone.length?Math.round(mDone.reduce((s,v)=>s+(+v.price||0),0)/mDone.length):0;
      const patCounts={};mDone.forEach(v=>{patCounts[v.patientName]=(patCounts[v.patientName]||0)+1;});
      const topPat=Object.entries(patCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
      const typeCounts={};mDone.forEach(v=>{typeCounts[v.type]=(typeCounts[v.type]||0)+1;});
      const topTypes=Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]);
      return <>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:700,marginBottom:10,color:"#7A8FA6",textTransform:"capitalize"}}>{new Date(sm+"-15").toLocaleDateString("pl-PL",{month:"long",year:"numeric"})}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
          {[{l:"Wizyty łącznie",v:mVisits.length,c:"#0A7C7C"},{l:"Zakończone",v:mDone.length,c:"#3DAA72"},{l:"Średnia cena",v:avgPrice+" zł",c:"#7C6AF4"},{l:"Zaplanowane",v:mVisits.length-mDone.length,c:"#F4A261"}].map((x,i)=>(
            <div key={i} style={{background:x.c+"14",borderRadius:14,padding:"12px 10px",textAlign:"center",border:`1.5px solid ${x.c}30`}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,color:x.c}}>{x.v}</div>
              <div style={{fontSize:11,color:"#7A8FA6",marginTop:2}}>{x.l}</div>
            </div>
          ))}
        </div>
        {topPat.length>0&&<>
          <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>Najczęstsi pacjenci</div>
          {topPat.map(([name,cnt])=><div key={name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #F2F5F7"}}>
            <span style={{fontSize:14,fontWeight:500}}>{name}</span><Badge color="#0A7C7C">{cnt} {cnt===1?"wizyta":"wizyty"}</Badge>
          </div>)}
        </>}
        {topTypes.length>0&&<>
          <div style={{fontWeight:700,fontSize:14,marginBottom:8,marginTop:16}}>Rodzaje wizyt</div>
          {topTypes.map(([type,cnt])=><div key={type} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #F2F5F7"}}>
            <span style={{fontSize:14,fontWeight:500}}>{type}</span><Badge color="#7C6AF4">{cnt}</Badge>
          </div>)}
        </>}
        {mVisits.length===0&&<Empty text="Brak wizyt w tym miesiącu"/>}
      </>;
    }

    // ── FINANCES ──────────────────────────────────────────────────────────────
    function Finances({finances,setFinances,visits,setVisits,rentals,setRentals,nfzCases,setNfzCases}) {
      const [showAdd,setShowAdd]=useState(false);
      const [editE,setEditE]=useState(null);
      const [viewMode,setViewMode]=useState("month"); // "month" | "year" | "stats"
      const [month,setMonth]=useState(()=>todayLocal().slice(0,7));
      const [year,setYear]=useState(()=>todayLocal().slice(0,4));
      const [toast,setToast]=useState(null);
      const ef=()=>({date:todayLocal(),type:"przychód",category:"Wizyta",amount:"",description:""});
      const [form,setForm]=useState(ef);

      // Usuwa wpis z finansów ORAZ cofa efekt w źródle
      const deleteWithSource = (entry) => {
        const sid = entry.sourceId;
        if(!sid){ setFinances(fs=>fs.filter(f=>f.id!==entry.id)); return; }

        if(sid.startsWith("visit-")){
          const vid = +sid.replace("visit-","");
          setVisits(vs=>vs.filter(v=>+v.id!==vid));
        } else if(sid.startsWith("payment-")){
          const pid = +sid.replace("payment-","");
          setRentals(rs=>{
            const updated = rs.map(r=>{
              const found=(r.payments||[]).find(p=>+p.id===pid);
              if(!found){ return r; }
              const result = {...r,
                payments:(r.payments||[]).filter(p=>+p.id!==pid),
                amountPaid:Math.max(0,(r.amountPaid||0)-found.amount)
              };
              return result;
            });
            return updated;
          });
        } else if(sid.startsWith("extend-")){
          // extend-{rentalId}-{extId}
          const rest=sid.slice("extend-".length); // "12345-67890"
          const dashIdx=rest.indexOf("-");
          const rentalId=+rest.slice(0,dashIdx);
          const extId=+rest.slice(dashIdx+1);
          setRentals(rs=>rs.map(r=>+r.id!==rentalId?r:{...r,
            extensions:(r.extensions||[]).map(e=>+e.id===extId?{...e,amountPaid:0,paidDate:null,doc:null}:e)
          }));
        } else if(sid.startsWith("cycle-")){
          // cycle-{rentalId}-{YYYY-MM}
          const rest=sid.slice("cycle-".length);
          const dashIdx=rest.indexOf("-");
          const rentalId=+rest.slice(0,dashIdx);
          const month=rest.slice(dashIdx+1);
          setRentals(rs=>rs.map(r=>+r.id!==rentalId?r:{...r,
            cycles:(r.cycles||[]).map(c=>c.month===month?{...c,paid:false,paidDate:null}:c)
          }));
        } else if(sid.startsWith("wozek-")){
          const casId=+sid.replace("wozek-","");
          setNfzCases(cs=>(cs||[]).map(c=>+c.id===casId?{...c,realized:false}:c));
        }

        setFinances(fs=>fs.filter(f=>f.id!==entry.id));
      };
      const cats={przychód:["Wizyta","Wypożyczalnia","Wózek","Konsultacja","Inne"],koszt:["Paliwo","Sprzęt","Marketing","ZUS","Podatki","Inne"]};

      const months=useMemo(()=>{const c=todayLocal().slice(0,7),s=new Set([c]);finances.forEach(f=>{if(f.date)s.add(f.date.slice(0,7));});return Array.from(s).sort((a,b)=>b.localeCompare(a));},[finances]);
      const years=useMemo(()=>{const c=todayLocal().slice(0,4),s=new Set([c]);finances.forEach(f=>{if(f.date)s.add(f.date.slice(0,4));});return Array.from(s).sort((a,b)=>b.localeCompare(a));},[finances]);

      const mly=viewMode==="month"?finances.filter(f=>f.date&&f.date.startsWith(month)):finances.filter(f=>f.date&&f.date.startsWith(year));
      const inc=mly.filter(f=>f.type==="przychód").reduce((s,f)=>s+f.amount,0);
      const cst=mly.filter(f=>f.type==="koszt").reduce((s,f)=>s+f.amount,0);

      // For year view - monthly breakdown
      const yearMonths=useMemo(()=>{
        if(viewMode!=="year")return[];
        const ms=new Set(finances.filter(f=>f.date&&f.date.startsWith(year)).map(f=>f.date.slice(0,7)));
        return Array.from(ms).sort((a,b)=>b.localeCompare(a));
      },[finances,year,viewMode]);

      return <>
        <div>
          <div style={{padding:"28px 20px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800}}>Finanse</div>
            <Btn small onClick={()=>{setForm(ef());setShowAdd(true);}}><Ico d={I.plus} s={16} c="#fff"/> Dodaj</Btn>
          </div>
          <div style={{padding:"0 20px"}}>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              {[{k:"month",l:"Miesiąc"},{k:"year",l:"Rok"},{k:"stats",l:"📊 Statystyki"}].map(x=><button key={x.k} onClick={()=>setViewMode(x.k)} style={{padding:"8px 16px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,background:viewMode===x.k?"#0A7C7C":"#E4EAF0",color:viewMode===x.k?"#fff":"#7A8FA6",fontFamily:"inherit"}}>{x.l}</button>)}
            </div>
            {viewMode==="month"&&<div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
              {months.map(m=><button key={m} onClick={()=>setMonth(m)} style={{padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,whiteSpace:"nowrap",background:month===m?"#0A7C7C":"#E4EAF0",color:month===m?"#fff":"#7A8FA6",fontFamily:"inherit"}}>{new Date(m+"-15").toLocaleDateString("pl-PL",{month:"long",year:"numeric"})}</button>)}
            </div>}
            {viewMode==="year"&&<div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
              {years.map(y=><button key={y} onClick={()=>setYear(y)} style={{padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,whiteSpace:"nowrap",background:year===y?"#0A7C7C":"#E4EAF0",color:year===y?"#fff":"#7A8FA6",fontFamily:"inherit"}}>{y}</button>)}
            </div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
              {[{l:"Przychód",v:inc,c:"#3DAA72"},{l:"Koszty",v:cst,c:"#E05C5C"},{l:"Wynik",v:inc-cst,c:inc-cst>=0?"#0A7C7C":"#E05C5C"}].map((x,i)=>(
                <div key={i} style={{background:x.c+"14",borderRadius:14,padding:"12px 8px",textAlign:"center",border:`1.5px solid ${x.c}30`}}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,color:x.c}}>{x.v} zł</div>
                  <div style={{fontSize:11,color:"#7A8FA6",marginTop:2}}>{x.l}</div>
                </div>
              ))}
            </div>
            {viewMode==="year"&&yearMonths.length>0&&<>
              {yearMonths.map(m=>{
                const ml=finances.filter(f=>f.date&&f.date.startsWith(m));
                const mi=ml.filter(f=>f.type==="przychód").reduce((s,f)=>s+f.amount,0);
                const mc=ml.filter(f=>f.type==="koszt").reduce((s,f)=>s+f.amount,0);
                return <div key={m} style={{marginBottom:8,borderRadius:14,border:"1.5px solid #E4EAF0",overflow:"hidden"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"#F2F5F7",cursor:"pointer"}} onClick={()=>{setViewMode("month");setMonth(m);}}>
                    <span style={{fontWeight:600,fontSize:14,textTransform:"capitalize"}}>{new Date(m+"-15").toLocaleDateString("pl-PL",{month:"long",year:"numeric"})}</span>
                    <div style={{display:"flex",gap:12,fontSize:13}}>
                      <span style={{color:"#3DAA72",fontWeight:600}}>+{mi} zł</span>
                      <span style={{color:"#E05C5C",fontWeight:600}}>−{mc} zł</span>
                      <span style={{color:mi-mc>=0?"#0A7C7C":"#E05C5C",fontWeight:700}}>{mi-mc>=0?"+":""}{mi-mc} zł</span>
                    </div>
                  </div>
                </div>;
              })}
            </>}
            {viewMode==="month"&&<>{mly.length===0&&<Empty text="Brak wpisów w tym miesiącu"/>}
            {[...mly].sort((a,b)=>b.date.localeCompare(a.date)).map(f=>(
              <Card key={f.id} onClick={()=>setEditE({...f,amount:String(f.amount)})}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><div style={{fontWeight:600}}>{f.description||f.category}</div><div style={{fontSize:13,color:"#7A8FA6"}}>{f.date} · {f.category}</div></div>
                  <span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:16,color:f.type==="przychód"?"#3DAA72":"#E05C5C"}}>{f.type==="przychód"?"+":"−"}{f.amount} zł</span>
                </div>
              </Card>
            ))}</>}
            {viewMode==="stats"&&<StatsPanel visits={visits}/>}
          </div>
        </div>

        {showAdd&&<Modal title="Nowy wpis" onClose={()=>setShowAdd(false)}>
          <Sel label="Typ" value={form.type} onChange={v=>setForm(f=>({...f,type:v,category:cats[v][0]}))} options={[{value:"przychód",label:"📈 Przychód"},{value:"koszt",label:"📉 Koszt"}]}/>
          <Sel label="Kategoria" value={form.category} onChange={v=>setForm(f=>({...f,category:v}))} options={cats[form.type].map(c=>({value:c,label:c}))}/>
          <Inp label="Kwota (zł) *" value={form.amount} onChange={v=>setForm(f=>({...f,amount:v}))} type="number" placeholder="150"/>
          <Inp label="Opis" value={form.description} onChange={v=>setForm(f=>({...f,description:v}))} placeholder="np. wizyta u Jana Kowalskiego"/>
          <Inp label="Data" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))} type="date"/>
          <Btn disabled={!form.amount} style={{width:"100%",justifyContent:"center"}} onClick={()=>{if(!form.amount)return;setFinances(fs=>[{...form,id:Date.now(),amount:+form.amount},...fs]);setForm(ef());setShowAdd(false);setToast("Wpis dodany");}}>Zapisz</Btn>
        </Modal>}

        {editE&&<Modal title="Edytuj wpis" onClose={()=>setEditE(null)}>
          <Sel label="Typ" value={editE.type} onChange={v=>setEditE(f=>({...f,type:v,category:cats[v][0]}))} options={[{value:"przychód",label:"📈 Przychód"},{value:"koszt",label:"📉 Koszt"}]}/>
          <Sel label="Kategoria" value={editE.category} onChange={v=>setEditE(f=>({...f,category:v}))} options={cats[editE.type].map(c=>({value:c,label:c}))}/>
          <Inp label="Kwota (zł)" value={editE.amount} onChange={v=>setEditE(f=>({...f,amount:v}))} type="number"/>
          <Inp label="Opis" value={editE.description||""} onChange={v=>setEditE(f=>({...f,description:v}))}/>
          <Inp label="Data" value={editE.date} onChange={v=>setEditE(f=>({...f,date:v}))} type="date"/>
          <Btn style={{width:"100%",justifyContent:"center",marginBottom:8}} onClick={()=>{setFinances(fs=>fs.map(f=>f.id===editE.id?{...f,...editE,amount:+editE.amount}:f));setEditE(null);setToast("Zmiany zapisane");}}>Zapisz zmiany</Btn>
          <Btn variant="danger" style={{width:"100%",justifyContent:"center"}} onClick={()=>{deleteWithSource(editE);setEditE(null);}}>🗑️ Usuń wpis</Btn>
        </Modal>}
        {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      </>;
    }

    // ── NFZ ───────────────────────────────────────────────────────────────────
    const emptyNFZ = () => ({patientName:"",address:"",phone:"",hasDisabilityCert:false,wheelchairModel:"",orderDate:"",notes:""});

    const nextOrderDate = (cas) => {
      if(!cas.orderDate) return null;
      const [y,m,d] = cas.orderDate.split("-").map(Number);
      const years = cas.hasDisabilityCert ? 1 : 4;
      return new Date(y+years,m-1,d).getFullYear()+"-"+String(new Date(y+years,m-1,d).getMonth()+1).padStart(2,"0")+"-"+String(new Date(y+years,m-1,d).getDate()).padStart(2,"0");
    };

    function NFZ({nfzCases,setNfzCases,initialSel,onSelCleared,setFinances}) {
      const dk = useContext(DarkCtx);
      const [showAdd,setShowAdd] = useState(false);
      const [form,setForm] = useState(emptyNFZ);
      const [selId,setSelId] = useState(null);
      const [editForm,setEditForm] = useState(null);
      const [confirmDel,setConfirmDel] = useState(false);
      const [toast,setToast] = useState(null);
      const [tab,setTab] = useState("orzeczenie");
      const [payModal,setPayModal] = useState(null); // {casId, date, name}
      const [payAmount,setPayAmount] = useState("");

      useEffect(()=>{if(initialSel!=null){setSelId(initialSel);}}, [initialSel]);
      const closeDetail=()=>{setSelId(null);if(onSelCleared)onSelCleared();};

      const cases = nfzCases || [];
      const today = todayLocal();

      const withCert  = cases.filter(c=>c.hasDisabilityCert);
      const withoutCert = cases.filter(c=>!c.hasDisabilityCert);
      const sortByNext = arr => [...arr].sort((a,b)=>{
        const na=nextOrderDate(a)||"9999", nb=nextOrderDate(b)||"9999";
        return na.localeCompare(nb);
      });

      if (selId !== null) {
        const cas = cases.find(c => c.id === selId);
        if (!cas) { setSelId(null); return null; }
        const nd = nextOrderDate(cas);
        const daysLeft = nd ? dateDiff(today, nd) : null;
        return <>
          <div>
            <button onClick={()=>setSelId(null)} style={{background:"none",border:"none",display:"flex",alignItems:"center",gap:6,color:"#0A7C7C",fontWeight:600,cursor:"pointer",padding:"20px 20px 0",fontFamily:"inherit",fontSize:14}}>
              <Ico d={I.back} s={18} c="#0A7C7C"/> Wózki
            </button>
            <div style={{padding:"16px 20px 0"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800}}>{cas.patientName}</div>
                <Btn small variant="secondary" onClick={()=>setEditForm({...cas})}>✏️ Edytuj</Btn>
              </div>
              <Card style={{marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:700,color:"#7A8FA6",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Dane pacjenta</div>
                <div style={{display:"grid",gap:10}}>
                  {cas.phone&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:14,color:dk?"#C8E8E8":"#1C2B3A"}}>{cas.phone}</span>
                    <a href={`tel:${cas.phone.replace(/\s/g,"")}`} style={{textDecoration:"none"}}><Btn small variant="secondary"><Ico d={I.ph} s={15} c="#0A7C7C"/> Zadzwoń</Btn></a>
                  </div>}
                  {cas.address&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:14,color:"#7A8FA6",flex:1,paddingRight:8}}>{cas.address}</span>
                    <a href={`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(cas.address)}`} target="_blank" rel="noreferrer" style={{textDecoration:"none",flexShrink:0}}><Btn small variant="secondary">🗺️ Trasa</Btn></a>
                  </div>}
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:18,height:18,borderRadius:5,border:`2px solid ${cas.hasDisabilityCert?"#3DAA72":"#E4EAF0"}`,background:cas.hasDisabilityCert?"#3DAA72":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {cas.hasDisabilityCert&&<span style={{color:"#fff",fontSize:11}}>✓</span>}
                    </div>
                    <span style={{fontSize:14,color:dk?"#C8E8E8":"#1C2B3A"}}>Orzeczenie o niepełnosprawności (stopień znaczny)</span>
                  </div>
                </div>
              </Card>
              {(cas.wheelchairModel||cas.orderDate)&&<Card style={{marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:700,color:"#7A8FA6",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Wózek</div>
                {cas.wheelchairModel&&<div style={{marginBottom:6}}><span style={{fontSize:12,color:"#7A8FA6"}}>Model: </span><span style={{fontWeight:600,fontSize:14}}>{cas.wheelchairModel}</span></div>}
                {cas.orderDate&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                  <div><span style={{fontSize:12,color:"#7A8FA6"}}>Data zamówienia: </span><span style={{fontWeight:600,fontSize:14}}>{cas.orderDate}</span></div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {cas.realized&&<span style={{fontSize:12,color:"#3DAA72",fontWeight:600}}>✓ Zrealizowano</span>}
                    <div onClick={()=>{if(!cas.realized){setPayModal({casId:cas.id,date:cas.orderDate,name:cas.patientName});setPayAmount("");}else{setNfzCases(cs=>cs.map(x=>x.id===cas.id?{...x,realized:false}:x));setToast("Cofnięto realizację");}}}
                      style={{width:24,height:24,borderRadius:7,border:`2px solid ${cas.realized?"#3DAA72":"#E4EAF0"}`,background:cas.realized?"#3DAA72":"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
                      {cas.realized&&<span style={{color:"#fff",fontSize:13}}>✓</span>}
                    </div>
                  </div>
                </div>}
                {nd&&<div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #E4EAF0"}}>
                  <div style={{fontSize:12,color:"#7A8FA6",marginBottom:4}}>Kolejne zamówienie możliwe od:</div>
                  <div style={{fontWeight:700,fontSize:15}}>{nd}</div>
                  <div style={{fontSize:13,marginTop:4,color:daysLeft<=0?"#3DAA72":daysLeft<=30?"#F4A261":"#7A8FA6"}}>
                    {daysLeft<=0?"✓ Można już składać wniosek":daysLeft===1?"Jutro":daysLeft<0?`${Math.abs(daysLeft)} dni temu`:`za ${daysLeft} dni`}
                  </div>
                </div>}
              </Card>}
              {cas.notes&&<Card style={{marginBottom:10,background:"#FFFBF5",border:"1.5px solid #F4A26130"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#F4A261",textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Notatki</div>
                <div style={{fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{cas.notes}</div>
              </Card>}
              <Btn variant="danger" style={{width:"100%",justifyContent:"center",marginTop:4}} onClick={()=>setConfirmDel(true)}>🗑️ Usuń</Btn>
            </div>
          </div>
          {editForm&&<Modal title="Edytuj" onClose={()=>setEditForm(null)}>
            <Inp label="Imię i nazwisko" value={editForm.patientName} onChange={v=>setEditForm(f=>({...f,patientName:v}))} placeholder="Jan Kowalski"/>
            <Inp label="Adres" value={editForm.address||""} onChange={v=>setEditForm(f=>({...f,address:v}))} placeholder="ul. Przykładowa 1, Gliwice"/>
            <Inp label="Telefon" value={editForm.phone||""} onChange={v=>setEditForm(f=>({...f,phone:v}))} type="tel"/>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,cursor:"pointer"}} onClick={()=>setEditForm(f=>({...f,hasDisabilityCert:!f.hasDisabilityCert}))}>
              <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${editForm.hasDisabilityCert?"#3DAA72":"#E4EAF0"}`,background:editForm.hasDisabilityCert?"#3DAA72":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {editForm.hasDisabilityCert&&<span style={{color:"#fff",fontSize:13}}>✓</span>}
              </div>
              <span style={{fontSize:14,fontWeight:500}}>Orzeczenie o niepełnosprawności (stopień znaczny)</span>
            </div>
            <Inp label="Model wózka" value={editForm.wheelchairModel||""} onChange={v=>setEditForm(f=>({...f,wheelchairModel:v}))} placeholder="np. Wózek aktywny X"/>
            <Inp label="Data zamówienia" value={editForm.orderDate||""} onChange={v=>setEditForm(f=>({...f,orderDate:v}))} type="date"/>
            <Txa label="Notatki" value={editForm.notes||""} onChange={v=>setEditForm(f=>({...f,notes:v}))} rows={2}/>
            <Btn style={{width:"100%",justifyContent:"center"}} onClick={()=>{setNfzCases(cs=>cs.map(x=>x.id===selId?{...x,...editForm}:x));setEditForm(null);setToast("Zapisano zmiany");}}>Zapisz zmiany</Btn>
          </Modal>}
          {confirmDel&&<Modal title="Usuń" onClose={()=>setConfirmDel(false)}>
            <div style={{fontSize:15,marginBottom:20}}>Na pewno usunąć tę pozycję?</div>
            <div style={{display:"flex",gap:10}}>
              <Btn variant="secondary" style={{flex:1,justifyContent:"center"}} onClick={()=>setConfirmDel(false)}>Anuluj</Btn>
              <Btn variant="danger" style={{flex:1,justifyContent:"center"}} onClick={()=>{setNfzCases(cs=>cs.filter(x=>x.id!==selId));setConfirmDel(false);setSelId(null);}}>Usuń</Btn>
            </div>
          </Modal>}
          {payModal&&<Modal title="Kwota przychodu" onClose={()=>setPayModal(null)}>
            <div style={{fontSize:14,color:"#7A8FA6",marginBottom:14}}>{payModal.name} · {payModal.date}</div>
            <Inp label="Kwota (zł) *" value={payAmount} onChange={setPayAmount} type="number" placeholder="0"/>
            <Btn disabled={!payAmount||+payAmount<=0} style={{width:"100%",justifyContent:"center"}} onClick={()=>{
              const sid="wozek-"+payModal.casId;
              setFinances(fs=>[{id:Date.now(),sourceId:sid,date:payModal.date,type:"przychód",category:"Wózek",amount:+payAmount,description:"Wózek – "+payModal.name},...(fs||[])]);
              setNfzCases(cs=>cs.map(x=>x.id===payModal.casId?{...x,realized:true}:x));
              setPayModal(null);setPayAmount("");setToast("Dodano do finansów");
            }}>Zapisz i oznacz jako zrealizowany</Btn>
          </Modal>}
          {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
        </>;
      }

      const listItems = sortByNext(tab==="orzeczenie" ? withCert : withoutCert);
      return <div>
        <div style={{padding:"28px 20px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800}}>Wózki</div>
          <Btn small onClick={()=>{setForm(emptyNFZ());setShowAdd(true);}}><Ico d={I.plus} s={16} c="#fff"/> Nowy</Btn>
        </div>
        <div style={{display:"flex",gap:6,padding:"0 20px 14px"}}>
          {[{k:"orzeczenie",l:`Z orzeczeniem (${withCert.length})`},{k:"bez",l:`Bez orzeczenia (${withoutCert.length})`}].map(t=>
            <button key={t.k} onClick={()=>setTab(t.k)} style={{padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,whiteSpace:"nowrap",background:tab===t.k?"#0A7C7C":"#E4EAF0",color:tab===t.k?"#fff":"#7A8FA6",fontFamily:"inherit"}}>{t.l}</button>
          )}
        </div>
        <div style={{padding:"0 20px"}}>
          {listItems.length===0&&<Empty text="Brak wpisów"/>}
          {listItems.map(cas=>{
            const nd=nextOrderDate(cas);
            const dl=nd?dateDiff(today,nd):null;
            return <Card key={cas.id} onClick={()=>setSelId(cas.id)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:15,marginBottom:3}}>{cas.patientName}</div>
                  <div style={{fontSize:13,color:"#7A8FA6",display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
                    {cas.wheelchairModel&&<span>🦽 {cas.wheelchairModel}</span>}
                    {cas.orderDate&&<span>📅 {cas.orderDate}</span>}
                    {cas.realized&&<span style={{color:"#3DAA72",fontWeight:600}}>✓ zrealizowany</span>}
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0,paddingLeft:10}}>
                  <div onClick={e=>{e.stopPropagation();if(!cas.realized){setPayModal({casId:cas.id,date:cas.orderDate||"",name:cas.patientName});setPayAmount("");}else{setNfzCases(cs=>cs.map(x=>x.id===cas.id?{...x,realized:false}:x));}}}
                    style={{width:24,height:24,borderRadius:7,border:`2px solid ${cas.realized?"#3DAA72":"#E4EAF0"}`,background:cas.realized?"#3DAA72":"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                    {cas.realized&&<span style={{color:"#fff",fontSize:13}}>✓</span>}
                  </div>
                  <div style={{textAlign:"right"}}>
                    {nd&&<div style={{fontSize:12,color:dl<=0?"#3DAA72":"#7A8FA6",fontWeight:dl<=0?700:400}}>{dl<=0?"➜ można złożyć":"➜ "+nd}</div>}
                    <Ico d="M9 18l6-6-6-6" s={18} c="#7A8FA6"/>
                  </div>
                </div>
              </div>
            </Card>;
          })}
        </div>
        {showAdd&&<Modal title="Nowy wózek" onClose={()=>setShowAdd(false)}>
          <Inp label="Imię i nazwisko *" value={form.patientName} onChange={v=>setForm(f=>({...f,patientName:v}))} placeholder="Jan Kowalski"/>
          <Inp label="Adres" value={form.address} onChange={v=>setForm(f=>({...f,address:v}))} placeholder="ul. Przykładowa 1, Gliwice"/>
          <Inp label="Telefon" value={form.phone} onChange={v=>setForm(f=>({...f,phone:v}))} type="tel"/>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,cursor:"pointer"}} onClick={()=>setForm(f=>({...f,hasDisabilityCert:!f.hasDisabilityCert}))}>
            <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${form.hasDisabilityCert?"#3DAA72":"#E4EAF0"}`,background:form.hasDisabilityCert?"#3DAA72":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              {form.hasDisabilityCert&&<span style={{color:"#fff",fontSize:13}}>✓</span>}
            </div>
            <span style={{fontSize:14,fontWeight:500}}>Orzeczenie o niepełnosprawności (stopień znaczny)</span>
          </div>
          <Inp label="Model wózka" value={form.wheelchairModel} onChange={v=>setForm(f=>({...f,wheelchairModel:v}))} placeholder="np. Wózek aktywny X"/>
          <Inp label="Data zamówienia" value={form.orderDate} onChange={v=>setForm(f=>({...f,orderDate:v}))} type="date"/>
          <Txa label="Notatki" value={form.notes} onChange={v=>setForm(f=>({...f,notes:v}))} rows={2}/>
          <Btn disabled={!form.patientName} style={{width:"100%",justifyContent:"center"}} onClick={()=>{if(!form.patientName)return;setNfzCases(cs=>[{...form,id:Date.now()},...(cs||[])]);setForm(emptyNFZ());setShowAdd(false);setToast("Dodano");}}>Dodaj</Btn>
        </Modal>}
        {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      </div>;
    }


    // ── APP ───────────────────────────────────────────────────────────────────
    const TABS=[{id:"dashboard",i:I.home,l:"Pulpit"},{id:"patients",i:I.users,l:"Pacjenci"},{id:"rentals",i:I.equip,l:"Sprzęt"},{id:"finances",i:I.fin,l:"Finanse"},{id:"nfz",i:"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z",l:"Wózki"}];

    function App({visits,setVisits,patients,setPatients,rentals,setRentals,finances,setFinances,stock,setStock,nfzCases,setNfzCases,todos,setTodos,dark,setDark}) {
      const [tab,setTab]=useState("dashboard");
      const [dlRental,setDlRental]=useState(null);
      const [wozkiSel,setWozkiSel]=useState(null);
      const [rentalsView,setRentalsView]=useState("aktywne");
      const goToRental=id=>{setDlRental(id);setTab("rentals");};
      const goToWozki=id=>{setWozkiSel(id);setTab("nfz");};
      const dk=dark;

      // Long-press on Pulpit to toggle dark mode
      const lpTimer=React.useRef(null);
      const lpStart=()=>{lpTimer.current=setTimeout(()=>{setDark(d=>!d);},700);};
      const lpEnd=()=>{if(lpTimer.current)clearTimeout(lpTimer.current);};

      return <>
        <div style={{maxWidth:480,margin:"0 auto",background:dk?"#0A1A1A":"#F2F5F7",minHeight:"100vh",color:dk?"#E8F5F5":"#1C2B3A"}}>
          <div style={{paddingBottom:80,minHeight:"100vh"}}>
            {tab==="dashboard"&&<Dashboard visits={visits} setVisits={setVisits} rentals={rentals} setRentals={setRentals} finances={finances} setFinances={setFinances} patients={patients} goToRental={goToRental} nfzCases={nfzCases} goToWozki={goToWozki} todos={todos} setTodos={setTodos}/>}
            {tab==="patients"&&<Patients patients={patients} setPatients={setPatients} visits={visits} setVisits={setVisits} finances={finances} setFinances={setFinances} rentals={rentals} setRentals={setRentals}/>}
            {tab==="rentals"&&<Rentals rentals={rentals} setRentals={setRentals} finances={finances} setFinances={setFinances} patients={patients} initialDetail={dlRental} onDetailClosed={()=>setDlRental(null)} rentalsView={rentalsView} setRentalsView={setRentalsView} stock={stock} setStock={setStock}/>}
            {tab==="finances"&&<Finances finances={finances} setFinances={setFinances} visits={visits} setVisits={setVisits} rentals={rentals} setRentals={setRentals} nfzCases={nfzCases} setNfzCases={setNfzCases}/>}
            {tab==="nfz"&&<NFZ nfzCases={nfzCases} setNfzCases={setNfzCases} initialSel={wozkiSel} onSelCleared={()=>setWozkiSel(null)} setFinances={setFinances}/>}
          </div>
          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:dk?"#0F1F1F":"#fff",borderTop:`1px solid ${dk?"#1A3030":"#E4EAF0"}`,display:"flex",padding:"8px 0 12px",zIndex:50,boxShadow:"0 -4px 20px rgba(0,0,0,.08)"}}>
            {TABS.map(t=>{
              const isDash=t.id==="dashboard";
              return <button key={t.id}
                onClick={()=>setTab(t.id)}
                onMouseDown={isDash?lpStart:undefined} onMouseUp={isDash?lpEnd:undefined} onMouseLeave={isDash?lpEnd:undefined}
                onTouchStart={isDash?lpStart:undefined} onTouchEnd={isDash?lpEnd:undefined}
                style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 0",fontFamily:"inherit",userSelect:"none",WebkitUserSelect:"none"}}>
                <div style={{width:36,height:36,borderRadius:12,background:tab===t.id?"#0A7C7C":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}><Ico d={t.i} s={18} c={tab===t.id?"#fff":dk?"#5A8A8A":"#7A8FA6"}/></div>
                <span style={{fontSize:10,fontWeight:600,color:tab===t.id?"#0A7C7C":dk?"#5A8A8A":"#7A8FA6"}}>{t.l}</span>
              </button>;
            })}
          </div>
        </div>
      </>;
    }

    function AppWithSync({visits,setVisits,patients,setPatients,rentals,setRentals,finances,setFinances,stock,setStock,nfzCases,setNfzCases,todos,setTodos,dark,setDark}) {
      // Auto-generate current month cycle — only for rentals that already have cycles (went through HistoryFill)
      // or are new (startDate is in current month)
      useEffect(()=>{
        if(!rentals)return;
        const cm=todayLocal().slice(0,7);
        const needsUpdate=rentals.some(r=>{
          if(r.status!=="aktywne"||!r.renewable)return false;
          if((r.cycles||[]).some(c=>c.month===cm))return false;
          // Skip if cycles empty AND startDate older than current month — needs HistoryFill first
          if((r.cycles||[]).length===0&&r.startDate.slice(0,7)<cm)return false;
          return true;
        });
        if(!needsUpdate)return;
        setRentals(rs=>rs.map(r=>{
          if(r.status!=="aktywne"||!r.renewable)return r;
          if((r.cycles||[]).some(c=>c.month===cm))return r;
          if((r.cycles||[]).length===0&&r.startDate.slice(0,7)<cm)return r;
          const last=[...(r.cycles||[])].sort((a,b)=>b.month.localeCompare(a.month))[0];
          return {...r,cycles:[...(r.cycles||[]),{month:cm,amount:last?last.amount:(r.amount||0),paid:false,paidDate:null}]};
        }));
      },[]);
      useEffect(()=>{
        if(!visits||!rentals||!finances)return;
        const now=new Date(),ex=new Set(finances.map(f=>f.sourceId).filter(Boolean)),toAdd=[];
        visits.forEach(v=>{
          const sid="visit-"+v.id; if(ex.has(sid))return;
          const done=v.status==="zakończona"||new Date(v.date+"T"+(v.time||"00:00")+":00")<=now;
          if(done)toAdd.push({id:Date.now()+Math.random(),sourceId:sid,date:v.date,type:"przychód",category:"Wizyta",amount:v.price||0,description:"Wizyta – "+v.patientName});
        });
        rentals.forEach(r=>(r.payments||[]).forEach(p=>{
          const sid="payment-"+p.id; if(ex.has(sid))return;
          toAdd.push({id:Date.now()+Math.random(),sourceId:sid,date:p.date,type:"przychód",category:"Wypożyczalnia",amount:p.amount,description:"Wypożyczenie – "+r.patientName+" ("+r.equipment+")"});
        }));
        rentals.forEach(r=>(r.cycles||[]).filter(c=>c.paid).forEach(c=>{
          const sid="cycle-"+r.id+"-"+c.month; if(ex.has(sid))return;
          const label=new Date(c.month+"-15").toLocaleDateString("pl-PL",{month:"long",year:"numeric"});
          toAdd.push({id:Date.now()+Math.random(),sourceId:sid,date:c.paidDate||c.month+"-15",type:"przychód",category:"Wypożyczalnia",amount:c.amount,description:"Wypożyczenie – "+r.patientName+" ("+r.equipment+") "+label});
        }));
        if(toAdd.length)setFinances(prev=>[...toAdd,...prev]);
      },[visits,rentals]);
      return <App visits={visits} setVisits={setVisits} patients={patients} setPatients={setPatients} rentals={rentals} setRentals={setRentals} finances={finances} setFinances={setFinances} stock={stock} setStock={setStock} nfzCases={nfzCases} setNfzCases={setNfzCases} todos={todos} setTodos={setTodos} dark={dark} setDark={setDark}/>;
    }

    function AppWrapper() {
      const [visits,setVisits,v1]=usePersistedState("fizjo-visits",[]);
      const [patients,setPatients,v2]=usePersistedState("fizjo-patients",[]);
      const [rentals,setRentals,v3]=usePersistedState("fizjo-rentals",[]);
      const [finances,setFinances,v4]=usePersistedState("fizjo-finances",[]);
      const [stock,setStock,v5]=usePersistedState("fizjo-stock",{});
      const [nfzCases,setNfzCases,v6]=usePersistedState("fizjo-nfz",[]);
      const [todos,setTodos,v7]=usePersistedState("fizjo-todos",[]);
      const [dark,setDark]=useState(false);
      if(!v1||!v2||!v3||!v4||!v5||!v6||!v7)return<div className="loader"><div className="spinner"/><div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,color:"#0A7C7C",fontSize:18}}>ZubrzyckiFizjo</div><div style={{fontSize:13,color:"#7A8FA6"}}>Wczytywanie danych...</div></div>;
      return <DarkCtx.Provider value={dark}><AppWithSync visits={visits} setVisits={setVisits} patients={patients} setPatients={setPatients} rentals={rentals} setRentals={setRentals} finances={finances} setFinances={setFinances} stock={stock} setStock={setStock} nfzCases={nfzCases} setNfzCases={setNfzCases} todos={todos} setTodos={setTodos} dark={dark} setDark={setDark}/></DarkCtx.Provider>;
    }

    class ErrBoundary extends React.Component {
      constructor(p){super(p);this.state={err:null};}
      static getDerivedStateFromError(e){return{err:e};}
      render(){
        if(this.state.err)return<div style={{padding:20,fontFamily:"monospace",color:"red",whiteSpace:"pre-wrap"}}>
          <b>BŁĄD APLIKACJI:</b>{"\n"}{this.state.err?.message}{"\n"}{this.state.err?.stack}
        </div>;
        return this.props.children;
      }
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<ErrBoundary><AppWrapper/></ErrBoundary>);
  </script>
</body>
</html>
