                <div style={{fontSize:11,fontWeight:700,color:"#7A8FA6",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Wypożyczenie</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                  <div><div style={{fontSize:11,color:"#7A8FA6",marginBottom:3}}>Data od</div><div style={{fontWeight:600}}>{r.startDate}</div></div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
                    <div><div style={{fontSize:11,color:"#7A8FA6",marginBottom:3}}>Data do</div><div style={{fontWeight:600}}>{r.endDate||"—"}</div></div>
                    {r.status==="aktywne"&&!r.renewable&&r.endDate&&<button onClick={()=>{setExtForm({newEndDate:"",endTime:"10:00",amountDue:"",amountPaid:"",payDate:"",notes:"",editId:null});setShowExtend(true);}} style={{background:"#E6F4F4",border:"none",borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:600,color:"#0A7C7C",cursor:"pointer",fontFamily:"inherit"}}>+ Przedłuż</button>}
                  </div>
                  <div><div style={{fontSize:11,color:"#7A8FA6",marginBottom:3}}>Typ</div><div style={{fontWeight:600}}>{r.renewable?"Odnawialne":"Jednorazowe"}</div></div>
                  {r.transport>0&&<div><div style={{fontSize:11,color:"#7A8FA6",marginBottom:3}}>Transport</div><div style={{fontWeight:600,color:"#F4A261"}}>{r.transport} zł</div></div>}
                </div>
                {(r.extensions||[]).length>0&&<div style={{marginBottom:12,paddingBottom:12,borderBottom:"1px solid #E4EAF0"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#7A8FA6",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Historia przedłużeń</div>
                  <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:6,paddingBottom:6,borderBottom:"1px solid #F2F5F7"}}>
                    <div style={{width:3,borderRadius:2,background:"#E4EAF0",alignSelf:"stretch",minHeight:32,marginTop:2,flexShrink:0}}/>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,color:"#7A8FA6"}}>Okres oryginalny</div>
                      <div style={{fontSize:13,fontWeight:600}}>{r.startDate} → {(r.extensions||[])[0]?.prevEndDate||r.endDate} · <span style={{color:"#1C2B3A"}}>{r.amount} zł</span></div>
                    </div>
                  </div>
                  {(r.extensions||[]).map((ext,i)=><div key={ext.id||i} style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:6,paddingBottom:6,borderBottom:"1px solid #F2F5F7"}}>
                    <div style={{width:3,borderRadius:2,background:"#0A7C7C",alignSelf:"stretch",minHeight:32,marginTop:2,flexShrink:0}}/>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,color:"#0A7C7C",fontWeight:600}}>Przedłużenie {i+1}</div>
                      <div style={{fontSize:13}}>{ext.prevEndDate} → {ext.newEndDate}</div>
                      {(ext.amountDue||ext.amount||0)>0&&<div style={{fontSize:12,marginTop:2}}>
                        <span style={{color:"#7A8FA6"}}>Należne: </span><span style={{fontWeight:600}}>{ext.amountDue||ext.amount} zł</span>
                        {(ext.amountPaid||0)>0
                          ? <><span style={{color:"#3DAA72",marginLeft:8}}>✓ Zapłacono: {ext.amountPaid} zł</span>{(ext.amountPaid)<(ext.amountDue||ext.amount||0)&&<span style={{color:"#E05C5C",marginLeft:8}}>Pozostało: {(ext.amountDue||ext.amount||0)-ext.amountPaid} zł</span>}</>
                          : <span style={{color:"#F4A261",marginLeft:8}}>· do zapłaty</span>
                        }
                      </div>}
                      {ext.notes&&<div style={{fontSize:12,color:"#7A8FA6",marginTop:2,fontStyle:"italic",whiteSpace:"pre-wrap"}}>{ext.notes}</div>}
                    </div>
                    <div style={{display:"flex",gap:6,flexShrink:0}}>
                      <button onClick={()=>{setExtForm({newEndDate:ext.newEndDate,endTime:ext.endTime||"10:00",amountDue:String(ext.amountDue||ext.amount||""),amountPaid:String(ext.amountPaid||""),payDate:ext.paidDate||"",notes:ext.notes||"",editId:ext.id||i});setShowExtend(true);}} style={{background:"#E6F4F4",border:"none",borderRadius:8,padding:"5px 9px",fontSize:12,fontWeight:600,color:"#0A7C7C",cursor:"pointer",fontFamily:"inherit"}}>✏️</button>
                      <button onClick={()=>{
                        const prevEnd = i===0 ? (r.extensions||[])[0].prevEndDate : (r.extensions||[])[i-1].newEndDate;
                        const newExts = (r.extensions||[]).filter((_,j)=>j!==i);
                        const newEndDate = newExts.length>0 ? newExts[newExts.length-1].newEndDate : prevEnd;
                        setRentals(rs=>rs.map(x=>x.id===r.id?{...x,endDate:newEndDate,extensions:newExts}:x));
                        if(ext.amount>0||(ext.amountPaid||0)>0){
                          if(ext.id){
                            setFinances(fs=>fs.filter(f=>f.sourceId!=="extend-"+r.id+"-"+ext.id));
                          } else {
                            // Stare przedłużenie bez id — szukamy po opisie i kwocie
                            setFinances(fs=>{
                              const toRemove=fs.findIndex(f=>f.sourceId&&f.sourceId.startsWith("extend-"+r.id+"-")&&f.amount===(ext.amountPaid||ext.amount)&&!newExts.some(e=>e.id&&f.sourceId==="extend-"+r.id+"-"+e.id));
                              return toRemove>=0?fs.filter((_,j)=>j!==toRemove):fs;
                            });
                          }
                        }
                      }} style={{background:"#FEE2E2",border:"none",borderRadius:8,padding:"5px 9px",fontSize:12,fontWeight:600,color:"#E05C5C",cursor:"pointer",fontFamily:"inherit"}}>✕</button>
                    </div>
                  </div>)}
                </div>}
                <div style={{borderTop:"1px solid #E4EAF0",paddingTop:12}}>
                  {r.renewable ? <>
                    <div style={{fontSize:11,fontWeight:700,color:"#7A8FA6",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Cykle miesięczne</div>
                    {(r.cycles||[]).length===0&&r.startDate<todayLocal().slice(0,7)
                      ? <HistoryFill r={r} setRentals={setRentals} setFinances={setFinances}/>
                      : <>
                          {(r.cycles||[]).length===0&&<div style={{fontSize:14,color:"#7A8FA6",textAlign:"center",padding:"12px 0"}}>Brak cykli — pojawią się automatycznie</div>}
                          {[...(r.cycles||[])].sort((a,b)=>b.month.localeCompare(a.month)).map(c=><CycleRow key={c.month} r={r} cycle={c} setRentals={setRentals} setFinances={setFinances}/>)}
                        </>
                    }
                  </> : (()=>{
                    // Łączna należność = oryginał + amountDue ze wszystkich przedłużeń
                    const extDue = (r.extensions||[]).reduce((s,e)=>s+(+e.amountDue||+e.amount||0),0);
                    const totalAmount = (+r.amount||0) + extDue;
                    // Zapłacono = wpłaty z payments + amountPaid z przedłużeń
                    const paymentsPaid = (r.payments||[]).reduce((s,p)=>s+p.amount,0);
                    const extPaid = (r.extensions||[]).reduce((s,e)=>s+(e.amountPaid||0),0);
                    const totalPaid = paymentsPaid + extPaid;
                    const remaining = totalAmount - totalPaid;

                    // Historia wpłat: normalne wpłaty + przedłużenia które mają amountPaid>0
                    const allPayments = [
                      ...(r.payments||[]).map(p=>({...p,_type:"payment"})),
                      ...(r.extensions||[]).filter(e=>(e.amountPaid||0)>0).map(e=>({
                        id:"ext-"+e.id, amount:e.amountPaid, date:e.paidDate||e.date||r.startDate,
                        doc:e.doc, _type:"extension", _extId:e.id,
                        _label:"Przedłużenie → "+e.newEndDate,
                        _due:e.amountDue||e.amount||0
                      }))
                    ].sort((a,b)=>b.date.localeCompare(a.date));

                    return <>
                      <div style={{fontSize:11,fontWeight:700,color:"#7A8FA6",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Płatność</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
                        {[{l:"Łącznie",v:totalAmount+" zł",c:"#1C2B3A"},{l:"Zapłacono",v:totalPaid+" zł",c:"#3DAA72"},{l:"Pozostało",v:remaining+" zł",c:remaining>0?"#E05C5C":"#3DAA72"}].map((x,i)=>(
                          <div key={i} style={{background:x.c==="#1C2B3A"?"#F2F5F7":x.c+"14",borderRadius:12,padding:"10px 8px",textAlign:"center",border:`1.5px solid ${x.c==="#1C2B3A"?"#E4EAF0":x.c+"30"}`}}>
                            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14,color:x.c}}>{x.v}</div>
                            <div style={{fontSize:11,color:"#7A8FA6",marginTop:2}}>{x.l}</div>
                          </div>
                        ))}
                      </div>
                      <PaymentForm rentalId={r.id} rentalAmount={totalAmount} amountPaid={totalPaid} patientName={r.patientName} equipment={r.equipment} setRentals={setRentals} setFinances={setFinances}/>
                      {allPayments.length>0&&<div style={{marginTop:14,paddingTop:12,borderTop:"1px solid #E4EAF0"}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#7A8FA6",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Historia wpłat</div>
                        {allPayments.map(p=>(
                          <div key={p.id} style={{padding:"10px 0",borderBottom:"1px solid #F2F5F7"}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                                <div style={{width:8,height:8,borderRadius:"50%",background:p._type==="extension"?"#7C6AF4":"#3DAA72",flexShrink:0}}/>
                                <div>
                                  <div style={{fontWeight:600,fontSize:14}}>{p.amount} zł{p._label&&<span style={{fontSize:12,color:"#7C6AF4",fontWeight:400,marginLeft:6}}>{p._label}</span>}</div>
                                  <div style={{fontSize:12,color:"#7A8FA6"}}>{p.date}{p._due>0&&p._due!==p.amount&&<span style={{marginLeft:6,color:"#F4A261"}}>należne: {p._due} zł</span>}</div>
                                </div>
                              </div>
                              <button onClick={()=>{
                                if(p._type==="payment"){
                                  setRentals(rs=>rs.map(x=>x.id===r.id?{...x,payments:(x.payments||[]).filter(q=>q.id!==p.id),amountPaid:Math.max(0,(x.amountPaid||0)-p.amount)}:x));
                                  setFinances(fs=>fs.filter(f=>f.sourceId!=="payment-"+p.id));
                                } else {
                                  // Usuń wpłatę za przedłużenie — zeruj amountPaid, zachowaj amountDue
                                  setRentals(rs=>rs.map(x=>x.id===r.id?{...x,extensions:(x.extensions||[]).map(e=>e.id===p._extId?{...e,amountPaid:0,paidDate:null,doc:null}:e)}:x));
                                  setFinances(fs=>fs.filter(f=>f.sourceId!=="extend-"+r.id+"-"+p._extId));
                                }
                              }} style={{background:"#FEE2E2",border:"none",borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:600,color:"#E05C5C",cursor:"pointer",fontFamily:"inherit"}}>Usuń</button>
                            </div>
                            <div style={{display:"flex",gap:8}}>
                              {[{k:"receipt",l:"🧾 Paragon"},{k:"invoice",l:"📄 Faktura"}].map(opt=>{
                                const ac=p.doc===opt.k;
                                const toggle=()=>{
                                  if(p._type==="payment"){
                                    setRentals(rs=>rs.map(x=>x.id===r.id?{...x,payments:(x.payments||[]).map(q=>q.id===p.id?{...q,doc:ac?null:opt.k}:q)}:x));
                                  } else {
                                    setRentals(rs=>rs.map(x=>x.id===r.id?{...x,extensions:(x.extensions||[]).map(e=>e.id===p._extId?{...e,doc:ac?null:opt.k}:e)}:x));
                                  }
                                };
                                return <button key={opt.k} onClick={toggle} style={{flex:1,padding:"7px 8px",borderRadius:10,fontFamily:"inherit",fontSize:12,fontWeight:600,cursor:"pointer",border:`1.5px solid ${ac?"#0A7C7C":"#E4EAF0"}`,background:ac?"#E6F4F4":"#fff",color:ac?"#0A7C7C":"#7A8FA6",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>{ac&&<span style={{fontSize:10}}>✓</span>}{opt.l}</button>;
                              })}
                            </div>
                          </div>
                        ))}
                      </div>}
                    </>;
                  })()}
                </div>
              </Card>

              {r.renewable&&(r.cycles||[]).length>0&&(()=>{
                const paid=(r.cycles||[]).filter(c=>c.paid);
                const total=paid.reduce((s,c)=>s+c.amount,0);
                const unpaidN=(r.cycles||[]).filter(c=>!c.paid).length;
                return <Card style={{marginBottom:10,background:"#E6F4F4",border:"1.5px solid #0A7C7C30"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#0A7C7C",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Podsumowanie wypożyczenia</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                    {[{l:"Mies. łącznie",v:paid.length,c:"#0A7C7C",suf:""},{l:"Łącznie wpłacono",v:total,c:"#3DAA72",suf:" zł"},{l:"Do opłacenia",v:unpaidN,c:unpaidN>0?"#E05C5C":"#3DAA72",suf:" mies."}].map((x,i)=>(
                      <div key={i} style={{background:"#fff",borderRadius:12,padding:"10px 8px",textAlign:"center",border:"1.5px solid #E4EAF0"}}>
                        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14,color:x.c}}>{x.v}{x.suf}</div>
                        <div style={{fontSize:11,color:"#7A8FA6",marginTop:2}}>{x.l}</div>
                      </div>
                    ))}
                  </div>
                </Card>;
              })()}

              {r.notes&&<Card style={{marginBottom:10,background:"#FFFBF5",border:"1.5px solid #F4A26130"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#F4A261",textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Notatki</div>
                <div style={{fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{r.notes}</div>
              </Card>}

              {r.status==="aktywne"&&<>
                {r.renewable&&<div style={{marginBottom:10}}>
                  <div style={{fontSize:12,color:"#7A8FA6",marginBottom:6,fontWeight:600}}>Data zakończenia wypożyczenia</div>
                  <Inp label="" value={closeDate||""} onChange={v=>setCloseDate(v)} type="date"/>
                </div>}
                <Btn style={{width:"100%",justifyContent:"center",marginBottom:10}} onClick={()=>{
                  const extTotal=(r.extensions||[]).reduce((s,e)=>s+(+e.amountDue||0),0);
                  const totalAmount=(+r.amount||0)+extTotal;
                  const paymentsPaid=(r.payments||[]).reduce((s,p)=>s+p.amount,0);
                  const extPaid=(r.extensions||[]).reduce((s,e)=>s+(+e.amountPaid||0),0);
                  const remaining=totalAmount-(paymentsPaid+extPaid);
                  if(r.renewable&&!closeDate){alert("Podaj datę zakończenia");return;}
                  if(remaining>0&&!window.confirm(`Pozostało ${remaining} zł do zapłaty. Zakończyć mimo to?`))return;
                  const endMonth=r.renewable&&closeDate?closeDate.slice(0,7):null;
                  setRentals(rs=>rs.map(x=>x.id===r.id?{...x,status:"zakończone",endDate:r.renewable?closeDate:x.endDate,
                    cycles:endMonth?((x.cycles||[]).filter(c=>c.paid||c.month<=endMonth)):x.cycles
                  }:x));
                  if(endMonth){
                    const toRemove=new Set((r.cycles||[]).filter(c=>!c.paid&&c.month>endMonth).map(c=>"cycle-"+r.id+"-"+c.month));
                    if(toRemove.size>0)setFinances(fs=>fs.filter(f=>!toRemove.has(f.sourceId)));
                  }
                  close();
                }}><Ico d={I.chk} s={16} c="#fff"/> Sprzęt zwrócony — zakończ</Btn>
              </>}
              {r.status==="zakończone"&&<Btn variant="secondary" style={{width:"100%",justifyContent:"center",marginBottom:10}} onClick={()=>setRentals(rs=>rs.map(x=>x.id===r.id?{...x,status:"aktywne"}:x))}>↩️ Cofnij zakończenie</Btn>}
              {!r.renewable&&(()=>{
                const lastExt=(r.extensions||[]).at(-1);
                const dtStart=r.startDate+"T"+(r.startTime||"10:00")+":00";
                const endDate=lastExt?lastExt.newEndDate:r.endDate;
                const endTime=lastExt?(lastExt.endTime||"10:00"):(r.endTime||"10:00");
                const dtEnd=endDate?""+endDate+"T"+endTime+":00":dtStart;
                const desc="Tel: "+(r.phone||"brak")+(r.address?"\nAdres: "+r.address:"")+(r.notes?"\nNotatki: "+r.notes:"");
                return <Btn variant="secondary" style={{width:"100%",justifyContent:"center",marginBottom:10}} onClick={()=>openGCal("Wypożyczenie \u2013 "+r.patientName+" ("+r.equipment+")", dtStart, dtEnd, desc, false)}>📅 Dodaj do kalendarza</Btn>;
              })()}
              <Btn variant="danger" style={{width:"100%",justifyContent:"center",marginTop:4}} onClick={()=>setConfirmDel(true)}>🗑️ Usuń wypożyczenie</Btn>
            </div>
          </div>

          {showEdit&&ef&&<Modal title="Edytuj wypożyczenie" onClose={()=>setShowEdit(false)}>
            <Sel label="Sprzęt" value={ef.equipment} onChange={v=>setEf(f=>({...f,equipment:v}))} options={EQUIPMENT.map(x=>({value:x,label:x}))}/>
            <PatientPicker label="Pacjent" value={ef.patientName} onChange={v=>setEf(f=>({...f,patientName:v}))} onSelect={p=>setEf(f=>({...f,patientName:p.name,phone:p.phone,address:p.address,patientId:p.id}))} patients={patients}/>
            <Inp label="Telefon" value={ef.phone||""} onChange={v=>setEf(f=>({...f,phone:v}))} type="tel"/>
            <Inp label="Adres" value={ef.address||""} onChange={v=>setEf(f=>({...f,address:v}))}/>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Typ</div>
              <div style={{display:"flex",gap:8}}>{[{v:false,l:"Jednorazowe"},{v:true,l:"Odnawialne"}].map(o=><button key={String(o.v)} onClick={()=>setEf(f=>({...f,renewable:o.v}))} style={{flex:1,padding:"10px 8px",borderRadius:12,border:`2px solid ${ef.renewable===o.v?"#0A7C7C":"#E4EAF0"}`,background:ef.renewable===o.v?"#E6F4F4":"#fff",color:ef.renewable===o.v?"#0A7C7C":"#7A8FA6",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{o.l}</button>)}</div>
            </div>
            <Inp label="Data od" value={ef.startDate} onChange={v=>setEf(f=>({...f,startDate:v}))} type="date"/>
            {!ef.allDay&&<TimeSel label="Godzina rozpoczęcia" value={ef.startTime||"10:00"} onChange={v=>setEf(f=>({...f,startTime:v}))}/>}
            {!ef.renewable&&<Inp label="Data do" value={ef.endDate||""} onChange={v=>setEf(f=>({...f,endDate:v}))} type="date"/>}
            {!ef.renewable&&!ef.allDay&&<TimeSel label="Godzina zakończenia" value={ef.endTime||"10:00"} onChange={v=>setEf(f=>({...f,endTime:v}))}/>}
            <div style={{marginBottom:14}}>
              <div style={{display:"flex",gap:8}}>{[{v:false,l:"⏰ Z godziną"},{v:true,l:"🗓 Całodniowe"}].map(o=><button key={String(o.v)} onClick={()=>setEf(f=>({...f,allDay:o.v}))} style={{flex:1,padding:"8px",borderRadius:10,border:`2px solid ${(ef.allDay||false)===o.v?"#0A7C7C":"#E4EAF0"}`,background:(ef.allDay||false)===o.v?"#E6F4F4":"#fff",color:(ef.allDay||false)===o.v?"#0A7C7C":"#7A8FA6",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{o.l}</button>)}</div>
            </div>
            <Inp label="Kwota (zł)" value={ef.amount} onChange={v=>setEf(f=>({...f,amount:v}))} type="number"/>
            <Inp label="Zapłacono (zł)" value={ef.amountPaid} onChange={v=>setEf(f=>({...f,amountPaid:v}))} type="number"/>
            <Inp label="Transport (zł)" value={ef.transport||""} onChange={v=>setEf(f=>({...f,transport:v}))} type="number" placeholder="0"/>
            <Txa label="Notatki" value={ef.notes||""} onChange={v=>setEf(f=>({...f,notes:v}))} rows={2}/>
            <Btn style={{width:"100%",justifyContent:"center"}} onClick={()=>{
              const raw=+ef.amount,pat=patients.find(p=>p.name===ef.patientName);
              const u={...ef,amount:raw,amountPaid:Math.min(+(ef.amountPaid||0),raw),patientId:pat?.id||ef.patientId||null};
              setRentals(rs=>rs.map(x=>x.id===detail?{...x,...u}:x));
              // Sync opisy finansów: normalne wpłaty + przedłużenia
              setFinances(fs=>fs.map(f=>{
                const cur=rentals.find(x=>x.id===detail);
                if(!cur)return f;
                const isPayment=(cur.payments||[]).some(p=>f.sourceId==="payment-"+p.id);
                const isExtension=f.sourceId&&f.sourceId.startsWith("extend-"+detail+"-");
                if(isPayment) return{...f,description:"Wypożyczenie – "+u.patientName+" ("+u.equipment+")"};
                if(isExtension) return{...f,description:"Przedłużenie – "+u.patientName+" ("+u.equipment+")"};
                return f;
              }));
              setShowEdit(false);setToast("Zmiany zapisane");
            }}>Zapisz zmiany</Btn>
          </Modal>}

          {showExtend&&<Modal title={extForm.editId!=null?"Edytuj przedłużenie":"Przedłuż wypożyczenie"} onClose={()=>setShowExtend(false)}>
            <div style={{fontSize:14,color:"#7A8FA6",marginBottom:14}}>{r.patientName} · {r.equipment}</div>
            {extForm.editId==null&&<div style={{marginBottom:12,padding:"10px 14px",background:"#F2F5F7",borderRadius:10,fontSize:13}}>
              <span style={{color:"#7A8FA6"}}>Aktualna data do: </span><span style={{fontWeight:700}}>{r.endDate}</span>
            </div>}
            <Inp label="Nowa data końca *" value={extForm.newEndDate} onChange={v=>setExtForm(f=>({...f,newEndDate:v}))} type="date"/>
            <TimeSel label="Godzina zakończenia" value={extForm.endTime||"10:00"} onChange={v=>setExtForm(f=>({...f,endTime:v}))}/>
            <Inp label="Kwota do zapłaty (zł)" value={extForm.amountDue||""} onChange={v=>setExtForm(f=>({...f,amountDue:v}))} type="number" placeholder="zostaw puste jeśli nieznana"/>
            <Inp label="Zapłacono (zł)" value={extForm.amountPaid||""} onChange={v=>setExtForm(f=>({...f,amountPaid:v}))} type="number" placeholder="0 = jeszcze nie zapłacił"/>

            <Btn disabled={!extForm.newEndDate} style={{width:"100%",justifyContent:"center"}} onClick={()=>{

                }:x));
                // Sync finansów — wpis dotyczy amountPaid
                const extSid="extend-"+r.id+"-"+extForm.editId;
                if(oldPaid>0&&paid>0) setFinances(fs=>fs.map(f=>f.sourceId===extSid?{...f,amount:paid,description:"Przedłużenie – "+r.patientName+" ("+r.equipment+")"}:f));
                else if(oldPaid>0&&paid===0) setFinances(fs=>fs.filter(f=>f.sourceId!==extSid));
                else if(oldPaid===0&&paid>0) setFinances(fs=>[{id:Date.now(),sourceId:extSid,date:extForm.payDate||todayLocal(),type:"przychód",category:"Wypożyczalnia",amount:paid,description:"Przedłużenie – "+r.patientName+" ("+r.equipment+")"},...(fs||[])]);
                setToast("Przedłużenie zaktualizowane");
              } else {
                const extId = Date.now();
                const ext={id:extId,prevEndDate:r.endDate,newEndDate:extForm.newEndDate,endTime:extForm.endTime||"10:00",amountDue:due,amountPaid:paid,notes:extForm.notes||"",date:todayLocal(),paidDate:paid>0?(extForm.payDate||todayLocal()):null};
                setRentals(rs=>rs.map(x=>x.id===r.id?{...x,endDate:extForm.newEndDate,extensions:[...(x.extensions||[]),ext]}:x));
                if(paid>0){
                  setFinances(fs=>[{id:Date.now()+1,sourceId:"extend-"+r.id+"-"+extId,date:extForm.payDate||todayLocal(),type:"przychód",category:"Wypożyczalnia",amount:paid,description:"Przedłużenie – "+r.patientName+" ("+r.equipment+")"},...(fs||[])]);
                }
                setToast("Przedłużono do "+extForm.newEndDate);
              }
              setShowExtend(false);
            }}>Zatwierdź</Btn>
          </Modal>}

          {confirmDel&&<Modal title="Usuń wypożyczenie" onClose={()=>setConfirmDel(false)}>

            <div style={{display:"flex",gap:10}}>
              <Btn variant="secondary" style={{flex:1,justifyContent:"center"}} onClick={()=>setConfirmDel(false)}>Anuluj</Btn>
              <Btn variant="danger" style={{flex:1,justifyContent:"center"}} onClick={()=>{const cur=rentals.find(x=>x.id===detail);if(cur){const pids=new Set((cur.payments||[]).map(p=>"payment-"+p.id));const cids=new Set((cur.cycles||[]).map(c=>"cycle-"+cur.id+"-"+c.month));setFinances(fs=>fs.filter(f=>!pids.has(f.sourceId)&&!cids.has(f.sourceId)&&!(f.sourceId&&f.sourceId.startsWith("extend-"+cur.id+"-"))));}setRentals(rs=>rs.filter(x=>x.id!==detail));setConfirmDel(false);close();}}>Usuń</Btn>
            </div>

      return <div>
        <div style={{padding:"28px 20px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
          <div style={{minWidth:0}}><div style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800}}>Wypożyczalnia</div><div style={{fontSize:13,color:"#7A8FA6"}}>{cnt.aktywne+cnt.odnawialne} aktywnych</div></div>
          <Btn small onClick={()=>{setForm(emptyRental());setShowAdd(true);}} style={{flexShrink:0}}><Ico d={I.plus} s={16} c="#fff"/> Nowe</Btn>
        </div>
        <div style={{display:"flex",gap:6,padding:"0 20px 16px"}}>
          {[{k:"aktywne",l:`Aktywne (${cnt.aktywne})`},{k:"odnawialne",l:`🔄 Odn. (${cnt.odnawialne})`},{k:"zakończone",l:`Zakończone (${cnt.zakończone})`}].map(x=>
            <button key={x.k} onClick={()=>setView(x.k)} style={{flex:1,padding:"8px 6px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:12,whiteSpace:"nowrap",background:view===x.k?"#0A7C7C":dk?"#1E3A3A":"#E4EAF0",color:view===x.k?"#fff":dk?"#5A8A8A":"#4A6070",fontFamily:"inherit",textAlign:"center"}}>{x.l}</button>
          )}
        </div>
        <StockPanel rentals={rentals} stock={stock} setStock={setStock}/>
        <div style={{padding:"0 20px"}}>
          {filt.length===0?<Empty text="Brak wypożyczeń w tej kategorii"/>:filt.map(r=><RCard key={r.id} r={r} onClick={()=>setDetail(r.id)}/>)}
        </div>
        {showAdd&&<Modal title="Nowe wypożyczenie" onClose={()=>setShowAdd(false)}>
          <Sel label="Sprzęt" value={form.equipment} onChange={v=>setForm(f=>({...f,equipment:v}))} options={EQUIPMENT.map(x=>({value:x,label:x}))}/>
          <PatientPicker label="Pacjent *" value={form.patientName} onChange={v=>setForm(f=>({...f,patientName:v}))} onSelect={p=>setForm(f=>({...f,patientName:p.name,phone:p.phone,address:p.address,patientId:p.id}))} patients={patients}/>
          <Inp label="Telefon" value={form.phone} onChange={v=>setForm(f=>({...f,phone:v}))} type="tel"/>
          <Inp label="Adres" value={form.address} onChange={v=>setForm(f=>({...f,address:v}))}/>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Typ</div>
            <div style={{display:"flex",gap:8}}>{[{v:false,l:"Jednorazowe"},{v:true,l:"🔄 Odnawialne miesięcznie"}].map(o=><button key={String(o.v)} onClick={()=>setForm(f=>({...f,renewable:o.v,endDate:o.v?"":f.endDate}))} style={{flex:1,padding:"10px 8px",borderRadius:12,border:`2px solid ${form.renewable===o.v?"#0A7C7C":"#E4EAF0"}`,background:form.renewable===o.v?"#E6F4F4":"#fff",color:form.renewable===o.v?"#0A7C7C":"#7A8FA6",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{o.l}</button>)}</div>
          </div>
          <Inp label="Data od" value={form.startDate} onChange={v=>setForm(f=>({...f,startDate:v}))} type="date"/>
          {!form.allDay&&<TimeSel label="Godzina rozpoczęcia" value={form.startTime||"10:00"} onChange={v=>setForm(f=>({...f,startTime:v}))}/>}
          {!form.renewable&&<Inp label="Data do" value={form.endDate} onChange={v=>setForm(f=>({...f,endDate:v}))} type="date"/>}
          {!form.renewable&&!form.allDay&&<TimeSel label="Godzina zakończenia" value={form.endTime||"10:00"} onChange={v=>setForm(f=>({...f,endTime:v}))}/>}
          <div style={{marginBottom:14}}>
            <div style={{display:"flex",gap:8}}>{[{v:false,l:"⏰ Z godziną"},{v:true,l:"🗓 Całodniowe"}].map(o=><button key={String(o.v)} onClick={()=>setForm(f=>({...f,allDay:o.v}))} style={{flex:1,padding:"8px",borderRadius:10,border:`2px solid ${(form.allDay||false)===o.v?"#0A7C7C":"#E4EAF0"}`,background:(form.allDay||false)===o.v?"#E6F4F4":"#fff",color:(form.allDay||false)===o.v?"#0A7C7C":"#7A8FA6",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{o.l}</button>)}</div>
          </div>
          <Inp label="Kwota (zł)" value={form.amount} onChange={v=>setForm(f=>({...f,amount:v}))} type="number" placeholder="400"/>
          {!form.renewable&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Inp label="Zapłacono (zł)" value={form.amountPaid} onChange={v=>setForm(f=>({...f,amountPaid:v}))} type="number" placeholder="0"/>
            <div style={{marginBottom:14}}><div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>Pozostało</div><div style={{padding:"11px 14px",border:"1.5px solid #E4EAF0",borderRadius:12,fontSize:15,background:"#F2F5F7",color:(+form.amount-(+form.amountPaid||0))>0?"#E05C5C":"#3DAA72",fontWeight:700}}>{form.amount?(+form.amount-(+form.amountPaid||0))+" zł":"—"}</div></div>
          </div>}
          <Inp label="Transport (zł)" value={form.transport||""} onChange={v=>setForm(f=>({...f,transport:v}))} type="number" placeholder="0"/>
          <Txa label="Notatki" value={form.notes} onChange={v=>setForm(f=>({...f,notes:v}))} rows={2}/>
          <Btn disabled={!form.patientName} style={{width:"100%",justifyContent:"center"}} onClick={()=>{
            if(!form.patientName)return;
            if(!form.patientName)return;
            const pid=Date.now(),rid=Date.now()+1,paid=form.renewable?0:+(form.amountPaid||0);
            const pat=patients.find(p=>p.name===form.patientName);
            const nr={...form,id:rid,patientId:pat?.id||null,amount:+form.amount,amountPaid:paid,payments:paid>0?[{id:pid,amount:paid,date:form.startDate}]:[],cycles:[],status:"aktywne"};
            setRentals(r=>[nr,...r]);
            if(paid>0)setFinances(fs=>[{id:Date.now()+Math.random(),sourceId:"payment-"+pid,date:form.startDate,type:"przychód",category:"Wypożyczalnia",amount:paid,description:"Wypożyczenie – "+form.patientName+" ("+form.equipment+")"},...fs]);
            setShowAdd(false);setToast("Wypożyczenie dodane");
          }}>Zapisz wypożyczenie</Btn>
        </Modal>}
        {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      </div>;
    }

    function StatsPanel({visits}) {
      const sm=todayLocal().slice(0,7);
      const mVisits=visits.filter(v=>v.date&&v.date.startsWith(sm));
      const mDone=mVisits.filter(v=>visitStatus(v)==="zakończona");
      const avgPrice=mDone.length?Math.round(mDone.reduce((s,v)=>s+(+v.price||0),0)/mDone.length):0;
      const patCounts={};mDone.forEach(v=>{patCounts[v.patientName]=(patCounts[v.patientName]||0)+1;});
      const topPat=Object.entries(patCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
      const typeCounts={};mDone.forEach(v=>{typeCounts[v.type]=(typeCounts[v.type]||0)+1;});
      const topTypes=Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]);
      return <>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:700,marginBottom:10,color:"#7A8FA6",textTransform:"capitalize"}}>{new Date(sm+"-15").toLocaleDateString("pl-PL",{month:"long",year:"numeric"})}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
          {[{l:"Wizyty łącznie",v:mVisits.length,c:"#0A7C7C"},{l:"Zakończone",v:mDone.length,c:"#3DAA72"},{l:"Średnia cena",v:avgPrice+" zł",c:"#7C6AF4"},{l:"Zaplanowane",v:mVisits.length-mDone.length,c:"#F4A261"}].map((x,i)=>(
            <div key={i} style={{background:x.c+"14",borderRadius:14,padding:"12px 10px",textAlign:"center",border:`1.5px solid ${x.c}30`}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,color:x.c}}>{x.v}</div>
              <div style={{fontSize:11,color:"#7A8FA6",marginTop:2}}>{x.l}</div>
            </div>
          ))}
        </div>
        {topPat.length>0&&<>
          <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>Najczęstsi pacjenci</div>
          {topPat.map(([name,cnt])=><div key={name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #F2F5F7"}}>
            <span style={{fontSize:14,fontWeight:500}}>{name}</span><Badge color="#0A7C7C">{cnt} {cnt===1?"wizyta":"wizyty"}</Badge>
          </div>)}
        </>}
        {topTypes.length>0&&<>
          <div style={{fontWeight:700,fontSize:14,marginBottom:8,marginTop:16}}>Rodzaje wizyt</div>
          {topTypes.map(([type,cnt])=><div key={type} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #F2F5F7"}}>
            <span style={{fontSize:14,fontWeight:500}}>{type}</span><Badge color="#7C6AF4">{cnt}</Badge>
          </div>)}

        {mVisits.length===0&&<Empty text="Brak wizyt w tym miesiącu"/>}
      </>;
    }

    // ── FINANCES ──────────────────────────────────────────────────────────────

    function Finances({finances,setFinances,visits,setVisits,rentals,setRentals,nfzCases,setNfzCases,budget,setBudget,desk,anthropicKey}) {
      const demo=useDemo();
      const dk=useContext(DarkCtx);
      const [showAdd,setShowAdd]=useState(false);
      const [editE,setEditE]=useState(null);
      const [viewMode,setViewMode]=useState("month");
      const [month,setMonth]=useState(()=>todayLocal().slice(0,7));
      const [year,setYear]=useState(()=>todayLocal().slice(0,4));
      const [weekStart,setWeekStart]=useState(()=>{const d=new Date();const day=d.getDay()||7;d.setDate(d.getDate()-day+1);return d.toISOString().slice(0,10);});
      const [rangeFrom,setRangeFrom]=useState(()=>todayLocal().slice(0,7)+"-01");
      const [rangeTo,setRangeTo]=useState(()=>todayLocal());
      const [toast,setToast]=useState(null);
      const cats=["Wizyta","Wypożyczalnia","Wózek","Inne"];
      const ef=()=>({date:todayLocal(),category:"Wizyta",amount:"",description:""});
      const [form,setForm]=useState(ef);

      const weekEnd=useMemo(()=>{const d=new Date(weekStart);d.setDate(d.getDate()+6);return d.toISOString().slice(0,10);},[weekStart]);

      // visitMap: sourceId -> actual visit date
      const visitMap=useMemo(()=>{
        const m={};
        (visits||[]).forEach(v=>{if(v.id)m["visit-"+v.id]=v.date;});
        return m;
      },[visits]);

      const inPeriod=(date)=>{
        if(!date)return false;
        if(viewMode==="month")return date.startsWith(month);
        if(viewMode==="week")return date>=weekStart&&date<=weekEnd;
        if(viewMode==="range")return date>=rangeFrom&&date<=rangeTo;
        return date.startsWith(year);
      };
      const inPrevPeriod=(date)=>{
        if(!date)return false;
        if(viewMode==="month"){const d=new Date(month+"-15");d.setMonth(d.getMonth()-1);return date.startsWith(d.toISOString().slice(0,7));}
        if(viewMode==="week"){const ps=new Date(weekStart);ps.setDate(ps.getDate()-7);const pe=new Date(weekEnd);pe.setDate(pe.getDate()-7);return date>=ps.toISOString().slice(0,10)&&date<=pe.toISOString().slice(0,10);}
        if(viewMode==="range")return false;
        return date.startsWith(String(+year-1));
      };

      const inc=useMemo(()=>finances.filter(f=>{
        if(f.type!=="przychód")return false;
        const d=(f.sourceId||"").startsWith("visit-")?(visitMap[f.sourceId]||f.date):f.date;
        return inPeriod(d);
      }).reduce((s,f)=>s+(+f.amount||0),0),[finances,visits,visitMap,viewMode,month,year,weekStart,weekEnd,rangeFrom,rangeTo]);
      const prevInc=useMemo(()=>finances.filter(f=>{
        if(f.type!=="przychód")return false;
        const d=(f.sourceId||"").startsWith("visit-")?(visitMap[f.sourceId]||f.date):f.date;
        return inPrevPeriod(d);
      }).reduce((s,f)=>s+(+f.amount||0),0),[finances,visits,visitMap,viewMode,month,year,weekStart,weekEnd,rangeFrom,rangeTo]);
      const diff=prevInc>0?Math.round((inc-prevInc)/prevInc*100):null; // prevInc still from finances for comparison
      // ── SPÓJNA LOGIKA FILTROWANIA ────────────────────────────────────────────
      // Reguła: dla wpisów visit-* data = visits[id].date (aktualna data wizyty)
      //         dla reszty (payment, cycle, extend, wozek) = f.date z finances
      // visitMap już zbudowany wyżej

      // Wizyty w okresie (źródło: visits)
      const periodVisits=useMemo(()=>(visits||[]).filter(v=>inPeriod(v.date)&&v.status!=="anulowana"&&visitStatus(v)==="zakończona"),[visits,viewMode,month,year,weekStart,weekEnd,rangeFrom,rangeTo]);
      const visitCount=periodVisits.length;
      const visitAvg=visitCount>0?periodVisits.reduce((s,v)=>s+(+v.price||0),0)/visitCount:0;

      // Finanse nie-wizytowe w okresie (payment, cycle, extend, wozek, ręczne)
      const periodNonVisitFinances=useMemo(()=>finances.filter(f=>{
        if(f.type!=="przychód")return false;
        if((f.sourceId||"").startsWith("visit-"))return false; // wizyty liczymy z visits
        return inPeriod(f.date);
      }),[finances,viewMode,month,year,weekStart,weekEnd,rangeFrom,rangeTo]);

      // Łączny przychód: wizyty (z visits.price) + reszta (z finances)
      // inc już wyliczony wyżej przez finances — nadpisujemy spójnie
      const incVisits=periodVisits.reduce((s,v)=>s+(+v.price||0),0);
      const incOther=periodNonVisitFinances.reduce((s,f)=>s+(+f.amount||0),0);
      const incTotal=incVisits+incOther;

      // Kategorie
      const catBreakdown=useMemo(()=>{
        const map={Wizyta:incVisits,Wypożyczalnia:0,Wózek:0,Inne:0};
        periodNonVisitFinances.forEach(f=>{
          const c=f.category||"Inne";
          if(map[c]!==undefined)map[c]+=+f.amount||0;
          else map["Inne"]+=+f.amount||0;
        });
        const colors={Wizyta:"#0A7C7C",Wypożyczalnia:"#2E86AB",Wózek:"#7B4FBF",Inne:"#7A8FA6"};
        return Object.entries(map).filter(([,v])=>v>0).map(([k,v])=>({label:k,v,color:colors[k]||"#7A8FA6"}));
      },[periodVisits,periodNonVisitFinances,incVisits]);

      // Pacjenci (źródło: visits)
      const topPats=useMemo(()=>{
        const map={};const cnt={};
        periodVisits.forEach(v=>{
          const name=v.patientName||"Nieznany";
          if(name==="Nieznany")return;
          cnt[name]=(cnt[name]||0)+1;
          map[name]=(map[name]||0)+(+v.price||0);
        });
        return Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([n,c])=>([n,map[n]||0,c]));
      },[periodVisits]);

      // Lista wpisów: wizyty z visits + reszta z finances
      const listEntries=useMemo(()=>{
        const visitRows=periodVisits.map(v=>({
          id:"v-"+v.id,sourceId:"visit-"+v.id,date:v.date,
          category:"Wizyta",amount:v.price||0,
          description:"Wizyta – "+v.patientName,type:"przychód"
        }));
        const otherRows=periodNonVisitFinances;
        return [...visitRows,...otherRows].sort((a,b)=>b.date.localeCompare(a.date));
      },[periodVisits,periodNonVisitFinances]);

      const months=useMemo(()=>{const c=todayLocal().slice(0,7),s=new Set([c]);finances.forEach(f=>{if(f.date)s.add(f.date.slice(0,7));});return Array.from(s).sort((a,b)=>b.localeCompare(a));},[finances]);
      const years=useMemo(()=>{const c=todayLocal().slice(0,4),s=new Set([c]);finances.forEach(f=>{if(f.date)s.add(f.date.slice(0,4));});return Array.from(s).sort((a,b)=>b.localeCompare(a));},[finances]);

      const deleteWithSource=(entry)=>{
        const sid=entry.sourceId;
        if(!sid){setFinances(fs=>fs.filter(f=>f.id!==entry.id));return;}
        if(sid.startsWith("visit-")){const vid=+sid.replace("visit-","");setVisits(vs=>vs.filter(v=>+v.id!==vid));}
        else if(sid.startsWith("payment-")){const pid=+sid.replace("payment-","");setRentals(rs=>rs.map(r=>{const found=(r.payments||[]).find(p=>+p.id===pid);if(!found)return r;return{...r,payments:(r.payments||[]).filter(p=>+p.id!==pid),amountPaid:Math.max(0,(r.amountPaid||0)-found.amount)};}));}
        else if(sid.startsWith("extend-")){const rest=sid.slice(7);const di=rest.indexOf("-");const rid=+rest.slice(0,di);const eid=+rest.slice(di+1);setRentals(rs=>rs.map(r=>+r.id!==rid?r:{...r,extensions:(r.extensions||[]).map(e=>+e.id===eid?{...e,amountPaid:0,paidDate:null}:e)}));}
        else if(sid.startsWith("cycle-")){const rest=sid.slice(6);const di=rest.indexOf("-");const rid=+rest.slice(0,di);const mo=rest.slice(di+1);setRentals(rs=>rs.map(r=>+r.id!==rid?r:{...r,cycles:(r.cycles||[]).map(c=>c.month===mo?{...c,paid:false,paidDate:null}:c)}));}
        else if(sid.startsWith("wozek-")){const cid=+sid.replace("wozek-","");setNfzCases(cs=>(cs||[]).map(c=>+c.id===cid?{...c,realized:false}:c));}
        setFinances(fs=>fs.filter(f=>f.id!==entry.id));
      };

      const bg2=dk?"#1A2A2A":"#fff";
      const border=dk?"#2A4040":"#E4EAF0";
      const sub="#7A8FA6";

            </div>}

            {viewMode!=="budget"&&<>
              <div style={{background:bg2,borderRadius:16,padding:"16px",marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                  <div>
                    <div style={{fontSize:11,color:sub,fontWeight:600,textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>Przychód</div>
                    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:28,color:"#3DAA72",lineHeight:1}}>{demo?"****":incTotal.toFixed(2)} zł</div>
                    {visitCount>0&&<div style={{fontSize:12,color:sub,marginTop:6}}>{visitCount} {visitCount===1?"wizyta":visitCount<5?"wizyty":"wizyt"} · śr. <b style={{color:dk?"#C8E8E8":"#1C2B3A"}}>{demo?"**":Math.round(visitAvg)} zł</b></div>}
                  </div>
                  {diff!==null&&<div style={{background:diff>=0?"#3DAA7220":"#E05C5C20",borderRadius:10,padding:"6px 10px",textAlign:"center"}}>
                    <div style={{fontWeight:700,fontSize:14,color:diff>=0?"#3DAA72":"#E05C5C"}}>{diff>=0?"+":""}{diff}%</div>
                    <div style={{fontSize:10,color:sub}}>vs poprz.</div>
                  </div>}
                </div>

              </div>

              {catBreakdown.length>0&&<div style={{background:bg2,borderRadius:16,padding:"16px",marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
                <div style={{fontSize:11,fontWeight:700,color:sub,textTransform:"uppercase",letterSpacing:.5,marginBottom:12}}>Kategorie</div>
                {catBreakdown.map(c=>{
                  const pct=inc>0?(c.v/inc*100):0;
                  return <div key={c.label} style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{fontSize:13,fontWeight:600,color:dk?"#C8E8E8":"#1C2B3A"}}>{c.label}</span>
                      <span style={{fontSize:13,color:sub}}>{demo?"****":c.v.toFixed(2)} zł <span style={{color:c.color,fontWeight:700}}>({pct.toFixed(0)}%)</span></span>
                    </div>
                    <div style={{height:7,borderRadius:4,background:dk?"#2A4040":"#F0F4F8"}}>
                      <div style={{height:"100%",width:pct+"%",background:c.color,borderRadius:4,transition:"width .3s"}}/>
                    </div>
                  </div>;
                })}
              </div>}

              {topPats.length>0&&<div style={{background:bg2,borderRadius:16,padding:"16px",marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
                <div style={{fontSize:11,fontWeight:700,color:sub,textTransform:"uppercase",letterSpacing:.5,marginBottom:12}}>Pacjenci</div>
                {topPats.map(([name,v,c],i)=>(
                  <div key={name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:i<topPats.length-1?`1px solid ${border}`:"none"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:22,height:22,borderRadius:7,background:"#0A7C7C20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#0A7C7C"}}>{i+1}</div>
                      <div>
                        <div style={{fontSize:13,fontWeight:600,color:dk?"#C8E8E8":"#1C2B3A"}}>{demo?"Pacjent "+String.fromCharCode(65+i):name}</div>
                        <div style={{fontSize:11,color:sub}}>{c} {c===1?"wizyta":c<5?"wizyty":"wizyt"}</div>
                      </div>
                    </div>
                    <span style={{fontSize:13,fontWeight:700,color:"#3DAA72"}}>{demo?"****":v.toFixed(2)} zł</span>
                  </div>
                ))}
              </div>}

              <div style={{fontSize:11,fontWeight:700,color:sub,textTransform:"uppercase",letterSpacing:.5,margin:"16px 0 8px"}}>Wpisy</div>
              {listEntries.length===0&&<Empty text="Brak przychodów w tym okresie"/>}
              {listEntries.map(f=>(
                <Card key={f.id} onClick={()=>setEditE({...f,amount:String(f.amount)})}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{minWidth:0,flex:1}}>
                      <div style={{fontWeight:600,fontSize:14,color:dk?"#E8F5F5":"#1C2B3A"}}>{demo?f.category:f.description||f.category}</div>
                      <div style={{fontSize:12,color:sub,marginTop:2,display:"flex",alignItems:"center",gap:6}}>{f.date} · <Badge color={catColors[f.category]||"#7A8FA6"}>{f.category}</Badge></div>
                    </div>
                    <span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:16,color:"#3DAA72",marginLeft:8,flexShrink:0}}>+{demo?"****":f.amount} zł</span>
                  </div>
                </Card>
              ))}
            </>}

          </div>
        </div>

        {showAdd&&<Modal title="Nowy przychód" onClose={()=>setShowAdd(false)}>
          <Sel label="Kategoria" value={form.category} onChange={v=>setForm(f=>({...f,category:v}))} options={cats.map(c=>({value:c,label:c}))}/>
          <Inp label="Kwota (zł) *" value={form.amount} onChange={v=>setForm(f=>({...f,amount:v}))} type="number" placeholder="150"/>
          <Inp label="Opis" value={form.description} onChange={v=>setForm(f=>({...f,description:v}))} placeholder="np. wizyta u Jana Kowalskiego"/>
          <Inp label="Data" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))} type="date"/>
          <Btn disabled={!form.amount} style={{width:"100%",justifyContent:"center"}} onClick={()=>{if(!form.amount)return;setFinances(fs=>[{...form,id:Date.now(),type:"przychód",amount:+form.amount},...fs]);setForm(ef());setShowAdd(false);setToast("Wpis dodany");}}>Zapisz</Btn>
        </Modal>}

        {editE&&<Modal title="Edytuj wpis" onClose={()=>setEditE(null)}>
          <Sel label="Kategoria" value={editE.category||"Wizyta"} onChange={v=>setEditE(f=>({...f,category:v}))} options={cats.map(c=>({value:c,label:c}))}/>
          <Inp label="Kwota (zł)" value={editE.amount} onChange={v=>setEditE(f=>({...f,amount:v}))} type="number"/>
          <Inp label="Opis" value={editE.description||""} onChange={v=>setEditE(f=>({...f,description:v}))}/>
          <Inp label="Data" value={editE.date} onChange={v=>setEditE(f=>({...f,date:v}))} type="date"/>
          <Btn style={{width:"100%",justifyContent:"center",marginBottom:8}} onClick={()=>{setFinances(fs=>fs.map(f=>f.id===editE.id?{...f,...editE,amount:+editE.amount}:f));setEditE(null);setToast("Zmiany zapisane");}}>Zapisz zmiany</Btn>
          <Btn variant="danger" style={{width:"100%",justifyContent:"center"}} onClick={()=>{deleteWithSource(editE);setEditE(null);}}>🗑️ Usuń wpis</Btn>
        </Modal>}
        {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
