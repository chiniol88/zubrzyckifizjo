    // ── RECEIPT SCANNER ───────────────────────────────────────────────────────
    function ReceiptScanner({onClose,onConfirm,expCats,incCats,memory,setMemory,selMonth,existingExpenses,anthropicKey}) {
      const dk=useContext(DarkCtx);
      const bg2=dk?"#1A2A2A":"#fff";
      const border=dk?"#2A4040":"#E4EAF0";
      const sub="#7A8FA6";

      const [images,setImages]=useState([]); // base64 strings
      const [step,setStep]=useState("upload"); // upload | analyzing | review | done
      const [items,setItems]=useState([]); // {id, name, amount, cat, subcat, confidence, discount, isDiscount}
      const [receiptDate,setReceiptDate]=useState(selMonth+"-01");
      const [receiptTotal,setReceiptTotal]=useState("");
      const [aiError,setAiError]=useState(null);
      const [dupWarning,setDupWarning]=useState(false);

      const allExpCatNames=expCats.flatMap(c=>[c.name,...(c.subs||[]).map(s=>c.name+"/"+s)]);

      const addImage=(e)=>{
        const files=Array.from(e.target.files);
        files.forEach(file=>{
          const reader=new FileReader();
          reader.onload=ev=>{
            const b64=ev.target.result.split(",")[1];
            setImages(prev=>[...prev,{b64,mime:file.type,preview:ev.target.result}]);
          };
          reader.readAsDataURL(file);
        });
      };

      const removeImage=(i)=>setImages(prev=>prev.filter((_,j)=>j!==i));

      const analyze=async()=>{
        if(!images.length)return;
        setStep("analyzing");
        setAiError(null);

        const memoryHints=Object.entries(memory||{}).slice(0,40).map(([k,v])=>`"${k}" => "${v}"`).join(", ");
        const catList=allExpCatNames.join(", ");

        const prompt=`Jesteś asystentem do analizy paragonów. Przeanalizuj paragon(y) na zdjęciach.

Dostępne kategorie kosztów: ${catList}
${memoryHints?`Zapamiętane przypisania produktów: ${memoryHints}`:""}

Zwróć TYLKO JSON (bez markdown) w formacie:
{
  "date": "YYYY-MM-DD lub null jeśli nieczytelna",
  "total": liczba (suma z paragonu, pole SUMA/RAZEM/DO ZAPŁATY),
  "items": [
    {
      "name": "nazwa z paragonu",
      "amount": liczba (kwota po rabacie),
      "cat": "kategoria z listy lub null",
      "subcat": "podkategoria lub null",
      "confidence": "high|medium|low",
      "isDiscount": false,
      "discountApplied": liczba lub 0
    }
  ],
  "unreadable": ["linia której nie mogłem odczytać"]
}

Zasady:
- Jeśli pozycja to rabat/promocja/zniżka: isDiscount=true, amount=wartość rabatu (ujemna liczba), odejmij od poprzedniej pozycji
- Nie wliczaj linii z VAT, numerem NIP, adresem sklepu, podsumowaniami
- Dla pozycji ilość×cena: amount = wynik mnożenia
- Jeśli nie możesz przypisać kategorii: cat=null
- Data: szukaj formatu DD.MM.YYYY lub DD-MM-YYYY na paragonie`;

        try {
          const content=[
            {type:"text",text:prompt},
            ...images.map(img=>({type:"image",source:{type:"base64",media_type:img.mime,data:img.b64}}))
          ];

          if(!anthropicKey){setAiError("Brak klucza API — dodaj go w Ustawieniach");setStep("upload");return;}
          const resp=await fetch("https://api.anthropic.com/v1/messages",{
            method:"POST",
            headers:{"Content-Type":"application/json","x-api-key":anthropicKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
            body:JSON.stringify({
              model:"claude-sonnet-4-20250514",
              max_tokens:4000,
              messages:[{role:"user",content}]
            })
          });

          const data=await resp.json();
          const text=data.content?.[0]?.text||"";
          const clean=text.replace(/```json|```/g,"").trim();
          let parsed;
          try {
            parsed=JSON.parse(clean);
          } catch(pe) {
            setAiError("Błąd parsowania odpowiedzi AI. Spróbuj z lepszym zdjęciem lub poczekaj chwilę i spróbuj ponownie.");
            setStep("upload");
            return;
          }

          // Build items list
          const newItems=(parsed.items||[]).filter(i=>!i.isDiscount).map((i,idx)=>({
            id:idx,
            name:i.name||"?",
            amount:Math.max(0,+i.amount||0),
            cat:i.cat||null,
            subcat:i.subcat||null,
            confidence:i.confidence||"low",
            discountApplied:i.discountApplied||0,
            unreadable:false
          }));

          // Add unreadable items
          (parsed.unreadable||[]).forEach((line,idx)=>{
            newItems.push({id:1000+idx,name:line,amount:0,cat:null,subcat:null,confidence:"low",unreadable:true});
          });

          setItems(newItems);
          if(parsed.date)setReceiptDate(parsed.date);
          if(parsed.total)setReceiptTotal(String(parsed.total));

          // Check duplicate
          const day=parsed.date||receiptDate;
          const sameDayTotal=existingExpenses.filter(e=>e.date===day).reduce((s,e)=>s+(+e.amount||0),0);
          if(parsed.total&&sameDayTotal>0)setDupWarning(true);

          setStep("review");
        } catch(err) {
          setAiError("Błąd analizy: "+err.message);
          setStep("upload");
        }
      };

      const updateItem=(id,field,val)=>{
        setItems(prev=>prev.map(i=>i.id===id?{...i,[field]:val}:i));
      };
      const removeItem=(id)=>setItems(prev=>prev.filter(i=>i.id!==id));
      const addItem=()=>setItems(prev=>[...prev,{id:Date.now(),name:"",amount:0,cat:null,subcat:null,confidence:"high",unreadable:false,discountApplied:0}]);

      const itemsSum=items.reduce((s,i)=>s+(+i.amount||0),0);
      const totalNum=+receiptTotal||0;
      const diff=totalNum>0?Math.abs(itemsSum-totalNum):0;
      const diffOk=diff<=0.05;

      const confirm=()=>{
        // Group by cat/subcat
        const groups={};
        items.forEach(i=>{
          if(!i.amount||!i.cat)return;
          const key=(i.cat+(i.subcat?"/"+i.subcat:""));
          groups[key]=(groups[key]||{cat:i.cat,subcat:i.subcat||"",total:0});
          groups[key].total+=(+i.amount||0);
        });

        // Save memory — only high/medium confidence corrections
        const newMem={...memory};
        items.forEach(i=>{
          if(i.cat&&i.name&&i.name!=="?")newMem[i.name.toUpperCase()]=i.cat+(i.subcat?"/"+i.subcat:"");
        });
        setMemory(newMem);

        const store=Object.values(groups)
          .filter(g=>g.total>0)
          .map(g=>({
            id:Date.now()+Math.random(),
            cat:g.cat,subcat:g.subcat,
            desc:"Paragon "+receiptDate,
            amount:Math.round(g.total*100)/100,
            date:receiptDate
          }));

        onConfirm(store,receiptDate);
      };

      const catOptions=(type)=>{
        const cats=type==="exp"?expCats:incCats;
        const opts=[{value:"",label:"— wybierz —"}];
        cats.forEach(c=>{
          opts.push({value:c.name,label:c.name});
          (c.subs||[]).forEach(s=>opts.push({value:c.name+"/"+s,label:"  ↳ "+s}));
        });
        return opts;
      };

      const inputStyle={padding:"6px 10px",borderRadius:8,border:`1.5px solid ${border}`,background:dk?"#0F1F1F":"#FAFCFD",color:dk?"#E8F5F5":"#1C2B3A",fontSize:13,fontFamily:"inherit",width:"100%"};

      return <Modal title="📷 Skanuj paragon" onClose={onClose}>
        {step==="upload"&&<>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:13,color:sub,marginBottom:10}}>Dodaj zdjęcie(a) paragonu. Możesz dodać kilka dla długich paragonów.</div>
            <label style={{display:"block",border:`2px dashed ${border}`,borderRadius:12,padding:"20px",textAlign:"center",cursor:"pointer",background:dk?"#0F1F1F":"#F7FAFA"}}>
              <div style={{fontSize:24,marginBottom:4}}>📷</div>
              <div style={{fontSize:13,fontWeight:600,color:"#0A7C7C"}}>Dodaj zdjęcie</div>
              <div style={{fontSize:11,color:sub,marginTop:2}}>lub kilka zdjęć naraz</div>
              <input type="file" accept="image/*" multiple capture="environment" onChange={addImage} style={{display:"none"}}/>
            </label>
          </div>
          {images.length>0&&<>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
              {images.map((img,i)=><div key={i} style={{position:"relative",width:70,height:70}}>
                <img src={img.preview} style={{width:70,height:70,objectFit:"cover",borderRadius:8,border:`1px solid ${border}`}}/>
                <button onClick={()=>removeImage(i)} style={{position:"absolute",top:-6,right:-6,width:20,height:20,borderRadius:10,background:"#E05C5C",color:"#fff",border:"none",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>×</button>
              </div>)}
            </div>
            <Btn style={{width:"100%",justifyContent:"center"}} onClick={analyze}>Analizuj paragon{images.length>1?"y":""}</Btn>
          </>}
          {aiError&&<div style={{color:"#E05C5C",fontSize:13,marginTop:8,padding:"10px 12px",background:"#FEE2E2",borderRadius:10}}>{aiError}</div>}
        </>}

        {step==="analyzing"&&<div style={{textAlign:"center",padding:"40px 20px"}}>
          <div style={{fontSize:32,marginBottom:12}}>🔍</div>
          <div style={{fontWeight:600,fontSize:15,marginBottom:6}}>Analizuję paragon...</div>
          <div style={{fontSize:13,color:sub}}>Rozpoznaję pozycje i przypisuję kategorie</div>
        </div>}

        {step==="review"&&<>
          {dupWarning&&<div style={{background:"#FEF3C7",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:13,color:"#92400E"}}>
            ⚠️ W tym dniu masz już wpisy kosztów. Możliwy duplikat — sprawdź.
          </div>}

          <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:11,color:sub,fontWeight:600,marginBottom:3}}>DATA PARAGONU</div>
              <input type="date" value={receiptDate} onChange={e=>setReceiptDate(e.target.value)} style={inputStyle}/>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:11,color:sub,fontWeight:600,marginBottom:3}}>KWOTA Z PARAGONU</div>
              <input type="number" value={receiptTotal} onChange={e=>setReceiptTotal(e.target.value)} placeholder="0.00" style={inputStyle}/>
            </div>
          </div>

          <div style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div style={{fontSize:11,color:sub,fontWeight:600}}>POZYCJE ({items.length})</div>
              <button onClick={addItem} style={{background:"#0A7C7C",color:"#fff",border:"none",borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+ Dodaj</button>
            </div>
            {items.map(item=>(
              <div key={item.id} style={{background:item.unreadable?(dk?"#2A1A1A":"#FFF5F5"):(item.cat?( dk?"#0F1F1F":"#F7FAF9"):(dk?"#1A1A2A":"#F5F5FF")),borderRadius:10,padding:"10px 12px",marginBottom:6,border:`1px solid ${item.unreadable?"#E05C5C":item.cat?border:"#A78BFA"}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:6}}>
                  <div style={{flex:1}}>
                    <input value={item.name} onChange={e=>updateItem(item.id,"name",e.target.value)} style={{width:"100%",padding:"4px 8px",borderRadius:7,border:`1px solid ${border}`,background:"transparent",color:dk?"#E8F5F5":"#1C2B3A",fontSize:12,fontWeight:600,fontFamily:"inherit"}}/>
                    {item.discountApplied>0&&<div style={{fontSize:10,color:"#3DAA72"}}>rabat: -{item.discountApplied.toFixed(2)} zł</div>}
                    {item.unreadable&&<div style={{fontSize:10,color:"#E05C5C"}}>⚠️ Nieodczytana pozycja — wpisz kwotę ręcznie</div>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <input type="number" value={item.amount||""} onChange={e=>updateItem(item.id,"amount",+e.target.value)} placeholder="0.00"
                      style={{width:75,padding:"4px 8px",borderRadius:7,border:`1.5px solid ${border}`,background:dk?"#0F1F1F":"#fff",color:dk?"#E8F5F5":"#1C2B3A",fontSize:13,fontFamily:"inherit",textAlign:"right"}}/>
                    <button onClick={()=>removeItem(item.id)} style={{width:26,height:26,borderRadius:7,background:"#FEE2E2",border:"none",color:"#E05C5C",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>×</button>
                  </div>
                </div>
                <select value={(item.cat&&item.subcat)?item.cat+"/"+item.subcat:(item.cat||"")}
                  onChange={e=>{const val=e.target.value;if(!val){updateItem(item.id,"cat",null);updateItem(item.id,"subcat",null);}else if(val.includes("/")){const[c,s]=val.split("/");updateItem(item.id,"cat",c);updateItem(item.id,"subcat",s);}else{updateItem(item.id,"cat",val);updateItem(item.id,"subcat",null);}}}
                  style={{...inputStyle,fontSize:12}}>
                  {catOptions("exp").map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
                </select>
                {item.confidence==="low"&&item.cat&&<div style={{fontSize:10,color:"#F59E0B",marginTop:3}}>⚡ Niska pewność — sprawdź kategorię</div>}
              </div>
            ))}
          </div>

          <div style={{background:dk?"#1A2A2A":"#F0F9F5",borderRadius:10,padding:"12px 14px",marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:13,color:sub}}>Suma pozycji:</span>
              <span style={{fontWeight:700,fontSize:13,color:dk?"#E8F5F5":"#1C2B3A"}}>{itemsSum.toFixed(2)} zł</span>
            </div>
            {totalNum>0&&<div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:13,color:sub}}>Kwota z paragonu:</span>
              <span style={{fontWeight:700,fontSize:13,color:dk?"#E8F5F5":"#1C2B3A"}}>{totalNum.toFixed(2)} zł</span>
            </div>}
            {totalNum>0&&!diffOk&&<div style={{marginTop:6,padding:"6px 10px",background:"#FEF3C7",borderRadius:8,fontSize:12,color:"#92400E"}}>
              ⚠️ Różnica: {diff.toFixed(2)} zł — sprawdź pozycje lub skoryguj kwoty
            </div>}
            {totalNum>0&&diffOk&&<div style={{marginTop:6,fontSize:12,color:"#3DAA72",fontWeight:600}}>✓ Kwoty się zgadzają</div>}
          </div>

          {items.some(i=>!i.cat&&i.amount>0)&&<div style={{background:"#FEF3C7",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:"#92400E"}}>
            ⚠️ {items.filter(i=>!i.cat&&i.amount>0).length} pozycji bez kategorii — nie zostaną dodane do budżetu
          </div>}

          <div style={{display:"flex",gap:8}}>
            <Btn variant="secondary" style={{flex:1,justifyContent:"center"}} onClick={()=>setStep("upload")}>← Wróć</Btn>
            <Btn style={{flex:1,justifyContent:"center"}} onClick={confirm}>Dodaj do budżetu ✓</Btn>
          </div>
        </>}
      </Modal>;
    }


    // ── BUDGET ────────────────────────────────────────────────────────────────
    // Struktura kategorii: [{name: "Wynagrodzenie", subs: ["Patryk", "Ania"]}, ...]
    // Migracja: stare string[] -> [{name, subs:[]}]
    function normCats(arr) {
      if(!arr||!arr.length) return [];
      return arr.map(c=>typeof c==="string"?{name:c,subs:[]}:c);
    }

    function Budget({finances,visits,rentals,budget,setBudget,desk,anthropicKey}) {
      const dk=useContext(DarkCtx);
      const demo=useDemo();
      const bg2=dk?"#1A2A2A":"#fff";
      const border=dk?"#2A4040":"#E4EAF0";
      const sub="#7A8FA6";

      const [selMonth,setSelMonth]=useState(()=>todayLocal().slice(0,7));
      const [showCatMgr,setShowCatMgr]=useState(false);
      const [showScanner,setShowScanner]=useState(false);
      const receiptMemory=useMemo(()=>budget.receiptMemory||{},[budget]);
      const setReceiptMemory=(m)=>setBudget(b=>({...b,receiptMemory:m}));
      const [showAdd,setShowAdd]=useState(null); // "income"|"expense"
      const [editItem,setEditItem]=useState(null);
      const [form,setForm]=useState({cat:"",subcat:"",desc:"",amount:""});
      // cat manager state
      const [editCat,setEditCat]=useState(null); // {type, catIdx, field:"name"|"sub", subIdx, value}
      const [newCatName,setNewCatName]=useState({income:"",expense:""});
      const [newSubName,setNewSubName]=useState({}); // {`${type}-${catIdx}`: ""}
      const [newCatType,setNewCatType]=useState("expense");

      // Normalize cats on read
      const incCats=useMemo(()=>normCats(budget.incomeCategories||[{name:"Wynagrodzenie",subs:[]},{name:"Inne",subs:[]}]),[budget]);
      const expCats=useMemo(()=>normCats(budget.expenseCategories||[{name:"Mieszkanie",subs:[]},{name:"Jedzenie",subs:[]},{name:"Transport",subs:[]},{name:"Inne",subs:[]}]),[budget]);

      const monthData=useMemo(()=>(budget.months||{})[selMonth]||{income:[],expenses:[]},[budget,selMonth]);

      const setMonthData=(fn)=>{
        setBudget(b=>{
          const prev=b.months||{};
          const cur=prev[selMonth]||{income:[],expenses:[]};
          return {...b,months:{...prev,[selMonth]:typeof fn==="function"?fn(cur):fn}};
        });
      };

      // Practice income for selMonth
      const practiceCats=useMemo(()=>{
        const visitMap={};
        (visits||[]).forEach(v=>{if(v.id)visitMap["visit-"+v.id]=v.date;});
        const map={Wizyta:0,Wypożyczalnia:0,Wózek:0};
        (finances||[]).filter(f=>{
          if(f.type!=="przychód")return false;
          const sid=f.sourceId||"";
          const d=sid.startsWith("visit-")?(visitMap[sid]||f.date):f.date;
          return d&&d.startsWith(selMonth);
        }).forEach(f=>{
          const sid=f.sourceId||"";
          const cat=(f.category||"").toLowerCase();
          if(cat==="wizyta"||sid.startsWith("visit-"))map["Wizyta"]+=+f.amount||0;
          else if(cat==="wózek"||sid.startsWith("wozek-"))map["Wózek"]+=+f.amount||0;
          else map["Wypożyczalnia"]+=+f.amount||0;
        });
        return Object.entries(map).filter(([,v])=>v>0).map(([label,v])=>({label,v}));
      },[finances,visits,selMonth]);

      // Cat helpers
      const setCats=(type,fn)=>{
        const key=type==="income"?"incomeCategories":"expenseCategories";
        setBudget(b=>{const cur=normCats(b[key]||[]);return {...b,[key]:fn(cur)};});
      };

      const addCat=(type)=>{
        const name=newCatName[type]||"";
        if(!name.trim())return;
        setCats(type,cats=>[...cats,{name:name.trim(),subs:[]}]);
        setNewCatName(n=>({...n,[type]:""}));
      };
      const delCat=(type,catIdx)=>{
        setCats(type,cats=>cats.filter((_,i)=>i!==catIdx));
      };
      const moveCat=(type,idx,dir)=>{
        setCats(type,cats=>{
          const a=[...cats];const ni=idx+dir;
          if(ni<0||ni>=a.length)return a;
          [a[idx],a[ni]]=[a[ni],a[idx]];return a;
        });
      };
      const renameCat=(type,catIdx,newName)=>{
        if(!newName.trim())return;
        const key=type==="income"?"incomeCategories":"expenseCategories";
        const mkey=type==="income"?"income":"expenses";
        setBudget(b=>{
          const cats=normCats(b[key]||[]);
          const oldName=cats[catIdx].name;
          const newCats=cats.map((c,i)=>i===catIdx?{...c,name:newName.trim()}:c);
          const months={};
          Object.entries(b.months||{}).forEach(([m,md])=>{
            months[m]={...md,[mkey]:(md[mkey]||[]).map(i=>i.cat===oldName?{...i,cat:newName.trim()}:i)};
          });
          return {...b,[key]:newCats,months};
        });
        setEditCat(null);
      };
      const addSub=(type,catIdx)=>{
        const key=`${type}-${catIdx}`;
        const name=(newSubName[key]||"").trim();
        if(!name)return;
        setCats(type,cats=>cats.map((c,i)=>i===catIdx?{...c,subs:[...(c.subs||[]),name]}:c));
        setNewSubName(n=>({...n,[key]:""}));
      };
      const delSub=(type,catIdx,subIdx)=>{
        setCats(type,cats=>cats.map((c,i)=>i===catIdx?{...c,subs:(c.subs||[]).filter((_,j)=>j!==subIdx)}:c));
      };
      const moveSub=(type,catIdx,subIdx,dir)=>{
        setCats(type,cats=>cats.map((c,i)=>{
          if(i!==catIdx)return c;
          const a=[...(c.subs||[])];const ni=subIdx+dir;
          if(ni<0||ni>=a.length)return c;
          [a[subIdx],a[ni]]=[a[ni],a[subIdx]];
          return {...c,subs:a};
        }));
      };
      const renameSub=(type,catIdx,subIdx,newName)=>{
        if(!newName.trim())return;
        const key=type==="income"?"incomeCategories":"expenseCategories";
        const mkey=type==="income"?"income":"expenses";
        setBudget(b=>{
          const cats=normCats(b[key]||[]);
          const oldName=cats[catIdx].subs[subIdx];
          const newCats=cats.map((c,i)=>i===catIdx?{...c,subs:c.subs.map((s,j)=>j===subIdx?newName.trim():s)}:c);
          const months={};
          Object.entries(b.months||{}).forEach(([m,md])=>{
            months[m]={...md,[mkey]:(md[mkey]||[]).map(it=>it.cat===cats[catIdx].name&&it.subcat===oldName?{...it,subcat:newName.trim()}:it)};
          });
          return {...b,[key]:newCats,months};
        });
        setEditCat(null);
      };

      // Item helpers
      const saveAdd=()=>{
        if(!form.cat||!form.amount)return;
        const item={id:Date.now(),cat:form.cat,subcat:form.subcat||"",desc:form.desc,amount:+form.amount};
        setMonthData(d=>showAdd==="income"
          ?{...d,income:[...(d.income||[]),item]}
          :{...d,expenses:[...(d.expenses||[]),item]});
        setShowAdd(null);
      };
      const saveEdit=()=>{
        if(!editItem)return;
        const updated={...editItem.item,cat:form.cat,subcat:form.subcat||"",desc:form.desc,amount:+form.amount};
        setMonthData(d=>editItem.type==="income"
          ?{...d,income:(d.income||[]).map(i=>i.id===updated.id?updated:i)}
          :{...d,expenses:(d.expenses||[]).map(i=>i.id===updated.id?updated:i)});
        setEditItem(null);
      };
      const delItem=(type,id)=>{
        setMonthData(d=>type==="income"
          ?{...d,income:(d.income||[]).filter(i=>i.id!==id)}
          :{...d,expenses:(d.expenses||[]).filter(i=>i.id!==id)});
        setEditItem(null);
      };

      const practiceTotal=practiceCats.reduce((s,c)=>s+(c.v||0),0);
      const manualIncTotal=(monthData.income||[]).reduce((s,i)=>s+(+i.amount||0),0);
      // totalInc/Exp including recurring — defined below after recurring state
      const recurringIncTotalEarly=(budget.recurring||[]).filter(r=>r.type==="income").reduce((s,r)=>s+(+r.amount||0),0);
      const recurringExpTotalEarly=(budget.recurring||[]).filter(r=>r.type==="expense").reduce((s,r)=>s+(+r.amount||0),0);
      const totalInc=practiceTotal+manualIncTotal+recurringIncTotalEarly;
      const totalExp=(monthData.expenses||[]).reduce((s,i)=>s+(+i.amount||0),0)+recurringExpTotalEarly;

      const [showYear,setShowYear]=useState(false);
      const [showCompare,setShowCompare]=useState(false);
      const [compareMonth,setCompareMonth]=useState(()=>{const d=new Date(todayLocal().slice(0,7)+"-15");d.setMonth(d.getMonth()-1);return d.toISOString().slice(0,7);});
      const [showRecurring,setShowRecurring]=useState(null); // "income"|"expense"|null - add modal
      const [editRecurring,setEditRecurring]=useState(null);
      const [rForm,setRForm]=useState({type:"expense",cat:"",subcat:"",desc:"",amount:"",cycle:"monthly"});

      const recurring=useMemo(()=>budget.recurring||[],[budget]);
      const recurringInc=useMemo(()=>recurring.filter(r=>r.type==="income"),[recurring]);
      const recurringExp=useMemo(()=>recurring.filter(r=>r.type==="expense"),[recurring]);
      // monthly equivalent: weekly×4, monthly×1
      const recurringIncTotal=recurringInc.reduce((s,r)=>s+(+r.amount||0)*(r.cycle==="weekly"?4:1),0);
      const recurringExpTotal=recurringExp.reduce((s,r)=>s+(+r.amount||0)*(r.cycle==="weekly"?4:1),0);

      const saveRecurring=()=>{
        if(!rForm.cat||!rForm.amount)return;
        const item={id:Date.now(),type:rForm.type,cat:rForm.cat,subcat:rForm.subcat||"",desc:rForm.desc,amount:+rForm.amount,cycle:rForm.cycle};
        setBudget(b=>({...b,recurring:[...(b.recurring||[]),item]}));
        setShowRecurring(null);
      };
      const updateRecurring=()=>{
        if(!editRecurring)return;
        setBudget(b=>({...b,recurring:(b.recurring||[]).map(r=>r.id===editRecurring.id?{...editRecurring,...rForm,amount:+rForm.amount}:r)}));
        setEditRecurring(null);
      };
      const deleteRecurring=(id)=>{
        setBudget(b=>({...b,recurring:(b.recurring||[]).filter(r=>r.id!==id)}));
        setEditRecurring(null);
      };

      // Previous month helpers
      const prevMonth=useMemo(()=>{const d=new Date(selMonth+"-15");d.setMonth(d.getMonth()-1);return d.toISOString().slice(0,7);},[selMonth]);
      const prevMonthData=useMemo(()=>(budget.months||{})[prevMonth]||{income:[],expenses:[]},[budget,prevMonth]);
      const prevPracticeTotal=useMemo(()=>{
        const visitMap={};
        (visits||[]).forEach(v=>{if(v.id)visitMap["visit-"+v.id]=v.date;});
        const map={};
        (finances||[]).filter(f=>{
          if(f.type!=="przychód")return false;
          const sid=f.sourceId||"";
          const d=sid.startsWith("visit-")?(visitMap[sid]||f.date):f.date;
          return d&&d.startsWith(prevMonth);
        }).forEach(f=>{map._=((map._)||0)+(+f.amount||0);});
        return map._||0;
      },[finances,visits,prevMonth]);
      const prevTotalInc=prevPracticeTotal+(prevMonthData.income||[]).reduce((s,i)=>s+(+i.amount||0),0);
      const prevTotalExp=(prevMonthData.expenses||[]).reduce((s,i)=>s+(+i.amount||0),0);
      const diffInc=prevTotalInc>0?Math.round((totalInc-prevTotalInc)/prevTotalInc*100):null;
      const diffExp=prevTotalExp>0?Math.round((totalExp-prevTotalExp)/prevTotalExp*100):null;

      // Copy from prev month (positions without amounts)
      const copyFromPrev=()=>{
        const prev=(budget.months||{})[prevMonth]||{income:[],expenses:[]};
        if(!prev.income.length&&!prev.expenses.length){return;}
        setMonthData(d=>({
          income:[...(d.income||[]),...(prev.income||[]).map(i=>({...i,id:Date.now()+Math.random(),amount:0}))],
          expenses:[...(d.expenses||[]),...(prev.expenses||[]).map(i=>({...i,id:Date.now()+Math.random(),amount:0}))]
        }));
      };

      const onScannerConfirm=(items,date)=>{
        setMonthData(d=>({
          ...d,
          expenses:[...(d.expenses||[]),...items.map(i=>({id:Date.now()+Math.random(),cat:i.cat,subcat:i.subcat||"",desc:i.desc,amount:i.amount,date}))]
        }));
        setShowScanner(false);
      };

      const exportCSV=()=>{
        const rows=[["Data","Typ","Kategoria","Podkategoria","Opis","Kwota"]];
        // Praktyka
        practiceCats.forEach(c=>rows.push([selMonth+"-01","Przychód","Praktyka",c.label,"Auto",c.v.toFixed(2)]));
        // Cykliczne
        (budget.recurring||[]).forEach(r=>rows.push([selMonth+"-01",r.type==="income"?"Przychód":"Koszt",r.cat,r.subcat||"",r.desc||"↻ cykliczny",(+r.amount).toFixed(2)]));
        // Miesięczne
        (monthData.income||[]).forEach(i=>rows.push([selMonth+"-01","Przychód",i.cat,i.subcat||"",i.desc||"",(+i.amount).toFixed(2)]));
        (monthData.expenses||[]).forEach(e=>rows.push([selMonth+"-01","Koszt",e.cat,e.subcat||"",e.desc||"",(+e.amount).toFixed(2)]));
        const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
        const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8;"});
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a");
        a.href=url;a.download="budzet-"+selMonth+".csv";
        document.body.appendChild(a);a.click();document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      // Year summary
      const yearMonths=useMemo(()=>{
        const yr=selMonth.slice(0,4);
        const all=new Set();
        for(let m=1;m<=12;m++)all.add(yr+"-"+String(m).padStart(2,"0"));
        Object.keys(budget.months||{}).filter(m=>m.startsWith(yr)).forEach(m=>all.add(m));
        return Array.from(all).sort();
      },[selMonth,budget]);

      const monthsList=useMemo(()=>{
        const s=new Set();
        const cur=todayLocal().slice(0,7);s.add(cur);
        Object.keys(budget.months||{}).forEach(m=>s.add(m));
        for(let i=1;i<=5;i++){const d=new Date(cur+"-15");d.setMonth(d.getMonth()-i);s.add(d.toISOString().slice(0,7));}
        return Array.from(s).sort((a,b)=>b.localeCompare(a));
      },[budget]);

      const getCats=(type)=>type==="income"?incCats:expCats;
      const getColor=(type)=>type==="income"?"#3DAA72":"#E05C5C";

      const CatMgrSection=({type,cats,color})=>(
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color,textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>{type==="income"?"Przychody":"Koszty"}</div>
          {cats.map((cat,ci)=>(
            <div key={ci} style={{marginBottom:8,border:`1px solid ${border}`,borderRadius:10,overflow:"hidden"}}>
              {/* Category row */}
              <div style={{display:"flex",alignItems:"center",gap:4,padding:"8px 10px",background:dk?"#0F1F1F":"#F7F9FB"}}>
                <div style={{display:"flex",flexDirection:"column",gap:0}}>
                  <button onClick={()=>moveCat(type,ci,-1)} disabled={ci===0} style={{background:"none",border:"none",cursor:ci===0?"default":"pointer",color:ci===0?border:sub,fontSize:11,lineHeight:1,padding:"1px 3px"}}>▲</button>
                  <button onClick={()=>moveCat(type,ci,1)} disabled={ci===cats.length-1} style={{background:"none",border:"none",cursor:ci===cats.length-1?"default":"pointer",color:ci===cats.length-1?border:sub,fontSize:11,lineHeight:1,padding:"1px 3px"}}>▼</button>
                </div>
                {editCat&&editCat.type===type&&editCat.catIdx===ci&&editCat.field==="name"
                  ?<><input autoFocus value={editCat.value} onChange={e=>setEditCat(ec=>({...ec,value:e.target.value}))}
                      style={{flex:1,padding:"5px 8px",borderRadius:7,border:`1.5px solid ${color}`,background:dk?"#0F1F1F":"#fff",color:dk?"#E8F5F5":"#1C2B3A",fontSize:14,fontFamily:"inherit"}}/>
                    <button onClick={()=>renameCat(type,ci,editCat.value)} style={{background:color,color:"#fff",border:"none",borderRadius:7,padding:"5px 10px",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✓</button>
                    <button onClick={()=>setEditCat(null)} style={{background:"none",border:"none",color:sub,cursor:"pointer",fontSize:16}}>×</button></>
                  :<><span style={{flex:1,fontSize:14,fontWeight:600,color:dk?"#C8E8E8":"#1C2B3A"}}>{cat.name}</span>
                    <button onClick={()=>setEditCat({type,catIdx:ci,field:"name",value:cat.name})} style={{background:"none",border:"none",color:sub,cursor:"pointer",padding:"0 4px",fontSize:13}}>✏️</button>
                    <button onClick={()=>delCat(type,ci)} style={{background:"none",border:"none",color:"#E05C5C",cursor:"pointer",fontSize:16,lineHeight:1}}>×</button></>
                }
              </div>
              {/* Subcategories */}
              {(cat.subs||[]).map((s2,si)=>(
                <div key={si} style={{display:"flex",alignItems:"center",gap:4,padding:"6px 10px 6px 28px",borderTop:`1px solid ${border}`}}>
                  <div style={{display:"flex",flexDirection:"column",gap:0}}>
                    <button onClick={()=>moveSub(type,ci,si,-1)} disabled={si===0} style={{background:"none",border:"none",cursor:si===0?"default":"pointer",color:si===0?border:sub,fontSize:10,lineHeight:1,padding:"1px 2px"}}>▲</button>
                    <button onClick={()=>moveSub(type,ci,si,1)} disabled={si===(cat.subs.length-1)} style={{background:"none",border:"none",cursor:si===(cat.subs.length-1)?"default":"pointer",color:si===(cat.subs.length-1)?border:sub,fontSize:10,lineHeight:1,padding:"1px 2px"}}>▼</button>
                  </div>
                  {editCat&&editCat.type===type&&editCat.catIdx===ci&&editCat.field==="sub"&&editCat.subIdx===si
                    ?<><input autoFocus value={editCat.value} onChange={e=>setEditCat(ec=>({...ec,value:e.target.value}))}
                        style={{flex:1,padding:"4px 8px",borderRadius:6,border:`1.5px solid ${color}`,background:dk?"#0F1F1F":"#fff",color:dk?"#E8F5F5":"#1C2B3A",fontSize:13,fontFamily:"inherit"}}/>
                      <button onClick={()=>renameSub(type,ci,si,editCat.value)} style={{background:color,color:"#fff",border:"none",borderRadius:6,padding:"4px 10px",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✓</button>
                      <button onClick={()=>setEditCat(null)} style={{background:"none",border:"none",color:sub,cursor:"pointer",fontSize:16}}>×</button></>
                    :<><span style={{flex:1,fontSize:13,color:dk?"#A0C8C8":"#4A6070"}}>↳ {s2}</span>
                      <button onClick={()=>setEditCat({type,catIdx:ci,field:"sub",subIdx:si,value:s2})} style={{background:"none",border:"none",color:sub,cursor:"pointer",padding:"0 4px",fontSize:12}}>✏️</button>
                      <button onClick={()=>delSub(type,ci,si)} style={{background:"none",border:"none",color:"#E05C5C",cursor:"pointer",fontSize:15,lineHeight:1}}>×</button></>
                  }
                </div>
              ))}
              {/* Add subcategory */}
              <div style={{display:"flex",gap:6,padding:"6px 10px 6px 28px",borderTop:`1px solid ${border}`,background:dk?"#111E1E":"#FAFCFD"}}>
                <input value={newSubName[`${type}-${ci}`]||""} onChange={e=>setNewSubName(n=>({...n,[`${type}-${ci}`]:e.target.value}))}
                  onKeyDown={e=>e.key==="Enter"&&addSub(type,ci)}
                  placeholder="Dodaj podkategorię..." style={{flex:1,padding:"5px 8px",borderRadius:7,border:`1px solid ${border}`,background:"transparent",color:dk?"#E8F5F5":"#1C2B3A",fontSize:12,fontFamily:"inherit"}}/>
                <button onClick={()=>addSub(type,ci)} style={{background:color+"30",color,border:"none",borderRadius:7,padding:"5px 10px",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>+</button>
              </div>
            </div>
          ))}
          {/* Add category */}
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <input value={newCatName[type]||""} onChange={e=>setNewCatName(n=>({...n,[type]:e.target.value}))}
              onKeyDown={e=>e.key==="Enter"&&addCat(type)}
              placeholder="Nowa kategoria..." style={{flex:1,padding:"9px 12px",borderRadius:10,border:`1.5px solid ${border}`,background:dk?"#0F1F1F":"#FAFCFD",color:dk?"#E8F5F5":"#1C2B3A",fontSize:14,fontFamily:"inherit"}}/>
            <button onClick={()=>addCat(type)} style={{background:color,color:"#fff",border:"none",borderRadius:10,padding:"9px 14px",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+</button>
          </div>
        </div>
      );

      const ItemForm=({type,onSave,onClose,title})=>{
        const cats=getCats(type);
        const selCat=cats.find(c=>c.name===form.cat);
        const hasSubs=selCat&&(selCat.subs||[]).length>0;
        return <Modal title={title} onClose={onClose}>
          <Sel label="Kategoria" value={form.cat} onChange={v=>setForm(f=>({...f,cat:v,subcat:""}))} options={cats.map(c=>({value:c.name,label:c.name}))}/>
          {hasSubs&&<Sel label="Podkategoria" value={form.subcat} onChange={v=>setForm(f=>({...f,subcat:v}))} options={[{value:"",label:"— brak —"},...(selCat.subs||[]).map(s=>({value:s,label:s}))]}/>}
          <Inp label="Opis" value={form.desc} onChange={v=>setForm(f=>({...f,desc:v}))} placeholder="np. Wypłata marzec"/>
          <Inp label="Kwota (zł) *" value={form.amount} onChange={v=>setForm(f=>({...f,amount:v}))} type="number" placeholder="0"/>
          <Btn disabled={!form.cat||!form.amount} style={{width:"100%",justifyContent:"center"}} onClick={onSave}>Zapisz</Btn>
        </Modal>;
      };

      const [expandedCats,setExpandedCats]=useState({});
      const toggleCat=(key)=>setExpandedCats(e=>({...e,[key]:!e[key]}));

      const renderItems=(type,cats,color)=>{
        const items=type==="income"?monthData.income||[]:monthData.expenses||[];
        const recItems=type==="income"?recurringInc:recurringExp;
        return cats.map(cat=>{
          const catItems=items.filter(i=>i.cat===cat.name);
          const catRec=recItems.filter(r=>r.cat===cat.name);
          if(!catItems.length&&!catRec.length)return null;
          const hasSubs=(cat.subs||[]).length>0;
          const catTotal=catItems.reduce((s,i)=>s+(+i.amount||0),0)+catRec.reduce((s,r)=>s+(+r.amount||0),0);
          const expKey=type+"-"+cat.name;
          const isOpen=!!expandedCats[expKey];
          return <div key={cat.name}>
            {/* Category header — clickable, shows only sum */}
            <div onClick={()=>toggleCat(expKey)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",background:dk?"#111E1E":type==="income"?"#F0F9F5":"#FDF7F7",cursor:"pointer",borderBottom:`1px solid ${border}`}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:11,color:isOpen?color:sub,transition:"transform .2s",display:"inline-block",transform:isOpen?"rotate(90deg)":"rotate(0deg)"}}>▶</span>
                <span style={{fontSize:13,fontWeight:700,color:dk?"#C8E8E8":"#1C2B3A"}}>{cat.name}</span>
                <span style={{fontSize:11,color:sub}}>{catItems.length} {catItems.length===1?"wpis":"wpisów"}</span>
              </div>
              <span style={{fontWeight:800,fontSize:14,color}}>{demo?"****":catTotal.toFixed(2)} zł</span>
            </div>
            {/* Expanded: individual entries grouped by subcat */}
            {isOpen&&<div style={{background:dk?"#0D1A1A":type==="income"?"#F7FCF9":"#FDF5F5"}}>
              {hasSubs
                ? (cat.subs||[]).map(s=>{
                    const subItems=catItems.filter(i=>i.subcat===s);
                    if(!subItems.length)return null;
                    const subTotal=subItems.reduce((a,i)=>a+(+i.amount||0),0);
                    return <div key={s}>
                      <div style={{display:"flex",justifyContent:"space-between",padding:"5px 16px 5px 28px",background:dk?"#0F1B1B":type==="income"?"#EBF7F1":"#FAF0F0",fontSize:10,fontWeight:600,color:sub}}>
                        <span>↳ {s}</span>
                        <span style={{color}}>{demo?"****":subTotal.toFixed(2)} zł</span>
                      </div>
                      {subItems.map(item=><div key={item.id} onClick={()=>{setForm({cat:item.cat,subcat:item.subcat||"",desc:item.desc||"",amount:String(item.amount)});setEditItem({type,item});}}
                        style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 16px 8px 36px",borderBottom:`1px solid ${border}`,cursor:"pointer"}}>
                        <span style={{fontSize:12,color:sub}}>{demo?"••••":item.desc||item.subcat||item.cat}</span>
                        <span style={{fontWeight:600,fontSize:12,color}}>{demo?"****":(+item.amount).toFixed(2)} zł</span>
                      </div>)}
                      {catRec.filter(r=>r.subcat===s2).map(r=><div key={r.id} onClick={()=>{setRForm({type:r.type,cat:r.cat,subcat:r.subcat||"",desc:r.desc,amount:String(r.amount),cycle:"monthly"});setEditRecurring(r);}}
                        style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 16px 8px 36px",borderBottom:`1px solid ${border}`,cursor:"pointer"}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <span style={{fontSize:11,color,opacity:.6}}>↻</span>
                          <span style={{fontSize:12,color:sub}}>{demo?"••••":r.desc||r.subcat||r.cat}</span>
                        </div>
                        <span style={{fontWeight:600,fontSize:12,color}}>{demo?"****":(+r.amount).toFixed(2)} zł</span>
                      </div>)}
                    </div>;
                  })
                : null
              }
              {catItems.filter(i=>!i.subcat).map(item=><div key={item.id} onClick={()=>{setForm({cat:item.cat,subcat:"",desc:item.desc||"",amount:String(item.amount)});setEditItem({type,item});}}
                style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 16px",borderBottom:`1px solid ${border}`,cursor:"pointer"}}>
                <span style={{fontSize:12,color:sub}}>{demo?"••••":item.desc||item.cat}</span>
                <span style={{fontWeight:600,fontSize:12,color}}>{demo?"****":(+item.amount).toFixed(2)} zł</span>
              </div>)}
              {catRec.filter(r=>!r.subcat).map(r=><div key={r.id} onClick={()=>{setRForm({type:r.type,cat:r.cat,subcat:r.subcat||"",desc:r.desc,amount:String(r.amount),cycle:"monthly"});setEditRecurring(r);}}
                style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 16px",borderBottom:`1px solid ${border}`,cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:12,color,opacity:.6}}>↻</span>
                  <span style={{fontSize:12,color:sub}}>{demo?"••••":r.desc||r.cat}</span>
                </div>
                <span style={{fontWeight:600,fontSize:12,color}}>{demo?"****":(+r.amount).toFixed(2)} zł</span>
              </div>)}
            </div>}
          </div>;
        });
      };

      return <div style={{padding:"0 20px 40px"}}>
        {/* Month selector */}
        <div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
          {monthsList.map(m=><button key={m} onClick={()=>setSelMonth(m)}
            style={{padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,whiteSpace:"nowrap",
              background:selMonth===m?"#0A7C7C":dk?"#1E3A3A":"#E4EAF0",
              color:selMonth===m?"#fff":dk?"#5A8A8A":"#4A6070",fontFamily:"inherit"}}>
            {new Date(m+"-15").toLocaleDateString("pl-PL",{month:"long",year:"numeric"})}
          </button>)}
        </div>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setShowScanner(true)} style={{background:"#0A7C7C",border:"none",borderRadius:10,padding:"6px 14px",fontSize:12,fontWeight:600,color:"#fff",cursor:"pointer",fontFamily:"inherit"}}>📷 Skanuj paragon</button>
            <button onClick={()=>setShowCompare(v=>!v)} style={{background:showCompare?"#2E86AB":"none",border:`1.5px solid ${showCompare?"#2E86AB":border}`,borderRadius:10,padding:"6px 14px",fontSize:12,fontWeight:600,color:showCompare?"#fff":sub,cursor:"pointer",fontFamily:"inherit"}}>⚖️ Porównaj</button>
            <button onClick={()=>setShowYear(v=>!v)} style={{background:showYear?"#0A7C7C":"none",border:`1.5px solid ${showYear?"#0A7C7C":border}`,borderRadius:10,padding:"6px 14px",fontSize:12,fontWeight:600,color:showYear?"#fff":sub,cursor:"pointer",fontFamily:"inherit"}}>📅 Rok {selMonth.slice(0,4)}</button>
            <button onClick={copyFromPrev} style={{background:"none",border:`1.5px solid ${border}`,borderRadius:10,padding:"6px 14px",fontSize:12,fontWeight:600,color:sub,cursor:"pointer",fontFamily:"inherit"}}>📋 Kopiuj z poprzedniego</button>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={exportCSV} style={{background:"none",border:`1.5px solid ${border}`,borderRadius:10,padding:"6px 14px",fontSize:12,fontWeight:600,color:sub,cursor:"pointer",fontFamily:"inherit"}}>⬇️ CSV</button>
            <button onClick={()=>setShowCatMgr(true)} style={{background:"none",border:`1.5px solid ${border}`,borderRadius:10,padding:"6px 14px",fontSize:12,fontWeight:600,color:sub,cursor:"pointer",fontFamily:"inherit"}}>⚙️</button>
          </div>
        </div>

        {/* ROK */}
        {showCompare&&<div style={{background:bg2,borderRadius:16,marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,.06)",overflow:"hidden"}}>
          <div style={{padding:"12px 16px",borderBottom:`1px solid ${border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:11,fontWeight:700,color:sub,textTransform:"uppercase",letterSpacing:.5}}>Porównaj miesiące</div>
            <select value={compareMonth} onChange={e=>setCompareMonth(e.target.value)}
              style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${border}`,background:dk?"#0F1F1F":"#FAFCFD",color:dk?"#E8F5F5":"#1C2B3A",fontSize:12,fontFamily:"inherit"}}>
              {monthsList.filter(m=>m!==selMonth).map(m=><option key={m} value={m}>{new Date(m+"-15").toLocaleDateString("pl-PL",{month:"long",year:"numeric"})}</option>)}
            </select>
          </div>
          {(()=>{
            const md2=(budget.months||{})[compareMonth]||{income:[],expenses:[]};
            const visitMap={};(visits||[]).forEach(v=>{if(v.id)visitMap["visit-"+v.id]=v.date;});
            let prac2=0;
            (finances||[]).filter(f=>{if(f.type!=="przychód")return false;const sid=f.sourceId||"";const d=sid.startsWith("visit-")?(visitMap[sid]||f.date):f.date;return d&&d.startsWith(compareMonth);}).forEach(f=>{prac2+=(+f.amount||0);});
            const recInc2=(budget.recurring||[]).filter(r=>r.type==="income").reduce((s,r)=>s+(+r.amount||0),0);
            const recExp2=(budget.recurring||[]).filter(r=>r.type==="expense").reduce((s,r)=>s+(+r.amount||0),0);
            const inc2=prac2+(md2.income||[]).reduce((s,i)=>s+(+i.amount||0),0)+recInc2;
            const exp2=(md2.expenses||[]).reduce((s,i)=>s+(+i.amount||0),0)+recExp2;
            const rows=[
              {label:"Przychody",a:totalInc,b:inc2,color:"#3DAA72"},
              {label:"Koszty",a:totalExp,b:exp2,color:"#E05C5C"},
            ];
            const fmtDiff=(a,b,invert)=>{const d=a-b;if(d===0)return null;const pct=b>0?Math.round(Math.abs(d)/b*100):null;const better=invert?d<0:d>0;return {val:d,pct,better};};
            return <div style={{padding:"12px 16px"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,marginBottom:8,textAlign:"center"}}>
                <div style={{fontSize:11,color:sub}}></div>
                <div style={{fontSize:11,fontWeight:700,color:"#0A7C7C"}}>{new Date(selMonth+"-15").toLocaleDateString("pl-PL",{month:"short",year:"numeric"})}</div>
                <div style={{fontSize:11,fontWeight:700,color:"#2E86AB"}}>{new Date(compareMonth+"-15").toLocaleDateString("pl-PL",{month:"short",year:"numeric"})}</div>
              </div>
              {rows.map(row=>{
                const diff=fmtDiff(row.a,row.b,row.label==="Koszty");
                return <div key={row.label} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,marginBottom:10,alignItems:"center"}}>
                  <div style={{fontSize:12,fontWeight:600,color:dk?"#C8E8E8":"#1C2B3A"}}>{row.label}</div>
                  <div style={{textAlign:"center",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,color:row.color}}>{totalInc&&row.label==="Przychody"?totalInc.toFixed(0):totalExp.toFixed(0)} zł</div>
                  <div style={{textAlign:"center",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,color:row.color}}>{row.b.toFixed(0)} zł</div>
                  {diff&&<div style={{gridColumn:"1/-1",textAlign:"right",fontSize:11,color:diff.better?"#3DAA72":"#E05C5C",marginTop:-4}}>
                    {diff.better?"↑ lepiej":"↓ gorzej"} o {Math.abs(diff.val).toFixed(0)} zł{diff.pct?` (${diff.pct}%)`:""}
                  </div>}
                </div>;
              })}
            </div>;
          })()}
        </div>}

        {showYear&&<div style={{background:bg2,borderRadius:16,marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,.06)",overflow:"hidden"}}>
          <div style={{padding:"12px 16px",borderBottom:`1px solid ${border}`,fontSize:11,fontWeight:700,color:sub,textTransform:"uppercase",letterSpacing:.5}}>Rok {selMonth.slice(0,4)}</div>
          {yearMonths.map(m=>{
            const md=(budget.months||{})[m]||{income:[],expenses:[]};
            const visitMap={};(visits||[]).forEach(v=>{if(v.id)visitMap["visit-"+v.id]=v.date;});
            let prac=0;
            (finances||[]).filter(f=>{if(f.type!=="przychód")return false;const sid=f.sourceId||"";const d=sid.startsWith("visit-")?(visitMap[sid]||f.date):f.date;return d&&d.startsWith(m);}).forEach(f=>{prac+=(+f.amount||0);});
            const inc2=prac+(md.income||[]).reduce((s,i)=>s+(+i.amount||0),0);
            const exp2=(md.expenses||[]).reduce((s,i)=>s+(+i.amount||0),0);
            const isSelected=m===selMonth;
            return <div key={m} onClick={()=>{setSelMonth(m);setShowYear(false);}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",borderBottom:`1px solid ${border}`,cursor:"pointer",background:isSelected?(dk?"#1A3030":"#F0FAF6"):"transparent"}}>
              <span style={{fontSize:13,fontWeight:isSelected?700:500,color:dk?"#C8E8E8":"#1C2B3A",textTransform:"capitalize"}}>{new Date(m+"-15").toLocaleDateString("pl-PL",{month:"long"})}</span>
              <div style={{display:"flex",gap:16}}>
                <span style={{fontSize:13,fontWeight:600,color:"#3DAA72"}}>{demo?"**":inc2>0?"+"+inc2.toFixed(0):"—"}</span>
                <span style={{fontSize:13,fontWeight:600,color:"#E05C5C"}}>{demo?"**":exp2>0?"-"+exp2.toFixed(0):"—"}</span>
              </div>
            </div>;
          })}
        </div>}

        <div style={{display:desk?"grid":"block",gridTemplateColumns:desk?"1fr 1fr":"unset",gap:desk?16:0,alignItems:"start"}}>
        {/* PRZYCHODY */}
        <div style={{background:bg2,borderRadius:16,marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,.06)",overflow:"hidden"}}>
          <div style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${border}`}}>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:sub,textTransform:"uppercase",letterSpacing:.5}}>Przychody</div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:2}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:22,color:"#3DAA72"}}>{demo?"****":totalInc.toFixed(2)} zł</div>
                {diffInc!==null&&<div style={{background:diffInc>=0?"#3DAA7220":"#E05C5C20",borderRadius:8,padding:"3px 8px",fontSize:11,fontWeight:700,color:diffInc>=0?"#3DAA72":"#E05C5C"}}>{diffInc>=0?"+":""}{diffInc}%</div>}
              </div>
            </div>
            <div style={{display:"flex",gap:6}}><Btn small onClick={()=>{const c=incCats[0];setForm({cat:c?c.name:"",subcat:"",desc:"",amount:""});setShowAdd("income");}}>+ Jednorazowy</Btn><Btn small variant="secondary" onClick={()=>{const c=incCats[0];setRForm({type:"income",cat:c?c.name:"",subcat:"",desc:"",amount:"",cycle:"monthly"});setShowRecurring("income");}}>↻</Btn></div>
          </div>
          {practiceCats.length>0&&<>
            <div style={{padding:"6px 16px",background:dk?"#0F1F1F":"#F0F9F5",fontSize:10,fontWeight:700,color:"#3DAA72",textTransform:"uppercase",letterSpacing:.5}}>Praktyka (auto)</div>
            {practiceCats.map(c=><div key={c.label} style={{display:"flex",justifyContent:"space-between",padding:"9px 16px",borderBottom:`1px solid ${border}`}}>
              <span style={{fontSize:13,color:dk?"#C8E8E8":"#1C2B3A"}}>{c.label}</span>
              <span style={{fontWeight:700,fontSize:13,color:"#3DAA72"}}>{demo?"****":c.v.toFixed(2)} zł</span>
            </div>)}
          </>}
          {renderItems("income",incCats,"#3DAA72")}
          {(monthData.income||[]).length===0&&practiceCats.length===0&&recurringInc.length===0&&<div style={{padding:16,textAlign:"center",color:sub,fontSize:13}}>Brak przychodów</div>}
        </div>

        {/* KOSZTY */}
        <div style={{background:bg2,borderRadius:16,marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,.06)",overflow:"hidden"}}>
          <div style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${border}`}}>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:sub,textTransform:"uppercase",letterSpacing:.5}}>Koszty</div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:2}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:22,color:"#E05C5C"}}>{demo?"****":totalExp.toFixed(2)} zł</div>
                {diffExp!==null&&<div style={{background:diffExp<=0?"#3DAA7220":"#E05C5C20",borderRadius:8,padding:"3px 8px",fontSize:11,fontWeight:700,color:diffExp<=0?"#3DAA72":"#E05C5C"}}>{diffExp>=0?"+":""}{diffExp}%</div>}
              </div>
            </div>
            <div style={{display:"flex",gap:6}}><Btn small onClick={()=>{const c=expCats[0];setForm({cat:c?c.name:"",subcat:"",desc:"",amount:""});setShowAdd("expense");}}>+ Jednorazowy</Btn><Btn small variant="secondary" onClick={()=>{const c=expCats[0];setRForm({type:"expense",cat:c?c.name:"",subcat:"",desc:"",amount:"",cycle:"monthly"});setShowRecurring("expense");}}>↻</Btn></div>
          </div>
          {renderItems("expense",expCats,"#E05C5C")}
          {(monthData.expenses||[]).length===0&&recurringExp.length===0&&<div style={{padding:16,textAlign:"center",color:sub,fontSize:13}}>Brak kosztów</div>}
        </div>
        </div>{/* end side-by-side grid */}

        {showAdd&&<ItemForm type={showAdd} title={showAdd==="income"?"Nowy przychód":"Nowy koszt"} onSave={saveAdd} onClose={()=>setShowAdd(null)}/>}

        {editItem&&<Modal title="Edytuj wpis" onClose={()=>setEditItem(null)}>
          {(()=>{
            const cats=getCats(editItem.type);
            const selCat=cats.find(c=>c.name===form.cat);
            const hasSubs=selCat&&(selCat.subs||[]).length>0;
            return <>
              <Sel label="Kategoria" value={form.cat} onChange={v=>setForm(f=>({...f,cat:v,subcat:""}))} options={cats.map(c=>({value:c.name,label:c.name}))}/>
              {hasSubs&&<Sel label="Podkategoria" value={form.subcat} onChange={v=>setForm(f=>({...f,subcat:v}))} options={[{value:"",label:"— brak —"},...(selCat.subs||[]).map(s=>({value:s,label:s}))]}/>}
              <Inp label="Opis" value={form.desc} onChange={v=>setForm(f=>({...f,desc:v}))}/>
              <Inp label="Kwota (zł)" value={form.amount} onChange={v=>setForm(f=>({...f,amount:v}))} type="number"/>
              <Btn style={{width:"100%",justifyContent:"center",marginBottom:8}} onClick={saveEdit}>Zapisz zmiany</Btn>
              <Btn variant="danger" style={{width:"100%",justifyContent:"center"}} onClick={()=>delItem(editItem.type,editItem.item.id)}>🗑️ Usuń</Btn>
            </>;
          })()}
        </Modal>}

        {showRecurring&&<Modal title={showRecurring==="income"?"Nowy cykliczny przychód":"Nowy cykliczny koszt"} onClose={()=>setShowRecurring(null)}>
          
          <Sel label="Kategoria" value={rForm.cat} onChange={v=>setRForm(f=>({...f,cat:v,subcat:""}))} options={getCats(showRecurring).map(c=>({value:c.name,label:c.name}))}/>
          {(()=>{const selCat=getCats(showRecurring).find(c=>c.name===rForm.cat);const hasSubs=selCat&&(selCat.subs||[]).length>0;return hasSubs&&<Sel label="Podkategoria" value={rForm.subcat} onChange={v=>setRForm(f=>({...f,subcat:v}))} options={[{value:"",label:"— brak —"},...(selCat.subs||[]).map(s=>({value:s,label:s}))]}/>})()}
          <Inp label="Opis" value={rForm.desc} onChange={v=>setRForm(f=>({...f,desc:v}))} placeholder="np. Czynsz, Rata kredytu"/>
          <Inp label="Kwota (zł) *" value={rForm.amount} onChange={v=>setRForm(f=>({...f,amount:v}))} type="number" placeholder="0"/>
          <Btn disabled={!rForm.cat||!rForm.amount} style={{width:"100%",justifyContent:"center"}} onClick={saveRecurring}>Zapisz</Btn>
        </Modal>}

        {editRecurring&&<Modal title="Edytuj cykliczny" onClose={()=>setEditRecurring(null)}>
          
          <Sel label="Kategoria" value={rForm.cat} onChange={v=>setRForm(f=>({...f,cat:v,subcat:""}))} options={getCats(editRecurring.type).map(c=>({value:c.name,label:c.name}))}/>
          {(()=>{const selCat=getCats(editRecurring.type).find(c=>c.name===rForm.cat);const hasSubs=selCat&&(selCat.subs||[]).length>0;return hasSubs&&<Sel label="Podkategoria" value={rForm.subcat} onChange={v=>setRForm(f=>({...f,subcat:v}))} options={[{value:"",label:"— brak —"},...(selCat.subs||[]).map(s=>({value:s,label:s}))]}/>})()}
          <Inp label="Opis" value={rForm.desc} onChange={v=>setRForm(f=>({...f,desc:v}))}/>
          <Inp label="Kwota (zł)" value={rForm.amount} onChange={v=>setRForm(f=>({...f,amount:v}))} type="number"/>
          <Btn style={{width:"100%",justifyContent:"center",marginBottom:8}} onClick={updateRecurring}>Zapisz zmiany</Btn>
          <Btn variant="danger" style={{width:"100%",justifyContent:"center"}} onClick={()=>deleteRecurring(editRecurring.id)}>🗑️ Usuń</Btn>
        </Modal>}

        {showScanner&&<ReceiptScanner
          onClose={()=>setShowScanner(false)}
          onConfirm={onScannerConfirm}
          expCats={expCats}
          incCats={incCats}
          memory={receiptMemory}
          setMemory={setReceiptMemory}
          selMonth={selMonth}
          existingExpenses={(monthData.expenses||[])}
          anthropicKey={anthropicKey}
        />}

        {showCatMgr&&<Modal title="Zarządzaj kategoriami" onClose={()=>setShowCatMgr(false)}>
          <CatMgrSection type="income" cats={incCats} color="#3DAA72"/>
          <CatMgrSection type="expense" cats={expCats} color="#E05C5C"/>
        </Modal>}
      </div>;
    }


    const emptyNFZ = () => ({patientName:"",address:"",phone:"",hasDisabilityCert:false,wheelchairModel:"",orderDate:"",notes:""});

    const nextOrderDate = (cas) => {
      if(!cas.orderDate) return null;
      const [y,m,d] = cas.orderDate.split("-").map(Number);
      const years = cas.hasDisabilityCert ? 1 : 4;
      return new Date(y+years,m-1,d).getFullYear()+"-"+String(new Date(y+years,m-1,d).getMonth()+1).padStart(2,"0")+"-"+String(new Date(y+years,m-1,d).getDate()).padStart(2,"0");
    };

    function NFZ({nfzCases,setNfzCases,initialSel,onSelCleared,setFinances}) {
      const dk = useContext(DarkCtx);
      const [showAdd,setShowAdd] = useState(false);
      const [form,setForm] = useState(emptyNFZ);
      const [selId,setSelId] = useState(null);
      const [editForm,setEditForm] = useState(null);
      const [confirmDel,setConfirmDel] = useState(false);
      const [toast,setToast] = useState(null);
      const [tab,setTab] = useState("orzeczenie");
      const [payModal,setPayModal] = useState(null); // {casId, date, name}
      const [payAmount,setPayAmount] = useState("");

      useEffect(()=>{if(initialSel!=null){setSelId(initialSel);}}, [initialSel]);
      const closeDetail=()=>{setSelId(null);if(onSelCleared)onSelCleared();};

      const cases = nfzCases || [];
      const today = todayLocal();

      const withCert  = cases.filter(c=>c.hasDisabilityCert);
      const withoutCert = cases.filter(c=>!c.hasDisabilityCert);
      const sortByNext = arr => [...arr].sort((a,b)=>{
        const na=nextOrderDate(a)||"9999", nb=nextOrderDate(b)||"9999";
        return na.localeCompare(nb);
      });

      if (selId !== null) {
        const cas = cases.find(c => c.id === selId);
        if (!cas) { setSelId(null); return null; }
        const nd = nextOrderDate(cas);
        const daysLeft = nd ? dateDiff(today, nd) : null;
        return <>
          <div>
            <button onClick={()=>setSelId(null)} style={{background:"none",border:"none",display:"flex",alignItems:"center",gap:6,color:"#0A7C7C",fontWeight:600,cursor:"pointer",padding:"20px 20px 0",fontFamily:"inherit",fontSize:14}}>
              <Ico d={I.back} s={18} c="#0A7C7C"/> Wózki
            </button>
            <div style={{padding:"16px 20px 0"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800}}>{cas.patientName}</div>
                <Btn small variant="secondary" onClick={()=>setEditForm({...cas})}>✏️ Edytuj</Btn>
              </div>
              <Card style={{marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:700,color:"#7A8FA6",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Dane pacjenta</div>
                <div style={{display:"grid",gap:10}}>
                  {cas.phone&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:14,color:dk?"#C8E8E8":"#1C2B3A"}}>{cas.phone}</span>
                    <a href={`tel:${cas.phone.replace(/\s/g,"")}`} style={{textDecoration:"none"}}><Btn small variant="secondary"><Ico d={I.ph} s={15} c="#0A7C7C"/> Zadzwoń</Btn></a>
                  </div>}
                  {cas.address&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:14,color:"#7A8FA6",flex:1,paddingRight:8}}>{cas.address}</span>
                    <a href={`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(cas.address)}`} target="_blank" rel="noreferrer" style={{textDecoration:"none",flexShrink:0}}><Btn small variant="secondary">🗺️ Trasa</Btn></a>
                  </div>}
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:18,height:18,borderRadius:5,border:`2px solid ${cas.hasDisabilityCert?"#3DAA72":"#E4EAF0"}`,background:cas.hasDisabilityCert?"#3DAA72":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {cas.hasDisabilityCert&&<span style={{color:"#fff",fontSize:11}}>✓</span>}
                    </div>
                    <span style={{fontSize:14,color:dk?"#C8E8E8":"#1C2B3A"}}>Orzeczenie o niepełnosprawności (stopień znaczny)</span>
                  </div>
                </div>
              </Card>
              {(cas.wheelchairModel||cas.orderDate)&&<Card style={{marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:700,color:"#7A8FA6",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Wózek</div>
                {cas.wheelchairModel&&<div style={{marginBottom:6}}><span style={{fontSize:12,color:"#7A8FA6"}}>Model: </span><span style={{fontWeight:600,fontSize:14}}>{cas.wheelchairModel}</span></div>}
                {cas.orderDate&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                  <div><span style={{fontSize:12,color:"#7A8FA6"}}>Data zamówienia: </span><span style={{fontWeight:600,fontSize:14}}>{cas.orderDate}</span></div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {cas.realized&&<span style={{fontSize:12,color:"#3DAA72",fontWeight:600}}>✓ Zrealizowano</span>}
                    <div onClick={()=>{if(!cas.realized){setPayModal({casId:cas.id,date:cas.orderDate,name:cas.patientName});setPayAmount("");}else{setNfzCases(cs=>cs.map(x=>x.id===cas.id?{...x,realized:false}:x));setToast("Cofnięto realizację");}}}
                      style={{width:24,height:24,borderRadius:7,border:`2px solid ${cas.realized?"#3DAA72":"#E4EAF0"}`,background:cas.realized?"#3DAA72":"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
                      {cas.realized&&<span style={{color:"#fff",fontSize:13}}>✓</span>}
                    </div>
                  </div>
                </div>}
                {nd&&<div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #E4EAF0"}}>

                  </div>
                </div>}
              </Card>}
              {cas.notes&&<Card style={{marginBottom:10,background:"#FFFBF5",border:"1.5px solid #F4A26130"}}>

          </div>
          {editForm&&<Modal title="Edytuj" onClose={()=>setEditForm(null)}>

            <Inp label="Adres" value={editForm.address||""} onChange={v=>setEditForm(f=>({...f,address:v}))} placeholder="ul. Przykładowa 1, Gliwice"/>
            <Inp label="Telefon" value={editForm.phone||""} onChange={v=>setEditForm(f=>({...f,phone:v}))} type="tel"/>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,cursor:"pointer"}} onClick={()=>setEditForm(f=>({...f,hasDisabilityCert:!f.hasDisabilityCert}))}>
              <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${editForm.hasDisabilityCert?"#3DAA72":"#E4EAF0"}`,background:editForm.hasDisabilityCert?"#3DAA72":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {editForm.hasDisabilityCert&&<span style={{color:"#fff",fontSize:13}}>✓</span>}
              </div>
              <span style={{fontSize:14,fontWeight:500}}>Orzeczenie o niepełnosprawności (stopień znaczny)</span>
            </div>
            <Inp label="Model wózka" value={editForm.wheelchairModel||""} onChange={v=>setEditForm(f=>({...f,wheelchairModel:v}))} placeholder="np. Wózek aktywny X"/>
            <Inp label="Data zamówienia" value={editForm.orderDate||""} onChange={v=>setEditForm(f=>({...f,orderDate:v}))} type="date"/>
            <Txa label="Notatki" value={editForm.notes||""} onChange={v=>setEditForm(f=>({...f,notes:v}))} rows={2}/>
            <Btn style={{width:"100%",justifyContent:"center"}} onClick={()=>{setNfzCases(cs=>cs.map(x=>x.id===selId?{...x,...editForm}:x));setEditForm(null);setToast("Zapisano zmiany");}}>Zapisz zmiany</Btn>
          </Modal>}
          {confirmDel&&<Modal title="Usuń" onClose={()=>setConfirmDel(false)}>
            <div style={{fontSize:15,marginBottom:20}}>Na pewno usunąć tę pozycję?</div>
            <div style={{display:"flex",gap:10}}>
              <Btn variant="secondary" style={{flex:1,justifyContent:"center"}} onClick={()=>setConfirmDel(false)}>Anuluj</Btn>
              <Btn variant="danger" style={{flex:1,justifyContent:"center"}} onClick={()=>{setFinances(fs=>fs.filter(f=>f.sourceId!=="wozek-"+selId));setNfzCases(cs=>cs.filter(x=>x.id!==selId));setConfirmDel(false);setSelId(null);}}>Usuń</Btn>
            </div>
          </Modal>}
          {payModal&&<Modal title="Kwota przychodu" onClose={()=>setPayModal(null)}>
            <div style={{fontSize:14,color:"#7A8FA6",marginBottom:14}}>{payModal.name} · {payModal.date}</div>
            <Inp label="Kwota (zł) *" value={payAmount} onChange={setPayAmount} type="number" placeholder="0"/>
            <Btn disabled={!payAmount||+payAmount<=0} style={{width:"100%",justifyContent:"center"}} onClick={()=>{
              const sid="wozek-"+payModal.casId;
              setFinances(fs=>[{id:Date.now(),sourceId:sid,date:payModal.date,type:"przychód",category:"Wózek",amount:+payAmount,description:"Wózek – "+payModal.name},...(fs||[])]);
              setNfzCases(cs=>cs.map(x=>x.id===payModal.casId?{...x,realized:true}:x));
              setPayModal(null);setPayAmount("");setToast("Dodano do finansów");
            }}>Zapisz i oznacz jako zrealizowany</Btn>
          </Modal>}
          {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
        </>;
      }

      const listItems = sortByNext(tab==="orzeczenie" ? withCert : withoutCert);
      return <div>
        <div style={{padding:"28px 20px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800}}>Wózki</div>
