tFamily:"inherit"}}>Nie masz konta? Zarejestruj się</button></>}{mode!=="login"&&<button onClick={()=>setMode("login")} style={{background:"none",border:"none",color:"#0A7C7C",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>← Wróć</button>}</div></div></div></div>;

function Dashboard({user}){

ontWeight:600}}>{r.equipment}</div><div style={{fontSize:13,color:"#7A8FA6"}}>{r.patient_name}</div></div><Bdg col={d<3?"#E05C5C":d<7?"#F4A261":"#3DAA72"} ch={d>0?`${d}d`:"Termin!"}/></div>}/>;})}</>}<div style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:700,margin:"16px 0 10px"}}>Wynik miesiąca</div><Card ch={<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>{[{l:"Przychód",v:stats.inc,c:"#3DAA72"},{l:"Koszty",v:stats.cst,c:"#E05C5C"},{l:"Zysk",v:stats.prf,c:stats.prf>=0?"#0A7C7C":"#E05C5C"}].map((x,i)=><div key={i} style={{textAlign:"center",padding:"8px 4px",background:x.c+"14",borderRadius:12}}><div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,color:x.c}}>{x.v} zł</div><div style={{fontSize:11,color:"#7A8FA6",marginTop:2}}>{x.l}</div></div>)}</div>}/></div></div>;

function Patients({user}){
  const [pts,setPts]=useState([]);const [sel,setSel]=useState(null);const [vis,setVis]=useState([]);const [ld,setLd]=useState(true);const [sAdd,setSAdd]=useState(false);const [sVis,setSVis]=useState(false);const [srch,setSrch]=useState("");

  const cmpV=async id=>{await sb.from("visits").update({status:"zakończona"}).eq("id",id);setVis(v=>v.map(x=>x.id===id?{...x,status:"zakończona"}:x));};
  const filt=pts.filter(p=>p.name.toLowerCase().includes(srch.toLowerCase())||p.phone?.includes(srch));

  }
  if(ld)return<Ldg/>;
  return<div><div style={{padding:"28px 20px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800}}>Pacjenci</div><div style={{fontSize:13,color:"#7A8FA6"}}>{pts.length} pacjentów</div></div><Btn ch={<><Ico d={I.plus} s={16} c="#fff"/> Nowy</>} oc={()=>setSAdd(true)} sm/></div><div style={{padding:"0 20px"}}><Inp val={srch} oc={setSrch} ph="🔍 Szukaj pacjenta..."/>{filt.length===0?<Mpty t={srch?"Brak wyników":"Dodaj pierwszego pacjenta!"}/>:filt.map(p=><Card key={p.id} oc={()=>opn(p)} ch={<><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{display:"flex",gap:12,alignItems:"center"}}><Av name={p.name}/><div><div style={{fontWeight:600}}>{p.name}</div><div style={{fontSize:13,color:"#7A8FA6"}}>{p.phone}</div></div></div><Ico d="M9 18l6-6-6-6" s={20} c="#7A8FA6"/></div>{p.diagnosis&&<div style={{fontSize:12,color:"#7A8FA6",marginTop:8,paddingTop:8,borderTop:"1px solid #E4EAF0"}}>{p.diagnosis}</div>}</>}/>)}</div>{sAdd&&<Modal title="Nowy pacjent" onClose={()=>setSAdd(false)}><Inp lb="Imię i nazwisko *" val={f.name} oc={v=>setF(x=>({...x,name:v}))} ph="Jan Kowalski"/><Inp lb="Telefon" val={f.phone} oc={v=>setF(x=>({...x,phone:v}))} ph="600 000 000" tp="tel"/><Inp lb="Adres" val={f.address} oc={v=>setF(x=>({...x,address:v}))} ph="ul. Przykładowa 1, Gliwice"/><Txa lb="Diagnoza" val={f.diagnosis} oc={v=>setF(x=>({...x,diagnosis:v}))} ph="np. po endoprotezoplastyce" rows={2}/><Txa lb="Notatki" val={f.notes} oc={v=>setF(x=>({...x,notes:v}))} ph="np. wymaga CPM" rows={2}/><Btn ch={sav?"Zapisywanie...":"Dodaj pacjenta"} oc={addP} dis={sav||!f.name} st={{width:"100%",justifyContent:"center"}}/></Modal>}</div>;
}

function Rentals({user}){
  const [ren,setRen]=useState([]);const [ld,setLd]=useState(true);const [fil,setFil]=useState("aktywne");const [sAdd,setSAdd]=useState(false);const [sav,setSav]=useState(false);
  const [f,setF]=useState({equipment:"Maszyna CPM (kolano)",patient_name:"",phone:"",start_date:new Date().toISOString().split("T")[0],end_date:"",daily_rate:"",deposit:""});
  useEffect(()=>{sb.from("rentals").select("*").eq("user_id",user.id).order("start_date",{ascending:false}).then(({data})=>{setRen(data||[]);setLd(false);});},[]);
  const add=async()=>{if(!f.patient_name||!f.end_date)return;setSav(true);const{data}=await sb.from("rentals").insert({...f,daily_rate:+f.daily_rate,deposit:+f.deposit,status:"aktywne",user_id:user.id}).select().single();if(data)setRen(r=>[data,...r]);setF({equipment:"Maszyna CPM (kolano)",patient_name:"",phone:"",start_date:new Date().toISOString().split("T")[0],end_date:"",daily_rate:"",deposit:""});setSAdd(false);setSav(false);};
  const ret=async id=>{await sb.from("rentals").update({status:"zakończone"}).eq("id",id);setRen(r=>r.map(x=>x.id===id?{...x,status:"zakończone"}:x));};
  const filt=ren.filter(r=>r.status===fil);
  if(ld)return<Ldg/>;
  return<div><div style={{padding:"28px 20px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800}}>Wypożyczalnia</div><Btn ch={<><Ico d={I.plus} s={16} c="#fff"/> Nowe</>} oc={()=>setSAdd(true)} sm/></div><div style={{display:"flex",gap:8,padding:"0 20px 16px"}}>{[["aktywne",ren.filter(r=>r.status==="aktywne").length],["zakończone",ren.filter(r=>r.status==="zakończone").length]].map(([s,cnt])=><button key={s} onClick={()=>setFil(s)} style={{padding:"8px 16px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,background:fil===s?"#0A7C7C":"#E4EAF0",color:fil===s?"#fff":"#7A8FA6",fontFamily:"inherit"}}>{s.charAt(0).toUpperCase()+s.slice(1)} ({cnt})</button>)}</div><div style={{padding:"0 20px"}}>{filt.length===0?<Mpty t={`Brak ${fil} wypożyczeń`}/>:filt.map(r=>{const d=Math.ceil((new Date(r.end_date)-new Date())/86400000);return<Card key={r.id} ch={<><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}><div><div style={{fontWeight:700,fontSize:15}}>{r.equipment}</div><div style={{fontSize:14,color:"#7A8FA6"}}>{r.patient_name}</div>{r.phone&&<a href={`tel:${r.phone}`} style={{fontSize:13,color:"#0A7C7C",textDecoration:"none"}}>{r.phone}</a>}</div>{r.status==="aktywne"&&<Bdg col={d<0?"#E05C5C":d<7?"#F4A261":"#3DAA72"} ch={d>0?`${d}d`:d===0?"Dziś!":`${Math.abs(d)}d po terminie`}/>}</div><div style={{display:"flex",flexWrap:"wrap",gap:"4px 16px",fontSize:12,color:"#7A8FA6",marginBottom:r.status==="aktywne"?12:0}}><span>📅 {r.start_date} → {r.end_date}</span><span>💰 {r.daily_rate} zł/dzień</span><span>🔒 Kaucja: {r.deposit} zł</span></div>{r.status==="aktywne"&&<Btn ch={<><Ico d={I.chk} s={15} c="#0A7C7C"/> Sprzęt zwrócony</>} oc={()=>ret(r.id)} v="secondary" sm st={{width:"100%",justifyContent:"center"}}/>}</>}/>;})}</div>{sAdd&&<Modal title="Nowe wypożyczenie" onClose={()=>setSAdd(false)}><Sel lb="Sprzęt" val={f.equipment} oc={v=>setF(x=>({...x,equipment:v}))} opts={["Maszyna CPM (kolano)","Maszyna CPM (biodro)","Balkonik aluminiowy","Kule łokciowe (para)","Chodzik","Inne"].map(x=>({v:x,l:x}))}/><Inp lb="Pacjent *" val={f.patient_name} oc={v=>setF(x=>({...x,patient_name:v}))} ph="Jan Kowalski"/><Inp lb="Telefon" val={f.phone} oc={v=>setF(x=>({...x,phone:v}))} ph="600 000 000" tp="tel"/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Inp lb="Data od" val={f.start_date} oc={v=>setF(x=>({...x,start_date:v}))} tp="date"/><Inp lb="Data do *" val={f.end_date} oc={v=>setF(x=>({...x,end_date:v}))} tp="date"/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Inp lb="Stawka (zł/dzień)" val={f.daily_rate} oc={v=>setF(x=>({...x,daily_rate:v}))} tp="number" ph="25"/><Inp lb="Kaucja (zł)" val={f.deposit} oc={v=>setF(x=>({...x,deposit:v}))} tp="number" ph="300"/></div><Btn ch={sav?"Zapisywanie...":"Zapisz wypożyczenie"} oc={add} dis={sav||!f.patient_name||!f.end_date} st={{width:"100%",justifyContent:"center"}}/></Modal>}</div>;
}

function Finances({user}){
  const [fin,setFin]=useState([]);const [ld,setLd]=useState(true);const [sAdd,setSAdd]=useState(false);const [sav,setSav]=useState(false);const [mo,setMo]=useState(new Date().toISOString().slice(0,7));
  const [f,setF]=useState({date:new Date().toISOString().split("T")[0],type:"przychód",category:"Wizyta",amount:"",description:""});
  const cats={przychód:["Wizyta","Wypożyczalnia","Konsultacja","Inne"],koszt:["Paliwo","Sprzęt","Marketing","ZUS","Podatki","Inne"]};
  useEffect(()=>{sb.from("finances").select("*").eq("user_id",user.id).order("date",{ascending:false}).then(({data})=>{setFin(data||[]);setLd(false);});},[]);
  const add=async()=>{if(!f.amount)return;setSav(true);const{data}=await sb.from("finances").insert({...f,amount:+f.amount,user_id:user.id}).select().single();if(data)setFin(x=>[data,...x]);setF({date:new Date().toISOString().split("T")[0],type:"przychód",category:"Wizyta",amount:"",description:""});setSAdd(false);setSav(false);};
  const mly=fin.filter(x=>x.date?.startsWith(mo));const inc=mly.filter(x=>x.type==="przychód").reduce((s,x)=>s+ +x.amount,0);const cst=mly.filter(x=>x.type==="koszt").reduce((s,x)=>s+ +x.amount,0);
  const mos=[...new Set(fin.map(x=>x.date?.slice(0,7)))].filter(Boolean).sort().reverse();
  if(ld)return<Ldg/>;
  return<div><div style={{padding:"28px 20px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800}}>Finanse</div><Btn ch={<><Ico d={I.plus} s={16} c="#fff"/> Dodaj</>} oc={()=>setSAdd(true)} sm/></div><div style={{padding:"0 20px"}}><div style={{overflowX:"auto",display:"flex",gap:8,paddingBottom:4,marginBottom:16}}>{(mos.length?mos:[mo]).map(m=><button key={m} onClick={()=>setMo(m)} style={{padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,whiteSpace:"nowrap",background:mo===m?"#0A7C7C":"#E4EAF0",color:mo===m?"#fff":"#7A8FA6",fontFamily:"inherit"}}>{new Date(m+"-01").toLocaleDateString("pl-PL",{month:"long",year:"numeric"})}</button>)}</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>{[{l:"Przychód",v:inc,c:"#3DAA72"},{l:"Koszty",v:cst,c:"#E05C5C"},{l:"Wynik",v:inc-cst,c:inc-cst>=0?"#0A7C7C":"#E05C5C"}].map((x,i)=><div key={i} style={{background:x.c+"14",borderRadius:14,padding:"12px 8px",textAlign:"center",border:`1.5px solid ${x.c}30`}}><div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,color:x.c}}>{x.v} zł</div><div style={{fontSize:11,color:"#7A8FA6",marginTop:2}}>{x.l}</div></div>)}</div>{mly.length===0?<Mpty t="Brak wpisów w tym miesiącu"/>:mly.map(x=><Card key={x.id} ch={<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:600}}>{x.description||x.category}</div><div style={{fontSize:13,color:"#7A8FA6"}}>{x.date} · {x.category}</div></div><span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:16,color:x.type==="przychód"?"#3DAA72":"#E05C5C"}}>{x.type==="przychód"?"+":"−"}{x.amount} zł</span></div>}/>)}</div>{sAdd&&<Modal title="Nowy wpis" onClose={()=>setSAdd(false)}><Sel lb="Typ" val={f.type} oc={v=>setF(x=>({...x,type:v,category:cats[v][0]}))} opts={[{v:"przychód",l:"📈 Przychód"},{v:"koszt",l:"📉 Koszt"}]}/><Sel lb="Kategoria" val={f.category} oc={v=>setF(x=>({...x,category:v}))} opts={cats[f.type].map(c=>({v:c,l:c}))}/><Inp lb="Kwota (zł) *" val={f.amount} oc={v=>setF(x=>({...x,amount:v}))} tp="number" ph="150"/><Inp lb="Opis" val={f.description} oc={v=>setF(x=>({...x,description:v}))} ph="np. wizyta u Jana Kowalskiego"/><Inp lb="Data" val={f.date} oc={v=>setF(x=>({...x,date:v}))} tp="date"/><Btn ch={sav?"Zapisywanie...":"Zapisz"} oc={add} dis={sav||!f.amount} st={{width:"100%",justifyContent:"center"}}/></Modal>}</div>;
}

function Marketing(){
  const [tp,setTp]=useState("fizjoterapia domowa – korzyści i jak działa");const [tn,setTn]=useState("profesjonalny i merytoryczny");const [post,setPost]=useState("");const [ld,setLd]=useState(false);const [cp,setCp]=useState(false);
  const topics=[{v:"fizjoterapia domowa – korzyści i jak działa",l:"Fizjoterapia domowa"},{v:"rehabilitacja po endoprotezoplastyce biodra lub kolana",l:"Po endoprotezie"},{v:"wypożyczanie maszyny CPM",l:"Maszyna CPM"},{v:"rehabilitacja neurologiczna i polineuropatia",l:"Rehab neurologiczna"},{v:"ćwiczenia profilaktyczne dla seniorów",l:"Seniorzy"},{v:"wypożyczalnia sprzętu – balkoniki, kule, chodziki",l:"Wypożyczalnia"}];
  const gen=async()=>{setLd(true);setPost("");try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`Napisz post na Facebook dla ZubrzyckiFizjo z Gliwic. Właściciel: Patryk Zubrzycki – fizjoterapeuta.\n\nTemat: ${tp}\nTon: ${tn}\n\nZasady: po polsku, naturalnie, 3-5 zdań + emoji, 4-6 hashtagów, podpisz "Patryk Zubrzycki – fizjoterapeuta 💚". Tylko treść posta.`}]})});const d=await r.json();setPost(d.content?.[0]?.text||"Błąd generowania.");}catch{setPost("Błąd połączenia.");}setLd(false);};
  const copy=()=>{navigator.clipboard.writeText(post);setCp(true);setTimeout(()=>setCp(false),2000);};
  return<div><div style={{padding:"28px 20px 16px"}}><div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800}}>Generator postów</div><div style={{fontSize:13,color:"#7A8FA6",marginTop:2}}>AI tworzy posty na Facebooka</div></div><div style={{padding:"0 20px"}}><div style={{marginBottom:16}}><div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Temat</div><div style={{display:"flex",flexWrap:"wrap",gap:8}}>{topics.map(t=><button key={t.v} onClick={()=>setTp(t.v)} style={{padding:"8px 14px",borderRadius:20,border:`1.5px solid ${tp===t.v?"#0A7C7C":"#E4EAF0"}`,background:tp===t.v?"#0A7C7C":"#fff",color:tp===t.v?"#fff":"#1C2B3A",fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}}>{t.l}</button>)}</div></div><div style={{marginBottom:20}}><div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Ton</div><div style={{display:"flex",gap:8}}>{[["profesjonalny i merytoryczny","Profesjonalny"],["ciepły i empatyczny","Ciepły"],["edukacyjny","Edukacyjny"]].map(([v,l])=><button key={v} onClick={()=>setTn(v)} style={{padding:"8px 14px",borderRadius:20,border:`1.5px solid ${tn===v?"#F4A261":"#E4EAF0"}`,background:tn===v?"#F4A261":"#fff",color:tn===v?"#fff":"#1C2B3A",fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>)}</div></div><Btn ch={ld?"⏳ Generuję...":<><Ico d={I.sp} s={18} c="#fff" f="#fff"/> Generuj post</>} oc={gen} v="orange" dis={ld} st={{width:"100%",justifyContent:"center",fontSize:16,padding:14}}/>{post&&<Card st={{marginTop:16,background:"#FFFBF5",border:"1.5px solid #F4A26140"}} ch={<><div style={{lineHeight:1.7,whiteSpace:"pre-wrap",fontSize:15}}>{post}</div><button onClick={copy} style={{marginTop:14,background:cp?"#3DAA72":"#F4A261",color:"#fff",border:"none",borderRadius:10,padding:"10px 16px",fontWeight:600,fontSize:14,cursor:"pointer",width:"100%",fontFamily:"inherit"}}>{cp?"✓ Skopiowano!":"📋 Kopiuj do schowka"}</button></>}/>}</div></div>;
}

const TABS=[{id:"dashboard",i:I.home,l:"Pulpit"},{id:"patients",i:I.users,l:"Pacjenci"},{id:"rentals",i:I.equip,l:"Sprzęt"},{id:"finances",i:I.fin,l:"Finanse"},{id:"marketing",i:I.mkt,l:"Marketing"}];

function App(){
  const [ses,setSes]=useState(null);const [ld,setLd]=useState(true);const [tab,setTab]=useState("dashboard");
  useEffect(()=>{sb.auth.getSession().then(({data:{session}})=>{setSes(session);setLd(false);});const{data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>setSes(s));return()=>subscription.unsubscribe();},[]);
  if(ld)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#F2F5F7"}}><div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20,color:"#0A7C7C"}}>ZubrzyckiFizjo</div></div>;
  if(!ses)return<Auth/>;
  return<div style={{maxWidth:480,margin:"0 auto",background:"#F2F5F7",minHeight:"100vh"}}><div style={{paddingBottom:80,minHeight:"100vh"}}>{tab==="dashboard"&&<Dashboard user={ses.user}/>}{tab==="patients"&&<Patients user={ses.user}/>}{tab==="rentals"&&<Rentals user={ses.user}/>}{tab==="finances"&&<Finances user={ses.user}/>}{tab==="marketing"&&<Marketing/>}</div><div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:"1px solid #E4EAF0",display:"flex",padding:"8px 0 12px",zIndex:50,boxShadow:"0 -4px 20px rgba(0,0,0,.06)"}}>{TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 0",fontFamily:"inherit"}}><div style={{width:36,height:36,borderRadius:12,background:tab===t.id?"#0A7C7C":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}><Ico d={t.i} s={18} c={tab===t.id?"#fff":"#7A8FA6"}/></div><span style={{fontSize:10,fontWeight:600,color:tab===t.id?"#0A7C7C":"#7A8FA6"}}>{t.l}</span></button>)}</div></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
