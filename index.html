<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#0A7C7C"/>
  <title>ZubrzyckiFizjo</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#F2F5F7;color:#1C2B3A;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
    input,select,textarea,button{font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent}
    ::-webkit-scrollbar{display:none}*{scrollbar-width:none}
    .loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;background:#F2F5F7}
    .spinner{width:40px;height:40px;border:3px solid #E4EAF0;border-top-color:#0A7C7C;border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const SUPA_URL = "https://xqjrlzsdfyjeajfkathx.supabase.co";
    const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxanJsenNkZnlqZWFqZmthdGh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NjUzMzgsImV4cCI6MjA4ODE0MTMzOH0.sFWfnIV0tpNnwB65du9dNYTMSelrlEpMXxWf4Mcww4g";

    async function dbGet(key) {
      try {
        const r = await fetch(`${SUPA_URL}/rest/v1/app_data?key=eq.${key}&select=value`,
          {headers:{"apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`}});
        const d = await r.json();
        return d?.[0]?.value ?? null;
      } catch { return null; }
    }
    async function dbSet(key, value) {
      try {
        await fetch(`${SUPA_URL}/rest/v1/app_data`,{method:"POST",
          headers:{"apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},
          body:JSON.stringify({key,value})});
      } catch {}
    }
    function usePersistedState(key, initial) {
      const [state, setState] = useState(initial);
      const [loaded, setLoaded] = useState(false);
      useEffect(()=>{dbGet(key).then(v=>{if(v!==null)setState(v);setLoaded(true);});},[]);
      useEffect(()=>{if(!loaded)return;const t=setTimeout(()=>dbSet(key,state),800);return()=>clearTimeout(t);},[state,loaded]);
      return [state,setState,loaded];
    }

    // ── UTILS ─────────────────────────────────────────────────────────────────
    const todayLocal = () => { const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
    const dateDiff = (a,b) => { const [ay,am,ad]=a.split("-").map(Number),[by,bm,bd]=b.split("-").map(Number); return Math.ceil((new Date(by,bm-1,bd)-new Date(ay,am-1,ad))/86400000); };
    const visitStatus = v => {
      if(v.status==="zakończona") return "zakończona";
      if(v.status==="anulowana") return "anulowana";
      if(!v.date) return "zaplanowana";
      return new Date(v.date+"T"+(v.time||"00:00")+":00") <= new Date() ? "zakończona" : "zaplanowana";
    };
    const emptyVisit = () => ({date:todayLocal(),time:"10:00",type:"Rehabilitacja domowa",price:"150",status:"zaplanowana",patientName:"",patientId:null});
    const emptyRental = () => ({equipment:"Artromot K1 2025",patientName:"",phone:"",address:"",startDate:todayLocal(),endDate:"",renewable:false,amount:"",amountPaid:"",transport:"",notes:""});

    const VISIT_TYPES = ["Rehabilitacja domowa","Kinezyterapia","Masaż leczniczy","Krioterapia","Elektroterapia","Konsultacja","Inne"];
    const EQUIPMENT = ["Artromot K1 2025","Artromot K1 I","Kinetec Spectra","Kinetec Spectra SZ","Optiflex","Ambonka Paula"];

    // ── UI ────────────────────────────────────────────────────────────────────
    const I = {
      home:"M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z M9 22V12h6v10",
      users:"M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2 M23 21v-2a4 4 0 00-3-3.87 M16 3.13a4 4 0 010 7.75",
      equip:"M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18",
      fin:"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z",
      mkt:"M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z",
      plus:"M12 5v14 M5 12h14",back:"M19 12H5 M12 19l-7-7 7-7",chk:"M20 6L9 17l-5-5",
      ph:"M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.08 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z",
      sp:"M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z",
    };
    const Ico = ({d,s=20,c="#1C2B3A",f="none"}) => <svg width={s} height={s} viewBox="0 0 24 24" fill={f} stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d.split(" M").map((p,i)=><path key={i} d={(i?"M":"")+p}/>)}</svg>;

    const Btn = ({children,onClick,variant="primary",small,disabled,style={}}) => {
      const v={primary:{background:"#0A7C7C",color:"#fff"},secondary:{background:"#E6F4F4",color:"#0A7C7C"},orange:{background:"#F4A261",color:"#fff"},danger:{background:"#FEE2E2",color:"#E05C5C"}};
      return <button onClick={onClick} disabled={disabled} style={{...v[variant],border:"none",borderRadius:12,padding:small?"8px 14px":"13px 18px",fontSize:small?13:15,fontWeight:600,cursor:disabled?"not-allowed":"pointer",display:"flex",alignItems:"center",gap:6,opacity:disabled?.5:1,fontFamily:"inherit",...style}}>{children}</button>;
    };
    const Card = ({children,onClick,style={}}) => <div onClick={onClick} style={{background:"#fff",borderRadius:16,padding:"14px 16px",marginBottom:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)",cursor:onClick?"pointer":"default",...style}}>{children}</div>;
    const Badge = ({children,color="#0A7C7C"}) => <span style={{background:color+"18",color,borderRadius:8,padding:"3px 8px",fontSize:11,fontWeight:700}}>{children}</span>;
    const Empty = ({text}) => <div style={{textAlign:"center",padding:"40px 20px",color:"#7A8FA6",fontSize:14}}>{text}</div>;
    const Av = ({name}) => { const i=(name||"?").split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase(); return <div style={{width:40,height:40,borderRadius:12,background:"#E6F4F4",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14,color:"#0A7C7C",flexShrink:0}}>{i}</div>; };

    function Toast({msg,onDone}) {
      useEffect(()=>{const t=setTimeout(onDone,2200);return()=>clearTimeout(t);},[]);
      return <div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",background:"#1C2B3A",color:"#fff",borderRadius:14,padding:"12px 20px",fontSize:14,fontWeight:600,zIndex:999,boxShadow:"0 4px 20px rgba(0,0,0,.25)",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:8}}><span style={{color:"#3DAA72",fontSize:16}}>✓</span>{msg}</div>;
    }

    function Modal({title,onClose,children}) {
      return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div style={{background:"#fff",borderRadius:"24px 24px 0 0",width:"100%",maxWidth:480,maxHeight:"92vh",overflowY:"auto",padding:"20px 20px 40px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:19,fontWeight:700}}>{title}</div>
            <button onClick={onClose} style={{background:"#F2F5F7",border:"none",borderRadius:10,width:32,height:32,cursor:"pointer",fontSize:18,color:"#7A8FA6",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
          </div>
          {children}
        </div>
      </div>;
    }

    function Inp({label,value,onChange,type="text",placeholder=""}) {
      return <div style={{marginBottom:14}}>
        {label&&<div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>{label}</div>}
        <input type={type} value={value||""} placeholder={placeholder} onChange={e=>onChange(e.target.value)}
          style={{width:"100%",padding:"11px 14px",border:"1.5px solid #E4EAF0",borderRadius:12,fontSize:15,outline:"none",background:"#FAFCFD",fontFamily:"inherit"}}/>
      </div>;
    }
    function Txa({label,value,onChange,rows=3,placeholder=""}) {
      return <div style={{marginBottom:14}}>
        {label&&<div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>{label}</div>}
        <textarea value={value||""} rows={rows} placeholder={placeholder} onChange={e=>onChange(e.target.value)}
          style={{width:"100%",padding:"11px 14px",border:"1.5px solid #E4EAF0",borderRadius:12,fontSize:15,outline:"none",background:"#FAFCFD",fontFamily:"inherit",resize:"vertical"}}/>
      </div>;
    }
    function Sel({label,value,onChange,options}) {
      return <div style={{marginBottom:14}}>
        {label&&<div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>{label}</div>}
        <select value={value} onChange={e=>onChange(e.target.value)}
          style={{width:"100%",padding:"11px 14px",border:"1.5px solid #E4EAF0",borderRadius:12,fontSize:15,outline:"none",background:"#FAFCFD",fontFamily:"inherit"}}>
          {options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
      </div>;
    }
    function PatientPicker({label,value,onChange,onSelect,patients}) {
      const [open,setOpen]=useState(false);
      const matches=(patients||[]).filter(p=>value&&p.name.toLowerCase().includes(value.toLowerCase())).slice(0,6);
      return <div style={{marginBottom:14,position:"relative"}}>
        {label&&<div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>{label}</div>}
        <input value={value||""} placeholder="Wpisz imię pacjenta..." onChange={e=>{onChange(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),150)}
          style={{width:"100%",padding:"11px 14px",border:"1.5px solid #E4EAF0",borderRadius:12,fontSize:15,outline:"none",background:"#FAFCFD",fontFamily:"inherit"}}/>
        {open&&matches.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",borderRadius:12,boxShadow:"0 4px 20px rgba(0,0,0,.12)",zIndex:200,overflow:"hidden"}}>
          {matches.map(p=><div key={p.id} onPointerDown={e=>{e.preventDefault();onChange(p.name);if(onSelect)onSelect(p);setOpen(false);}} style={{padding:"12px 16px",cursor:"pointer",borderBottom:"1px solid #F2F5F7",fontSize:14,fontWeight:500}}>
            {p.name} <span style={{color:"#7A8FA6",fontSize:12}}>{p.phone}</span>
          </div>)}
        </div>}
      </div>;
    }
    function ClockDisplay() {
      const [t,setT]=useState(()=>new Date().toLocaleTimeString("pl-PL",{hour:"2-digit",minute:"2-digit"}));
      useEffect(()=>{const i=setInterval(()=>setT(new Date().toLocaleTimeString("pl-PL",{hour:"2-digit",minute:"2-digit"})),1000);return()=>clearInterval(i);},[]);
      return <span>{t}</span>;
    }

    function MiniCalendar({visits,today,onEditVisit,onAddVisit}) {
      const [calYear,setCalYear]=useState(()=>+today.slice(0,4));
      const [calMonth,setCalMonth]=useState(()=>+today.slice(5,7));
      const [openDay,setOpenDay]=useState(null);

      const daysInMonth=new Date(calYear,calMonth,0).getDate();
      const firstDow=new Date(calYear,calMonth-1,1).getDay(); // 0=Sun
      const startOffset=(firstDow+6)%7; // Mon=0
      const monthStr=calYear+"-"+String(calMonth).padStart(2,"0");

      const prevMonth=()=>{if(calMonth===1){setCalYear(y=>y-1);setCalMonth(12);}else setCalMonth(m=>m-1);setOpenDay(null);};
      const nextMonth=()=>{if(calMonth===12){setCalYear(y=>y+1);setCalMonth(1);}else setCalMonth(m=>m+1);setOpenDay(null);};

      const visitsByDay=useMemo(()=>{
        const m={};
        visits.filter(v=>v.date&&v.date.startsWith(monthStr)).forEach(v=>{
          const d=+v.date.slice(8);
          if(!m[d])m[d]=[];
          m[d].push(v);
        });
        return m;
      },[visits,monthStr]);

      const DOW=["Pn","Wt","Śr","Cz","Pt","Sb","Nd"];
      const todayDay=today.startsWith(monthStr)?+today.slice(8):null;

      const cells=[];
      for(let i=0;i<startOffset;i++)cells.push(null);
      for(let d=1;d<=daysInMonth;d++)cells.push(d);

      const dayVisits=openDay?((visitsByDay[openDay]||[]).sort((a,b)=>(a.time||"").localeCompare(b.time||""))):[];
      const openDateStr=openDay?monthStr+"-"+String(openDay).padStart(2,"0"):null;

      return <div style={{marginTop:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:700}}>Kalendarz</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={prevMonth} style={{background:"#E4EAF0",border:"none",borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
            <span style={{fontSize:13,fontWeight:600,color:"#1C2B3A",minWidth:100,textAlign:"center",textTransform:"capitalize"}}>{new Date(calYear,calMonth-1,15).toLocaleDateString("pl-PL",{month:"long",year:"numeric"})}</span>
            <button onClick={nextMonth} style={{background:"#E4EAF0",border:"none",borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
          </div>
        </div>
        <div style={{background:"#fff",borderRadius:16,padding:"12px 10px",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:6}}>
            {DOW.map(d=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:700,color:"#7A8FA6",padding:"2px 0"}}>{d}</div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
            {cells.map((d,i)=>{
              if(!d)return<div key={"e"+i}/>;
              const cnt=(visitsByDay[d]||[]).length;
              const isToday=d===todayDay;
              const isOpen=d===openDay;
              return <div key={d} onClick={()=>setOpenDay(isOpen?null:d)} style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"5px 2px",borderRadius:10,cursor:"pointer",background:isOpen?"#0A7C7C":isToday?"#E6F4F4":"transparent",transition:"background .15s"}}>
                <span style={{fontSize:13,fontWeight:isToday||isOpen?700:400,color:isOpen?"#fff":isToday?"#0A7C7C":"#1C2B3A"}}>{d}</span>
                {cnt>0&&<div style={{display:"flex",gap:2,marginTop:2}}>
                  {[...Array(Math.min(cnt,3))].map((_,j)=><div key={j} style={{width:4,height:4,borderRadius:"50%",background:isOpen?"rgba(255,255,255,.8)":"#0A7C7C"}}/>)}
                </div>}
              </div>;
            })}
          </div>
        </div>

        {openDay&&<div style={{marginTop:8,background:"#fff",borderRadius:16,padding:"14px 16px",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontWeight:700,fontSize:14}}>{new Date(openDateStr+"T12:00:00").toLocaleDateString("pl-PL",{weekday:"long",day:"numeric",month:"long"})}</div>
            <button onClick={()=>onAddVisit(openDateStr)} style={{background:"#0A7C7C",color:"#fff",border:"none",borderRadius:10,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>+ Wizyta</button>
          </div>
          {dayVisits.length===0
            ?<div style={{fontSize:13,color:"#7A8FA6",textAlign:"center",padding:"10px 0"}}>Brak wizyt tego dnia</div>
            :dayVisits.map(v=><div key={v.id} onClick={()=>onEditVisit(v)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #F2F5F7",cursor:"pointer"}}>
                <div><div style={{fontWeight:600,fontSize:14}}>{v.time} · {v.patientName}</div><div style={{fontSize:12,color:"#7A8FA6"}}>{v.type}</div></div>
                <div style={{textAlign:"right"}}><div style={{fontWeight:600,fontSize:13,marginBottom:3}}>{v.price} zł</div><Badge color={visitStatus(v)==="zakończona"?"#3DAA72":"#0A7C7C"}>{visitStatus(v)}</Badge></div>
              </div>)
          }
        </div>}
      </div>;
    }

    // ── DASHBOARD ─────────────────────────────────────────────────────────────
    function Dashboard({visits,setVisits,rentals,setRentals,finances,setFinances,patients,goToRental}) {
      const today = todayLocal();
      const [showAdd,setShowAdd]=useState(false);
      const [vf,setVf]=useState(emptyVisit);
      const [editV,setEditV]=useState(null);
      const [confirmDel,setConfirmDel]=useState(null);
      const [toast,setToast]=useState(null);

      const tomorrowDate=(()=>{const d=new Date(today+"T12:00:00");d.setDate(d.getDate()+1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");})();
      const todayV = visits.filter(v=>v.date===today).sort((a,b)=>(a.time||"").localeCompare(b.time||""));
      const tomorrowV = visits.filter(v=>v.date===tomorrowDate).sort((a,b)=>(a.time||"").localeCompare(b.time||""));
      const upcoming = rentals.filter(r=>r.status==="aktywne"&&r.endDate&&!r.renewable).sort((a,b)=>a.endDate.localeCompare(b.endDate)).slice(0,5);
      const unpaidCycles = rentals.filter(r=>r.status==="aktywne"&&r.renewable&&(r.cycles||[]).some(c=>!c.paid));

      const syncFinance = (v, isNew=false) => {
        const done = v.status==="zakończona" || new Date(v.date+"T"+(v.time||"00:00")+":00")<=new Date();
        if(!done) return;
        const sid = "visit-"+v.id;
        setFinances(fs=>{
          const exists = fs.some(f=>f.sourceId===sid);
          if(isNew && !exists) return [{id:Date.now()+Math.random(),sourceId:sid,date:v.date,type:"przychód",category:"Wizyta",amount:v.price||0,description:"Wizyta – "+v.patientName},...fs];
          if(!isNew && exists) return fs.map(f=>f.sourceId===sid?{...f,amount:v.price,description:"Wizyta – "+v.patientName,date:v.date}:f);
          if(!isNew && !exists) return [{id:Date.now()+Math.random(),sourceId:sid,date:v.date,type:"przychód",category:"Wizyta",amount:v.price||0,description:"Wizyta – "+v.patientName},...fs];
          return fs;
        });
      };

      const saveNew = () => {
        if(!vf.patientName) return;
        const pat=patients.find(p=>p.name===vf.patientName);
        const nv={id:Date.now(),...vf,price:+vf.price,patientId:pat?.id||null};
        setVisits(vs=>[...vs,nv]);
        syncFinance(nv,true);
        setShowAdd(false); setVf(emptyVisit()); setToast("Wizyta zapisana");
      };
      const saveEdit = () => {
        if(!editV) return;
        const u={...editV,price:+editV.price};
        setVisits(vs=>vs.map(v=>v.id===u.id?{...v,...u}:v));
        syncFinance(u,false);
        setEditV(null); setToast("Zmiany zapisane");
      };
      const delVisit = id => {
        setVisits(vs=>vs.filter(v=>v.id!==id));
        setFinances(fs=>fs.filter(f=>f.sourceId!=="visit-"+id));
        setConfirmDel(null); setEditV(null);
      };

      return <>
        <div>
          <div style={{padding:"28px 20px 16px"}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800}}>Pulpit</div>
            <div style={{fontSize:13,color:"#7A8FA6",marginTop:4,display:"flex",justifyContent:"space-between"}}>
              <span>{new Date(today+"T12:00:00").toLocaleDateString("pl-PL",{weekday:"long",day:"numeric",month:"long"})}</span>
              <span style={{fontWeight:600,color:"#0A7C7C"}}><ClockDisplay/></span>
            </div>
          </div>
          <div style={{padding:"0 20px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:700}}>Wizyty dziś ({todayV.length})</div>
              <Btn small onClick={()=>{setVf(emptyVisit());setShowAdd(true);}}><Ico d={I.plus} s={15} c="#fff"/> Wizyta</Btn>
            </div>
            {todayV.length===0?<Empty text="Brak wizyt na dziś"/>:todayV.map(v=>
              <Card key={v.id} onClick={()=>setEditV({...v,price:String(v.price)})}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><div style={{fontWeight:600}}>{v.time} · {v.patientName}</div><div style={{fontSize:13,color:"#7A8FA6"}}>{v.type}</div></div>
                  <div style={{textAlign:"right"}}><div style={{fontWeight:600,marginBottom:4}}>{v.price} zł</div><Badge color={visitStatus(v)==="zakończona"?"#3DAA72":"#0A7C7C"}>{visitStatus(v)}</Badge></div>
                </div>
              </Card>
            )}
            <MiniCalendar visits={visits} today={today}
              onEditVisit={v=>setEditV({...v,price:String(v.price)})}
              onAddVisit={date=>{ setVf({...emptyVisit(),date}); setShowAdd(true); }}
            />
            {tomorrowV.length>0&&<>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:700,marginBottom:10,marginTop:8}}>Jutro ({tomorrowV.length})</div>
              {tomorrowV.map(v=>
                <Card key={v.id} style={{opacity:.85}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div><div style={{fontWeight:600}}>{v.time} · {v.patientName}</div><div style={{fontSize:13,color:"#7A8FA6"}}>{v.type}</div></div>
                    <div style={{fontWeight:600}}>{v.price} zł</div>
                  </div>
                </Card>
              )}
            </>}
            {upcoming.length>0&&<>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:700,marginBottom:10,marginTop:8}}>Najbliższe zwroty</div>
              {upcoming.map(r=>{const d=dateDiff(today,r.endDate);return(
                <Card key={r.id} onClick={()=>goToRental(r.id)}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div><div style={{fontWeight:600}}>{r.equipment}</div><div style={{fontSize:13,color:"#7A8FA6"}}>{r.patientName} · {r.endDate}</div></div>
                    <Badge color={d<0?"#E05C5C":d===0?"#F4A261":d<7?"#F4A261":"#3DAA72"}>{d<0?Math.abs(d)+"d po term.":d===0?"Dziś!":d+"d"}</Badge>
                  </div>
                </Card>
              );})}
            </>}
            {unpaidCycles.length>0&&<>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:700,marginBottom:10,marginTop:8}}>Do opłacenia 🔄</div>
              {unpaidCycles.map(r=>{const n=(r.cycles||[]).filter(c=>!c.paid).length;return(
                <Card key={r.id} onClick={()=>goToRental(r.id)} style={{borderLeft:"3px solid #E05C5C"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div><div style={{fontWeight:600}}>{r.equipment}</div><div style={{fontSize:13,color:"#7A8FA6"}}>{r.patientName}</div></div>
                    <Badge color="#E05C5C">{n} {n===1?"miesiąc":"mies."}</Badge>
                  </div>
                </Card>
              );})}
            </>}
          </div>
        </div>

        {showAdd&&<Modal title="Nowa wizyta" onClose={()=>setShowAdd(false)}>
          <PatientPicker label="Pacjent *" value={vf.patientName} onChange={v=>setVf(f=>({...f,patientName:v}))} onSelect={p=>setVf(f=>({...f,patientName:p.name,patientId:p.id}))} patients={patients}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Inp label="Data" value={vf.date} onChange={v=>setVf(f=>({...f,date:v}))} type="date"/>
            <Inp label="Godzina" value={vf.time} onChange={v=>setVf(f=>({...f,time:v}))} type="time"/>
          </div>
          <Sel label="Typ" value={vf.type} onChange={v=>setVf(f=>({...f,type:v}))} options={VISIT_TYPES.map(x=>({value:x,label:x}))}/>
          <Inp label="Cena (zł)" value={vf.price} onChange={v=>setVf(f=>({...f,price:v}))} type="number"/>
          <Sel label="Status" value={vf.status} onChange={v=>setVf(f=>({...f,status:v}))} options={[{value:"zaplanowana",label:"📅 Zaplanowana"},{value:"zakończona",label:"✅ Zakończona"}]}/>
          <Btn onClick={saveNew} disabled={!vf.patientName} style={{width:"100%",justifyContent:"center"}}>Zapisz wizytę</Btn>
        </Modal>}

        {editV&&<Modal title="Edytuj wizytę" onClose={()=>setEditV(null)}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Inp label="Data" value={editV.date} onChange={v=>setEditV(f=>({...f,date:v}))} type="date"/>
            <Inp label="Godzina" value={editV.time} onChange={v=>setEditV(f=>({...f,time:v}))} type="time"/>
          </div>
          <Sel label="Typ" value={editV.type} onChange={v=>setEditV(f=>({...f,type:v}))} options={VISIT_TYPES.map(x=>({value:x,label:x}))}/>
          <Inp label="Cena (zł)" value={editV.price} onChange={v=>setEditV(f=>({...f,price:v}))} type="number"/>
          <Sel label="Status" value={editV.status||"zaplanowana"} onChange={v=>setEditV(f=>({...f,status:v}))} options={[{value:"zaplanowana",label:"📅 Zaplanowana"},{value:"zakończona",label:"✅ Zakończona"}]}/>
          <Btn onClick={saveEdit} style={{width:"100%",justifyContent:"center",marginBottom:8}}>Zapisz zmiany</Btn>
          <Btn variant="danger" onClick={()=>setConfirmDel(editV.id)} style={{width:"100%",justifyContent:"center"}}>🗑️ Usuń wizytę</Btn>
        </Modal>}

        {confirmDel&&<Modal title="Usuń wizytę" onClose={()=>setConfirmDel(null)}>
          <div style={{fontSize:15,marginBottom:20}}>Na pewno usunąć tę wizytę?</div>
          <div style={{display:"flex",gap:10}}>
            <Btn variant="secondary" style={{flex:1,justifyContent:"center"}} onClick={()=>setConfirmDel(null)}>Anuluj</Btn>
            <Btn variant="danger" style={{flex:1,justifyContent:"center"}} onClick={()=>delVisit(confirmDel)}>Usuń</Btn>
          </div>
        </Modal>}
        {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      </>;
    }

    // ── PATIENTS ──────────────────────────────────────────────────────────────
    function Patients({patients,setPatients,visits,setVisits,finances,setFinances,rentals,setRentals}) {
      const [selId,setSelId]=useState(null);
      const [showAdd,setShowAdd]=useState(false);
      const [showEdit,setShowEdit]=useState(false);
      const [confirmDelPat,setConfirmDelPat]=useState(false);
      const [editForm,setEditForm]=useState(null);
      const [newForm,setNewForm]=useState({name:"",phone:"",address:"",diagnosis:"",notes:""});
      const [showAddV,setShowAddV]=useState(false);
      const [vf,setVf]=useState(emptyVisit);
      const [editV,setEditV]=useState(null);
      const [confirmDelV,setConfirmDelV]=useState(null);
      const [search,setSearch]=useState("");
      const [toast,setToast]=useState(null);

      const pat = selId ? patients.find(p=>p.id===selId) : null;
      if(selId && !pat) { setSelId(null); return null; }

      const patVisits = pat ? visits.filter(v=>v.patientId===pat.id) : [];
      const patRentals = pat ? rentals.filter(r=>r.patientId===pat.id||r.patientName===pat.name) : [];
      const history = [...patVisits.map(v=>({...v,_t:"v",_d:v.date,_time:v.time||"00:00"})),...patRentals.map(r=>({...r,_t:"r",_d:r.startDate,_time:"00:00"}))].sort((a,b)=>b._d.localeCompare(a._d)||b._time.localeCompare(a._time));

      const patTotalVisits = pat ? patVisits.filter(v=>visitStatus(v)==="zakończona").reduce((s,v)=>s+(+v.price||0),0) : 0;
      const patTotalRentals = pat ? patRentals.reduce((s,r)=>s+(r.renewable?(r.cycles||[]).filter(c=>c.paid).reduce((ss,c)=>ss+c.amount,0):(r.amountPaid||0)),0) : 0;
      const patTotal = patTotalVisits + patTotalRentals;

      const syncFinance = (v,isNew) => {
        const done = v.status==="zakończona"||new Date(v.date+"T"+(v.time||"00:00")+":00")<=new Date();
        if(!done) return;
        const sid="visit-"+v.id;
        setFinances(fs=>{
          const ex=fs.some(f=>f.sourceId===sid);
          if(isNew&&!ex) return [{id:Date.now()+Math.random(),sourceId:sid,date:v.date,type:"przychód",category:"Wizyta",amount:v.price||0,description:"Wizyta – "+v.patientName},...fs];
          if(!isNew) return ex?fs.map(f=>f.sourceId===sid?{...f,amount:v.price,description:"Wizyta – "+v.patientName,date:v.date}:f):[{id:Date.now()+Math.random(),sourceId:sid,date:v.date,type:"przychód",category:"Wizyta",amount:v.price||0,description:"Wizyta – "+v.patientName},...fs];
          return fs;
        });
      };



      if(pat) {
        const maps=pat.address?`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(pat.address)}`:null;
        return <>
          <div>
            <button onClick={()=>setSelId(null)} style={{background:"none",border:"none",display:"flex",alignItems:"center",gap:6,color:"#0A7C7C",fontWeight:600,cursor:"pointer",padding:"20px 20px 0",fontFamily:"inherit",fontSize:14}}>
              <Ico d={I.back} s={18} c="#0A7C7C"/> Pacjenci
            </button>
            <div style={{padding:"16px 20px 0"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <Av name={pat.name}/>
                  <div><div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800}}>{pat.name}</div><div style={{fontSize:13,color:"#7A8FA6"}}>{pat.phone}</div></div>
                </div>
                <Btn small variant="secondary" onClick={()=>{setEditForm({...pat});setConfirmDelPat(false);setShowEdit(true);}}>✏️ Edytuj</Btn>
              </div>

              <Card style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:pat.address?10:0}}>
                  <div style={{fontSize:14,color:"#7A8FA6"}}>{pat.phone||"Brak telefonu"}</div>
                  {pat.phone&&<a href={`tel:${pat.phone.replace(/\s/g,"")}`} style={{textDecoration:"none"}}><Btn small variant="secondary"><Ico d={I.ph} s={15} c="#0A7C7C"/> Zadzwoń</Btn></a>}
                </div>
                {pat.address&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:14,color:"#7A8FA6",flex:1,paddingRight:8}}>{pat.address}</div>
                  {maps&&<a href={maps} target="_blank" rel="noreferrer" style={{textDecoration:"none",flexShrink:0}}><Btn small variant="secondary">🗺️ Trasa</Btn></a>}
                </div>}
              </Card>
              {pat.diagnosis&&<Card style={{marginBottom:10,background:"#F0EDFF",border:"1.5px solid #7C6AF430"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#7C6AF4",textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Diagnoza</div>
                <div style={{fontSize:14,lineHeight:1.6}}>{pat.diagnosis}</div>
              </Card>}
              {pat.notes&&<Card style={{marginBottom:10,background:"#FFFBF5",border:"1.5px solid #F4A26130"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#F4A261",textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Notatki</div>
                <div style={{fontSize:14,lineHeight:1.6}}>{pat.notes}</div>
              </Card>}

              {patTotal>0&&<Card style={{marginBottom:10,background:"#E6F4F4",border:"1.5px solid #0A7C7C30"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#0A7C7C",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Łącznie zapłacono</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                  {[{l:"Wizyty",v:patTotalVisits,c:"#0A7C7C"},{l:"Wypożyczenia",v:patTotalRentals,c:"#7C6AF4"},{l:"Razem",v:patTotal,c:"#1C2B3A"}].map((x,i)=>(
                    <div key={i} style={{background:"#fff",borderRadius:12,padding:"10px 8px",textAlign:"center",border:"1.5px solid #E4EAF0"}}>
                      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14,color:x.c}}>{x.v} zł</div>
                      <div style={{fontSize:11,color:"#7A8FA6",marginTop:2}}>{x.l}</div>
                    </div>
                  ))}
                </div>
              </Card>}

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:700}}>Historia ({history.length})</div>
                <Btn small onClick={()=>{setVf({...emptyVisit(),patientName:pat.name,patientId:pat.id});setShowAddV(true);}}><Ico d={I.plus} s={15} c="#fff"/> Wizyta</Btn>
              </div>
              {history.length===0?<Empty text="Brak historii"/>:history.map(item=>
                item._t==="v"
                ? <Card key={"v"+item.id} onClick={()=>setEditV({...item,price:String(item.price)})}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div><div style={{fontSize:11,fontWeight:700,color:"#0A7C7C",textTransform:"uppercase",letterSpacing:.5,marginBottom:2}}>Wizyta</div><div style={{fontWeight:600}}>{item.date} · {item.time}</div><div style={{fontSize:13,color:"#7A8FA6"}}>{item.type}</div></div>
                      <div style={{textAlign:"right"}}><div style={{fontWeight:600,marginBottom:4}}>{item.price} zł</div><Badge color={visitStatus(item)==="zakończona"?"#3DAA72":"#0A7C7C"}>{visitStatus(item)}</Badge></div>
                    </div>
                  </Card>
                : <Card key={"r"+item.id} style={{background:"#F0EDFF"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div><div style={{fontSize:11,fontWeight:700,color:"#7C6AF4",textTransform:"uppercase",letterSpacing:.5,marginBottom:2}}>Wypożyczenie</div><div style={{fontWeight:600}}>{item.equipment}</div><div style={{fontSize:13,color:"#7A8FA6"}}>{item.startDate}{item.endDate?" → "+item.endDate:""}</div></div>
                      <div style={{textAlign:"right"}}><div style={{fontWeight:600,marginBottom:4}}>{item.amount} zł</div><Badge color={item.status==="zakończone"?"#7A8FA6":"#7C6AF4"}>{item.status}</Badge></div>
                    </div>
                  </Card>
              )}
            </div>
          </div>

          {/* Modal: edytuj pacjenta */}
          {showEdit&&editForm&&<Modal title="Edytuj pacjenta" onClose={()=>{setShowEdit(false);setEditForm(null);setConfirmDelPat(false);}}>
            <Inp label="Imię i nazwisko" value={editForm.name||""} onChange={v=>setEditForm(f=>({...f,name:v}))} placeholder="Jan Kowalski"/>
            <Inp label="Telefon" value={editForm.phone||""} onChange={v=>setEditForm(f=>({...f,phone:v}))} placeholder="600 000 000" type="tel"/>
            <Inp label="Adres" value={editForm.address||""} onChange={v=>setEditForm(f=>({...f,address:v}))} placeholder="ul. Przykładowa 1, Gliwice"/>
            <Txa label="Diagnoza" value={editForm.diagnosis||""} onChange={v=>setEditForm(f=>({...f,diagnosis:v}))} rows={2}/>
            <Txa label="Notatki" value={editForm.notes||""} onChange={v=>setEditForm(f=>({...f,notes:v}))} rows={2}/>
            {!confirmDelPat
              ? <>
                  <Btn style={{width:"100%",justifyContent:"center",marginBottom:8}} onClick={()=>{
                    const _pid=editForm.id;
                    const _old=patients.find(p=>p.id===_pid)?.name||editForm.name;
                    const _new=editForm.name||_old;
                    setPatients(ps=>ps.map(p=>p.id===_pid?{...p,...editForm}:p));
                    if(_new!==_old){
                      setVisits(vs=>vs.map(v=>v.patientId===_pid?{...v,patientName:_new}:v));
                      setFinances(fs=>fs.map(f=>f.description?{...f,description:f.description.split(_old).join(_new)}:f));
                    }
                    setRentals(rs=>rs.map(r=>{
                      if(r.patientId!==_pid&&r.patientName!==_old) return r;
                      return {...r,patientName:_new,phone:editForm.phone,address:editForm.address,patientId:_pid};
                    }));
                    setShowEdit(false);
                    setEditForm(null);
                    setToast("Zapisano zmiany");
                  }}>Zapisz zmiany</Btn>
                  <Btn variant="danger" style={{width:"100%",justifyContent:"center"}} onClick={()=>setConfirmDelPat(true)}>🗑️ Usuń pacjenta</Btn>
                </>
              : <>
                  <div style={{background:"#FEE2E2",borderRadius:12,padding:14,marginBottom:12,fontSize:14,color:"#E05C5C",textAlign:"center",fontWeight:600}}>Na pewno usunąć pacjenta i wszystkie jego dane?</div>
                  <div style={{display:"flex",gap:10}}>
                    <Btn variant="secondary" style={{flex:1,justifyContent:"center"}} onClick={()=>setConfirmDelPat(false)}>Anuluj</Btn>
                    <Btn variant="danger" style={{flex:1,justifyContent:"center"}} onClick={()=>{
                      const _pid=editForm.id;
                      const _pn=editForm.name;
                      const _pr=rentals.filter(r=>r.patientId===_pid||r.patientName===_pn);
                      const _vids=visits.filter(v=>v.patientId===_pid).map(v=>v.id);
                      const _pids=_pr.flatMap(r=>(r.payments||[]).map(p=>p.id));
                      const _cids=_pr.flatMap(r=>(r.cycles||[]).map(c=>"cycle-"+r.id+"-"+c.month));
                      setVisits(vs=>vs.filter(v=>v.patientId!==_pid));
                      setRentals(rs=>rs.filter(r=>r.patientId!==_pid&&r.patientName!==_pn));
                      setFinances(fs=>fs.filter(f=>!_vids.some(id=>f.sourceId==="visit-"+id)&&!_pids.some(id=>f.sourceId==="payment-"+id)&&!_cids.some(cid=>f.sourceId===cid)));
                      setPatients(ps=>ps.filter(p=>p.id!==_pid));
                      setShowEdit(false);
                      setEditForm(null);
                      setSelId(null);
                    }}>Tak, usuń</Btn>
                  </div>
                </>
            }
          </Modal>}

          {showAddV&&<Modal title="Nowa wizyta" onClose={()=>setShowAddV(false)}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Inp label="Data" value={vf.date} onChange={v=>setVf(f=>({...f,date:v}))} type="date"/>
              <Inp label="Godzina" value={vf.time} onChange={v=>setVf(f=>({...f,time:v}))} type="time"/>
            </div>
            <Sel label="Typ" value={vf.type} onChange={v=>setVf(f=>({...f,type:v}))} options={VISIT_TYPES.map(x=>({value:x,label:x}))}/>
            <Inp label="Cena (zł)" value={vf.price} onChange={v=>setVf(f=>({...f,price:v}))} type="number"/>
            <Sel label="Status" value={vf.status} onChange={v=>setVf(f=>({...f,status:v}))} options={[{value:"zaplanowana",label:"📅 Zaplanowana"},{value:"zakończona",label:"✅ Zakończona"}]}/>
            <Btn onClick={()=>{const nv={id:Date.now(),patientId:pat.id,patientName:pat.name,...vf,price:+vf.price};setVisits(vs=>[...vs,nv]);syncFinance(nv,true);setShowAddV(false);setToast("Wizyta dodana");}} style={{width:"100%",justifyContent:"center"}}>Zapisz wizytę</Btn>
          </Modal>}

          {editV&&<Modal title="Edytuj wizytę" onClose={()=>setEditV(null)}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Inp label="Data" value={editV.date} onChange={v=>setEditV(f=>({...f,date:v}))} type="date"/>
              <Inp label="Godzina" value={editV.time} onChange={v=>setEditV(f=>({...f,time:v}))} type="time"/>
            </div>
            <Sel label="Typ" value={editV.type} onChange={v=>setEditV(f=>({...f,type:v}))} options={VISIT_TYPES.map(x=>({value:x,label:x}))}/>
            <Inp label="Cena (zł)" value={editV.price} onChange={v=>setEditV(f=>({...f,price:v}))} type="number"/>
            <Sel label="Status" value={editV.status||"zaplanowana"} onChange={v=>setEditV(f=>({...f,status:v}))} options={[{value:"zaplanowana",label:"📅 Zaplanowana"},{value:"zakończona",label:"✅ Zakończona"}]}/>
            <Btn onClick={()=>{const u={...editV,price:+editV.price};setVisits(vs=>vs.map(v=>v.id===u.id?{...v,...u}:v));syncFinance(u,false);setEditV(null);setToast("Zmiany zapisane");}} style={{width:"100%",justifyContent:"center",marginBottom:8}}>Zapisz zmiany</Btn>
            <Btn variant="danger" onClick={()=>setConfirmDelV(editV.id)} style={{width:"100%",justifyContent:"center"}}>🗑️ Usuń wizytę</Btn>
          </Modal>}

          {confirmDelV&&<Modal title="Usuń wizytę" onClose={()=>setConfirmDelV(null)}>
            <div style={{fontSize:15,marginBottom:20}}>Na pewno usunąć tę wizytę?</div>
            <div style={{display:"flex",gap:10}}>
              <Btn variant="secondary" style={{flex:1,justifyContent:"center"}} onClick={()=>setConfirmDelV(null)}>Anuluj</Btn>
              <Btn variant="danger" style={{flex:1,justifyContent:"center"}} onClick={()=>{setVisits(vs=>vs.filter(v=>v.id!==confirmDelV));setFinances(fs=>fs.filter(f=>f.sourceId!=="visit-"+confirmDelV));setConfirmDelV(null);setEditV(null);}}>Usuń</Btn>
            </div>
          </Modal>}
          {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
        </>;
      }

      // Lista pacjentów
      const sl=search.toLowerCase(),sn=search.replace(/\s/g,"");
      const filtered=patients.filter(p=>p.name.toLowerCase().includes(sl)||(p.phone||"").replace(/\s/g,"").includes(sn)||(p.address||"").toLowerCase().includes(sl)||(p.diagnosis||"").toLowerCase().includes(sl)||(p.notes||"").toLowerCase().includes(sl));
      const [sort,setSort]=useState("alpha");
      const lastVisitDate=p=>visits.filter(v=>v.patientId===p.id).map(v=>v.date).sort((a,b)=>b.localeCompare(a))[0]||"";
      const sorted=[...filtered].sort((a,b)=>sort==="alpha"?a.name.localeCompare(b.name,"pl"):lastVisitDate(b).localeCompare(lastVisitDate(a)));
      return <div>
        <div style={{padding:"28px 20px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800}}>Pacjenci</div><div style={{fontSize:13,color:"#7A8FA6"}}>{patients.length} pacjentów</div></div>
          <Btn small onClick={()=>setShowAdd(true)}><Ico d={I.plus} s={16} c="#fff"/> Nowy</Btn>
        </div>
        <div style={{padding:"0 20px"}}>
          <Inp value={search} onChange={setSearch} placeholder="🔍 Szukaj..."/>
          <div style={{display:"flex",gap:6,marginBottom:12}}>
            {[{k:"alpha",l:"A–Z"},{k:"recent",l:"Ostatnio aktywni"}].map(x=><button key={x.k} onClick={()=>setSort(x.k)} style={{padding:"7px 14px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:12,background:sort===x.k?"#0A7C7C":"#E4EAF0",color:sort===x.k?"#fff":"#7A8FA6",fontFamily:"inherit"}}>{x.l}</button>)}
          </div>
          {search&&sorted.length===0&&<Empty text="Nie znaleziono pacjenta"/>}
          {sorted.map(p=>{const lv=lastVisitDate(p);return(<Card key={p.id} onClick={()=>setSelId(p.id)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",gap:12,alignItems:"center"}}>
                <Av name={p.name}/>
                <div>
                  <div style={{fontWeight:600}}>{p.name}</div>
                  <div style={{fontSize:13,color:"#7A8FA6"}}>{p.phone}</div>
                  {sort==="recent"&&lv&&<div style={{fontSize:11,color:"#0A7C7C",marginTop:2}}>ostatnia wizyta: {lv}</div>}
                </div>
              </div>
              <Ico d="M9 18l6-6-6-6" s={20} c="#7A8FA6"/>
            </div>
            {p.diagnosis&&<div style={{fontSize:12,color:"#7A8FA6",marginTop:8,paddingTop:8,borderTop:"1px solid #E4EAF0"}}>{p.diagnosis}</div>}
          </Card>);})}
        </div>
        {showAdd&&<Modal title="Nowy pacjent" onClose={()=>setShowAdd(false)}>
          <Inp label="Imię i nazwisko *" value={newForm.name} onChange={v=>setNewForm(f=>({...f,name:v}))} placeholder="Jan Kowalski"/>
          <Inp label="Telefon" value={newForm.phone} onChange={v=>setNewForm(f=>({...f,phone:v}))} placeholder="600 000 000" type="tel"/>
          <Inp label="Adres" value={newForm.address} onChange={v=>setNewForm(f=>({...f,address:v}))} placeholder="ul. Przykładowa 1, Gliwice"/>
          <Txa label="Diagnoza" value={newForm.diagnosis} onChange={v=>setNewForm(f=>({...f,diagnosis:v}))} rows={2}/>
          <Txa label="Notatki" value={newForm.notes} onChange={v=>setNewForm(f=>({...f,notes:v}))} rows={2}/>
          <Btn disabled={!newForm.name} style={{width:"100%",justifyContent:"center"}} onClick={()=>{if(!newForm.name)return;setPatients(ps=>[...ps,{...newForm,id:Date.now()}]);setNewForm({name:"",phone:"",address:"",diagnosis:"",notes:""});setShowAdd(false);}}>Dodaj pacjenta</Btn>
        </Modal>}
      </div>;
    }

    // ── RENTALS ───────────────────────────────────────────────────────────────
    function PaymentForm({rentalId,rentalAmount,amountPaid,patientName,equipment,setRentals,setFinances}) {
      const [amt,setAmt]=useState("");
      const [date,setDate]=useState(todayLocal);
      const add=()=>{
        const v=+amt; if(!v) return;
        const rem=rentalAmount-(amountPaid||0);
        if(v>rem){alert(`Wpłata (${v} zł) przekracza pozostałą kwotę (${rem} zł)`);return;}
        const np={id:Date.now(),amount:v,date};
        setRentals(rs=>rs.map(x=>x.id===rentalId?{...x,payments:[...(x.payments||[]),np],amountPaid:Math.min((x.amountPaid||0)+v,rentalAmount)}:x));
        setFinances(fs=>[{id:Date.now()+Math.random(),sourceId:"payment-"+np.id,date,type:"przychód",category:"Wypożyczalnia",amount:v,description:"Wypożyczenie – "+patientName+" ("+equipment+")"},...fs]);
        setAmt("");
      };
      return <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:8}}>
        <div style={{display:"flex",gap:8}}>
          <input type="number" value={amt} onChange={e=>setAmt(e.target.value)} placeholder="Kwota wpłaty..." style={{flex:1,padding:"10px 14px",border:"1.5px solid #E4EAF0",borderRadius:12,fontSize:14,outline:"none",background:"#FAFCFD",fontFamily:"inherit"}}/>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{flex:1,padding:"10px 14px",border:"1.5px solid #E4EAF0",borderRadius:12,fontSize:14,outline:"none",background:"#FAFCFD",fontFamily:"inherit"}}/>
        </div>
        <button onClick={add} style={{background:"#0A7C7C",color:"#fff",border:"none",borderRadius:12,padding:10,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>+ Dodaj wpłatę</button>
      </div>;
    }

    function HistoryFill({r,setRentals,setFinances}) {
      const cm=todayLocal().slice(0,7);
      // Generate all months from startDate month to current month
      const months=[];
      const [sy,sm]=r.startDate.split("-").map(Number);
      const [cy,cmn]=cm.split("-").map(Number);
      const startDay=r.startDate.split("-")[2]; // e.g. "08"
      let y=sy,m=sm;
      while(y<cy||(y===cy&&m<=cmn)){
        const mStr=y+"-"+String(m).padStart(2,"0");
        // paidDate = same day as startDate but capped to last day of that month
        const lastDay=new Date(y,m,0).getDate();
        const day=Math.min(+startDay,lastDay);
        const paidDate=mStr+"-"+String(day).padStart(2,"0");
        months.push({month:mStr,paidDate});
        m++;if(m>12){m=1;y++;}
      }
      const [checked,setChecked]=useState(()=>Object.fromEntries(months.map(x=>[x.month,true])));
      const [amounts,setAmounts]=useState(()=>Object.fromEntries(months.map(x=>[x.month,String(r.amount||"")])));
      const [bulkAmt,setBulkAmt]=useState(String(r.amount||""));
      const allChecked=months.every(x=>checked[x.month]);
      return <div>
        <div style={{background:"#FFF8E6",border:"1.5px solid #F4A26140",borderRadius:14,padding:14,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>📋 Uzupełnij historię płatności</div>
          <div style={{fontSize:13,color:"#7A8FA6",lineHeight:1.5}}>To wypożyczenie trwa od {r.startDate}. Zaznacz które miesiące zostały opłacone i podaj kwoty, następnie zatwierdź.</div>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}>
          <input type="number" value={bulkAmt} onChange={e=>{setBulkAmt(e.target.value);setAmounts(a=>Object.fromEntries(Object.keys(a).map(k=>[k,e.target.value])));}} placeholder="Kwota dla wszystkich..." style={{flex:1,padding:"10px 14px",border:"1.5px solid #E4EAF0",borderRadius:12,fontSize:14,outline:"none",background:"#FAFCFD",fontFamily:"inherit"}}/>
          <button onClick={()=>setChecked(c=>Object.fromEntries(Object.keys(c).map(k=>[k,!allChecked])))} style={{padding:"10px 14px",borderRadius:12,border:"1.5px solid #E4EAF0",background:allChecked?"#0A7C7C":"#fff",color:allChecked?"#fff":"#7A8FA6",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>{allChecked?"✓ Wszystkie":"Zaznacz wszystkie"}</button>
        </div>
        <div style={{borderRadius:12,border:"1.5px solid #E4EAF0",overflow:"hidden",marginBottom:14}}>
          {months.map((x,i)=>{
            const label=new Date(x.month+"-15").toLocaleDateString("pl-PL",{month:"long",year:"numeric"});
            return <div key={x.month} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderBottom:i<months.length-1?"1px solid #F2F5F7":"none",background:checked[x.month]?"#F6FFF9":"#FAFCFD"}}>
              <button onClick={()=>setChecked(c=>({...c,[x.month]:!c[x.month]}))} style={{width:22,height:22,borderRadius:6,border:`2px solid ${checked[x.month]?"#3DAA72":"#E4EAF0"}`,background:checked[x.month]?"#3DAA72":"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,padding:0}}>
                {checked[x.month]&&<span style={{color:"#fff",fontSize:13,lineHeight:1}}>✓</span>}
              </button>
              <div style={{flex:1,fontSize:14,fontWeight:checked[x.month]?600:400,color:checked[x.month]?"#1C2B3A":"#7A8FA6",textTransform:"capitalize"}}>{label}<div style={{fontSize:11,color:"#7A8FA6",fontWeight:400}}>{x.paidDate}</div></div>
              <input type="number" value={amounts[x.month]||""} onChange={e=>setAmounts(a=>({...a,[x.month]:e.target.value}))} disabled={!checked[x.month]} style={{width:80,padding:"7px 10px",border:"1.5px solid #E4EAF0",borderRadius:10,fontSize:13,outline:"none",background:checked[x.month]?"#FAFCFD":"#F2F5F7",fontFamily:"inherit",textAlign:"right",color:checked[x.month]?"#1C2B3A":"#7A8FA6"}}/>
              <span style={{fontSize:13,color:"#7A8FA6"}}>zł</span>
            </div>;
          })}
        </div>
        <Btn style={{width:"100%",justifyContent:"center"}} onClick={()=>{
          const newCycles=months.map(x=>({month:x.month,amount:+(amounts[x.month]||0),paid:!!checked[x.month],paidDate:checked[x.month]?x.paidDate:null}));
          setRentals(rs=>rs.map(rr=>rr.id===r.id?{...rr,cycles:newCycles}:rr));
          const newFinances=months.filter(x=>checked[x.month]&&+(amounts[x.month]||0)>0).map(x=>{
            const label=new Date(x.month+"-15").toLocaleDateString("pl-PL",{month:"long",year:"numeric"});
            return {id:Date.now()+Math.random(),sourceId:"cycle-"+r.id+"-"+x.month,date:x.paidDate,type:"przychód",category:"Wypożyczalnia",amount:+(amounts[x.month]||0),description:"Wypożyczenie – "+r.patientName+" ("+r.equipment+") "+label};
          });
          if(newFinances.length)setFinances(fs=>[...newFinances,...fs]);
        }}>✓ Zatwierdź historię ({months.filter(x=>checked[x.month]).length} mies.)</Btn>
      </div>;
    }

    function CycleRow({r,cycle,setRentals,setFinances}) {
      const [amt,setAmt]=useState(String(cycle.amount||""));
      const label=new Date(cycle.month+"-15").toLocaleDateString("pl-PL",{month:"long",year:"numeric"});
      const sid="cycle-"+r.id+"-"+cycle.month;
      if(cycle.paid) return (
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #F2F5F7"}}>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:"#3DAA72",flexShrink:0}}/>
            <div><div style={{fontWeight:600,fontSize:14,textTransform:"capitalize"}}>{label}</div><div style={{fontSize:12,color:"#7A8FA6"}}>{cycle.amount} zł · {cycle.paidDate}</div></div>
          </div>
          <button onClick={()=>{setRentals(rs=>rs.map(x=>x.id===r.id?{...x,cycles:(x.cycles||[]).map(c=>c.month===cycle.month?{...c,paid:false,paidDate:null}:c)}:x));setFinances(fs=>fs.filter(f=>f.sourceId!==sid));}} style={{background:"#FEE2E2",border:"none",borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:600,color:"#E05C5C",cursor:"pointer",fontFamily:"inherit"}}>Anuluj</button>
        </div>
      );
      return (
        <div style={{padding:"10px 0",borderBottom:"1px solid #F2F5F7"}}>
          <div style={{fontWeight:600,fontSize:14,textTransform:"capitalize",marginBottom:8,color:"#E05C5C"}}>⚠️ {label}</div>
          <div style={{display:"flex",gap:8}}>
            <input type="number" value={amt} onChange={e=>setAmt(e.target.value)} placeholder="Kwota..." style={{flex:1,padding:"10px 14px",border:"1.5px solid #E4EAF0",borderRadius:12,fontSize:14,outline:"none",background:"#FAFCFD",fontFamily:"inherit"}}/>
            <button onClick={()=>{const v=+amt;if(!v)return;setRentals(rs=>rs.map(x=>x.id===r.id?{...x,cycles:(x.cycles||[]).map(c=>c.month===cycle.month?{...c,amount:v,paid:true,paidDate:todayLocal()}:c)}:x));setFinances(fs=>[{id:Date.now()+Math.random(),sourceId:sid,date:todayLocal(),type:"przychód",category:"Wypożyczalnia",amount:v,description:"Wypożyczenie – "+r.patientName+" ("+r.equipment+") "+label},...fs]);}} style={{background:"#0A7C7C",color:"#fff",border:"none",borderRadius:12,padding:"10px 16px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>✓ Opłać</button>
          </div>
        </div>
      );
    }

    function RCard({r,onClick}) {
      const today=todayLocal(),dl=r.endDate?dateDiff(today,r.endDate):null,ov=dl!==null&&dl<0;
      const unpaid=(r.cycles||[]).filter(c=>!c.paid).length;
      return <Card onClick={onClick}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
          <div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}><div style={{fontWeight:700,fontSize:15}}>{r.equipment}</div>{r.renewable&&<Badge color="#7C6AF4">🔄</Badge>}</div><div style={{fontSize:14}}>{r.patientName}</div></div>
          {r.status==="aktywne"&&(r.renewable?<Badge color={unpaid>0?"#E05C5C":"#3DAA72"}>{unpaid>0?unpaid+" nieopłacone":"✓ opłacone"}</Badge>:<Badge color={ov?"#E05C5C":dl<7?"#F4A261":"#3DAA72"}>{ov?Math.abs(dl)+"d po term.":dl===0?"Dziś!":dl+"d"}</Badge>)}
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:"4px 16px",fontSize:12,color:"#7A8FA6"}}>
          <span>📅 {r.startDate}{r.renewable?" → odnawialne":r.endDate?" → "+r.endDate:""}</span>
          <span>💰 {r.amount} zł{r.renewable?"/mies.":""}</span>
          {r.renewable?(unpaid>0?<span style={{color:"#E05C5C",fontWeight:600}}>⚠️ {unpaid} {unpaid===1?"miesiąc":"mies."} do opłacenia</span>:<span style={{color:"#3DAA72",fontWeight:600}}>✓ wszystko opłacone</span>):(r.amount-(r.amountPaid||0))>0?<span style={{color:"#E05C5C",fontWeight:600}}>⚠️ do zapłaty: {r.amount-(r.amountPaid||0)} zł</span>:<span style={{color:"#3DAA72",fontWeight:600}}>✓ opłacone</span>}
        </div>
      </Card>;
    }

    function Rentals({rentals,setRentals,finances,setFinances,patients,initialDetail,onDetailClosed,rentalsView,setRentalsView}) {
      const view=rentalsView||"aktywne",setView=setRentalsView;
      const [showAdd,setShowAdd]=useState(false);
      const [showEdit,setShowEdit]=useState(false);
      const [detail,setDetail]=useState(null);
      const [form,setForm]=useState(emptyRental);
      const [ef,setEf]=useState(null);
      const [confirmDel,setConfirmDel]=useState(false);
      const [toast,setToast]=useState(null);

      useEffect(()=>{if(initialDetail!=null)setDetail(initialDetail);},[initialDetail]);
      const close=()=>{setDetail(null);if(onDetailClosed)onDetailClosed();};

      const cnt={aktywne:rentals.filter(r=>r.status==="aktywne"&&!r.renewable).length,odnawialne:rentals.filter(r=>r.status==="aktywne"&&r.renewable).length,zakończone:rentals.filter(r=>r.status==="zakończone").length};
      const filt=view==="aktywne"?rentals.filter(r=>r.status==="aktywne"&&!r.renewable):view==="odnawialne"?rentals.filter(r=>r.status==="aktywne"&&r.renewable):rentals.filter(r=>r.status==="zakończone");

      if(detail!==null) {
        const r=rentals.find(x=>x.id===detail);
        if(!r){setDetail(null);return null;}
        const today=todayLocal(),dl=r.endDate?dateDiff(today,r.endDate):null,ov=dl!==null&&dl<0;
        const maps=r.address?`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(r.address)}`:null;
        return <>
          <div>
            <button onClick={close} style={{background:"none",border:"none",display:"flex",alignItems:"center",gap:6,color:"#0A7C7C",fontWeight:600,cursor:"pointer",padding:"20px 20px 0",fontFamily:"inherit",fontSize:14}}><Ico d={I.back} s={18} c="#0A7C7C"/> Wypożyczalnia</button>
            <div style={{padding:"16px 20px 0"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
                <div>
                  <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800}}>{r.equipment}</div>
                  {r.renewable?<Badge color="#7C6AF4">🔄 Odnawialne miesięcznie</Badge>:dl!==null&&<Badge color={ov?"#E05C5C":dl<7?"#F4A261":"#3DAA72"}>{ov?Math.abs(dl)+"d po terminie":dl===0?"Termin dziś!":dl+" dni"}</Badge>}
                </div>
                <Btn small variant="secondary" onClick={()=>{setEf({...r,amount:String(r.amount),amountPaid:String(r.amountPaid||0)});setShowEdit(true);}}>✏️ Edytuj</Btn>
              </div>

              <Card style={{marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:700,color:"#7A8FA6",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Pacjent</div>
                <div style={{fontWeight:700,fontSize:16,marginBottom:12}}>{r.patientName}</div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:r.address?10:0}}>
                  <div style={{fontSize:14,color:"#7A8FA6"}}>{r.phone}</div>
                  {r.phone&&<a href={`tel:${r.phone.replace(/\s/g,"")}`} style={{textDecoration:"none"}}><Btn small variant="secondary"><Ico d={I.ph} s={15} c="#0A7C7C"/> Zadzwoń</Btn></a>}
                </div>
                {r.address&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:14,color:"#7A8FA6",flex:1,paddingRight:8}}>{r.address}</div>
                  {maps&&<a href={maps} target="_blank" rel="noreferrer" style={{textDecoration:"none",flexShrink:0}}><Btn small variant="secondary">🗺️ Trasa</Btn></a>}
                </div>}
              </Card>

              <Card style={{marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:700,color:"#7A8FA6",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Wypożyczenie</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                  <div><div style={{fontSize:11,color:"#7A8FA6",marginBottom:3}}>Data od</div><div style={{fontWeight:600}}>{r.startDate}</div></div>
                  <div><div style={{fontSize:11,color:"#7A8FA6",marginBottom:3}}>Data do</div><div style={{fontWeight:600}}>{r.endDate||"—"}</div></div>
                  <div><div style={{fontSize:11,color:"#7A8FA6",marginBottom:3}}>Typ</div><div style={{fontWeight:600}}>{r.renewable?"Odnawialne":"Jednorazowe"}</div></div>
                  {r.transport>0&&<div><div style={{fontSize:11,color:"#7A8FA6",marginBottom:3}}>Transport</div><div style={{fontWeight:600,color:"#F4A261"}}>{r.transport} zł</div></div>}
                </div>
                <div style={{borderTop:"1px solid #E4EAF0",paddingTop:12}}>
                  {r.renewable ? <>
                    <div style={{fontSize:11,fontWeight:700,color:"#7A8FA6",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Cykle miesięczne</div>
                    {(r.cycles||[]).length===0&&r.startDate<todayLocal().slice(0,7)
                      ? <HistoryFill r={r} setRentals={setRentals} setFinances={setFinances}/>
                      : <>
                          {(r.cycles||[]).length===0&&<div style={{fontSize:14,color:"#7A8FA6",textAlign:"center",padding:"12px 0"}}>Brak cykli — pojawią się automatycznie</div>}
                          {[...(r.cycles||[])].sort((a,b)=>b.month.localeCompare(a.month)).map(c=><CycleRow key={c.month} r={r} cycle={c} setRentals={setRentals} setFinances={setFinances}/>)}
                        </>
                    }
                  </> : <>
                    <div style={{fontSize:11,fontWeight:700,color:"#7A8FA6",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Płatność</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                      {[{l:"Kwota",v:r.amount+" zł",c:"#1C2B3A"},{l:"Zapłacono",v:(r.amountPaid||0)+" zł",c:"#3DAA72"},{l:"Pozostało",v:(r.amount-(r.amountPaid||0))+" zł",c:(r.amount-(r.amountPaid||0))>0?"#E05C5C":"#3DAA72"}].map((x,i)=>(
                        <div key={i} style={{background:x.c==="#1C2B3A"?"#F2F5F7":x.c+"14",borderRadius:12,padding:"10px 8px",textAlign:"center",border:`1.5px solid ${x.c==="#1C2B3A"?"#E4EAF0":x.c+"30"}`}}>
                          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14,color:x.c}}>{x.v}</div>
                          <div style={{fontSize:11,color:"#7A8FA6",marginTop:2}}>{x.l}</div>
                        </div>
                      ))}
                    </div>
                    <PaymentForm rentalId={r.id} rentalAmount={r.amount} amountPaid={r.amountPaid||0} patientName={r.patientName} equipment={r.equipment} setRentals={setRentals} setFinances={setFinances}/>
                    {(r.payments||[]).length>0&&<div style={{marginTop:14,paddingTop:12,borderTop:"1px solid #E4EAF0"}}>
                      <div style={{fontSize:11,fontWeight:700,color:"#7A8FA6",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Historia wpłat</div>
                      {[...(r.payments||[])].sort((a,b)=>b.date.localeCompare(a.date)).map(p=>(
                        <div key={p.id} style={{padding:"10px 0",borderBottom:"1px solid #F2F5F7"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                            <div style={{display:"flex",gap:12,alignItems:"center"}}>
                              <div style={{width:8,height:8,borderRadius:"50%",background:"#3DAA72"}}/>
                              <div><div style={{fontWeight:600,fontSize:14}}>{p.amount} zł</div><div style={{fontSize:12,color:"#7A8FA6"}}>{p.date}</div></div>
                            </div>
                            <button onClick={()=>{setRentals(rs=>rs.map(x=>x.id===r.id?{...x,payments:(x.payments||[]).filter(q=>q.id!==p.id),amountPaid:Math.max(0,(x.amountPaid||0)-p.amount)}:x));setFinances(fs=>fs.filter(f=>f.sourceId!=="payment-"+p.id));}} style={{background:"#FEE2E2",border:"none",borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:600,color:"#E05C5C",cursor:"pointer",fontFamily:"inherit"}}>Usuń</button>
                          </div>
                          <div style={{display:"flex",gap:8}}>
                            {[{k:"receipt",l:"🧾 Paragon"},{k:"invoice",l:"📄 Faktura"}].map(opt=>{const ac=p.doc===opt.k;return <button key={opt.k} onClick={()=>setRentals(rs=>rs.map(x=>x.id===r.id?{...x,payments:(x.payments||[]).map(q=>q.id===p.id?{...q,doc:ac?null:opt.k}:q)}:x))} style={{flex:1,padding:"7px 8px",borderRadius:10,fontFamily:"inherit",fontSize:12,fontWeight:600,cursor:"pointer",border:`1.5px solid ${ac?"#0A7C7C":"#E4EAF0"}`,background:ac?"#E6F4F4":"#fff",color:ac?"#0A7C7C":"#7A8FA6",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>{ac&&<span style={{fontSize:10}}>✓</span>}{opt.l}</button>;})}
                          </div>
                        </div>
                      ))}
                    </div>}
                  </>}
                </div>
              </Card>

              {r.renewable&&(r.cycles||[]).length>0&&(()=>{
                const paid=(r.cycles||[]).filter(c=>c.paid);
                const total=paid.reduce((s,c)=>s+c.amount,0);
                const unpaidN=(r.cycles||[]).filter(c=>!c.paid).length;
                return <Card style={{marginBottom:10,background:"#E6F4F4",border:"1.5px solid #0A7C7C30"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#0A7C7C",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Podsumowanie wypożyczenia</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                    {[{l:"Mies. łącznie",v:paid.length,c:"#0A7C7C",suf:""},{l:"Łącznie wpłacono",v:total,c:"#3DAA72",suf:" zł"},{l:"Do opłacenia",v:unpaidN,c:unpaidN>0?"#E05C5C":"#3DAA72",suf:" mies."}].map((x,i)=>(
                      <div key={i} style={{background:"#fff",borderRadius:12,padding:"10px 8px",textAlign:"center",border:"1.5px solid #E4EAF0"}}>
                        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14,color:x.c}}>{x.v}{x.suf}</div>
                        <div style={{fontSize:11,color:"#7A8FA6",marginTop:2}}>{x.l}</div>
                      </div>
                    ))}
                  </div>
                </Card>;
              })()}

              {r.notes&&<Card style={{marginBottom:10,background:"#FFFBF5",border:"1.5px solid #F4A26130"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#F4A261",textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Notatki</div>
                <div style={{fontSize:14,lineHeight:1.6}}>{r.notes}</div>
              </Card>}

              {r.status==="aktywne"&&<>
                <Btn style={{width:"100%",justifyContent:"center",marginBottom:10}} onClick={()=>{setRentals(rs=>rs.map(x=>x.id===r.id?{...x,status:"zakończone"}:x));close();}}><Ico d={I.chk} s={16} c="#fff"/> Sprzęt zwrócony — zakończ</Btn>
              </>}
              {r.status==="zakończone"&&<Btn variant="secondary" style={{width:"100%",justifyContent:"center",marginBottom:10}} onClick={()=>setRentals(rs=>rs.map(x=>x.id===r.id?{...x,status:"aktywne"}:x))}>↩️ Cofnij zakończenie</Btn>}
              <Btn variant="danger" style={{width:"100%",justifyContent:"center",marginTop:4}} onClick={()=>setConfirmDel(true)}>🗑️ Usuń wypożyczenie</Btn>
            </div>
          </div>

          {showEdit&&ef&&<Modal title="Edytuj wypożyczenie" onClose={()=>setShowEdit(false)}>
            <Sel label="Sprzęt" value={ef.equipment} onChange={v=>setEf(f=>({...f,equipment:v}))} options={EQUIPMENT.map(x=>({value:x,label:x}))}/>
            <PatientPicker label="Pacjent" value={ef.patientName} onChange={v=>setEf(f=>({...f,patientName:v}))} onSelect={p=>setEf(f=>({...f,patientName:p.name,phone:p.phone,address:p.address,patientId:p.id}))} patients={patients}/>
            <Inp label="Telefon" value={ef.phone||""} onChange={v=>setEf(f=>({...f,phone:v}))} type="tel"/>
            <Inp label="Adres" value={ef.address||""} onChange={v=>setEf(f=>({...f,address:v}))}/>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Typ</div>
              <div style={{display:"flex",gap:8}}>{[{v:false,l:"Jednorazowe"},{v:true,l:"Odnawialne"}].map(o=><button key={String(o.v)} onClick={()=>setEf(f=>({...f,renewable:o.v}))} style={{flex:1,padding:"10px 8px",borderRadius:12,border:`2px solid ${ef.renewable===o.v?"#0A7C7C":"#E4EAF0"}`,background:ef.renewable===o.v?"#E6F4F4":"#fff",color:ef.renewable===o.v?"#0A7C7C":"#7A8FA6",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{o.l}</button>)}</div>
            </div>
            <Inp label="Data od" value={ef.startDate} onChange={v=>setEf(f=>({...f,startDate:v}))} type="date"/>
            {!ef.renewable&&<Inp label="Data do" value={ef.endDate||""} onChange={v=>setEf(f=>({...f,endDate:v}))} type="date"/>}
            <Inp label="Kwota (zł)" value={ef.amount} onChange={v=>setEf(f=>({...f,amount:v}))} type="number"/>
            <Inp label="Zapłacono (zł)" value={ef.amountPaid} onChange={v=>setEf(f=>({...f,amountPaid:v}))} type="number"/>
            <Inp label="Transport (zł)" value={ef.transport||""} onChange={v=>setEf(f=>({...f,transport:v}))} type="number" placeholder="0"/>
            <Txa label="Notatki" value={ef.notes||""} onChange={v=>setEf(f=>({...f,notes:v}))} rows={2}/>
            <Btn style={{width:"100%",justifyContent:"center"}} onClick={()=>{
              const raw=+ef.amount,pat=patients.find(p=>p.name===ef.patientName);
              const u={...ef,amount:raw,amountPaid:Math.min(+(ef.amountPaid||0),raw),patientId:pat?.id||ef.patientId||null};
              setRentals(rs=>rs.map(x=>x.id===detail?{...x,...u}:x));
              setFinances(fs=>fs.map(f=>{const cur=rentals.find(x=>x.id===detail);if(!cur)return f;if(!(cur.payments||[]).some(p=>f.sourceId==="payment-"+p.id))return f;return{...f,description:"Wypożyczenie – "+u.patientName+" ("+u.equipment+")"};}));
              setShowEdit(false);setToast("Zmiany zapisane");
            }}>Zapisz zmiany</Btn>
          </Modal>}

          {confirmDel&&<Modal title="Usuń wypożyczenie" onClose={()=>setConfirmDel(false)}>
            <div style={{fontSize:15,marginBottom:20}}>Na pewno usunąć to wypożyczenie?</div>
            <div style={{display:"flex",gap:10}}>
              <Btn variant="secondary" style={{flex:1,justifyContent:"center"}} onClick={()=>setConfirmDel(false)}>Anuluj</Btn>
              <Btn variant="danger" style={{flex:1,justifyContent:"center"}} onClick={()=>{const cur=rentals.find(x=>x.id===detail);if(cur){const pids=new Set((cur.payments||[]).map(p=>"payment-"+p.id));const cids=new Set((cur.cycles||[]).map(c=>"cycle-"+cur.id+"-"+c.month));setFinances(fs=>fs.filter(f=>!pids.has(f.sourceId)&&!cids.has(f.sourceId)));}setRentals(rs=>rs.filter(x=>x.id!==detail));setConfirmDel(false);close();}}>Usuń</Btn>
            </div>
          </Modal>}
        </>;
      }

      return <div>
        <div style={{padding:"28px 20px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800}}>Wypożyczalnia</div><div style={{fontSize:13,color:"#7A8FA6"}}>{cnt.aktywne+cnt.odnawialne} aktywnych</div></div>
          <Btn small onClick={()=>{setForm(emptyRental());setShowAdd(true);}}><Ico d={I.plus} s={16} c="#fff"/> Nowe</Btn>
        </div>
        <div style={{display:"flex",gap:6,padding:"0 20px 16px",overflowX:"auto"}}>
          {[{k:"aktywne",l:`Aktywne (${cnt.aktywne})`},{k:"odnawialne",l:`🔄 Odnawialne (${cnt.odnawialne})`},{k:"zakończone",l:`Zakończone (${cnt.zakończone})`}].map(x=>
            <button key={x.k} onClick={()=>setView(x.k)} style={{padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,whiteSpace:"nowrap",background:view===x.k?"#0A7C7C":"#E4EAF0",color:view===x.k?"#fff":"#7A8FA6",fontFamily:"inherit"}}>{x.l}</button>
          )}
        </div>
        <div style={{padding:"0 20px"}}>
          {filt.length===0?<Empty text="Brak wypożyczeń w tej kategorii"/>:filt.map(r=><RCard key={r.id} r={r} onClick={()=>setDetail(r.id)}/>)}
        </div>
        {showAdd&&<Modal title="Nowe wypożyczenie" onClose={()=>setShowAdd(false)}>
          <Sel label="Sprzęt" value={form.equipment} onChange={v=>setForm(f=>({...f,equipment:v}))} options={EQUIPMENT.map(x=>({value:x,label:x}))}/>
          <PatientPicker label="Pacjent *" value={form.patientName} onChange={v=>setForm(f=>({...f,patientName:v}))} onSelect={p=>setForm(f=>({...f,patientName:p.name,phone:p.phone,address:p.address,patientId:p.id}))} patients={patients}/>
          <Inp label="Telefon" value={form.phone} onChange={v=>setForm(f=>({...f,phone:v}))} type="tel"/>
          <Inp label="Adres" value={form.address} onChange={v=>setForm(f=>({...f,address:v}))}/>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Typ</div>
            <div style={{display:"flex",gap:8}}>{[{v:false,l:"Jednorazowe"},{v:true,l:"🔄 Odnawialne miesięcznie"}].map(o=><button key={String(o.v)} onClick={()=>setForm(f=>({...f,renewable:o.v,endDate:o.v?"":f.endDate}))} style={{flex:1,padding:"10px 8px",borderRadius:12,border:`2px solid ${form.renewable===o.v?"#0A7C7C":"#E4EAF0"}`,background:form.renewable===o.v?"#E6F4F4":"#fff",color:form.renewable===o.v?"#0A7C7C":"#7A8FA6",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{o.l}</button>)}</div>
          </div>
          <Inp label="Data od" value={form.startDate} onChange={v=>setForm(f=>({...f,startDate:v}))} type="date"/>
          {!form.renewable&&<Inp label="Data do" value={form.endDate} onChange={v=>setForm(f=>({...f,endDate:v}))} type="date"/>}
          <Inp label="Kwota (zł)" value={form.amount} onChange={v=>setForm(f=>({...f,amount:v}))} type="number" placeholder="400"/>
          {!form.renewable&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Inp label="Zapłacono (zł)" value={form.amountPaid} onChange={v=>setForm(f=>({...f,amountPaid:v}))} type="number" placeholder="0"/>
            <div style={{marginBottom:14}}><div style={{fontSize:12,fontWeight:600,color:"#7A8FA6",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>Pozostało</div><div style={{padding:"11px 14px",border:"1.5px solid #E4EAF0",borderRadius:12,fontSize:15,background:"#F2F5F7",color:(+form.amount-(+form.amountPaid||0))>0?"#E05C5C":"#3DAA72",fontWeight:700}}>{form.amount?(+form.amount-(+form.amountPaid||0))+" zł":"—"}</div></div>
          </div>}
          <Inp label="Transport (zł)" value={form.transport||""} onChange={v=>setForm(f=>({...f,transport:v}))} type="number" placeholder="0"/>
          <Txa label="Notatki" value={form.notes} onChange={v=>setForm(f=>({...f,notes:v}))} rows={2}/>
          <Btn disabled={!form.patientName} style={{width:"100%",justifyContent:"center"}} onClick={()=>{
            if(!form.patientName)return;
            if(!form.renewable&&!form.endDate){alert("Podaj datę końca wypożyczenia");return;}
            const pid=Date.now(),rid=Date.now()+1,paid=form.renewable?0:+(form.amountPaid||0);
            const pat=patients.find(p=>p.name===form.patientName);
            const nr={...form,id:rid,patientId:pat?.id||null,amount:+form.amount,amountPaid:paid,payments:paid>0?[{id:pid,amount:paid,date:form.startDate}]:[],cycles:[],status:"aktywne"};
            setRentals(r=>[nr,...r]);
            if(paid>0)setFinances(fs=>[{id:Date.now()+Math.random(),sourceId:"payment-"+pid,date:form.startDate,type:"przychód",category:"Wypożyczalnia",amount:paid,description:"Wypożyczenie – "+form.patientName+" ("+form.equipment+")"},...fs]);
            setShowAdd(false);setToast("Wypożyczenie dodane");
          }}>Zapisz wypożyczenie</Btn>
        </Modal>}
        {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      </div>;
    }

    // ── FINANCES ──────────────────────────────────────────────────────────────
    function Finances({finances,setFinances}) {
      const [showAdd,setShowAdd]=useState(false);
      const [editE,setEditE]=useState(null);
      const [viewMode,setViewMode]=useState("month"); // "month" | "year"
      const [month,setMonth]=useState(()=>todayLocal().slice(0,7));
      const [year,setYear]=useState(()=>todayLocal().slice(0,4));
      const [toast,setToast]=useState(null);
      const ef=()=>({date:todayLocal(),type:"przychód",category:"Wizyta",amount:"",description:""});
      const [form,setForm]=useState(ef);
      const cats={przychód:["Wizyta","Wypożyczalnia","Konsultacja","Inne"],koszt:["Paliwo","Sprzęt","Marketing","ZUS","Podatki","Inne"]};

      const months=useMemo(()=>{const c=todayLocal().slice(0,7),s=new Set([c]);finances.forEach(f=>{if(f.date)s.add(f.date.slice(0,7));});return Array.from(s).sort((a,b)=>b.localeCompare(a));},[finances]);
      const years=useMemo(()=>{const c=todayLocal().slice(0,4),s=new Set([c]);finances.forEach(f=>{if(f.date)s.add(f.date.slice(0,4));});return Array.from(s).sort((a,b)=>b.localeCompare(a));},[finances]);

      const mly=viewMode==="month"?finances.filter(f=>f.date&&f.date.startsWith(month)):finances.filter(f=>f.date&&f.date.startsWith(year));
      const inc=mly.filter(f=>f.type==="przychód").reduce((s,f)=>s+f.amount,0);
      const cst=mly.filter(f=>f.type==="koszt").reduce((s,f)=>s+f.amount,0);

      // For year view - monthly breakdown
      const yearMonths=useMemo(()=>{
        if(viewMode!=="year")return[];
        const ms=new Set(finances.filter(f=>f.date&&f.date.startsWith(year)).map(f=>f.date.slice(0,7)));
        return Array.from(ms).sort((a,b)=>b.localeCompare(a));
      },[finances,year,viewMode]);

      return <>
        <div>
          <div style={{padding:"28px 20px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800}}>Finanse</div>
            <Btn small onClick={()=>{setForm(ef());setShowAdd(true);}}><Ico d={I.plus} s={16} c="#fff"/> Dodaj</Btn>
          </div>
          <div style={{padding:"0 20px"}}>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              {[{k:"month",l:"Miesiąc"},{k:"year",l:"Rok"}].map(x=><button key={x.k} onClick={()=>setViewMode(x.k)} style={{padding:"8px 16px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,background:viewMode===x.k?"#0A7C7C":"#E4EAF0",color:viewMode===x.k?"#fff":"#7A8FA6",fontFamily:"inherit"}}>{x.l}</button>)}
            </div>
            {viewMode==="month"&&<div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
